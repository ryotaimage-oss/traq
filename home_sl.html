<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – SLホーム</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.logout-btn:hover { border-color: var(--orange); color: var(--text); }

.main { flex: 1; padding: 24px 16px; max-width: 800px; margin: 0 auto; width: 100%; }

.section-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
.section-title .count { background: var(--error); color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 10px; margin-left: 8px; }

/* トラブルカード */
.trouble-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
.trouble-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
}
.trouble-card.pending { border-left: 3px solid var(--orange); }
.trouble-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.trouble-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.trouble-detail { font-size: 13px; margin-bottom: 12px; line-height: 1.6; }
.trouble-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.badge-equipment { background: #1e2a4a; color: #93c5fd; }
.badge-mold      { background: #2a1a3a; color: #c4b5fd; }
.badge-pending   { background: #2a2000; color: #fbbf24; }
.badge-approved  { background: #1a3a1a; color: #4ade80; }
.badge-rejected  { background: #2a1a1a; color: #f87171; }

.btn { padding: 8px 16px; border-radius: var(--radius); font-family: inherit; font-size: 13px; cursor: pointer; border: none; font-weight: 500; }
.btn-approve { background: var(--success); color: #000; }
.btn-reject  { background: none; border: 1px solid var(--error); color: var(--error); }
.btn-approve:hover { opacity: .85; }
.btn-reject:hover  { background: var(--error); color: #fff; }

.reject-area { margin-top: 10px; display: none; }
.reject-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 13px; margin-bottom: 8px;
}
.reject-input:focus { outline: none; border-color: var(--error); }
.btn-reject-confirm { background: var(--error); color: #fff; border: none; border-radius: var(--radius); padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; }

.empty { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

/* トースト */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap; }
.toast.success { border-color: var(--success); }
.toast.error   { border-color: var(--error); }
.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub" id="header-sub">SLホーム</div>
  </div>
  <div class="header-right">
    <span class="user-info" id="header-user"></span>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</header>

<main class="main">

  <!-- サブメニュー -->
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
    <button style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:10px;font-size:13px;" onclick="location.href='dashboard.html'"><span>📊</span> ダッシュボード</button>
    <button style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:10px;font-size:13px;" onclick="location.href='excel_download.html'"><span>📥</span> Excelダウンロード</button>
    <button style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:10px;font-size:13px;" onclick="location.href='settings.html'"><span>⚙️</span> 設定</button>
  </div>

  <!-- 承認待ち -->
  <div class="section-title">
    🔔 承認待ち<span class="count hidden" id="pending-count">0</span>
  </div>
  <div id="pending-list">
    <div class="loading"><span class="spinner"></span>読込中...</div>
  </div>

  <!-- 処理済み -->
  <div class="section-title" style="margin-top:24px;">
    ✅ 処理済み（直近20件）
  </div>
  <div id="done-list">
    <div class="loading"><span class="spinner"></span>読込中...</div>
  </div>

</main>

<!-- トースト -->
<div class="toast hidden" id="toast"></div>

<script>
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  if (session.role !== 'sl' && session.role !== 'admin') { location.href = 'home.html'; return; }
  document.getElementById('header-user').textContent = session.name + ' (' + session.shift + '直)';
  document.getElementById('header-sub').textContent  = session.shift + '直 SLホーム';
})();

function logout() {
  localStorage.removeItem('traq_session');
  location.href = 'index.html';
}

var allUsers = [], allLines = [], allMachines = [], allProducts = [];

async function loadMasters() {
  var results = await Promise.all([
    sbFetch('traq_users?select=id,name'),
    sbFetch('lines?select=id,name'),
    sbFetch('machines?select=id,machine_no'),
    sbFetch('products?select=id,product_code,product_name')
  ]);
  allUsers    = results[0] || [];
  allLines    = results[1] || [];
  allMachines = results[2] || [];
  allProducts = results[3] || [];
}

function getName(arr, id, field) {
  var item = arr.find(function(x) { return x.id === id; });
  return item ? item[field] : '-';
}

async function loadTroubles() {
  try {
    await loadMasters();

    // 承認待ち（同シフトのOP投稿）
    var pending = await sbFetch(
      'troubles?status=eq.pending&shift=eq.' + session.shift +
      '&order=created_at.asc&select=*'
    );
    renderPending(pending || []);

    // 処理済み（自分が承認/差戻し）
    var done = await sbFetch(
      'troubles?approver_id=eq.' + session.userId +
      '&order=updated_at.desc&limit=20&select=*'
    );
    renderDone(done || []);

  } catch(e) {
    document.getElementById('pending-list').innerHTML = '<div class="empty" style="color:var(--error);">読込失敗: ' + e.message + '</div>';
  }
}

function renderPending(rows) {
  var wrap = document.getElementById('pending-list');
  var countEl = document.getElementById('pending-count');
  if (!rows.length) {
    countEl.classList.add('hidden');
    wrap.innerHTML = '<div class="empty">承認待ちはありません</div>';
    return;
  }
  countEl.textContent = rows.length;
  countEl.classList.remove('hidden');

  wrap.innerHTML = '<div class="trouble-list">' +
    rows.map(function(t) {
      var typeBadge = t.trouble_type === 'equipment'
        ? '<span class="badge badge-equipment">設備</span>'
        : '<span class="badge badge-mold">金型</span>';
      var reporter = getName(allUsers, t.reporter_id, 'name');
      var line     = getName(allLines, t.line_id, 'name');
      var machine  = getName(allMachines, t.machine_id, 'machine_no');
      var product  = t.product_id ? getName(allProducts, t.product_id, 'product_code') : '-';
      var detail   = t.detail || '詳細なし';
      return '<div class="trouble-card pending" id="card-' + t.id + '">' +
        '<div class="trouble-card-header">' + typeBadge +
        '<span class="badge badge-pending">承認待ち</span>' +
        '<span style="margin-left:auto;font-size:12px;color:var(--muted);">' + t.occurred_date + ' ' + t.shift + '直</span></div>' +
        '<div class="trouble-meta">報告者: ' + reporter + ' ／ ' + line + ' ／ ' + machine + ' ／ ' + product + '</div>' +
        '<div class="trouble-detail">' + detail + '</div>' +
        '<div class="trouble-actions">' +
        '<button class="btn btn-approve" onclick="approve(' + t.id + ')">✓ 承認</button>' +
        '<button class="btn btn-reject" onclick="showReject(' + t.id + ')">✗ 差戻し</button>' +
        '</div>' +
        '<div class="reject-area" id="reject-area-' + t.id + '">' +
        '<input class="reject-input" id="reject-reason-' + t.id + '" placeholder="差戻し理由を入力してください">' +
        '<button class="btn-reject-confirm" onclick="reject(' + t.id + ')">差戻し確定</button>' +
        '</div>' +
        '</div>';
    }).join('') +
  '</div>';
}

function renderDone(rows) {
  var wrap = document.getElementById('done-list');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">処理済みはありません</div>';
    return;
  }
  wrap.innerHTML = '<div class="trouble-list">' +
    rows.map(function(t) {
      var typeBadge = t.trouble_type === 'equipment'
        ? '<span class="badge badge-equipment">設備</span>'
        : '<span class="badge badge-mold">金型</span>';
      var statusBadge = t.status === 'approved'
        ? '<span class="badge badge-approved">承認済み</span>'
        : '<span class="badge badge-rejected">差戻し</span>';
      var reporter = getName(allUsers, t.reporter_id, 'name');
      var detail = t.detail ? (t.detail.length > 40 ? t.detail.slice(0,40) + '…' : t.detail) : '詳細なし';
      return '<div class="trouble-card">' +
        '<div class="trouble-card-header">' + typeBadge + statusBadge +
        '<span style="margin-left:auto;font-size:12px;color:var(--muted);">' + t.occurred_date + '</span></div>' +
        '<div class="trouble-meta">報告者: ' + reporter + '</div>' +
        '<div class="trouble-detail" style="font-size:12px;color:var(--muted);">' + detail + '</div>' +
        (t.reject_reason ? '<div style="font-size:12px;color:var(--error);margin-top:4px;">差戻し理由: ' + t.reject_reason + '</div>' : '') +
        '</div>';
    }).join('') +
  '</div>';
}

function showReject(id) {
  var area = document.getElementById('reject-area-' + id);
  area.style.display = area.style.display === 'block' ? 'none' : 'block';
}

async function approve(id) {
  try {
    await sbFetch('troubles?id=eq.' + id, 'PATCH', {
      status: 'approved',
      approver_id: session.userId,
      approved_at: new Date().toISOString()
    });
    showToast('承認しました', 'success');
    await loadTroubles();
  } catch(e) {
    showToast('失敗: ' + e.message, 'error');
  }
}

async function reject(id) {
  var reason = document.getElementById('reject-reason-' + id).value.trim();
  if (!reason) { showToast('差戻し理由を入力してください', 'error'); return; }
  try {
    await sbFetch('troubles?id=eq.' + id, 'PATCH', {
      status: 'rejected',
      approver_id: session.userId,
      reject_reason: reason
    });
    showToast('差戻しました', 'success');
    await loadTroubles();
  } catch(e) {
    showToast('失敗: ' + e.message, 'error');
  }
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}

if (session) loadTroubles();
</script>
</body>
</html>
