<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – SLホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --factory:     #2e3a52;
  --roof:        #3d4e6e;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       56px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}.sidebar{display:none}


/* Role colors: OP=紺 SL=オレンジ admin=赤 */
.role-op .role-op .role-sl .role-sl .role-admin .role-admin [data-theme="light"] .role-op [data-theme="light"] .role-op [data-theme="light"] .role-sl [data-theme="light"] .role-sl [data-theme="light"] .role-admin [data-theme="light"] .role-admin .lang-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.lang-btn.active,.lang-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Pending banner */
.pending-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(245,158,11,.1);border-bottom:1px solid rgba(245,158,11,.25);flex-shrink:0}
.pending-banner-left{display:flex;align-items:center;gap:10px}
.pending-icon{font-size:20px}
.pending-count-wrap{}
.pending-count{font-size:22px;font-weight:700;color:var(--warning);line-height:1}
.pending-label{font-size:11px;color:var(--text2)}
.pending-banner-right{}
.btn-review-all{background:var(--warning);color:var(--navy);border:none;border-radius:var(--radius);padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-review-all:hover{background:#d97706}

/* Tab bar */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:80px;padding:12px 8px;text-align:center;font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.tab-item.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px;vertical-align:middle}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px calc(var(--nav-h) + 12px)}

/* Filter row */
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.ftab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ftab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}

/* Trouble cards */
.trouble-list{display:flex;flex-direction:column;gap:10px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;animation:slideUp .25s ease both}
.tcard:hover{border-color:rgba(239,159,39,.3)}
.tcard-top{padding:14px 14px 10px}
.tcard-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.tcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tcard-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.tcard-type.eq{background:rgba(59,130,246,.15);color:#60a5fa}
.tcard-type.md{background:rgba(168,85,247,.15);color:#c084fc}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.status-pending{background:rgba(245,158,11,.15);color:var(--warning)}
.status-approved{background:rgba(16,185,129,.12);color:var(--success)}
.status-rejected{background:rgba(239,68,68,.12);color:var(--danger)}
.tcard-date{font-size:11px;color:var(--text2)}
.tcard-time{font-size:11px;color:var(--text2);margin-left:auto}
.tcard-body{margin-bottom:8px}
.tcard-machine{font-size:15px;font-weight:700;margin-bottom:2px}
.tcard-product{font-size:12px;color:var(--text2);margin-bottom:4px}
.tcard-category{display:inline-block;font-size:11px;font-weight:500;background:var(--bg3);border-radius:4px;padding:2px 7px;color:var(--text2);margin-bottom:4px}
.tcard-detail{font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tcard-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border)}
.tcard-submitter{font-size:11px;color:var(--text2)}
.tcard-stop{font-size:11px;color:var(--text2)}

/* Approve/Reject action bar (bottom of card) */
.card-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.ca-btn{height:48px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.ca-approve{background:rgba(16,185,129,.12);color:var(--success)}
.ca-approve:hover{background:rgba(16,185,129,.25)}
.ca-reject{background:rgba(239,68,68,.08);color:var(--danger)}
.ca-reject:hover{background:rgba(239,68,68,.18)}
.ca-btn:active{transform:scale(.97)}

/* Already-actioned card dimming */
.tcard.actioned{opacity:.55}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:4px}
.empty-sub{font-size:12px}

/* Bottom nav */

/* PC sidebar */
@media(min-width:768px){
  .topbar{display:none}
  .bottom-nav{display:none}
    .app{flex-direction:row}
  .sidebar{display:flex;width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);flex-direction:column;overflow-y:auto}
  .sidebar-logo{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
  .sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--warning);color:var(--navy);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sidebar-name{font-size:13px;font-weight:700}
  .sidebar-role{font-size:11px;color:var(--warning)}
  .sidebar-nav{flex:1;padding:12px 8px}
  .snav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;font-family:inherit;width:100%;text-align:left;position:relative}
  .snav-item:hover{background:var(--bg3);color:var(--text1)}
  .snav-item.active{background:rgba(239,159,39,.12);color:var(--orange);font-weight:700}
  .snav-icon{font-size:18px;width:24px;text-align:center}
  .snav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
  .sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
    .main-column{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .scroll-area{padding-bottom:24px}
}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn .15s ease}
.modal-overlay.center{align-items:center}
.modal-sheet{background:var(--bg2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-overlay.center .modal-sheet{border-radius:12px;margin:20px;max-height:80vh}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}

/* Detail rows */
.detail-row{display:flex;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none;margin-bottom:0}
.detail-key{font-size:11px;font-weight:500;color:var(--text2);width:80px;flex-shrink:0;padding-top:2px}
.detail-val{font-size:13px;flex:1;word-break:break-all}

/* Approve/Reject modal buttons */
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn-approve{flex:1;height:52px;background:var(--success);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-approve:hover{opacity:.85}
.btn-reject-modal{flex:1;height:52px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);color:var(--danger);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-reject-modal:hover{background:rgba(239,68,68,.2)}
.btn-close{width:100%;height:46px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;margin-top:8px;transition:all .15s}
.btn-close:hover{color:var(--text1)}

/* Reject reason input */
.reject-wrap{margin-top:12px;display:none}
.reject-wrap.show{display:block;animation:fadeIn .2s ease}
.reject-textarea{width:100%;min-height:80px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;color:var(--text1);padding:10px 12px;outline:none;resize:vertical;transition:border-color .15s}
.reject-textarea:focus{border-color:var(--danger)}
.reject-textarea::placeholder{color:var(--text2)}
.reject-hint{font-size:11px;color:var(--text2);margin-bottom:6px}
.btn-reject-confirm{width:100%;height:50px;background:var(--danger);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-reject-confirm:hover{opacity:.85}
.btn-cancel-reject{width:100%;height:44px;background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;margin-top:6px}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:300;animation:fadeIn .2s ease;white-space:nowrap}
.toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.toast.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.toast.info{background:var(--bg3);border:1px solid var(--border);color:var(--text1)}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}


.role-op .role-sl .role-admin [data-theme="light"] .role-op [data-theme="light"] .role-sl [data-theme="light"] .role-admin 

/* ===== Topbar (F-style unified) ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mini-logo svg{display:block}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}

/* ===== Bottom Nav (2-tab unified) ===== */
.bottom-nav{display:flex;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:10px;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.nav-item.active{color:var(--orange)}
.nav-item:hover:not(.active){color:var(--text1)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-weight:500}
@media(min-width:768px){.bottom-nav{display:none}}

</style>
</head>
<body>
<div class="app" id="app">

  <!-- Sidebar (PC) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="100" height="32" viewBox="0 0 200 56" fill="none">
        <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
        <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
        <rect x="9" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
        <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
        <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
        <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>
        <rect x="6" y="16" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="20" y="20" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="34" y="23" width="12" height="4" rx="1" fill="var(--roof)"/>
        <circle cx="12" cy="10" r="3.5" fill="var(--orange)" opacity=".9"/>
        <circle cx="26" cy="14" r="3" fill="var(--orange)" opacity=".8"/>
        <circle cx="40" cy="17" r="2.5" fill="var(--orange)" opacity=".7"/>
        <text x="60" y="42" font-family="'Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="var(--orange)">Traq</text>
      </svg>
    </div>
    <div class="sidebar-user" id="sb-user-wrap">
      <div class="sidebar-avatar" id="sb-avatar">山</div>
      <div>
        <div class="sidebar-name" id="sb-name">山田 太郎</div>
        <div class="sidebar-role">SL / 1直</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="snav-item active" onclick="setTab('pending')">
        <span class="snav-icon">⏳</span>
        <span data-i18n="nav_pending">承認待ち</span>
        <span class="snav-badge" id="sb-badge">0</span>
      </button>
      <button class="snav-item" onclick="setTab('all')">
        <span class="snav-icon">📋</span>
        <span data-i18n="nav_all">全データ一覧</span>
      </button>
      <button class="snav-item" onclick="setTab('input')">
        <span class="snav-icon">✏️</span>
        <span data-i18n="nav_input">異常入力</span>
      </button>
      <button class="snav-item" onclick="setTab('dashboard')">
        <span class="snav-icon">📊</span>
        <span data-i18n="nav_dashboard">ダッシュボード</span>
      </button>
      <button class="snav-item" onclick="setTab('excel')">
        <span class="snav-icon">📥</span>
        <span data-i18n="nav_excel">Excelダウンロード</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="snav-item" onclick="toggleTheme()">
        <span class="snav-icon" id="sb-theme-icon">🌙</span>
        <span data-i18n="nav_theme">テーマ切替</span>
      </button>
      <button class="snav-item" style="gap:6px">
        <span class="snav-icon">🌐</span>
        <button class="lang-btn active" onclick="setLang('ja')" id="sb-lang-ja">JP</button>
        <button class="lang-btn" onclick="setLang('vi')" id="sb-lang-vi">VN</button>
        <button class="lang-btn" onclick="setLang('en')" id="sb-lang-en">EN</button>
      </button>
      <button class="snav-item" onclick="location.href='settings.html'">
        <span class="snav-icon">⚙️</span>
        <span>設定</span>
      </button>
      <button class="snav-item" onclick="doLogout()" style="color:var(--danger)">
        <span class="snav-icon">🚪</span>
        <span data-i18n="nav_logout">ログアウト</span>
      </button>
    </div>
  </aside>

  <!-- Main column -->
  <div class="main-column">

    <!-- Topbar (mobile) -->
    <div class="topbar">
      <div class="topbar-left">
        <svg class="mini-logo" width="26" height="26" viewBox="0 0 56 56" fill="none">
          <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
          <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
          <rect x="9" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
          <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
          <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
          <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
          <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
          <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>
          <rect x="6" y="16" width="12" height="4" rx="1" fill="var(--roof)"/>
          <rect x="20" y="20" width="12" height="4" rx="1" fill="var(--roof)"/>
          <rect x="34" y="23" width="12" height="4" rx="1" fill="var(--roof)"/>
          <circle cx="12" cy="10" r="3.5" fill="var(--orange)" opacity=".9"/>
          <circle cx="26" cy="14" r="3" fill="var(--orange)" opacity=".8"/>
          <circle cx="40" cy="17" r="2.5" fill="var(--orange)" opacity=".7"/>
        </svg>
        <span class="topbar-logo-text">Traq</span>
        <span class="topbar-sep"></span>
        <span class="topbar-sub">Trouble Tracking System</span>
      </div>
      <div class="topbar-right">
        <button class="hdr-icon-btn" onclick="forceReload()" title="リロード">🔄</button>

const SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';
async function sbFetch(path, method='GET', body=null) {
  const opts = { method, headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

/* ===== Load from Supabase ===== */
async function loadTroubles() {
  try {
    let q = 'troubles?select=*,lines(name),machines(machine_no),products(product_code,product_name),categories(name),traq_users!reporter_id(name)&order=created_at.desc&limit=100';
    if (SESSION.shift) q += '&shift=eq.' + encodeURIComponent(SESSION.shift);
    const rows = await sbFetch(q);
    TROUBLES = (rows || []).map(r => ({
      id: r.id,
      type: r.trouble_type,
      status: r.status,
      date: (r.occurred_date || '').slice(0,10),
      shift: r.shift ? String(r.shift) : '',
      line: r.lines ? r.lines.name : '',
      machine: r.machines ? r.machines.machine_no : '',
      product_code: r.products ? r.products.product_code : '',
      product_name: r.products ? r.products.product_name : '',
      category: r.categories ? r.categories.name : '',
      occurrence: r.occurrence || 'first',
      stop_minutes: r.stop_minutes,
      detail: r.detail || '',
      submitted_by: r.traq_users ? r.traq_users.name : '',
      submitted_at: r.created_at ? r.created_at.slice(0,16).replace('T',' ') : '',
      approved_by: r.approver_id ? '承認済み' : null,
      approved_at: r.approved_at ? r.approved_at.slice(0,16).replace('T',' ') : null,
      reject_reason: r.reject_reason || null,
    }));
  } catch(e) {
    console.error(e);
    showToast('データ読込エラー', 'error');
    TROUBLES = [];
  }
  renderList();
}

/* ===== Theme ===== */
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  const icon=isDark?'☀️':'🌙';
  document.getElementById('themeBtn').textContent=icon;
  const sb=document.getElementById('sb-theme-icon');
  if(sb) sb.textContent=icon;
  localStorage.setItem('traq_theme',isDark?'light':'dark');
}
function initTheme(){
  const saved=localStorage.getItem('traq_theme');
  const pref=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  const theme=saved||pref;
  document.documentElement.setAttribute('data-theme',theme);
  const icon=theme==='dark'?'🌙':'☀️';
  document.getElementById('themeBtn').textContent=icon;
  const sb=document.getElementById('sb-theme-icon');
  if(sb) sb.textContent=icon;
}

/* ===== Badges ===== */
function updateBadges(){
  const cnt=TROUBLES.filter(tr=>tr.status==='pending').length;
  document.getElementById('pendingCount').textContent=cnt;
  document.getElementById('tab-badge-pending').textContent=cnt;
  const sbBadge=document.getElementById('sb-badge');
  if(sbBadge) sbBadge.textContent=cnt;
  document.getElementById('pendingBanner').style.display=cnt>0?'flex':'none';
}

/* ===== Render list ===== */
function renderList(){
  updateBadges();
  const list=getFiltered();
  const container=document.getElementById('troubleList');

  if(list.length===0){
    const msg=mainTab==='pending'?t('empty_pending'):t('empty_all');
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">${mainTab==='pending'?'✅':'📭'}</div><div class="empty-title">${msg}</div></div>`;
    return;
  }

  container.innerHTML='';
  list.forEach((tr,idx)=>{
    const card=buildCard(tr,idx);
    container.appendChild(card);
  });
}

function getFiltered(){
  return TROUBLES.filter(tr=>{
    const statusOk = mainTab==='pending'?tr.status==='pending':
                     mainTab==='approved'?tr.status==='approved':
                     mainTab==='rejected'?tr.status==='rejected':true;
    const typeOk = typeFilter==='all'?true:typeFilter==='eq'?tr.type==='equipment':tr.type==='mold';
    return statusOk && typeOk;
  });
}

function buildCard(tr,idx){
  const div=document.createElement('div');
  div.className='tcard';
  div.setAttribute('data-id', tr.id);
  div.style.animationDelay=`${idx*0.04}s`;
  if(tr._actioned) div.classList.add('actioned');

  const typeClass=tr.type==='equipment'?'eq':'md';
  const typeLabel=t('type_'+typeClass);
  const statusLabel=t('status_'+tr.status);
  const stopLabel=tr.stop_minutes?t('stop_min',tr.stop_minutes):t('stop_none');
  const occLabel=tr.occurrence==='first'?t('occ_first'):t('occ_rec');

  let actionsHTML='';
  if(tr.status==='pending'){
    actionsHTML=`
      <div class="card-actions">
        <button class="ca-btn ca-approve" onclick="event.stopPropagation();quickApprove(${tr.id})">${t('btn_approve')}</button>
        <button class="ca-btn ca-reject"  onclick="event.stopPropagation();openRejectModal(${tr.id})">${t('btn_reject')}</button>
      </div>`;
  }

  let rejectHTML='';
  if(tr.status==='rejected'&&tr.reject_reason){
    rejectHTML=`<div style="margin-top:6px;padding:8px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;font-size:12px;color:var(--danger)"><strong style="display:block;font-size:10px;margin-bottom:2px">差し戻し理由：</strong>${tr.reject_reason}</div>`;
  }

  div.innerHTML=`
    <div class="tcard-top" onclick="openDetail(${tr.id})">
      <div class="tcard-header">
        <div class="tcard-meta">
          <span class="tcard-type ${typeClass}">${typeLabel}</span>
          <span class="status-badge status-${tr.status}">${statusLabel}</span>
          <span class="tcard-date">${tr.date.replace(/-/g,'/')} ${t('shift_label',tr.shift)}</span>
        </div>
        <span class="tcard-time">${tr.submitted_at?tr.submitted_at.slice(11,16):''}</span>
      </div>
      <div class="tcard-body">
        <div class="tcard-machine">${tr.line} – ${tr.machine}号機</div>
        <div class="tcard-product">${tr.product_code} / ${tr.product_name}</div>
        <span class="tcard-category">${tr.category}</span>
        <div class="tcard-detail">${tr.detail}</div>
        ${rejectHTML}
      </div>
      <div class="tcard-footer">
        <span class="tcard-submitter">👤 ${tr.submitted_by}　${tr.submitted_at||''}</span>
        <span class="tcard-stop">⏱ ${stopLabel} ${occLabel}</span>
      </div>
    </div>
    ${actionsHTML}
  `;
  return div;
}

/* ===== Quick approve (from card button) ===== */
async function quickApprove(id){
  const tr = TROUBLES.find(x => x.id === id);
  if (!tr) return;
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) card.classList.add('actioned');
  try {
    await sbFetch('troubles?id=eq.' + id, 'PATCH', {
      status: 'approved',
      approver_id: SESSION.userId,
      approved_at: new Date().toISOString()
    });
    tr.status = 'approved';
    tr._actioned = true;
    renderList();
    showToast(t('approve_done'), 'success');
  } catch(e) {
    if (card) card.classList.remove('actioned');
    showToast('エラー: ' + e.message, 'error');
  }
}

/* ===== Reject modal ===== */
function openRejectModal(id){
  const tr=TROUBLES.find(x=>x.id===id);
  if(!tr) return;
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${t('reject_title')}</div>
    <div class="modal-sub">${tr.line} – ${tr.machine}号機 / ${tr.product_code}</div>
    <p class="reject-hint">${t('reject_hint')}</p>
    <textarea class="reject-textarea" id="rejectReasonInput"
      placeholder="${t('reject_placeholder')}" rows="3"></textarea>
    <button class="btn-reject-confirm" onclick="doReject(${id})">${t('reject_confirm')}</button>
    <button class="btn-cancel-reject" onclick="closeModal()">${t('reject_cancel')}</button>
  `,true);
  setTimeout(()=>document.getElementById('rejectReasonInput')?.focus(),100);
}

async function doReject(id){
  const tr = TROUBLES.find(x => x.id === id);
  if (!tr) return;
  const reason = document.getElementById('rejectReasonInput')?.value.trim() || '';
  closeModal();
  try {
    await sbFetch('troubles?id=eq.' + id, 'PATCH', {
      status: 'rejected',
      reject_reason: reason || null,
      approver_id: SESSION.userId,
      approved_at: new Date().toISOString()
    });
    tr.status = 'rejected';
    tr.reject_reason = reason || null;
    tr._actioned = true;
    renderList();
    showToast(t('reject_done'), 'error');
  } catch(e) {
    showToast('エラー: ' + e.message, 'error');
  }
}

  }

  let rejectRowHTML='';
  if(tr.reject_reason){
    rejectRowHTML=`<div class="detail-row"><span class="detail-key">${t('key_reject_reason')}</span><span class="detail-val" style="color:var(--danger)">${tr.reject_reason}</span></div>`;
  }
  let approvedRowHTML='';
  if(tr.approved_by){
    approvedRowHTML=`<div class="detail-row"><span class="detail-key">${t('key_approved')}</span><span class="detail-val">${tr.approved_by} ${tr.approved_at||''}</span></div>`;
  }

  showModal(`
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span class="tcard-type ${typeClass}" style="font-size:11px;padding:3px 8px">${typeLabel}</span>
      <span class="modal-title" style="margin:0">${t('detail_title')}</span>
    </div>
    <div class="modal-sub">No.${tr.id}</div>
    <div class="detail-row"><span class="detail-key">${t('key_status')}</span><span class="detail-val"><span class="status-badge status-${tr.status}">${statusLabel}</span></span></div>
    <div class="detail-row"><span class="detail-key">${t('key_date')}</span><span class="detail-val">${tr.date.replace(/-/g,'/')} ${t('shift_label',tr.shift)}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_line')}</span><span class="detail-val">${tr.line}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_machine')}</span><span class="detail-val">${tr.machine}号機</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_product')}</span><span class="detail-val">${tr.product_code} / ${tr.product_name}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_stop')}</span><span class="detail-val">${stopLabel}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_category')}</span><span class="detail-val">${tr.category}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_detail')}</span><span class="detail-val">${tr.detail}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_occurrence')}</span><span class="detail-val">${occLabel}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_submitter')}</span><span class="detail-val">${tr.submitted_by} ${tr.submitted_at||''}</span></div>
    ${approvedRowHTML}
    ${rejectRowHTML}
    ${approveActionsHTML}
    <button class="btn-close" onclick="closeModal()">${t('btn_close')}</button>
  `);
}

/* ===== Modal ===== */
function showModal(html, center=false){
  const el=document.getElementById('modalEl');
  el.innerHTML=`<div class="modal-overlay ${center?'center':''}" onclick="handleOverlay(event)"><div class="modal-sheet">${html}</div></div>`;
  el.style.display='block';
}
function closeModal(){ document.getElementById('modalEl').style.display='none'; }
function handleOverlay(e){ if(e.target.classList.contains('modal-overlay')) closeModal(); }

/* ===== Toast ===== */
let toastTimer=null;
function showToast(msg,type='info'){
  const el=document.getElementById('toastEl');
  el.innerHTML=`<div class="toast ${type}">${msg}</div>`;
  el.style.display='block';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.style.display='none'; },2500);
}

/* ===== Logout ===== */
function doLogout(){
  localStorage.removeItem('traq_session');
  showToast(t('logout_done'), 'info');
  setTimeout(() => { location.href = 'index.html'; }, 1000);
}
