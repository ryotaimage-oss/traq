<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Traq – SLホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --factory:     #2e3a52;
  --roof:        #3d4e6e;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       64px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:6px}
.mini-logo{display:flex;align-items:center;gap:6px}
.mini-logo-emoji{font-size:18px;line-height:1}
.mini-logo-text{font-size:15px;font-weight:700;color:var(--orange)}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 5px}
.user-chip-avatar{width:26px;height:26px;border-radius:50%;background:var(--warning);color:var(--navy);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.user-chip-name{font-size:12px;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-chip-role{font-size:10px;color:var(--warning)}
.lang-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.lang-btn.active,.lang-btn:hover{border-color:var(--orange);color:var(--orange)}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.icon-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Layout */
.main-wrap{flex:1;overflow:hidden;display:flex}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-user{padding:16px;border-bottom:1px solid var(--border)}
.sb-avatar{width:40px;height:40px;border-radius:50%;background:var(--warning);color:var(--navy);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.sb-name{font-size:14px;font-weight:700}
.sb-role{font-size:11px;color:var(--warning);margin-top:2px}
.sb-nav{flex:1;padding:8px}
.sb-nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;text-decoration:none;width:100%;background:none;border:none;font-family:inherit;text-align:left;position:relative}
.sb-nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text1)}
.sb-nav-item.active{background:rgba(239,159,39,0.12);color:var(--orange);font-weight:700}
.sb-nav-icon{font-size:15px;width:18px;text-align:center}
.sb-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 5px;display:flex;align-items:center;justify-content:center}
.sb-bottom{padding:8px;border-top:1px solid var(--border);margin-top:auto}
.sb-theme-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;background:none;border:none;font-family:inherit;width:100%;text-align:left;transition:all .15s}
.sb-theme-btn:hover{color:var(--text1)}
.sb-lang{display:flex;gap:4px;padding:4px;margin-bottom:4px}
.sb-lang-btn{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:6px;background:none;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.sb-lang-btn.active,.sb-lang-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Right panel */
.right-panel{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Pending banner */
.pending-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(245,158,11,.1);border-bottom:1px solid rgba(245,158,11,.25);flex-shrink:0}
.pending-banner-left{display:flex;align-items:center;gap:10px}
.pending-icon{font-size:20px}
.pending-count{font-size:22px;font-weight:700;color:var(--warning);line-height:1}
.pending-label{font-size:11px;color:var(--text2)}
.btn-review-all{background:var(--warning);color:var(--navy);border:none;border-radius:var(--radius);padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-review-all:hover{background:#d97706}

/* Tab bar */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:80px;padding:12px 8px;text-align:center;font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.tab-item.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px;vertical-align:middle}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px calc(var(--nav-h) + 12px)}
@media(min-width:768px){.scroll-area{padding-bottom:12px}}

/* Filter row */
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.ftab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ftab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}
.ftab:hover:not(.active){border-color:var(--orange);color:var(--orange)}

/* Cards */
.trouble-list{display:flex;flex-direction:column;gap:10px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;animation:slideUp .25s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tcard:hover{border-color:rgba(239,159,39,.3)}
.tcard.actioned{opacity:0.45;pointer-events:none;transition:opacity .4s}
.tcard-top{padding:14px 14px 10px;cursor:pointer}
.tcard-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.tcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tcard-time{font-size:12px;color:var(--text2);white-space:nowrap}
.tcard-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.tcard-type.eq{background:rgba(59,130,246,.15);color:#60a5fa}
.tcard-type.md{background:rgba(168,85,247,.15);color:#c084fc}
.status-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.status-badge.pending{background:rgba(245,158,11,.15);color:#fbbf24}
.status-badge.approved{background:rgba(16,185,129,.15);color:#34d399}
.status-badge.rejected{background:rgba(239,68,68,.15);color:#f87171}
.status-badge.draft{background:rgba(100,116,139,.15);color:#94a3b8}
.shift-badge{font-size:11px;color:var(--text2)}
.tcard-title{font-size:15px;font-weight:700;margin-bottom:3px}
.tcard-product{font-size:12px;color:var(--text2);margin-bottom:8px}
.tcard-cat{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);margin-bottom:8px}
.tcard-detail{font-size:13px;line-height:1.6;color:var(--text1);margin-bottom:10px}
.tcard-footer{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.tcard-reporter::before{content:'👤';font-size:11px;margin-right:4px}
.tcard-stop::before{content:'⏱';font-size:11px;margin-right:4px}
.reject-box{margin-top:8px;padding:8px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px}
.reject-label{font-size:10px;font-weight:700;color:var(--danger);margin-bottom:2px}
.reject-text{font-size:12px;color:var(--danger)}

/* Action buttons */
.card-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.ca-btn{padding:12px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.ca-approve{background:rgba(16,185,129,.1);color:#10b981;border-right:1px solid var(--border)}
.ca-approve:hover{background:rgba(16,185,129,.2)}
.ca-reject{background:rgba(239,68,68,.1);color:var(--danger)}
.ca-reject:hover{background:rgba(239,68,68,.2)}

/* Empty */
.empty-state{text-align:center;padding:48px 16px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* Bottom nav */
.bottom-nav{height:var(--nav-h);flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-size:10px;color:var(--text2);border:none;background:none;font-family:inherit;transition:color .15s;position:relative}
.bn-item.active,.bn-item:hover{color:var(--orange)}
.bn-icon{font-size:20px;line-height:1}
.bn-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--danger);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;padding:0 4px;display:flex;align-items:center;justify-content:center}

/* Modal */
.modal-wrap{position:fixed;inset:0;z-index:100;display:none}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end}
.modal-overlay.center{align-items:center;justify-content:center}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 20px 40px}
.modal-overlay.center .modal-sheet{border-radius:12px;max-width:360px;width:calc(100% - 32px);padding:24px}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.modal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.modal-label{color:var(--text2);flex-shrink:0}
.modal-value{font-weight:500;text-align:right}
.modal-textarea{width:100%;min-height:96px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;color:var(--text1);resize:vertical;outline:none}
.modal-textarea:focus{border-color:var(--orange)}
.modal-btns{display:flex;gap:10px;margin-top:14px}
.btn-cancel{flex:1;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text1);cursor:pointer;font-family:inherit}
.btn-danger{flex:1;padding:12px;background:var(--danger);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}
.btn-primary{flex:1;padding:12px;background:var(--orange);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;color:var(--navy);cursor:pointer;font-family:inherit}
.modal-close-btn{width:100%;margin-top:14px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text1);cursor:pointer;font-family:inherit}

/* Toast */
.toast-wrap{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:#1e293b;color:#fff;border:1px solid rgba(255,255,255,.12);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;white-space:nowrap;animation:toastIn .2s ease}
.toast.success{background:#065f46;border-color:#10b981}
.toast.error{background:#7f1d1d;border-color:#ef4444}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(min-width:768px){
  .sidebar{display:flex!important}
  .bottom-nav{display:none}
  .toast-wrap{bottom:16px}
}
@media(max-width:767px){
  .sidebar{display:none}
  .tab-item{font-size:12px;padding:10px 6px}
}
</style>
</head>

  <nav class="bottom-nav">

<script>
var SB_URL='https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';
async function sbFetch(path,method,body){
  var opts={method:method||'GET',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(!res.ok)throw new Error(await res.text());
  var text=await res.text();return text?JSON.parse(text):null;
}

var currentLang='ja';
var I18N={
  ja:{shift:'直',eq:'設備',md:'金型',pending:'承認待ち',approved:'承認済み',rejected:'差し戻し',draft:'下書き',first:'初発',repeat:'再発',min:function(m){return m+'分'},unknown:'不明',empty_pending:'承認待ちはありません ✅',empty_all:'投稿はありません',approve:'✓ 承認する',reject:'✗ 差し戻す',reject_title:'差し戻し理由',reject_ph:'差し戻しの理由を入力してください…',reject_btn:'差し戻す',cancel:'キャンセル',approved_msg:'承認しました',rejected_msg:'差し戻しました',logout_msg:'ログアウトしました'},
  vi:{shift:'ca',eq:'Thiết bị',md:'Khuôn',pending:'Chờ duyệt',approved:'Đã duyệt',rejected:'Trả lại',draft:'Nháp',first:'Lần đầu',repeat:'Tái phát',min:function(m){return m+' phút'},unknown:'Không rõ',empty_pending:'Không có báo cáo chờ duyệt ✅',empty_all:'Không có báo cáo',approve:'✓ Duyệt',reject:'✗ Trả lại',reject_title:'Lý do trả lại',reject_ph:'Nhập lý do…',reject_btn:'Trả lại',cancel:'Hủy',approved_msg:'Đã duyệt',rejected_msg:'Đã trả lại',logout_msg:'Đã đăng xuất'},
  en:{shift:'shift',eq:'Equipment',md:'Mold',pending:'Pending',approved:'Approved',rejected:'Rejected',draft:'Draft',first:'First',repeat:'Repeat',min:function(m){return m+'min'},unknown:'Unknown',empty_pending:'No pending approvals ✅',empty_all:'No posts',approve:'✓ Approve',reject:'✗ Reject',reject_title:'Reject Reason',reject_ph:'Enter reason…',reject_btn:'Reject',cancel:'Cancel',approved_msg:'Approved',rejected_msg:'Rejected',logout_msg:'Logged out'}
};
function t(k,arg){var d=I18N[currentLang]||I18N.ja;var v=d[k]||I18N.ja[k]||k;return typeof v==='function'?v(arg):v;}
function setLang(l){
  currentLang=l;localStorage.setItem('traq_lang',l);
  ['ja','vi','en'].forEach(function(x){
    ['lang-','sb-lang-'].forEach(function(p){var b=document.getElementById(p+x);if(b)b.classList.toggle('active',x===l);});
  });
  renderList();
}

var SESSION=null,TROUBLES=[],currentTab='pending',typeFilter='all';
function getSession(){try{var s=localStorage.getItem('traq_session');if(!s)return null;var o=JSON.parse(s);if(o.expiresAt&&Date.now()>o.expiresAt){localStorage.removeItem('traq_session');return null;}return o;}catch(e){return null;}}

(async function init(){
  SESSION=getSession();
  if(!SESSION){location.href='index.html';return;}
  if(SESSION.role==='worker'||SESSION.role==='op'){location.href='home.html';return;}

  var th=localStorage.getItem('traq_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',th);
  var icon=th==='dark'?'🌙':'☀️';
  document.getElementById('themeBtn').textContent=icon;
  var sti=document.getElementById('sbThemeIcon');if(sti)sti.textContent=icon;

  var l=localStorage.getItem('traq_lang')||'ja';currentLang=l;
  ['ja','vi','en'].forEach(function(x){
    ['lang-','sb-lang-'].forEach(function(p){var b=document.getElementById(p+x);if(b)b.classList.toggle('active',x===l);});
  });

  var name=SESSION.name||'';var ini=name.charAt(0)||'?';
  var rl=SESSION.role==='leader'||SESSION.role==='sl'?'SL':SESSION.role==='admin'?'Admin':'SL';
  var shStr=(SESSION.shift||'')+t('shift');
  document.getElementById('chipAvatar').textContent=ini;
  document.getElementById('chipName').textContent=name;
  document.getElementById('chipRole').textContent=rl+' / '+shStr;
  document.getElementById('sbAvatar').textContent=ini;
  document.getElementById('sbName').textContent=name;
  document.getElementById('sbRole').textContent=rl+' / '+shStr;

  var sb=document.getElementById('sidebarEl');
  function checkSb(){if(sb)sb.style.display=window.innerWidth>=768?'flex':'none';}
  checkSb();window.addEventListener('resize',checkSb);

  await loadTroubles();
})();

async function loadTroubles(){
  try{
    var q='troubles?select=*,lines(name),machines(machine_no),products(product_code,product_name),categories(name),traq_users!reporter_id(name)&order=created_at.desc&limit=100';
    if(SESSION.shift)q+='&shift=eq.'+encodeURIComponent(SESSION.shift);
    var rows=await sbFetch(q,'GET');if(!rows)rows=[];
    TROUBLES=rows.map(function(r){return{id:r.id,type:r.trouble_type,status:r.status,date:r.occurred_date||'',shift:r.shift,line:r.lines?r.lines.name:'',machine:r.machines?r.machines.machine_no:'',product_code:r.products?r.products.product_code:'',product_name:r.products?r.products.product_name:'',category:r.categories?r.categories.name:'',occurrence:r.occurrence,stop_minutes:r.stop_minutes,detail:r.detail||'',reporter:r.traq_users?r.traq_users.name:'',reject_reason:r.reject_reason||'',created_at:r.created_at,stop_start:r.stop_start||null};});
  }catch(e){TROUBLES=[];showToast('データ読込エラー','error');}
  renderList();
}

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-item').forEach(function(b){b.classList.toggle('active',b.id==='tab-'+tab);});
  ['sb-pending','sb-all'].forEach(function(id){var b=document.getElementById(id);if(b)b.classList.toggle('active',id==='sb-'+tab);});
  ['bn-pending','bn-all'].forEach(function(id){var b=document.getElementById(id);if(b)b.classList.toggle('active',id==='bn-'+tab);});
  document.getElementById('scrollArea').scrollTo(0,0);renderList();
}
function setTypeFilter(f){
  typeFilter=f;
  document.querySelectorAll('.ftab').forEach(function(b){b.classList.toggle('active',b.dataset.f===f);});
  renderList();
}
function getFiltered(){
  return TROUBLES.filter(function(tr){
    var sok=currentTab==='pending'?tr.status==='pending':currentTab==='approved'?tr.status==='approved':currentTab==='rejected'?tr.status==='rejected':true;
    var tok=typeFilter==='all'?true:typeFilter==='eq'?tr.type==='equipment':tr.type==='mold';
    return sok&&tok;
  });
}

function renderList(){
  var cnt=TROUBLES.filter(function(tr){return tr.status==='pending';}).length;
  document.getElementById('pendingCount').textContent=cnt;
  document.getElementById('tabBadge').textContent=cnt;
  var sb=document.getElementById('sbBadge');var mb=document.getElementById('mobBadge');
  if(cnt>0){sb.textContent=cnt;sb.style.display='flex';mb.textContent=cnt;mb.style.display='flex';}
  else{sb.style.display='none';mb.style.display='none';}
  document.getElementById('pendingBanner').style.display=cnt>0?'flex':'none';

  var list=getFiltered();var container=document.getElementById('troubleList');
  if(list.length===0){
    var msg=currentTab==='pending'?t('empty_pending'):t('empty_all');
    container.innerHTML='<div class="empty-state"><div class="empty-icon">'+(currentTab==='pending'?'✅':'📭')+'</div><div class="empty-text">'+msg+'</div></div>';
    return;
  }
  container.innerHTML='';
  list.forEach(function(tr,i){container.appendChild(buildCard(tr,i));});
}

function buildCard(tr,idx){
  var div=document.createElement('div');div.className='tcard';div.id='card-'+tr.id;div.style.animationDelay=(idx*0.04)+'s';
  var tc=tr.type==='equipment'?'eq':'md';
  var stop=tr.stop_minutes?t('min',tr.stop_minutes):t('unknown');
  var occ=tr.occurrence==='first'?t('first'):t('repeat');
  var machine=tr.line?tr.line+' – '+tr.machine+'号機':(tr.machine?tr.machine+'号機':'');
  var product=tr.product_code&&tr.product_name?tr.product_code+' / '+tr.product_name:(tr.product_code||tr.product_name||'');
  var timeStr=tr.stop_start?tr.stop_start.slice(0,5):(tr.created_at?tr.created_at.slice(11,16):'');
  var dateStr=tr.date?tr.date.replace(/-/g,'/').slice(0,10):(tr.created_at?tr.created_at.slice(0,10).replace(/-/g,'/'):'');
  var shiftStr=tr.shift?tr.shift+t('shift'):'';
  var repDate=tr.created_at?tr.created_at.slice(0,10).replace(/-/g,'-')+' '+tr.created_at.slice(11,16):'';
  var rejHTML=tr.status==='rejected'&&tr.reject_reason?'<div class="reject-box"><div class="reject-label">差し戻し理由：</div><div class="reject-text">'+esc(tr.reject_reason)+'</div></div>':'';
  var actHTML=tr.status==='pending'?'<div class="card-actions"><button class="ca-btn ca-approve" onclick="event.stopPropagation();quickApprove(\''+tr.id+'\')">'+t('approve')+'</button><button class="ca-btn ca-reject" onclick="event.stopPropagation();openRejectModal(\''+tr.id+'\')">'+t('reject')+'</button></div>':'';
  div.innerHTML=
    '<div class="tcard-top" onclick="openDetail(\''+tr.id+'\')">' +
    '<div class="tcard-header"><div class="tcard-meta"><span class="tcard-type '+tc+'">'+t(tc)+'</span><span class="status-badge '+tr.status+'">'+t(tr.status)+'</span><span class="shift-badge">'+dateStr+' '+shiftStr+'</span></div><span class="tcard-time">'+timeStr+'</span></div>'+
    '<div class="tcard-title">'+esc(machine)+'</div>'+
    (product?'<div class="tcard-product">'+esc(product)+'</div>':'')+
    (tr.category?'<span class="tcard-cat">'+esc(tr.category)+'</span>':'')+
    '<div class="tcard-detail">'+esc(tr.detail).substring(0,100)+(tr.detail.length>100?'…':'')+'</div>'+
    '<div class="tcard-footer"><span class="tcard-reporter">'+esc(tr.reporter)+'　'+repDate+'</span><div style="display:flex;gap:8px"><span class="tcard-stop">'+stop+'</span><span style="font-size:11px;color:var(--text2)">'+occ+'</span></div></div>'+
    rejHTML+'</div>'+actHTML;
  return div;
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openDetail(id){
  var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});if(!tr)return;
  var tc=tr.type==='equipment'?'eq':'md';
  var machine=tr.line?tr.line+' – '+tr.machine+'号機':(tr.machine||'');
  var product=tr.product_code&&tr.product_name?tr.product_code+' / '+tr.product_name:'';
  var rBox=tr.status==='rejected'&&tr.reject_reason?'<div class="reject-box" style="margin-bottom:12px"><div class="reject-label">差し戻し理由：</div><div class="reject-text">'+esc(tr.reject_reason)+'</div></div>':'';
  var btns=tr.status==='pending'?'<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">'+t('cancel')+'</button><button class="btn-primary" onclick="closeModal();quickApprove(\''+tr.id+'\')">'+t('approve')+'</button><button class="btn-danger" onclick="closeModal();openRejectModal(\''+tr.id+'\')">差し戻す</button></div>':'<button class="modal-close-btn" onclick="closeModal()">閉じる</button>';
  showModal('<div class="modal-handle"></div><div class="modal-title">'+esc(machine)+'</div>'+rBox+mrow('種別','<span class="tcard-type '+tc+'">'+t(tc)+'</span>')+mrow('ステータス','<span class="status-badge '+tr.status+'">'+t(tr.status)+'</span>')+mrow('発生日',tr.date||'')+mrow('直',tr.shift?tr.shift+t('shift'):'')+mrow('品番',product)+mrow('分類',tr.category||'')+mrow('初発/再発',tr.occurrence==='first'?t('first'):t('repeat'))+mrow('停止時間',tr.stop_minutes?t('min',tr.stop_minutes):t('unknown'))+mrow('詳細',esc(tr.detail))+mrow('報告者',tr.reporter)+btns);
}
function mrow(l,v){return'<div class="modal-row"><span class="modal-label">'+l+'</span><span class="modal-value">'+v+'</span></div>';}

async function quickApprove(id){
  var card=document.getElementById('card-'+id);if(card)card.classList.add('actioned');
  try{
    await sbFetch('troubles?id=eq.'+id,'PATCH',{status:'approved',approver_id:SESSION.userId,approved_at:new Date().toISOString()});
    var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});if(tr)tr.status='approved';
    showToast(t('approved_msg'),'success');setTimeout(renderList,400);
  }catch(e){if(card)card.classList.remove('actioned');showToast('エラー: '+e.message,'error');}
}

var _rid=null;
function openRejectModal(id){
  _rid=id;
  var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});
  var m=tr?(tr.line?tr.line+' – '+tr.machine+'号機':(tr.machine||'')):'';
  showModal('<div class="modal-handle"></div><div class="modal-title">'+t('reject_title')+'</div><div class="modal-sub">'+esc(m)+'</div><textarea id="rejectReason" class="modal-textarea" placeholder="'+t('reject_ph')+'"></textarea><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">'+t('cancel')+'</button><button class="btn-danger" onclick="submitReject()">'+t('reject_btn')+'</button></div>',true);
  setTimeout(function(){var ta=document.getElementById('rejectReason');if(ta)ta.focus();},100);
}
async function submitReject(){
  var reason=(document.getElementById('rejectReason')||{}).value||'';
  if(!reason.trim()){showToast('理由を入力してください','error');return;}
  var id=_rid;closeModal();
  var card=document.getElementById('card-'+id);if(card)card.classList.add('actioned');
  try{
    await sbFetch('troubles?id=eq.'+id,'PATCH',{status:'rejected',reject_reason:reason.trim(),approver_id:SESSION.userId,approved_at:new Date().toISOString()});
    var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});if(tr){tr.status='rejected';tr.reject_reason=reason.trim();}
    showToast(t('rejected_msg'),'success');setTimeout(renderList,400);
  }catch(e){if(card)card.classList.remove('actioned');showToast('エラー: '+e.message,'error');}
}

function showModal(html,center){var el=document.getElementById('modalEl');el.innerHTML='<div class="modal-overlay'+(center?' center':'')+'" onclick="handleOverlay(event)"><div class="modal-sheet">'+html+'</div></div>';el.style.display='block';}
function closeModal(){document.getElementById('modalEl').style.display='none';}
function handleOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

var _tt=null;
function showToast(msg,type){var el=document.getElementById('toastWrap');el.innerHTML='<div class="toast'+(type?' '+type:'')+'">'+msg+'</div>';el.style.display='block';if(_tt)clearTimeout(_tt);_tt=setTimeout(function(){el.style.display='none';},2500);}

function toggleTheme(){
  var h=document.documentElement;var isDark=h.getAttribute('data-theme')==='dark';var next=isDark?'light':'dark';
  h.setAttribute('data-theme',next);localStorage.setItem('traq_theme',next);
  var icon=next==='dark'?'🌙':'☀️';
  document.getElementById('themeBtn').textContent=icon;
  var sti=document.getElementById('sbThemeIcon');if(sti)sti.textContent=icon;
}

function doLogout(){localStorage.removeItem('traq_session');showToast(t('logout_msg'));setTimeout(function(){location.href='index.html';},800);}
</script>
</body>
