<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – SLホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --factory:     #2e3a52;
  --roof:        #3d4e6e;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       56px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}.sidebar{display:none}
.main-column{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}

/* Pending banner */

/* Tab bar */
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:0;padding:11px 4px;text-align:center;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.tab-item.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px;vertical-align:middle}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 16px}

/* Filter row */
.filter-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.ftab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ftab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}

/* Trouble cards */
.trouble-list{display:flex;flex-direction:column;gap:10px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;animation:slideUp .25s ease both}
.tcard:hover{border-color:rgba(239,159,39,.3)}
.tcard-top{padding:14px 14px 10px}
.tcard-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.tcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tcard-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.tcard-type.eq{background:rgba(59,130,246,.15);color:#60a5fa}
.tcard-type.md{background:rgba(168,85,247,.15);color:#c084fc}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.status-pending{background:rgba(245,158,11,.15);color:var(--warning)}
.status-approved{background:rgba(16,185,129,.12);color:var(--success)}
.status-rejected{background:rgba(239,68,68,.12);color:var(--danger)}
.tcard-date{font-size:11px;color:var(--text2)}
.tcard-time{font-size:11px;color:var(--text2);margin-left:auto}
.tcard-body{margin-bottom:8px}
.tcard-machine{font-size:15px;font-weight:700;margin-bottom:2px}
.tcard-product{font-size:12px;color:var(--text2);margin-bottom:4px}
.tcard-category{display:inline-block;font-size:11px;font-weight:500;background:var(--bg3);border-radius:4px;padding:2px 7px;color:var(--text2);margin-bottom:4px}
.tcard-detail{font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tcard-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border)}
.tcard-submitter{font-size:11px;color:var(--text2)}
.tcard-stop{font-size:11px;color:var(--text2)}

/* Approve/Reject action bar (bottom of card) */
.card-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.ca-btn{height:48px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.ca-approve{background:rgba(16,185,129,.12);color:var(--success)}
.ca-approve:hover{background:rgba(16,185,129,.25)}
.ca-reject{background:rgba(239,68,68,.08);color:var(--danger)}
.ca-reject:hover{background:rgba(239,68,68,.18)}
.ca-btn:active{transform:scale(.97)}
.ca-resubmit{display:flex;align-items:center;justify-content:center;gap:6px;height:44px;border:none;border-top:1px solid var(--border);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:rgba(239,159,39,.08);color:var(--orange)}
.ca-resubmit:hover{background:rgba(239,159,39,.15)}
.ca-resubmit:active{transform:scale(.97)}
/* ===== Draft ===== */
.status-draft{background:rgba(139,144,160,.12);color:var(--text2)}
.draft-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(239,159,39,.06);border:1px solid rgba(239,159,39,.15);border-radius:var(--radius);margin:0 16px 8px;cursor:pointer;transition:background .15s}
.draft-banner:hover{background:rgba(239,159,39,.12)}
.draft-banner-left{display:flex;align-items:center;gap:8px}
.draft-count{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:11px;background:var(--orange);color:var(--navy);font-size:12px;font-weight:700;padding:0 6px}
.draft-banner-label{font-size:13px;font-weight:500;color:var(--text1)}
.draft-banner-right{font-size:12px;color:var(--orange);font-weight:500}
.draft-actions{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--border)}
.da-btn{height:44px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.da-btn:active{transform:scale(.97)}
.da-edit{background:var(--bg3);color:var(--text1);border-right:1px solid var(--border)}
.da-del{background:rgba(239,68,68,.06);color:var(--danger);border-right:1px solid var(--border)}
.da-send{background:rgba(239,159,39,.08);color:var(--orange)}

/* Already-actioned card dimming */
.tcard.actioned{opacity:.55}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:4px}
.empty-sub{font-size:12px}

/* Input shortcut bar */
.input-bar{display:flex;gap:6px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.input-bar-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(239,159,39,.25);background:rgba(239,159,39,.08);color:var(--orange);font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.input-bar-btn:hover,.input-bar-btn:active{background:rgba(239,159,39,.15);border-color:rgba(239,159,39,.4)}
@media(min-width:768px){.input-bar-btn{max-width:200px;flex:0 1 200px}}

/* Date bar */
.date-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  animation: fadeIn .3s ease both;
}
.date-text { font-size: 13px; color: var(--text2); }

/* Action cards */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
  animation: slideUp .3s .05s ease both;
}
.action-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  cursor: pointer;
  display: flex; flex-direction: row; align-items: center; gap: 10px;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.action-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 12px 12px 0 0;
  background: var(--orange);
  transform: scaleX(0);
  transition: transform .2s ease;
  transform-origin: left;
}
.action-card:hover, .action-card:active {
  border-color: var(--orange);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(239,159,39,.15);
}
.action-card:hover::before, .action-card:active::before { transform: scaleX(1); }
.action-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(239,159,39,.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.action-label {
  font-size: 13px; font-weight: 700; color: var(--text1); line-height: 1.3; white-space: nowrap;
}
.action-arrow {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 16px; color: var(--orange); opacity: .6;
}

/* Timeline (全件) */
.tl-filter-area{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.tl-filter-row{display:flex;gap:7px;align-items:center}
.tl-flabel{font-size:11px;color:var(--text2);white-space:nowrap;min-width:30px}
.tl-datebox{flex:1;padding:5px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text1);font-family:inherit}
.tl-datesep{font-size:11px;color:var(--text2)}
.tl-linesel{flex:1;padding:5px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text1);font-family:inherit;-webkit-appearance:none}
.tl-cnt{text-align:right;font-size:11px;color:var(--text2);padding:5px 14px 2px;flex-shrink:0}
.tl-list{display:flex;flex-direction:column;padding:10px 14px}
.tl-sep{display:flex;align-items:center;gap:8px;margin:8px 0 7px}
.tl-sep-line{flex:1;height:1px;background:var(--border)}
.tl-sep-label{font-size:11px;color:var(--text2);white-space:nowrap;font-weight:500}
.tl-item{display:flex;gap:9px;margin-bottom:10px}
.tl-col{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.tl-dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-dot.pending{background:var(--warning)}
.tl-dot.approved{background:var(--success)}
.tl-dot.rejected{background:var(--danger)}
.tl-dot.draft{background:#4b5563}
.tl-vl{width:1px;flex:1;background:var(--border);margin-top:3px}
.tl-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
.tl-card:hover{border-color:rgba(239,159,39,.3)}
.tl-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tl-machine{font-size:14px;font-weight:700;color:var(--text1)}
.tl-time{font-size:11px;color:var(--text2)}
.tl-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tl-pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.tl-pill.eq{background:rgba(59,130,246,.15);color:#60a5fa}
.tl-pill.md{background:rgba(168,85,247,.15);color:#c084fc}
.tl-pill.pending{background:rgba(245,158,11,.15);color:var(--warning)}
.tl-pill.approved{background:rgba(16,185,129,.12);color:var(--success)}
.tl-pill.rejected{background:rgba(239,68,68,.12);color:var(--danger)}
.tl-pill.draft{background:rgba(139,144,160,.12);color:var(--text2)}
.tl-product{font-size:11px;color:var(--text2);margin-bottom:4px}
.tl-detail{font-size:12px;color:var(--text1);line-height:1.4;margin-bottom:5px}
.tl-footer{display:flex;justify-content:space-between;align-items:center;padding-top:5px;border-top:1px solid var(--border)}
.tl-who{font-size:11px;color:var(--text2)}

/* Bottom nav */
.bottom-nav{display:flex;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:10px;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.nav-item.active{color:var(--orange)}
.nav-item:hover:not(.active){color:var(--text1)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-weight:500}

/* PC sidebar */
@media(min-width:768px){
  .bottom-nav{display:none}
  .app{flex-direction:row}
  .sidebar{display:flex;width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);flex-direction:column;overflow-y:auto}
  .sidebar-logo{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
  .sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .sidebar-avatar{width:36px;height:36px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sidebar-name{font-size:13px;font-weight:700}
  .sidebar-role{font-size:11px;color:var(--text2)}
  .sidebar-nav{flex:1;padding:12px 8px}
  .lang-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
  .lang-btn.active,.lang-btn:hover{border-color:var(--orange);color:var(--orange)}
  .snav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;font-family:inherit;width:100%;text-align:left}
  .snav-item:hover{background:var(--bg3);color:var(--text1)}
  .snav-item.active{background:rgba(239,159,39,.12);color:var(--orange);font-weight:700}
  .snav-icon{font-size:18px;width:24px;text-align:center}
  .snav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
  .snav-disabled{opacity:.3;pointer-events:none;cursor:not-allowed}
  .snav-lock{margin-left:auto;font-size:10px;opacity:.6}
  .snav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
  .sidebar-bottom{padding:12px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
  .role-admin .sidebar-avatar{background:rgba(239,68,68,0.25);color:#f87171}
  .role-sl .sidebar-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
  .role-op .sidebar-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
  [data-theme="light"] .role-admin .sidebar-avatar{background:rgba(239,68,68,0.15);color:#c53030}
  [data-theme="light"] .role-sl .sidebar-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
  [data-theme="light"] .role-op .sidebar-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
  .topbar{display:none}
  .main-column{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .scroll-area{padding-bottom:24px}
}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn .15s ease}
.modal-overlay.center{align-items:center}
.modal-sheet{background:var(--bg2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:slideUp .2s ease}
.modal-overlay.center .modal-sheet{border-radius:12px;margin:20px;max-height:80vh}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}

/* Detail rows */
.detail-row{display:flex;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none;margin-bottom:0}
.translate-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s;text-decoration:none}
.translate-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.detail-key{font-size:11px;font-weight:500;color:var(--text2);width:80px;flex-shrink:0;padding-top:2px}
.detail-val{font-size:13px;flex:1;word-break:break-all}

/* Approve/Reject modal buttons */
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn-approve{flex:1;height:52px;background:var(--success);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-approve:hover{opacity:.85}
.btn-reject-modal{flex:1;height:52px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);color:var(--danger);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-reject-modal:hover{background:rgba(239,68,68,.2)}
.btn-close{width:100%;height:46px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;margin-top:8px;transition:all .15s}
.btn-close:hover{color:var(--text1)}

/* Reject reason input */
.reject-wrap{margin-top:12px;display:none}
.reject-wrap.show{display:block;animation:fadeIn .2s ease}
.reject-textarea{width:100%;min-height:80px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;color:var(--text1);padding:10px 12px;outline:none;resize:vertical;transition:border-color .15s}
.reject-textarea:focus{border-color:var(--danger)}
.reject-textarea::placeholder{color:var(--text2)}
.reject-hint{font-size:11px;color:var(--text2);margin-bottom:6px}
.btn-reject-confirm{width:100%;height:50px;background:var(--danger);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .15s}

/* Detail images */
.detail-images{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.detail-images-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.detail-img-grid{display:flex;flex-wrap:wrap;gap:8px}
.detail-img-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.detail-img-thumb:hover{opacity:.8}
.detail-img-loading{font-size:12px;color:var(--text2)}
.img-fullscreen{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-fullscreen img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:4px}
.btn-reject-confirm:hover{opacity:.85}
.btn-cancel-reject{width:100%;height:44px;background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;margin-top:6px}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:300;animation:fadeIn .2s ease;white-space:nowrap}
.toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.toast.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.toast.info{background:var(--bg3);border:1px solid var(--border);color:var(--text1)}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Select mode */
.select-toggle{display:none;padding:4px 10px;border:1px solid rgba(239,159,39,0.3);border-radius:6px;background:none;font-family:inherit;font-size:11px;font-weight:600;color:var(--orange);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.select-toggle:hover{background:rgba(239,159,39,.08)}
.select-toggle.done{color:var(--text2);border-color:var(--border)}
.tcard.selectable{cursor:pointer}
.tcard.selected{border-color:var(--danger)!important;border-width:1.5px}
.tcard-checkbox{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.tcard-checkbox.checked{background:var(--danger);border-color:var(--danger)}
.tcard-checkbox svg{display:none}
.tcard-checkbox.checked svg{display:block}
.delete-bar{position:fixed;left:0;right:0;z-index:100;background:rgba(239,68,68,.95);display:none;align-items:center;justify-content:space-between;padding:10px 16px;backdrop-filter:blur(8px);box-shadow:0 -2px 12px rgba(0,0,0,.25)}
.delete-bar.visible{display:flex}
.delete-bar-count{color:#fff;font-size:13px;font-weight:600}
.delete-bar-actions{display:flex;gap:8px}
.delete-bar .db-cancel{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.delete-bar .db-delete{background:#fff;color:var(--danger);border:none;border-radius:6px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(min-width:1025px){.sidebar{width:240px}}
/* ===== Drum (approve end-time modal) ===== */
.ad-drum-row{display:flex;align-items:flex-start;gap:4px;justify-content:center}
.ad-drum-box{position:relative;overflow:hidden;height:150px;width:72px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border)}
.ad-drum-selector{position:absolute;top:50%;left:0;right:0;height:36px;margin-top:-18px;border-top:2px solid var(--orange);border-bottom:2px solid var(--orange);pointer-events:none;z-index:2}
.ad-drum-fade-top{position:absolute;top:0;left:0;right:0;height:57px;background:linear-gradient(to bottom,var(--bg3),transparent);z-index:1;pointer-events:none}
.ad-drum-fade-bot{position:absolute;bottom:0;left:0;right:0;height:57px;background:linear-gradient(to top,var(--bg3),transparent);z-index:1;pointer-events:none}
.ad-drum-list{position:absolute;left:0;right:0;top:57px;cursor:grab;user-select:none}
.ad-drum-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--text1)}
.drum-colon{font-size:20px;font-weight:700;color:var(--text2);align-self:center;padding-top:0}
.drum-unit{font-size:10px;color:var(--text2);text-align:center;margin-top:3px}
.approve-start-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-radius:var(--radius);margin-bottom:10px}
.approve-start-label{font-size:12px;color:var(--text2)}
.approve-start-val{font-size:16px;font-weight:700;color:var(--text1);font-family:'Noto Sans JP',sans-serif;letter-spacing:1px}
.approve-calc-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:var(--radius);margin-bottom:14px}
.approve-calc-label{font-size:12px;color:var(--success)}
.approve-calc-val{font-size:18px;font-weight:700;color:var(--success)}
</style>

async function sbFetch(path, method='GET', body=null) {
  const opts = { method, headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());

  return text ? JSON.parse(text) : null;

/* ===== UTC→JST変換 ===== */
function utcToJST(isoStr){
  if(!isoStr) return '';
  var s=isoStr.replace('+00:00','Z').replace('+00','Z');
  if(!/Z$/i.test(s)&&!/[+-]\d{2}/.test(s)) s+='Z';
  var d=new Date(s);
  if(isNaN(d.getTime())) return isoStr.slice(0,16).replace('T',' ');
  var jst=new Date(d.getTime()+9*60*60*1000);
  var y=jst.getUTCFullYear(),mo=String(jst.getUTCMonth()+1).padStart(2,'0'),dy=String(jst.getUTCDate()).padStart(2,'0'),h=String(jst.getUTCHours()).padStart(2,'0'),mi=String(jst.getUTCMinutes()).padStart(2,'0');
  return y+'-'+mo+'-'+dy+' '+h+':'+mi;
}

function buildLineOptions() {

  sel.innerHTML = '<option value="">すべてのライン</option>';
  lines.forEach(ln => {
    const opt = document.createElement('option');
    opt.value = ln; opt.textContent = ln;
    if(ln === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setDefaultDates() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const fmt = d => d.toISOString().slice(0,10);
  const fromEl = document.getElementById('tlDateFrom');
  const toEl = document.getElementById('tlDateTo');
  if(!fromEl.value) fromEl.value = fmt(monday);
  if(!toEl.value) toEl.value = fmt(now);
  fromEl.onchange = renderTimeline;
  toEl.onchange = renderTimeline;
}

function renderTimeline() {
  const from = document.getElementById('tlDateFrom').value;
  const to   = document.getElementById('tlDateTo').value;
  const line = document.getElementById('tlLineSelect').value;
  const filtered = TL_DATA.filter(r => {
    if(r.status === 'draft') return false;
    if(from && r.date < from) return false;
    if(to   && r.date > to)   return false;
    if(line && r.line !== line) return false;
    if(tlTypeFilter === 'eq' && r.type !== 'equipment') return false;
    if(tlTypeFilter === 'md' && r.type !== 'mold') return false;
    return true;
  });
  document.getElementById('tlCnt').textContent = TL_DATA.filter(r=>r.status!=='draft').length + '件中 ' + filtered.length + '件表示';
  if(filtered.length === 0) {
    document.getElementById('timelineList').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>該当する投稿はありません</div></div>';
    return;
  }
  const groups = {};
  filtered.forEach(r => { if(!groups[r.date]) groups[r.date]=[]; groups[r.date].push(r); });
  const container = document.getElementById('timelineList');
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'tl-list';
  const dayNames = ['日','月','火','水','木','金','土'];
  Object.keys(groups).sort().reverse().forEach(date => {
    const sep = document.createElement('div');
    sep.className = 'tl-sep';
    const d = new Date(date + 'T00:00:00');
    sep.innerHTML = '<div class="tl-sep-line"></div><span class="tl-sep-label">' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + dayNames[d.getDay()] + '）</span><div class="tl-sep-line"></div>';
    wrap.appendChild(sep);
    groups[date].forEach(r => {
      const typeLabel = r.type === 'equipment' ? t('type_eq') : t('type_md');
      const typeClass = r.type === 'equipment' ? 'eq' : 'md';
      const timeStr = r.submitted_at ? r.submitted_at.slice(11,16) : '';
      const isSelected = selectMode && selectedIds.has(r.id);
      const checkboxHTML = selectMode
        ? '<span class="tcard-checkbox' + (isSelected ? ' checked' : '') + '"></span>'
        : '';
      const item = document.createElement('div');
      item.className = 'tl-item' + (selectMode ? ' selectable' : '') + (isSelected ? ' selected' : '');
      item.setAttribute('data-id', r.id);
      item.innerHTML =
        '<div class="tl-col"><div class="tl-dot ' + r.status + '"></div><div class="tl-vl"></div></div>' +
        '<div class="tl-card' + (isSelected ? ' selected' : '') + '">' +
          '<div class="tl-card-head">' +
            '<span class="tl-machine">' + checkboxHTML + r.line + ' — ' + r.machine + '号機</span>' +
            '<span class="tl-time">' + timeStr + '</span>' +
          '</div>' +
          '<div class="tl-pills"><span class="tl-pill ' + typeClass + '">' + typeLabel + '</span><span class="tl-pill ' + r.status + '">' + t('status_'+r.status) + '</span></div>' +
          (r.product_code ? '<div class="tl-product">' + r.product_code + (r.product_name ? ' / ' + r.product_name : '') + '</div>' : '') +
          '<div class="tl-detail">' + r.detail + '</div>' +
          '<div class="tl-footer"><span class="tl-who">👤 ' + r.submitted_by + '</span></div>' +
        '</div>';
      if(selectMode) {
        item.querySelector('.tl-card').addEventListener('click', function(e) {
          e.stopPropagation(); toggleSelectCard(r.id);
        });
      } else {
        item.querySelector('.tl-card').addEventListener('click', () => openDetail(r.id));
      }
      wrap.appendChild(item);
    });
  });
  container.appendChild(wrap);
}

/* ===== Render list ===== */
function renderList(){
  updateBadges();
  // Draft banner
  var drafts=TROUBLES.filter(function(tr){return tr.status==='draft';});
  var dBanner=document.getElementById('draftBanner');
  if(dBanner){
    if(drafts.length>0){
      dBanner.style.display='flex';
      document.getElementById('draftCount').textContent=drafts.length;
    } else {
      dBanner.style.display='none';
    }
  }
  const list=getFiltered();
  const container=document.getElementById('troubleList');

  if(list.length===0){
    const msg=mainTab==='pending'?t('empty_pending'):mainTab==='draft'?t('empty_draft'):t('empty_all');
    const icon=mainTab==='pending'?'✅':mainTab==='draft'?'📝':'📭';
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${msg}</div></div>`;
    return;
  }

  container.innerHTML='';
  list.forEach((tr,idx)=>{
    const card=buildCard(tr,idx);
    container.appendChild(card);
  });
}

function getFiltered(){
  return TROUBLES.filter(tr=>{
    const statusOk = mainTab==='pending'?tr.status==='pending':
                     mainTab==='approved'?tr.status==='approved':
                     mainTab==='rejected'?tr.status==='rejected':
                     mainTab==='draft'?tr.status==='draft':
                     tr.status!=='draft';
    const typeOk = typeFilter==='all'?true:typeFilter==='eq'?tr.type==='equipment':tr.type==='mold';
    return statusOk && typeOk;
  });
}

function buildCard(tr,idx){
  const div=document.createElement('div');
  div.className='tcard';
  div.setAttribute('data-id', tr.id);
  div.style.animationDelay=`${idx*0.04}s`;
  if(tr._actioned) div.classList.add('actioned');
  if(selectMode) div.classList.add('selectable');
  if(selectMode && selectedIds.has(tr.id)) div.classList.add('selected');

  const typeClass=tr.type==='equipment'?'eq':'md';
  const typeLabel=t('type_'+typeClass);
  const statusLabel=t('status_'+tr.status);
  const stopMinutesStr = tr.stop_minutes ? t('stop_min', tr.stop_minutes) : null;
  const stopStartStr = tr.stop_start ? tr.stop_start.slice(0,5) : null;
  const stopEndStr   = tr.stop_end   ? tr.stop_end.slice(0,5)   : null;
  var stopHTML;
  if(stopStartStr || stopEndStr){
    var minPart = stopMinutesStr
      ? '<span style="font-size:13px;font-weight:500;color:var(--text1)">' + stopMinutesStr + '</span><span style="font-size:11px;color:var(--text2);margin:0 4px">|</span>'
      : '<span style="font-size:13px;color:var(--text2)">未確定</span><span style="font-size:11px;color:var(--text2);margin:0 4px">|</span>';
    var sPill = '<span style="font-size:12px;padding:2px 8px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border)">' + (stopStartStr || '--:--') + '</span>';
    var ePill = stopEndStr
      ? '<span style="font-size:12px;padding:2px 8px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border)">' + stopEndStr + '</span>'
      : '<span style="font-size:12px;padding:2px 8px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);color:var(--text2)">--:--</span>';
    stopHTML = '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' + minPart + sPill + '<span style="font-size:12px;color:var(--text2)">→</span>' + ePill + '</div>';
  } else {
    stopHTML = '<span>' + (stopMinutesStr || t('stop_none')) + '</span>';
  }
  const occLabel=tr.occurrence==='first'?t('occ_first'):t('occ_rec');

  let actionsHTML='';
  if(!selectMode && tr.status==='pending'){
    actionsHTML=`
      <div class="card-actions">
        <button class="ca-btn ca-approve" onclick="event.stopPropagation();quickApprove(${tr.id})">${t('btn_approve')}</button>
        <button class="ca-btn ca-reject"  onclick="event.stopPropagation();openRejectModal(${tr.id})">${t('btn_reject')}</button>
      </div>`;
  } else if(!selectMode && tr.status==='rejected'){
    actionsHTML=`
      <div>
        <button class="ca-resubmit" onclick="event.stopPropagation();editRejected(${tr.id})" style="width:100%;border-radius:0 0 10px 10px">${t('btn_resubmit')}</button>
      </div>`;
  } else if(!selectMode && tr.status==='draft'){
    actionsHTML=`
      <div class="draft-actions">
        <button class="da-btn da-edit" onclick="event.stopPropagation();editDraft('${tr.id}')">${t('da_edit')}</button>
        <button class="da-btn da-del"  onclick="event.stopPropagation();confirmDeleteDraft('${tr.id}')">${t('da_del')}</button>
        <button class="da-btn da-send" onclick="event.stopPropagation();sendDraft('${tr.id}')">${t('da_send')}</button>
      </div>`;
  }

  let rejectHTML='';
  if(tr.status==='rejected'&&tr.reject_reason){
    rejectHTML=`<div style="margin-top:6px;padding:8px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;font-size:12px;color:var(--danger)"><strong style="display:block;font-size:10px;margin-bottom:2px">差し戻し理由：</strong>${tr.reject_reason}</div>`;
  }

  const isChecked = selectMode && selectedIds.has(tr.id);
  const checkboxHTML = selectMode
    ? `<div class="tcard-checkbox ${isChecked?'checked':''}"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
    : '';

  const _cardId = String(tr.id);
  const onClickTop = selectMode
    ? `onclick="event.stopPropagation();toggleSelectCard('${_cardId}')"`
    : `onclick="openDetail('${_cardId}')"`;  // draft_XXX対応で文字列化

  div.innerHTML=`
    <div class="tcard-top" ${onClickTop}>
      <div class="tcard-header">
        <div class="tcard-meta" style="${selectMode?'display:flex;align-items:center;gap:8px':''}">
          ${checkboxHTML}
          <span class="tcard-type ${typeClass}">${typeLabel}</span>
          <span class="status-badge status-${tr.status}">${statusLabel}</span>
          <span class="tcard-date">${tr.date.replace(/-/g,'/')} ${t('shift_label',tr.shift)}</span>
        </div>
        <span class="tcard-time">${tr.submitted_at?tr.submitted_at.slice(11,16):''}</span>
      </div>
      <div class="tcard-body">
        <div class="tcard-machine">${tr.line} – ${tr.machine}号機</div>
        <div class="tcard-product">${tr.product_code} / ${tr.product_name}</div>
        <span class="tcard-category">${catName(tr)}</span>
        <div class="tcard-detail">${tr.detail}</div>
        ${rejectHTML}
      </div>
      <div class="tcard-footer">
        <span class="tcard-submitter">👤 ${tr.submitted_by}　${tr.submitted_at||''}</span>
        <span class="tcard-stop">⏱ ${stopMinutesStr || t('stop_none')} ${occLabel}</span>
      </div>
    </div>
    ${actionsHTML}
  `;
  // カード全体のクリック（selectModeは動的判定）
  div.addEventListener('click', function(e){
    if(tr.status === 'draft'){ editDraft(String(tr.id)); return; }
    if(selectMode){ e.stopPropagation(); toggleSelectCard(tr.id); return; }
    openDetail(tr.id);
  });
  return div;
}

async function sendDraft(id){

  try{
    await sbFetch('troubles','POST',{

      occurred_date:tr.date||null,shift:parseInt(tr.shift)||1,
      detail:tr.detail,occurrence:tr.occurrence==='repeat'?'recurrence':(tr.occurrence||'first'),
      stop_minutes:tr.stop_minutes||null,reporter_id:SESSION.userId

async function quickApprove(id){

var _drumState = {eh:0, em:0, startH:0, startM:0, approveId:null};

function openStopTimeModal(id){
  const tr = TROUBLES.find(x => x.id === id) || TL_DATA.find(x => x.id === id);
  if(!tr) return;
  _drumState.approveId = id;
  _drumState.noStart = false;

  // 開始時刻: stop_startがあればそれを使用、なければ投稿時刻(submitted_at)を代替表示
  var startDispStr = '--:--';
  if(tr.stop_start){
    var sp = tr.stop_start.split(':');
    _drumState.startH = parseInt(sp[0])||0;
    _drumState.startM = Math.round((parseInt(sp[1])||0) / 5);
    startDispStr = String(_drumState.startH).padStart(2,'0') + ':' + String(_drumState.startM*5).padStart(2,'0');
  } else if(tr.submitted_at){
    // submitted_atの時刻を開始時刻の代替として使用（表示・計算両方に使う）
    var timePart = tr.submitted_at.slice(11,16); // "HH:MM"
    startDispStr = timePart || '--:--';
    if(timePart && timePart.length === 5){
      _drumState.startH = parseInt(timePart.slice(0,2))||0;
      _drumState.startM = Math.round((parseInt(timePart.slice(3,5))||0) / 5);
    } else {
      _drumState.startH = -1;
      _drumState.startM = -1;
    }
  }

  // 終了初期値: stop_startがあれば開始+30分、なければ現在時刻+30分（終了ドラムの初期位置のみ）
  var baseH, baseM;
  if(tr.stop_start && _drumState.startH >= 0){
    baseH = _drumState.startH;
    baseM = _drumState.startM * 5;
  } else {
    var now = new Date();
    baseH = now.getHours();
    baseM = Math.floor(now.getMinutes() / 5) * 5;
  }
  var initMin = baseH * 60 + baseM + 30;
  _drumState.eh = Math.floor(initMin / 60) % 24;
  _drumState.em = Math.floor((initMin % 60) / 5);

  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${t('stop_input_title')}</div>
    <div class="modal-sub">${tr.line} – ${tr.machine}号機 / ${tr.product_code}</div>
    <div class="approve-start-row">
      <span class="approve-start-label">${t('stop_start_label')}</span>
      <span class="approve-start-val">${startDispStr}</span>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${t('stop_end_label')}</div>
    <div class="ad-drum-row" style="margin-bottom:10px">
      <div><div class="ad-drum-box"><div class="ad-drum-selector"></div><div class="ad-drum-fade-top"></div><div class="ad-drum-fade-bot"></div><div class="ad-drum-list" id="adH"></div></div><div class="drum-unit">${t('hour_unit')}</div></div>
      <span class="drum-colon" style="align-self:center">:</span>
      <div><div class="ad-drum-box"><div class="ad-drum-selector"></div><div class="ad-drum-fade-top"></div><div class="ad-drum-fade-bot"></div><div class="ad-drum-list" id="adM"></div></div><div class="drum-unit">${t('min_unit')}</div></div>
    </div>
    <div class="approve-calc-row">
      <span class="approve-calc-label">${t('stop_calc_label')}</span>
      <span class="approve-calc-val" id="approveCalc">--</span>
    </div>
    <button onclick="submitDrumApprove()" style="width:100%;height:48px;border:none;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;background:var(--success);color:#fff">${t('btn_approve')}</button>
    <button class="btn-cancel-reject" onclick="closeModal()">${t('reject_cancel')}</button>
  `,true);
  setTimeout(function(){initApproveDrums();},50);
}

/* ---- 承認ドラム (drag/touchスクロール方式) ---- */
var AD_ITEM_H = 36, AD_DRUM_TOP = 57;

function _adItems(total, fmt){
  return Array.from({length:total}, function(_,i){ return fmt(i); });
}
function _adSetPos(id, idx, animate){
  var el = document.getElementById(id);
  if(!el) return;
  el.style.transition = animate ? 'top 0.2s ease' : 'none';
  el.style.top = (AD_DRUM_TOP - idx * AD_ITEM_H) + 'px';
}
function _adSnapDrum(d){
  var el = document.getElementById(d.id);
  if(!el) return;
  var top = parseInt(el.style.top) || AD_DRUM_TOP;
  var maxIdx = d.items.length - 1;
  var idx = Math.round((AD_DRUM_TOP - top) / AD_ITEM_H);
  idx = Math.max(0, Math.min(maxIdx, idx));
  _drumState[d.key] = idx;
  _adSetPos(d.id, idx, true);
  calcApproveTime();
}
function _adInitDrag(d){
  var el = document.getElementById(d.id);
  if(!el) return;
  var startY = 0, startTop = 0, dragging = false;
  function onS(e){
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startTop = parseInt(el.style.top) || AD_DRUM_TOP;
    el.style.transition = 'none';
    e.preventDefault();
  }
  function onM(e){
    if(!dragging) return;
    var y = e.touches ? e.touches[0].clientY : e.clientY;
    var nt = startTop + (y - startY);
    var mn = AD_DRUM_TOP - (d.items.length - 1) * AD_ITEM_H;
    nt = Math.max(mn - 20, Math.min(AD_DRUM_TOP + 20, nt));
    el.style.top = nt + 'px';
    e.preventDefault();
  }
  function onE(){ if(!dragging) return; dragging = false; _adSnapDrum(d); }
  el.addEventListener('mousedown', onS);
  el.addEventListener('touchstart', onS, {passive:false});
  document.addEventListener('mousemove', onM);
  document.addEventListener('touchmove', onM, {passive:false});
  document.addEventListener('mouseup', onE);
  document.addEventListener('touchend', onE);
}
function initApproveDrums(){
  var defs = [
    {id:'adH', key:'eh', items:_adItems(24, function(i){return String(i).padStart(2,'0');})},
    {id:'adM', key:'em', items:_adItems(12, function(i){return String(i*5).padStart(2,'0');})}
  ];
  defs.forEach(function(d){
    var el = document.getElementById(d.id);
    if(!el) return;
    el.innerHTML = '';
    d.items.forEach(function(label){
      var div = document.createElement('div');
      div.className = 'ad-drum-item';
      div.textContent = label;
      el.appendChild(div);
    });
    _adSetPos(d.id, _drumState[d.key] < 0 ? 0 : _drumState[d.key], false);
    _adInitDrag(d);
  });
  // DOMが確実に描画された後に停止時間を計算・表示
  setTimeout(calcApproveTime, 0);
}

function calcApproveTime(){
  var el = document.getElementById('approveCalc');
  if(!el) return;
  // 開始時刻不明（stop_startなし）の場合は計算不可
  if(_drumState.startH < 0){
    el.textContent = '--';
    return;
  }
  var sm = _drumState.startH * 60 + _drumState.startM * 5;
  var em = _drumState.eh * 60 + _drumState.em * 5;
  if(em <= sm) em += 24 * 60;
  var diff = em - sm;
  el.textContent = diff + t('stop_unit');
}

function submitDrumApprove(){
  var endStr = String(_drumState.eh).padStart(2,'0') + ':' + String(_drumState.em * 5).padStart(2,'0') + ':00';
  var stopMinutes = null;
  // 開始時刻が判明している場合のみ停止時間を計算
  if(_drumState.startH >= 0){
    var sm = _drumState.startH * 60 + _drumState.startM * 5;
    var em = _drumState.eh * 60 + _drumState.em * 5;
    if(em <= sm) em += 24 * 60;
    stopMinutes = em - sm;
  }
  closeModal();
  doApprove(_drumState.approveId, stopMinutes, endStr, null);
}

function submitMinutesApprove(){
  var input = document.getElementById('stopTimeInput');
  var val = input ? parseInt(input.value, 10) : NaN;
  if(isNaN(val) || val < 0){
    if(input) input.style.borderColor = 'var(--danger)';
    if(input) input.focus();
    return;
  }
  closeModal();
  doApprove(_drumState.approveId, val, null);
}

async function doApprove(id, stopMinutes, stopEnd, stopStart){
  const tr = TROUBLES.find(x => x.id === id) || TL_DATA.find(x => x.id === id);
  if (!tr) return;
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) card.classList.add('actioned');
  try {
    var patch = {
      status: 'approved',
      approver_id: SESSION.userId,
      approved_at: new Date().toISOString()
    };
    if(stopMinutes !== undefined && stopMinutes !== null){
      patch.stop_minutes = stopMinutes;
    }
    if(stopEnd){
      patch.stop_end = stopEnd;
    }
    if(stopStart){
      patch.stop_start = stopStart;
    }
    await sbFetch('troubles?id=eq.' + id, 'PATCH', patch);
    tr.status = 'approved';
    tr.approved_by = SESSION.name;
    tr.approved_at = utcToJST(new Date().toISOString());
    if(stopMinutes !== undefined && stopMinutes !== null){
      tr.stop_minutes = stopMinutes;
    }
    if(stopEnd){
      tr.stop_end = stopEnd;
    }
    tr._actioned = true;
    // TROUBLESの対応レコードも同期（TL_DATA経由で取得した場合に必要）
    const trInList = TROUBLES.find(x => x.id === id);
    if(trInList){
      trInList.status = 'approved';
      trInList.approved_by = SESSION.name;
      trInList.approved_at = tr.approved_at;
      if(stopMinutes !== undefined && stopMinutes !== null) trInList.stop_minutes = stopMinutes;
      if(stopEnd) trInList.stop_end = stopEnd;
      trInList._actioned = true;
    }
    setMainTab('approved');
    showToast(t('approve_done'), 'success');
  } catch(e) {
    if (card) card.classList.remove('actioned');
    showToast('エラー: ' + e.message, 'error');
  }
}

/* ===== Reject modal ===== */
function openRejectModal(id){
  const tr=TROUBLES.find(x=>x.id===id) || TL_DATA.find(x=>x.id===id);
  if(!tr) return;
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${t('reject_title')}</div>
    <div class="modal-sub">${tr.line} – ${tr.machine}号機 / ${tr.product_code}</div>
    <p class="reject-hint">${t('reject_hint')}</p>
    <textarea class="reject-textarea" id="rejectReasonInput"
      placeholder="${t('reject_placeholder')}" rows="3"></textarea>
    <button class="btn-reject-confirm" onclick="doReject(${id})">${t('reject_confirm')}</button>
    <button class="btn-cancel-reject" onclick="closeModal()">${t('reject_cancel')}</button>
  `,true);
  setTimeout(()=>document.getElementById('rejectReasonInput')?.focus(),100);
}

async function doReject(id){
  const tr = TROUBLES.find(x => x.id === id) || TL_DATA.find(x => x.id === id);
  if (!tr) return;
  const reason = document.getElementById('rejectReasonInput')?.value.trim() || '';
  closeModal();
  try {
    await sbFetch('troubles?id=eq.' + id, 'PATCH', {
      status: 'rejected',
      reject_reason: reason || null,
      approver_id: SESSION.userId,
      approved_at: new Date().toISOString()
    });
    tr.status = 'rejected';
    tr.reject_reason = reason || null;
    tr.approved_by = SESSION.name;
    tr.approved_at = utcToJST(new Date().toISOString());
    tr._actioned = true;
    // TROUBLESの対応レコードも同期（TL_DATA経由で取得した場合に必要）
    const trInList = TROUBLES.find(x => x.id === id);
    if(trInList){
      trInList.status = 'rejected';
      trInList.reject_reason = reason || null;
      trInList.approved_by = SESSION.name;
      trInList.approved_at = tr.approved_at;
      trInList._actioned = true;
    }
    setMainTab('rejected');
    showToast(t('reject_done'), 'error');
  } catch(e) {
    showToast('エラー: ' + e.message, 'error');
  }
}

/* ===== Detail modal ===== */
function openDetail(id){

  if(!tr) return;
  const typeClass=tr.type==='equipment'?'eq':'md';
  const typeLabel=t('type_'+typeClass);
  const stopMinutesStr = tr.stop_minutes ? t('stop_min', tr.stop_minutes) : null;
  const stopStartStr = tr.stop_start ? tr.stop_start.slice(0,5) : null;
  const stopEndStr   = tr.stop_end   ? tr.stop_end.slice(0,5)   : null;

      </div>`;
  }

  let rejectRowHTML='';
  if(tr.reject_reason){
    rejectRowHTML=`<div class="detail-row"><span class="detail-key">${t('key_reject_reason')}</span><span class="detail-val" style="color:var(--danger)">${tr.reject_reason}</span></div>`;
  }
  let approvedRowHTML='';
  if(tr.approved_by){
    approvedRowHTML=`<div class="detail-row"><span class="detail-key">${t('key_approved')}</span><span class="detail-val">${tr.approved_by} ${tr.approved_at||''}</span></div>`;
  }

  showModal(`
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span class="tcard-type ${typeClass}" style="font-size:11px;padding:3px 8px">${typeLabel}</span>
      <span class="modal-title" style="margin:0">${t('detail_title')}</span>
    </div>
    <div class="modal-sub">No.${tr.id}</div>
    <div class="detail-row"><span class="detail-key">${t('key_status')}</span><span class="detail-val"><span class="status-badge status-${tr.status}">${statusLabel}</span></span></div>
    <div class="detail-row"><span class="detail-key">${t('key_date')}</span><span class="detail-val">${tr.date.replace(/-/g,'/')} ${t('shift_label',tr.shift)}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_line')}</span><span class="detail-val">${tr.line}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_machine')}</span><span class="detail-val">${tr.machine}号機</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_product')}</span><span class="detail-val">${tr.product_code} / ${tr.product_name}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_stop')}</span><span class="detail-val">${stopHTML}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_category')}</span><span class="detail-val">${catName(tr)}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_detail')}</span><span class="detail-val" style="display:flex;align-items:flex-start;gap:6px"><span style="flex:1;word-break:break-all">${tr.detail||'–'}</span>${(function(){var tlLang=currentLang==='vi'?'vi':currentLang==='en'?'en':'';if(!tlLang||!tr.detail)return '';var url='https://translate.google.com/?sl=ja&tl='+tlLang+'&text='+encodeURIComponent(tr.detail)+'&op=translate';return '<a href="'+url+'" target="_blank" rel="noopener" class="translate-icon-btn" title="Google翻訳で開く"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg></a>';})()} </span></div>
    <div class="detail-row"><span class="detail-key">${t('key_occurrence')}</span><span class="detail-val">${occLabel}</span></div>
    <div class="detail-row"><span class="detail-key">${t('key_submitter')}</span><span class="detail-val">${tr.submitted_by} ${tr.submitted_at||''}</span></div>
    ${approvedRowHTML}

      <div class="detail-images-title">📷 写真</div>

/* ===== Trouble Images ===== */
async function loadTroubleImages(troubleId){
  var loadingEl=document.getElementById('detail-img-loading');
  var gridEl=document.getElementById('detail-img-grid');
  var areaEl=document.getElementById('detail-images-area');
  if(!gridEl) return;
  try{
    var rows=await sbFetch('trouble_images?trouble_id=eq.'+troubleId+'&select=id,storage_path&order=created_at.asc');
    if(loadingEl) loadingEl.style.display='none';
    if(!rows||rows.length===0){
      if(areaEl) areaEl.innerHTML='<div class="detail-images-title">📷 写真</div><div style="font-size:12px;color:var(--text2)">添付写真なし</div>';
      return;
    }
    gridEl.innerHTML=rows.map(function(img){
      var url=SB_URL+'/storage/v1/object/public/trouble-images/'+img.storage_path;
      return '<img class="detail-img-thumb" src="'+url+'" onclick="openFullImage(this.src)" onerror="this.style.display=\'none\'" alt="写真">';
    }).join('');
  }catch(e){
    if(loadingEl) loadingEl.textContent='写真の読み込みに失敗';
    console.warn('trouble_images load error:',e);
  }
}

function openFullImage(url){
  var div=document.createElement('div');
  div.className='img-fullscreen';
  div.onclick=function(){div.remove();};
  div.innerHTML='<img src="'+url+'">';
  document.body.appendChild(div);
}

/* ===== Modal ===== */
function showModal(html, center=false){
  const el=document.getElementById('modalEl');
  el.innerHTML=`<div class="modal-overlay ${center?'center':''}" onclick="handleOverlay(event)"><div class="modal-sheet">${html}</div></div>`;
  el.style.display='block';
}
function closeModal(){ document.getElementById('modalEl').style.display='none'; }
function handleOverlay(e){ if(e.target.classList.contains('modal-overlay')) closeModal(); }

/* ===== Toast ===== */
let toastTimer=null;
function showToast(msg,type='info'){
  const el=document.getElementById('toastEl');
  el.innerHTML=`<div class="toast ${type}">${msg}</div>`;
  el.style.display='block';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.style.display='none'; },2500);
}

/* ===== Select Mode (SL/admin delete) ===== */
function toggleSelectMode(){
  if(selectMode) exitSelectMode(); else enterSelectMode();
}

function enterSelectMode(){
  selectMode = true;
  selectedIds.clear();
  updateSelectButtons(true);
  if(mainTab === 'all') renderTimeline(); else renderList();
  updateDeleteBar();
}

function exitSelectMode(){
  selectMode = false;
  selectedIds.clear();
  updateSelectButtons(false);
  if(mainTab === 'all') renderTimeline(); else renderList();
  updateDeleteBar();
}

function updateSelectButtons(active){
  // Mobile topbar
  var btn = document.getElementById('selectToggleBtn');
  if(btn){
    btn.textContent = active ? t('btn_select_done') : t('btn_select');
    btn.classList.toggle('done', active);
  }
  // PC sidebar
  var sbBtn = document.getElementById('sbSelectBtn');
  if(sbBtn){
    var label = sbBtn.querySelector('[data-i18n="btn_select"]');
    if(label) label.textContent = active ? t('btn_select_done') : t('btn_select');
    sbBtn.classList.toggle('active', active);
  }
}

function toggleSelectCard(id){
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  // 即時のDOM更新（全体再描画せず）
  var card = document.querySelector('[data-id="'+id+'"]');
  if(card){
    card.classList.toggle('selected', selectedIds.has(id));
    var cb = card.querySelector('.tcard-checkbox');
    if(cb) cb.classList.toggle('checked', selectedIds.has(id));
  }
  updateDeleteBar();
}

function updateDeleteBar(){
  var bar = document.getElementById('deleteBar');
  if(!bar) return;
  if(selectMode && selectedIds.size > 0){
    bar.classList.add('visible');
    // ボトムナビの上に配置
    var bnav = document.querySelector('.bottom-nav');
    bar.style.bottom = bnav ? (bnav.offsetHeight + 'px') : '0';
    document.getElementById('deleteBarCount').textContent = t('selected_count', selectedIds.size);
  } else {
    bar.classList.remove('visible');
  }
}

async function deleteSelected(){
  var count = selectedIds.size;
  if(count === 0) return;

  // 二段階確認
  if(!confirm(t('delete_excel_warn'))) return;
  if(!confirm(t('delete_confirm_msg', count))) return;

  var ids = Array.from(selectedIds);
  try {
    // 1) 関連画像のStorageパスを取得
    var imgFilter = ids.map(function(id){ return 'trouble_id.eq.' + id; }).join(',');
    var images = [];
    try {
      images = await sbFetch('trouble_images?select=id,storage_path&or=(' + imgFilter + ')');
    } catch(e){ console.warn('画像取得エラー:', e); }

    // 2) Storageから画像を削除（個別DELETE）
    if(images && images.length > 0){
      for(var i = 0; i < images.length; i++){
        try {
          var imgPath = images[i].storage_path;
          await fetch(SB_URL + '/storage/v1/object/trouble-images/' + imgPath, {
            method: 'DELETE',
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
          });
        } catch(e){ console.warn('Storage削除エラー:', e); }
      }
    }

    // 3) trouble_images レコード削除（CASCADE で自動削除されるがフォールバック）
    // troubles を削除すれば ON DELETE CASCADE で trouble_images も消える

    // 4) troubles を削除
    var troubleFilter = ids.map(function(id){ return 'id.eq.' + id; }).join(',');
    await sbFetch('troubles?or=(' + troubleFilter + ')', 'DELETE');

    // 5) ローカル状態を更新
    TROUBLES = TROUBLES.filter(function(tr){ return !selectedIds.has(tr.id); });
    TL_DATA = TL_DATA.filter(function(tr){ return !selectedIds.has(tr.id); });
    exitSelectMode();
    showToast(t('delete_done', count), 'success');
  } catch(e){
    console.error('削除エラー:', e);
    showToast(t('delete_error') + ': ' + e.message, 'error');
  }
}

/* ===== Logout ===== */
function doLogout(){
  localStorage.removeItem('traq_session');
  showToast(t('logout_done'), 'info');
  setTimeout(() => { location.href = 'index.html'; }, 1000);
}

/* ===== ページ復帰時にデータ再読み込み ===== */
window.addEventListener('pageshow', function(e) {
  if (e.persisted) { if (mainTab === 'all') { loadTimeline(); } else { loadTroubles(); } }
});
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    if (mainTab === 'all') { loadTimeline(); } else { loadTroubles(); }
  }
});
