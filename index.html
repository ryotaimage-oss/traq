<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – TroubleTrack System</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/bCrypt.min.js"></script>
<style>
  :root {
    --bg:        #080d18;
    --surface:   #111827;
    --border:    #1e293b;
    --orange:    #EF9F27;
    --orange-dim:#b87820;
    --text:      #f1f5f9;
    --muted:     #64748b;
    --error:     #ef4444;
    --success:   #22c55e;
    --radius:    8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── ヘッダー ── */
  .header {
    background: #080d18;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo-icon {
    width: 36px; height: 36px;
    flex-shrink: 0;
  }
  .logo-text { font-size: 20px; font-weight: 700; color: var(--orange); letter-spacing: .04em; }
  .logo-sub  { font-size: 10px; color: var(--muted); letter-spacing: .08em; }

  /* ── メインコンテンツ ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    padding: 28px 24px;
  }

  /* ── ステップインジケーター ── */
  .steps {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
    gap: 0;
  }
  .step-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--muted);
    background: var(--bg);
    transition: all .2s;
    position: relative;
    z-index: 1;
  }
  .step-dot.active  { border-color: var(--orange); color: var(--orange); }
  .step-dot.done    { border-color: var(--orange); background: var(--orange); color: #000; }
  .step-label { font-size: 10px; color: var(--muted); }
  .step-label.active { color: var(--orange); }
  .step-line {
    flex: 1;
    height: 2px;
    background: var(--border);
    margin-bottom: 16px;
    transition: background .2s;
  }
  .step-line.done { background: var(--orange); }

  /* ── セクションタイトル ── */
  .section-title {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 500;
    letter-spacing: .04em;
  }

  /* ── シフト選択 ── */
  .shift-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .shift-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 8px;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    color: var(--text);
  }
  .shift-btn:hover { border-color: var(--orange); }
  .shift-btn .shift-no   { font-size: 22px; font-weight: 700; color: var(--orange); }
  .shift-btn .shift-time { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: nowrap; }

  /* ── ユーザーリスト ── */
  .user-list { display: flex; flex-direction: column; gap: 6px; }
  .user-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all .15s;
    color: var(--text);
    text-align: left;
    width: 100%;
  }
  .user-btn:hover { border-color: var(--orange); }
  .user-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
    color: var(--orange);
  }
  .user-name  { font-size: 14px; font-weight: 500; }
  .user-role  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .role-badge {
    margin-left: auto;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .badge-admin  { background: #1e3a5f; color: #60a5fa; }
  .badge-leader { background: #1a3a1a; color: #4ade80; }
  .badge-worker { background: #2a1a00; color: var(--orange); }

  /* ── PINキーパッド ── */
  .pin-user {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .pin-user-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    color: var(--orange);
    flex-shrink: 0;
  }
  .pin-user-name { font-size: 15px; font-weight: 600; }
  .pin-user-role { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all .15s;
  }
  .pin-dot.filled { background: var(--orange); border-color: var(--orange); }
  .pin-dot.error  { background: var(--error);  border-color: var(--error); }

  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .pin-key {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all .1s;
    text-align: center;
    user-select: none;
  }
  .pin-key:active { background: var(--border); transform: scale(.95); }
  .pin-key.cancel { font-size: 13px; font-weight: 500; color: var(--muted); }
  .pin-key.del    { font-size: 18px; }

  .pin-error {
    text-align: center;
    font-size: 12px;
    color: var(--error);
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* ── 戻るボタン ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
    font-family: inherit;
  }
  .back-btn:hover { color: var(--text); }

  /* ── ローディング ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── エラー表示 ── */
  .fetch-error {
    text-align: center;
    padding: 40px 20px;
    color: var(--error);
    font-size: 13px;
  }
  .retry-btn {
    margin-top: 12px;
    background: none;
    border: 1px solid var(--error);
    color: var(--error);
    border-radius: var(--radius);
    padding: 8px 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
  }

  /* ── 非表示 ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <!-- 工場シルエット -->
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>

    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <!-- 煙突 -->
    <rect x="8"  y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <!-- 煙 -->
    <circle cx="9"  cy="6"  r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="11" cy="4"  r="1.5" fill="#EF9F27" opacity=".5"/>
    <circle cx="19" cy="4"  r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="21" cy="2"  r="1.5" fill="#EF9F27" opacity=".5"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>

<!-- メイン -->
<main class="main">
  <div class="card">

    <!-- ステップインジケーター -->

        <button class="pin-key" onclick="pinKey('6')">6</button>
        <button class="pin-key" onclick="pinKey('7')">7</button>

<script>
// ── Supabase設定 ──────────────────────────────────────────
const SB_URL = 'https://ptwqdlgcrdqefsfnoies.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0d3FkbGdjcmRxZWZzZm5vaWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzgwNjQsImV4cCI6MjA5MDAxNDA2NH0.82v4bj1BIj5M4uHmOBPvX1a7EcQ12LkHvWQmqDrGRzQ';

async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      ...opts.headers
    },
    ...opts
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`${res.status}: ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── 状態管理 ──────────────────────────────────────────────
let selectedShift = null;
let selectedUser  = null;
let allUsers      = [];
let pinInput      = '';

// ロールごとのPINロック状態（ブラウザメモリ管理）
// key: userId, value: { failCount, lockedUntil }
const lockState = {};

// ロールの日本語変換
const ROLE_LABELS = { worker: 'OP', leader: 'SL', admin: 'Admin' };

// ── ページ初期化 ──────────────────────────────────────────
(async () => {
  try {
    allUsers = await sbFetch('traq_users?is_active=eq.true&order=role.asc,name.asc&select=id,name,role,shift,pin_hash');
  } catch (e) {
    console.error('ユーザー取得失敗:', e);
    allUsers = [];
  }
})();

// ── ステップ制御 ──────────────────────────────────────────
function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById(`step${i}`).classList.toggle('hidden', i !== n);
  });
  updateStepIndicator(n);
}

function updateStepIndicator(n) {
  [1,2,3].forEach(i => {
    const dot = document.getElementById(`dot${i}`);
    const lbl = document.getElementById(`lbl${i}`);
    dot.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
    lbl.className = 'step-label' + (i === n ? ' active' : '');
    if (i < 3) {
      document.getElementById(`line${i}`).className = 'step-line' + (i < n ? ' done' : '');
    }
  });
}

// ── Step1: シフト選択 ─────────────────────────────────────
function selectShift(shift) {
  selectedShift = shift;
  renderUserList();
  goStep(2);
}

// ── Step2: ユーザーリスト表示 ─────────────────────────────
function renderUserList() {
  const wrap = document.getElementById('user-list-wrap');

  if (allUsers.length === 0) {
    wrap.innerHTML = '<div class="fetch-error">ユーザーを取得できませんでした<br><button class="retry-btn" onclick="retryLoad()">再読込</button></div>';
    return;
  }

  // シフト優先（自分のシフト→他シフト）、ロール順（admin→leader→worker）
  const roleOrder = { admin: 0, leader: 1, worker: 2 };
  const sorted = [...allUsers].sort((a, b) => {
    const aMyShift = a.shift === selectedShift ? 0 : 1;
    const bMyShift = b.shift === selectedShift ? 0 : 1;
    if (aMyShift !== bMyShift) return aMyShift - bMyShift;
    return (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9);
  });

  const title = document.getElementById('step2-title');
  title.textContent = `${selectedShift}直 — ユーザーを選択`;

  const badgeClass = { admin: 'badge-admin', leader: 'badge-leader', worker: 'badge-worker' };

  wrap.innerHTML = '<div class="user-list">' +
    sorted.map(u => {
      const initials = u.name.charAt(0);
      const roleLabel = ROLE_LABELS[u.role] || u.role;
      const badge = badgeClass[u.role] || 'badge-worker';
      const locked = isLocked(u.id);
      return `
        <button class="user-btn" onclick="selectUser(${u.id})" ${locked ? 'disabled style="opacity:.5"' : ''}>
          <div class="user-avatar">${initials}</div>
          <div>
            <div class="user-name">${u.name}</div>
            <div class="user-role">${u.shift}直${locked ? ' — ロック中' : ''}</div>
          </div>
          <span class="role-badge ${badge}">${roleLabel}</span>
        </button>`;
    }).join('') +
  '</div>';
}

async function retryLoad() {
  const wrap = document.getElementById('user-list-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>読込中...</div>';
  try {
    allUsers = await sbFetch('traq_users?is_active=eq.true&order=role.asc,name.asc&select=id,name,role,shift,pin_hash');
    renderUserList();
  } catch (e) {
    wrap.innerHTML = '<div class="fetch-error">取得失敗<br><button class="retry-btn" onclick="retryLoad()">再読込</button></div>';
  }
}

// ── Step3: PIN入力 ────────────────────────────────────────
function selectUser(userId) {
  selectedUser = allUsers.find(u => u.id === userId);
  if (!selectedUser) return;

  pinInput = '';
  document.getElementById('pin-avatar').textContent = selectedUser.name.charAt(0);
  document.getElementById('pin-name').textContent   = selectedUser.name;
  document.getElementById('pin-role').textContent   = ROLE_LABELS[selectedUser.role] || selectedUser.role;
  document.getElementById('pin-error').textContent  = '';
  renderPinDots();
  goStep(3);
}

function renderPinDots(shake = false) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById(`pd${i}`);
    dot.className = 'pin-dot' + (i < pinInput.length ? (shake ? ' error' : ' filled') : '');
  }
}

function pinKey(k) {
  if (pinInput.length >= 4) return;
  pinInput += k;
  renderPinDots();
  document.getElementById('pin-error').textContent = '';
  if (pinInput.length === 4) setTimeout(verifyPin, 80);
}

function pinDel() {
  if (pinInput.length > 0) {
    pinInput = pinInput.slice(0, -1);
    renderPinDots();
    document.getElementById('pin-error').textContent = '';
  }
}

function pinCancel() {
  pinInput = '';
  renderPinDots();
  document.getElementById('pin-error').textContent = '';
  goStep(2);
}

// ── ロック管理 ────────────────────────────────────────────
function isLocked(userId) {
  const s = lockState[userId];
  if (!s) return false;
  if (s.lockedUntil && new Date() < new Date(s.lockedUntil)) return true;
  return false;
}

function recordFail(userId) {
  if (!lockState[userId]) lockState[userId] = { failCount: 0, lockedUntil: null };
  lockState[userId].failCount++;
  if (lockState[userId].failCount >= 3) {
    const until = new Date(Date.now() + 5 * 60 * 1000);
    lockState[userId].lockedUntil = until.toISOString();
    lockState[userId].failCount = 0;
    return true; // ロックした
  }
  return false;
}

function clearFail(userId) {
  delete lockState[userId];
}

// ── PIN検証 ───────────────────────────────────────────────
let verifying = false;
async function verifyPin() {
  if (verifying) return;
  verifying = true;

  if (isLocked(selectedUser.id)) {
    showPinError('アカウントがロックされています');
    verifying = false;
    return;
  }

  try {
    const ok = await dcodeIO.bcrypt.compare(pinInput, selectedUser.pin_hash);
    if (ok) {
      clearFail(selectedUser.id);
      doLogin();
    } else {
      const locked = recordFail(selectedUser.id);
      pinInput = '';
      renderPinDots(true);
      if (locked) {
        showPinError('3回失敗しました。5分間ロックします');
        renderUserList(); // ロック状態をリスト反映
      } else {
        const s = lockState[selectedUser.id];
        showPinError(`PINが違います（${s.failCount}/3回）`);
      }
    }
  } catch (e) {
    console.error('PIN検証エラー:', e);
    showPinError('エラーが発生しました');
  }

  verifying = false;
}

function showPinError(msg) {
  document.getElementById('pin-error').textContent = msg;
}

// ── ログイン処理 ──────────────────────────────────────────
function doLogin() {
  // ロール変換
  const roleMap = { worker: 'op', leader: 'sl', admin: 'admin' };
  const role = roleMap[selectedUser.role] || 'op';

  // セッション保存（8時間有効）
  const session = {
    userId:    selectedUser.id,
    name:      selectedUser.name,
    role:      role,
    shift:     selectedShift,
    expiresAt: Date.now() + 8 * 60 * 60 * 1000
  };
  localStorage.setItem('traq_session', JSON.stringify(session));

  // リダイレクト
  const dest = { op: 'home.html', sl: 'home_sl.html', admin: 'home.html' };
