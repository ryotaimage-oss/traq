<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Traq – ログイン</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080d18">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables ===== */
:root {
  --orange:#EF9F27;--orange-dark:#c97d10;--navy:#080d18;
  --bg1:#080d18;--bg2:#111827;--bg3:#1e2d45;
  --text1:#e8eaf0;--text2:#8b90a0;
  --border:rgba(255,255,255,0.08);
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
  --radius:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg1:#e8e6e2;--bg2:#ffffff;--bg3:#f0ede8;
  --text1:#1a1f2e;--text2:#666666;
  --border:rgba(0,0,0,0.12);--shadow:0 4px 24px rgba(0,0,0,0.1);
}
/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ===== App layout ===== */
.app{min-height:100%;display:flex;flex-direction:column}

/* ===== Progress bar (top) ===== */
.progress-bar{display:flex;height:3px;flex-shrink:0}
.progress-bar span{flex:1;transition:background .3s}
.progress-bar .done{background:var(--success)}
.progress-bar .active{background:var(--orange)}
.progress-bar .pending{background:var(--border)}

/* ===== Top bar ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.theme-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;transition:border-color .2s}
.theme-btn:hover{border-color:var(--orange)}
.topbar-right{display:flex;align-items:center;gap:4px}
.lang-btn{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:500;color:var(--text2);border:1px solid var(--border);transition:all .15s}
.lang-btn.active{color:var(--orange);border-color:rgba(239,159,39,.4);background:rgba(239,159,39,.06)}
.lang-btn:hover{border-color:rgba(239,159,39,.3)}

/* ===== Main area ===== */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}

/* ===== Logo ===== */
.logo-area{text-align:center;margin-bottom:6px}
.sub-logo{color:var(--text2);font-size:9.5px;letter-spacing:.14em;margin:0 0 18px;opacity:.5}

/* ===== Card ===== */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px 20px;width:100%;max-width:380px;box-shadow:var(--shadow);display:none}
.card.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== Stepper ===== */
.stepper{display:flex;justify-content:center;align-items:center;gap:0;margin-bottom:16px}
.step-item{text-align:center}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin:0 auto 2px;transition:all .2s}
.step-dot.active{background:var(--orange);color:var(--navy)}
.step-dot.done{background:rgba(16,185,129,.15);border:1.5px solid var(--success);color:var(--success);font-size:11px}
.step-dot.pending{background:rgba(255,255,255,.05);border:1.5px solid var(--border);color:var(--text2)}
[data-theme="light"] .step-dot.pending{background:rgba(0,0,0,.04)}
.step-label{font-size:9px;color:var(--text2)}
.step-label.active{color:var(--orange)}
.step-label.done{color:var(--success)}
.step-line{width:28px;height:1.5px;margin:0 4px;margin-bottom:14px;transition:background .2s}
.step-line.done{background:rgba(16,185,129,.4)}
.step-line.pending{background:var(--border)}

/* ===== Card title ===== */
.card-title{font-size:16px;font-weight:700;text-align:center;margin:0 0 14px}

/* ===== Shift buttons ===== */
.shift-row{display:flex;gap:8px}
.shift-btn{flex:1;border-radius:10px;padding:14px 0;text-align:center;border:1.5px solid;transition:transform .1s,box-shadow .2s}
.shift-btn:active{transform:scale(.96)}
.shift-btn .num{font-size:22px;font-weight:700}
.shift-btn .time{font-size:10px;margin-top:2px;opacity:.6}
.s1{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.45);color:#f59e0b}
.s2{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25);color:#10b981}
.s3{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.25);color:#8b5cf6}
.s1:hover{border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.15)}
.s2:hover{border-color:#10b981;box-shadow:0 0 12px rgba(16,185,129,.15)}
.s3:hover{border-color:#8b5cf6;box-shadow:0 0 12px rgba(139,92,246,.15)}

/* ===== User list ===== */
.shift-badge{font-size:11px;color:var(--text2);margin:0 0 10px;text-align:center;opacity:.7}
.search-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.search-input{flex:1;background:none;border:none;outline:none;color:var(--text1);font-size:13px;font-family:inherit}
.search-input::placeholder{color:var(--text2);opacity:.5}
.search-icon{color:var(--text2);font-size:14px;opacity:.5}
.user-list{max-height:210px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.user-row{border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;transition:all .15s;cursor:pointer;border:1px solid transparent}
.user-row:hover{background:rgba(239,159,39,.04);border-color:rgba(239,159,39,.12)}
.user-row:active{transform:scale(.98)}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.user-name{font-size:12.5px;font-weight:500}
.user-role{font-size:10px;color:var(--text2)}
.user-role.adm{color:var(--danger)}
.user-role.sl{color:var(--orange)}
.user-loading{text-align:center;color:var(--text2);font-size:12px;padding:20px 0}
.user-empty{text-align:center;color:var(--text2);font-size:12px;padding:20px 0}

/* ===== PIN area ===== */
.pin-context{display:flex;align-items:center;gap:10px;margin-bottom:14px;justify-content:center}
.pin-ctx-avatar{width:34px;height:34px;border-radius:50%;background:rgba(239,159,39,.1);border:1.5px solid rgba(239,159,39,.25);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--orange);font-weight:600}
.pin-ctx-name{font-size:13px;font-weight:600}
.pin-ctx-tags{display:flex;gap:4px;margin-top:2px}
.pin-ctx-tag{font-size:9px;padding:1px 6px;border-radius:3px}
.pin-ctx-tag.role{background:rgba(239,159,39,.08);color:rgba(239,159,39,.7)}
.pin-ctx-tag.shift{background:rgba(255,255,255,.04);color:var(--text2)}
[data-theme="light"] .pin-ctx-tag.shift{background:rgba(0,0,0,.06)}
.pin-boxes{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.pin-box{width:38px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;transition:all .15s}
.pin-box.empty{border:1.5px solid var(--border)}
.pin-box.filled{background:rgba(239,159,39,.1);border:1.5px solid rgba(239,159,39,.45);color:var(--orange)}
.pin-box.error{background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.45);color:var(--danger);animation:shake .3s}
.pin-box.success{background:rgba(16,185,129,.1);border:1.5px solid rgba(16,185,129,.45);color:var(--success)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-error{text-align:center;color:var(--danger);font-size:12px;min-height:18px;margin-bottom:4px}
.pin-lock{text-align:center;color:var(--danger);font-size:12px;margin-bottom:8px;padding:6px;background:rgba(239,68,68,.06);border-radius:6px;display:none}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:220px;margin:0 auto}
.key-btn{background:var(--bg3);border-radius:10px;padding:12px 0;text-align:center;font-size:18px;font-weight:500;color:var(--text1);transition:all .1s;border:1px solid transparent}
.key-btn:hover{border-color:var(--border)}
.key-btn:active{transform:scale(.93);background:rgba(239,159,39,.08)}
.key-btn:disabled{opacity:.3;pointer-events:none}
.key-btn.del{background:rgba(239,68,68,.06);color:var(--danger);font-size:14px}
.key-btn.del:active{background:rgba(239,68,68,.12)}

/* ===== Back button ===== */
.btn-back{font-size:12px;color:var(--text2);margin-top:14px;display:block;text-align:center;transition:color .15s}
.btn-back:hover{color:var(--orange)}

/* ===== Footer ===== */
.footer{text-align:center;padding:8px 0;flex-shrink:0}
.footer span{font-size:9px;color:var(--text2);opacity:.3;letter-spacing:.08em}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.3)}
.toast.error{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25)}

/* ===== Session redirect overlay ===== */
.redirect-overlay{position:fixed;inset:0;background:var(--bg1);display:flex;align-items:center;justify-content:center;z-index:1000}
.redirect-overlay span{color:var(--text2);font-size:13px}
</style>
</head>
<body>
<div class="app">

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar">
    <span id="pb1" class="active"></span>
    <span id="pb2" class="pending"></span>
    <span id="pb3" class="pending"></span>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="topbar-right">
      <button class="lang-btn active" id="lang-ja" onclick="setLang('ja')">JA</button>
      <button class="lang-btn" id="lang-vi" onclick="setLang('vi')">VI</button>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <main class="main">

    <!-- Logo -->
    <div class="logo-area">
      <svg width="110" height="50" viewBox="0 0 120 55">
        <rect x="10" y="16" width="12" height="28" rx="2" fill="#EF9F27" opacity=".6"/>
        <rect x="26" y="7" width="14" height="37" rx="2" fill="#EF9F27" opacity=".85"/>
        <rect x="44" y="11" width="12" height="33" rx="2" fill="#EF9F27" opacity=".6"/>
        <circle cx="16" cy="11" r="3.5" fill="#EF9F27" opacity=".3"/>
        <circle cx="33" cy="2" r="4" fill="#EF9F27" opacity=".22"/>
        <circle cx="50" cy="7" r="3" fill="#EF9F27" opacity=".28"/>
        <text x="64" y="38" font-size="24" font-weight="700" fill="#EF9F27" font-family="sans-serif">Traq</text>
      </svg>
    </div>
    <p class="sub-logo">TROUBLETRACK SYSTEM</p>

    <!-- Step 1: Shift -->
    <div class="card" id="step1">
      <div class="stepper">
        <div class="step-item"><div class="step-dot active" id="sd1">1</div><div class="step-label active" id="sl1" data-i18n="step_shift">直</div></div>
        <div class="step-line pending" id="sln1"></div>
        <div class="step-item"><div class="step-dot pending" id="sd2">2</div><div class="step-label" id="sl2" data-i18n="step_name">名前</div></div>
        <div class="step-line pending" id="sln2"></div>
        <div class="step-item"><div class="step-dot pending" id="sd3">3</div><div class="step-label" id="sl3" data-i18n="step_pin">PIN</div></div>
      </div>
      <p class="card-title" data-i18n="select_shift">直を選択</p>
      <div class="shift-row">
        <button class="shift-btn s1" onclick="selectShift(1)">
          <div class="num">1</div>
          <div class="time">08–16</div>
        </button>
        <button class="shift-btn s2" onclick="selectShift(2)">
          <div class="num">2</div>
          <div class="time">16–00</div>
        </button>
        <button class="shift-btn s3" onclick="selectShift(3)">
          <div class="num">3</div>
          <div class="time">00–08</div>
        </button>
      </div>
    </div>

    <!-- Step 2: User -->
    <div class="card" id="step2">
      <div class="stepper" id="stepper2"></div>
      <p class="card-title" data-i18n="select_user">ユーザーを選択</p>
      <p class="shift-badge" id="shiftBadge"></p>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" data-i18n-ph="search_ph" placeholder="名前で検索..." oninput="filterUsers()">
      </div>
      <div class="user-list" id="userList">
        <div class="user-loading" data-i18n="loading">読み込み中...</div>
      </div>
      <button class="btn-back" onclick="goStep(1)">← <span data-i18n="back">もどる</span></button>
    </div>

    <!-- Step 3: PIN -->
    <div class="card" id="step3">
      <div class="stepper" id="stepper3"></div>
      <div class="pin-context" id="pinContext"></div>
      <p class="card-title" data-i18n="enter_pin">PINを入力</p>
      <div class="pin-error" id="pinErrorEl"></div>
      <div class="pin-lock" id="pinLockEl"></div>
      <div id="pinInputArea">
        <div class="pin-boxes">
          <div class="pin-box empty" id="pd0"></div>
          <div class="pin-box empty" id="pd1"></div>
          <div class="pin-box empty" id="pd2"></div>
          <div class="pin-box empty" id="pd3"></div>
        </div>
        <div class="numpad">
          <button class="key-btn" onclick="pinKey('1')">1</button>
          <button class="key-btn" onclick="pinKey('2')">2</button>
          <button class="key-btn" onclick="pinKey('3')">3</button>
          <button class="key-btn" onclick="pinKey('4')">4</button>
          <button class="key-btn" onclick="pinKey('5')">5</button>
          <button class="key-btn" onclick="pinKey('6')">6</button>
          <button class="key-btn" onclick="pinKey('7')">7</button>
          <button class="key-btn" onclick="pinKey('8')">8</button>
          <button class="key-btn" onclick="pinKey('9')">9</button>
          <button class="key-btn" style="visibility:hidden"></button>
          <button class="key-btn" onclick="pinKey('0')">0</button>
          <button class="key-btn del" onclick="pinDel()">⌫</button>
        </div>
      </div>
      <button class="btn-back" onclick="goStep(2)">← <span data-i18n="back">もどる</span></button>
    </div>

  </main>

  <div class="footer"><span>TROUBLETRACK SYSTEM v2.0</span></div>
</div>

<div class="toast" id="toastEl"></div>

<!-- Early theme init (before paint) -->
<script>
(function(){
  var s=localStorage.getItem('traq_theme');
  var p=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  var t=s||p;
  document.documentElement.setAttribute('data-theme',t);
  var b=document.getElementById('themeBtn');
  if(b) b.textContent=t==='dark'?'☀️':'🌙';
})();
</script>

<script>
/* ==========================================================
   Supabase
========================================================== */
const SB_URL = 'https://ptwqdlgcrdqefsfnoies.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0d3FkbGdjcmRxZWZzZm5vaWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzgwNjQsImV4cCI6MjA5MDAxNDA2NH0.82v4bj1BIj5M4uHmOBPvX1a7EcQ12LkHvWQmqDrGRzQ';

async function sbFetch(path, method, body) {
  method = method || 'GET';
  var opts = {
    method: method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }

  if (body) opts.body = JSON.stringify(body);

  return text ? JSON.parse(text) : null;
}

/* ==========================================================
   i18n
========================================================== */
var currentLang = localStorage.getItem('traq_lang') || 'ja';

var I18N = {
  ja: {
    select_shift:'直を選択', select_user:'ユーザーを選択',
    enter_pin:'PINを入力', back:'もどる',
    step_shift:'直', step_name:'名前', step_pin:'PIN',
    search_ph:'名前で検索...',
    loading:'読み込み中...', no_users:'ユーザーが見つかりません',
    role_op:'オペレーター', role_sl:'シフトリーダー', role_adm:'管理者',
    shift_label:'$1直',
    shift_time_1:'08:00〜16:00', shift_time_2:'16:00〜00:00', shift_time_3:'00:00〜08:00',
    pin_error:'PINが違います', pin_lock:'ロック中 $1分$2秒',
    login_ok:'$1 さん、ようこそ！',
    err_generic:'エラーが発生しました'
  },
  vi: {
    select_shift:'Chọn ca', select_user:'Chọn người dùng',
    enter_pin:'Nhập PIN', back:'Quay lại',
    step_shift:'Ca', step_name:'Tên', step_pin:'PIN',
    search_ph:'Tìm theo tên...',
    loading:'Đang tải...', no_users:'Không tìm thấy',
    role_op:'Công nhân', role_sl:'Trưởng ca', role_adm:'Quản trị',
    shift_label:'Ca $1',
    shift_time_1:'08:00–16:00', shift_time_2:'16:00–00:00', shift_time_3:'00:00–08:00',
    pin_error:'Sai PIN', pin_lock:'Khóa $1 phút $2 giây',
    login_ok:'Xin chào $1!',
    err_generic:'Đã xảy ra lỗi'
  },
  en: {
    select_shift:'Select shift', select_user:'Select user',
    enter_pin:'Enter PIN', back:'Back',
    step_shift:'Shift', step_name:'Name', step_pin:'PIN',
    search_ph:'Search by name...',
    loading:'Loading...', no_users:'No users found',
    role_op:'Operator', role_sl:'Shift Leader', role_adm:'Admin',
    shift_label:'Shift $1',
    shift_time_1:'08:00–16:00', shift_time_2:'16:00–00:00', shift_time_3:'00:00–08:00',
    pin_error:'Wrong PIN', pin_lock:'Locked $1m $2s',
    login_ok:'Welcome, $1!',
    err_generic:'An error occurred'
  }
};

function t(key) {
  var s = (I18N[currentLang] || I18N.ja)[key] || (I18N.ja[key]) || key;
  for (var i = 1; i < arguments.length; i++) {
    s = s.replace('$' + i, arguments[i]);
  }
  return s;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el) {
    el.placeholder = t(el.getAttribute('data-i18n-ph'));
  });
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('traq_lang', lang);
  ['ja','vi','en'].forEach(function(l) {
    var btn = document.getElementById('lang-' + l);
    if (btn) btn.classList.toggle('active', l === lang);
  });
  applyI18n();
  // Re-apply dynamic elements
  if (state.currentStep === 2) {
    renderShiftBadge();
  }
  if (state.currentStep === 3 && state.selectedUser) {
    renderPinContext();
  }
}

/* ==========================================================
   Theme
========================================================== */
function toggleTheme() {
  var curr = document.documentElement.getAttribute('data-theme');
  var next = curr === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('traq_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

/* ==========================================================
   State
========================================================== */
var state = {
  currentStep: 1,
  selectedShift: null,
  selectedUser: null,
  pinInput: '',
  allUsers: [],
  usersLoaded: false,
  failCount: {},
  lockUntil: {},
  lockTimers: {}
};

/* ==========================================================
   Session check
========================================================== */
(function checkSession() {
  try {
    var s = localStorage.getItem('traq_session');
    if (!s) return;
    var o = JSON.parse(s);
    if (o.expiresAt && Date.now() > o.expiresAt) {
      localStorage.removeItem('traq_session');
      return;
    }
    // Already logged in → redirect
    redirectByRole(o.role);
  } catch(e) {
    localStorage.removeItem('traq_session');
  }
})();

function redirectByRole(role) {
  if (role === 'admin') { location.href = 'admin.html'; }
  else if (role === 'sl') { location.href = 'home_sl.html'; }
  else { location.href = 'home.html'; }
}

/* ==========================================================
   Step navigation
========================================================== */
function goStep(n) {
  state.currentStep = n;
  document.getElementById('step1').classList.toggle('active', n === 1);
  document.getElementById('step2').classList.toggle('active', n === 2);
  document.getElementById('step3').classList.toggle('active', n === 3);

  // Update progress bar
  for (var i = 1; i <= 3; i++) {
    var el = document.getElementById('pb' + i);
    if (i < n) el.className = 'done';
    else if (i === n) el.className = 'active';
    else el.className = 'pending';
  }

  // Update stepper dots (step1 is static HTML)
  if (n >= 2) updateStepper('stepper2', n);
  if (n >= 3) updateStepper('stepper3', n);

  // Step-specific setup
  if (n === 2) {
    renderShiftBadge();
    document.getElementById('searchInput').value = '';
    if (!state.usersLoaded) {
      loadUsers();
    } else {
      renderUsers(state.allUsers);
    }
  }
  if (n === 3) {
    state.pinInput = '';
    updatePinBoxes();
    clearPinError();
    renderPinContext();
    checkLockState(state.selectedUser.id);
  }
}

function updateStepper(containerId, currentStep) {
  var html = '';
  var steps = [
    { num: 1, key: 'step_shift' },
    { num: 2, key: 'step_name' },
    { num: 3, key: 'step_pin' }
  ];
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var cls, labelCls, content;
    if (s.num < currentStep) {
      cls = 'done'; labelCls = 'done'; content = '✓';
    } else if (s.num === currentStep) {
      cls = 'active'; labelCls = 'active'; content = s.num;
    } else {
      cls = 'pending'; labelCls = ''; content = s.num;
    }
    html += '<div class="step-item"><div class="step-dot ' + cls + '">' + content + '</div><div class="step-label ' + labelCls + '">' + t(s.key) + '</div></div>';
    if (i < steps.length - 1) {
      var lineCls = s.num < currentStep ? 'done' : 'pending';
      html += '<div class="step-line ' + lineCls + '"></div>';
    }
  }
  document.getElementById(containerId).innerHTML = html;
}

/* ==========================================================
   Shift
========================================================== */
function selectShift(n) {
  state.selectedShift = n;
  state.usersLoaded = false;
  goStep(2);
}

function renderShiftBadge() {
  var n = state.selectedShift;
  var badge = document.getElementById('shiftBadge');
  badge.textContent = t('shift_label', n) + ' ─ ' + t('shift_time_' + n);
}

/* ==========================================================
   Users
========================================================== */
async function loadUsers() {
  var listEl = document.getElementById('userList');
  listEl.innerHTML = '<div class="user-loading">' + t('loading') + '</div>';
  try {
    var rows = await sbFetch('traq_users?is_active=eq.true&select=id,name,role,default_shift&order=name.asc');
    state.allUsers = rows || [];
    state.usersLoaded = true;
    renderUsers(state.allUsers);
  } catch(e) {
    listEl.innerHTML = '<div class="user-loading" style="color:var(--danger)">Error: ' + e.message + '</div>';
  }
}

function filterUsers() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  if (!q) { renderUsers(state.allUsers); return; }
  var filtered = state.allUsers.filter(function(u) {
    return u.name.toLowerCase().indexOf(q) >= 0;
  });
  renderUsers(filtered);
}

function renderUsers(users) {
  var listEl = document.getElementById('userList');
  if (!users || users.length === 0) {
    listEl.innerHTML = '<div class="user-empty">' + t('no_users') + '</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var initial = u.name.charAt(0);
    // Try to get 2-char initial for Japanese names
    if (/[\u3000-\u9fff]/.test(u.name)) {
      var parts = u.name.split(/[\s　]+/);
      initial = parts[0].charAt(0);
      if (parts.length > 1) initial = parts[0].substring(0, 2);
    }
    var roleText = t('role_' + (u.role === 'admin' ? 'adm' : u.role));
    var roleCls = u.role === 'admin' ? ' adm' : u.role === 'sl' ? ' sl' : '';
    html += '<div class="user-row" onclick="selectUser(' + u.id + ')">' +
      '<div class="user-avatar">' + initial + '</div>' +
      '<div><div class="user-name">' + u.name + '</div>' +
      '<div class="user-role' + roleCls + '">' + roleText + '</div></div></div>';
  }
  listEl.innerHTML = html;
}

function selectUser(id) {
  var u = state.allUsers.find(function(x) { return x.id === id; });
  if (!u) return;
  state.selectedUser = u;
  goStep(3);
}

/* ==========================================================
   PIN context (user info display on step 3)
========================================================== */
function renderPinContext() {
  var u = state.selectedUser;
  if (!u) return;
  var initial = u.name.charAt(0);
  if (/[\u3000-\u9fff]/.test(u.name)) {
    var parts = u.name.split(/[\s　]+/);
    initial = parts[0].substring(0, 2);
  }
  var roleKey = u.role === 'admin' ? 'adm' : u.role;
  var roleText = t('role_' + (u.role === 'admin' ? 'adm' : u.role));
  var el = document.getElementById('pinContext');
  el.innerHTML =
    '<div class="pin-ctx-avatar">' + initial + '</div>' +
    '<div><div class="pin-ctx-name">' + u.name + '</div>' +
    '<div class="pin-ctx-tags">' +
    '<span class="pin-ctx-tag role">' + roleText + '</span>' +
    '<span class="pin-ctx-tag shift">' + t('shift_label', state.selectedShift) + '</span>' +
    '</div></div>';
}

/* ==========================================================
   PIN input
========================================================== */
function pinKey(k) {
  if (state.pinInput.length >= 4) return;
  if (isLocked(state.selectedUser.id)) return;
  state.pinInput += k;
  updatePinBoxes();
  if (state.pinInput.length === 4) {
    doLogin();
  }
}

function pinDel() {
  if (state.pinInput.length === 0) return;
  state.pinInput = state.pinInput.slice(0, -1);
  updatePinBoxes();
  clearPinError();
}

function updatePinBoxes(visualState) {
  for (var i = 0; i < 4; i++) {
    var el = document.getElementById('pd' + i);
    if (!el) continue;
    if (visualState === 'error') {
      el.className = 'pin-box error';
      el.textContent = '•';
    } else if (visualState === 'success') {
      el.className = 'pin-box success';
      el.textContent = '•';
    } else if (i < state.pinInput.length) {
      el.className = 'pin-box filled';
      el.textContent = '•';
    } else {
      el.className = 'pin-box empty';
      el.textContent = '';
    }
  }
}

function clearPinError() {
  document.getElementById('pinErrorEl').textContent = '';
}

function disablePinInput(disabled) {
  document.querySelectorAll('.key-btn').forEach(function(b) {
    b.disabled = disabled;
  });
}

/* ==========================================================
   Lock (browser memory only)
========================================================== */
function isLocked(userId) {
  return state.lockUntil[userId] && Date.now() < state.lockUntil[userId];
}

function checkLockState(userId) {
  if (isLocked(userId)) {
    showLockMessage(userId);
    disablePinInput(true);
  } else {
    document.getElementById('pinLockEl').style.display = 'none';
    disablePinInput(false);
  }
}

function showLockMessage(userId) {
  var lockEl = document.getElementById('pinLockEl');
  lockEl.style.display = 'block';
  if (state.lockTimers[userId]) clearInterval(state.lockTimers[userId]);
  function updateLockText() {
    var remaining = state.lockUntil[userId] - Date.now();
    if (remaining <= 0) {
      clearInterval(state.lockTimers[userId]);
      lockEl.style.display = 'none';
      disablePinInput(false);
      return;
    }
    var m = Math.floor(remaining / 60000);
    var s = Math.floor((remaining % 60000) / 1000);
    lockEl.textContent = t('pin_lock', m, s);
  }
  updateLockText();
  state.lockTimers[userId] = setInterval(updateLockText, 500);
}

/* ==========================================================
   Login
========================================================== */
async function doLogin() {
  var u = state.selectedUser;
  if (!u) return;
  if (isLocked(u.id)) return;

  disablePinInput(true);

  try {
    var rows = await sbFetch('traq_users?id=eq.' + u.id + '&select=id,name,role,default_shift,pin');
    if (!rows || rows.length === 0) throw new Error('User not found');
    var dbUser = rows[0];

    if (state.pinInput !== dbUser.pin) {
      // Failure
      state.failCount[u.id] = (state.failCount[u.id] || 0) + 1;
      updatePinBoxes('error');

      if (state.failCount[u.id] >= 3) {
        state.lockUntil[u.id] = Date.now() + 5 * 60 * 1000;
        state.failCount[u.id] = 0;
        setTimeout(function() {
          showLockMessage(u.id);
          state.pinInput = '';
          updatePinBoxes();
        }, 500);
      } else {
        document.getElementById('pinErrorEl').textContent = t('pin_error');
        setTimeout(function() {
          state.pinInput = '';
          updatePinBoxes();
          disablePinInput(false);
        }, 600);
      }
      return;
    }

    // Success
    state.failCount[u.id] = 0;
    updatePinBoxes('success');

    localStorage.setItem('traq_session', JSON.stringify({
      userId: dbUser.id,
      name: dbUser.name,
      role: dbUser.role,
      shift: state.selectedShift,
      expiresAt: Date.now() + 8 * 60 * 60 * 1000
    }));

    showToast(t('login_ok', dbUser.name), 'success');
    setTimeout(function() { redirectByRole(dbUser.role); }, 800);

  } catch(e) {
    showToast(t('err_generic') + ': ' + e.message, 'error');
    state.pinInput = '';
    updatePinBoxes();
    disablePinInput(false);
  }
}

/* ==========================================================
   Toast
========================================================== */
var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'success');
  requestAnimationFrame(function() {
    el.classList.add('show');
  });
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    el.classList.remove('show');
  }, 2500);
}

/* ==========================================================
   Init
========================================================== */
(function init() {
  // Language
  ['ja','vi','en'].forEach(function(l) {
    var btn = document.getElementById('lang-' + l);
    if (btn) btn.classList.toggle('active', l === currentLang);
  });
  applyI18n();

  // Show step 1
  goStep(1);
})();
</script>
