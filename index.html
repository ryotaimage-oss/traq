<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables ===== */
:root{
  --orange:#EF9F27;--orange-dark:#c97d10;--navy:#080d18;
  --bg1:#080d18;--bg2:#111827;--bg3:#1e2d45;
  --factory:#2e3a52;--roof:#3d4e6e;
  --text1:#e8eaf0;--text2:#8b90a0;
  --border:rgba(255,255,255,0.08);
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
  --radius:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
[data-theme="light"]{
  --bg1:#e8e6e2;--bg2:#ffffff;--bg3:#f0ede8;
  --text1:#1a1f2e;--text2:#666666;
  --border:rgba(0,0,0,0.12);--shadow:0 4px 24px rgba(0,0,0,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{min-height:100%;display:flex;flex-direction:column}

/* ===== Progress bar (top 3-segment) ===== */
.progress-bar{display:flex;height:3px;flex-shrink:0}
.progress-bar span{flex:1;transition:background .3s}
.pb-done{background:var(--success)}
.pb-active{background:var(--orange)}
.pb-pending{background:var(--border)}

/* ===== Topbar ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.theme-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;transition:border-color .2s}
.theme-btn:hover{border-color:var(--orange)}
.topbar-right{display:flex;align-items:center;gap:4px}
.lang-btn{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:500;color:var(--text2);border:1px solid var(--border);transition:all .15s}
.lang-btn.active{color:var(--orange);border-color:rgba(239,159,39,.4);background:rgba(239,159,39,.06)}
.lang-btn:hover{border-color:rgba(239,159,39,.3)}

/* ===== Main ===== */
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.logo-area{text-align:center;margin-bottom:6px}
.sub-logo{color:var(--text2);font-size:9.5px;letter-spacing:.14em;margin:0 0 18px;opacity:.5}

/* ===== Card ===== */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px 20px;width:100%;max-width:380px;box-shadow:var(--shadow);animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card-title{font-size:16px;font-weight:700;text-align:center;margin:0 0 6px}
.card-hint{font-size:12px;color:var(--text2);margin-bottom:14px;text-align:center}

/* ===== Stepper ===== */
.steps{display:flex;justify-content:center;align-items:center;gap:0;margin-bottom:16px}
.step-item{text-align:center}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin:0 auto 2px;transition:all .2s;border:1.5px solid var(--border);color:var(--text2);background:transparent}
.step-dot.active{background:var(--orange);color:var(--navy);border-color:var(--orange)}
.step-dot.done{background:rgba(16,185,129,.15);border-color:var(--success);color:var(--success);font-size:11px}
.step-label{font-size:9px;color:var(--text2)}
.step-label.active{color:var(--orange)}
.step-label.done{color:var(--success)}
.step-line{width:28px;height:1.5px;margin:0 4px;margin-bottom:14px;transition:background .2s}
.step-line.done{background:rgba(16,185,129,.4)}
.step-line.pending{background:var(--border)}

/* ===== Shift buttons ===== */
.shift-grid{display:flex;gap:8px;margin-bottom:8px}
.shift-btn{flex:1;border-radius:10px;padding:14px 0;text-align:center;border:1.5px solid;transition:transform .1s,box-shadow .2s;cursor:pointer;font-family:inherit}
.shift-btn:active{transform:scale(.96)}
.shift-btn.s1{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.45);color:#f59e0b}
.shift-btn.s2{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25);color:#10b981}
.shift-btn.s3{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.25);color:#8b5cf6}
.shift-btn.s1:hover{border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.15)}
.shift-btn.s2:hover{border-color:#10b981;box-shadow:0 0 12px rgba(16,185,129,.15)}
.shift-btn.s3:hover{border-color:#8b5cf6;box-shadow:0 0 12px rgba(139,92,246,.15)}
.shift-num{font-size:22px;font-weight:700;display:block;line-height:1;margin-bottom:2px}
.shift-time{font-size:10px;display:block;opacity:.6}

/* ===== User list ===== */
.user-search{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;color:var(--text1);outline:none;margin-bottom:10px;transition:border-color .15s}
.user-search:focus{border-color:var(--orange)}
.user-search::placeholder{color:var(--text2);opacity:.5}
.user-grid{display:flex;flex-direction:column;gap:5px;max-height:210px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.user-grid::-webkit-scrollbar{width:4px}
.user-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.user-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left;width:100%}
.user-btn:hover{background:rgba(239,159,39,.04);border-color:rgba(239,159,39,.12)}
.user-btn:active{transform:scale(.98)}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.user-avatar.sl{background:rgba(239,159,39,.12);color:var(--orange);border-color:rgba(239,159,39,.25)}
.user-avatar.adm{background:rgba(239,68,68,.1);color:var(--danger);border-color:rgba(239,68,68,.2)}
.user-name{font-size:12.5px;font-weight:500;color:var(--text1)}
.user-role{font-size:10px;color:var(--text2);margin-top:1px}
.user-role.sl{color:var(--orange)}
.user-role.adm{color:var(--danger)}

/* ===== PIN ===== */
.pin-user-info{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.pin-avatar{width:34px;height:34px;border-radius:50%;background:rgba(239,159,39,.1);border:1.5px solid rgba(239,159,39,.25);color:var(--orange);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pin-avatar.sl{background:rgba(239,159,39,.12);border-color:rgba(239,159,39,.3)}
.pin-avatar.adm{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:var(--danger)}
.pin-user-name{font-size:13px;font-weight:600}
.pin-user-role{font-size:10px;color:var(--text2);margin-top:2px}
.pin-user-role.sl{color:var(--orange)}
.pin-user-role.adm{color:var(--danger)}

/* PIN boxes */
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.pin-dot{width:38px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;transition:all .15s;border:1.5px solid var(--border)}
.pin-dot.filled{background:rgba(239,159,39,.1);border-color:rgba(239,159,39,.45);color:var(--orange)}
.pin-dot.filled::after{content:'\2022'}
.pin-dot.success{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.45);color:var(--success)}
.pin-dot.success::after{content:'\2022'}
.pin-dot.error{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.45);color:var(--danger);animation:shake .3s}
.pin-dot.error::after{content:'\2022'}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pin-error{text-align:center;font-size:12px;color:var(--danger);min-height:18px;margin-bottom:6px}

/* Numpad */
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:220px;margin:0 auto 12px}
.key-btn{background:var(--bg3);border-radius:10px;padding:12px 0;text-align:center;font-size:18px;font-weight:500;color:var(--text1);transition:all .1s;border:1px solid transparent;display:flex;align-items:center;justify-content:center;font-family:inherit;height:auto}
.key-btn:hover{border-color:var(--border)}
.key-btn:active{transform:scale(.93);background:rgba(239,159,39,.08)}
.key-btn:disabled{opacity:.3;pointer-events:none}
.key-clear{font-size:11px;font-weight:600;color:var(--text2)}
.key-del{background:rgba(239,68,68,.06);color:var(--danger);font-size:14px}
.key-del:active{background:rgba(239,68,68,.12)}

/* ===== Buttons ===== */
.btn-primary{width:100%;height:48px;background:var(--orange);border:none;border-radius:var(--radius);font-family:inherit;font-size:15px;font-weight:700;color:var(--navy);cursor:pointer;transition:all .15s}
.btn-primary:hover{background:var(--orange-dark)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-secondary{display:block;text-align:center;width:100%;margin-top:14px;font-family:inherit;font-size:12px;color:var(--text2);cursor:pointer;transition:color .15s;background:none;border:none}
.btn-secondary:hover{color:var(--orange)}

/* ===== Loading / Footer / Toast ===== */
.loading{text-align:center;padding:20px;color:var(--text2);font-size:12px}
.footer{text-align:center;padding:8px 0;flex-shrink:0}
.footer span{font-size:9px;color:var(--text2);opacity:.3;letter-spacing:.08em}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;z-index:400;white-space:nowrap;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.toast.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.toast.info{background:var(--bg3);border:1px solid var(--border);color:var(--text1)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar">
    <span id="pbSeg1" class="pb-active"></span>
    <span id="pbSeg2" class="pb-pending"></span>
    <span id="pbSeg3" class="pb-pending"></span>
  </div>
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="topbar-right">
      <button class="lang-btn active" onclick="setLang('ja')" id="lang-ja">JP</button>
      <button class="lang-btn" onclick="setLang('vi')" id="lang-vi">VN</button>
      <button class="lang-btn" onclick="setLang('en')" id="lang-en">EN</button>
    </div>
  </div>
  <main class="main">
    <!-- Logo -->
    <div class="logo-area">
      <svg width="110" height="50" viewBox="0 0 120 55">
        <rect x="10" y="16" width="12" height="28" rx="2" fill="#EF9F27" opacity=".6"/>
        <rect x="26" y="7" width="14" height="37" rx="2" fill="#EF9F27" opacity=".85"/>
        <rect x="44" y="11" width="12" height="33" rx="2" fill="#EF9F27" opacity=".6"/>
        <circle cx="16" cy="11" r="3.5" fill="#EF9F27" opacity=".3"/>
        <circle cx="33" cy="2" r="4" fill="#EF9F27" opacity=".22"/>
        <circle cx="50" cy="7" r="3" fill="#EF9F27" opacity=".28"/>
        <text x="64" y="38" font-size="24" font-weight="700" fill="#EF9F27" font-family="sans-serif">Traq</text>
      </svg>
    </div>
    <p class="sub-logo">TROUBLETRACK SYSTEM</p>
    <!-- Step 1: シフト選択 -->
    <div class="card" id="step1">
      <div class="steps">
        <div class="step-item"><div class="step-dot active">1</div><div class="step-label active" data-i18n="step_shift">直</div></div>
        <div class="step-line pending"></div>
        <div class="step-item"><div class="step-dot">2</div><div class="step-label" data-i18n="step_name">名前</div></div>
        <div class="step-line pending"></div>
        <div class="step-item"><div class="step-dot">3</div><div class="step-label" data-i18n="step_pin">PIN</div></div>
      </div>
      <div class="card-title" data-i18n="shift_title">シフトを選択してください</div>
      <div class="card-hint" data-i18n="shift_hint">本日のシフトを選んでください</div>
      <div class="shift-grid">
        <button class="shift-btn s1" onclick="selectShift(1)" id="shift1">
          <span class="shift-num">1</span>
          <span class="shift-time">08–16</span>
        </button>
        <button class="shift-btn s2" onclick="selectShift(2)" id="shift2">
          <span class="shift-num">2</span>
          <span class="shift-time">16–00</span>
        </button>
        <button class="shift-btn s3" onclick="selectShift(3)" id="shift3">
          <span class="shift-num">3</span>
          <span class="shift-time">00–08</span>
        </button>
      </div>
    </div>
    <!-- Step 2: ユーザー選択 -->
    <div class="card" id="step2" style="display:none">
      <div class="steps">
        <div class="step-item"><div class="step-dot done">✓</div><div class="step-label done" data-i18n="step_shift">直</div></div>
        <div class="step-line done"></div>
        <div class="step-item"><div class="step-dot active">2</div><div class="step-label active" data-i18n="step_name">名前</div></div>
        <div class="step-line pending"></div>
        <div class="step-item"><div class="step-dot">3</div><div class="step-label" data-i18n="step_pin">PIN</div></div>
      </div>
      <div class="card-title" data-i18n="user_title">ユーザーを選択してください</div>
      <div class="card-hint" id="shiftBadge"></div>
      <input class="user-search" type="text" id="userSearch"
             placeholder="名前で検索..." data-i18n-ph="search_ph"
             oninput="filterUsers()">
      <div class="user-grid" id="userGrid">
        <div class="loading">読み込み中...</div>
      </div>
      <button class="btn-secondary" onclick="goStep(1)">← <span data-i18n="back">もどる</span></button>
    </div>
    <!-- Step 3: PIN入力 -->
    <div class="card" id="step3" style="display:none">
      <div class="steps">
        <div class="step-item"><div class="step-dot done">✓</div><div class="step-label done" data-i18n="step_shift">直</div></div>
        <div class="step-line done"></div>
        <div class="step-item"><div class="step-dot done">✓</div><div class="step-label done" data-i18n="step_name">名前</div></div>
        <div class="step-line done"></div>
        <div class="step-item"><div class="step-dot active">3</div><div class="step-label active" data-i18n="step_pin">PIN</div></div>
      </div>
      <div class="pin-user-info">
        <div class="pin-avatar" id="pinAvatar"></div>
        <div>
          <div class="pin-user-name" id="pinName"></div>
          <div class="pin-user-role" id="pinRole"></div>
        </div>
      </div>
      <div class="pin-error" id="pinErrorEl"></div>
      <div id="pinInputArea">
        <div class="pin-dots">
          <div class="pin-dot" id="pd0"></div>
          <div class="pin-dot" id="pd1"></div>
          <div class="pin-dot" id="pd2"></div>
          <div class="pin-dot" id="pd3"></div>
        </div>
        <div class="pin-keypad">
          <button class="key-btn" onclick="pinKey('1')">1</button>
          <button class="key-btn" onclick="pinKey('2')">2</button>
          <button class="key-btn" onclick="pinKey('3')">3</button>
          <button class="key-btn" onclick="pinKey('4')">4</button>
          <button class="key-btn" onclick="pinKey('5')">5</button>
          <button class="key-btn" onclick="pinKey('6')">6</button>
          <button class="key-btn" onclick="pinKey('7')">7</button>
          <button class="key-btn" onclick="pinKey('8')">8</button>
          <button class="key-btn" onclick="pinKey('9')">9</button>
          <button class="key-btn key-clear" onclick="pinClear()" data-i18n="pin_clear">クリア</button>
          <button class="key-btn" onclick="pinKey('0')">0</button>
          <button class="key-btn key-del" onclick="pinDel()">⌫</button>
        </div>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()" disabled data-i18n="login_btn">ログイン</button>
      </div>
      <button class="btn-secondary" onclick="goStep(2)">← <span data-i18n="back">もどる</span></button>
    </div>
  </main>
  <div class="footer"><span>TROUBLETRACK SYSTEM v2.0</span></div>
</div>
<div class="toast" id="toastEl"></div>
<script>
(function(){
  var saved=localStorage.getItem('traq_theme');
  var pref=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',saved||pref);
  var icon=document.getElementById('themeBtn');
  if(icon) icon.textContent=(saved||pref)==='dark'?'🌙':'☀️';
})();
</script>

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('traq_lang', lang);
  ['ja','vi','en'].forEach(l => {
    document.getElementById('lang-'+l)?.classList.toggle('active', l===lang);
  });
  applyI18n();
}
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t(el.dataset.i18nPh); });
  if (state.selectedShift) {
    const sb = document.getElementById('shiftBadge');
    if (sb) sb.textContent = t('shift_badge', state.selectedShift);
  }
}

/* ===== State ===== */
const state = {
  selectedShift: null,
  selectedUser: null,
  pinInput: '',
};
let ALL_USERS = [];

/* ===== Init ===== */
(function init() {
  const savedTheme = localStorage.getItem('traq_theme') ||
    (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', savedTheme);
  const themeBtn = document.getElementById('themeBtn');
  if (themeBtn) themeBtn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

  const savedLang = localStorage.getItem('traq_lang') || 'ja';
  currentLang = savedLang;
  ['ja','vi','en'].forEach(l => {
    document.getElementById('lang-'+l)?.classList.toggle('active', l===savedLang);
  });
  applyI18n();

  try {
    const s = localStorage.getItem('traq_session');
    if (s) {
      const o = JSON.parse(s);
      if (o.expiresAt && Date.now() < o.expiresAt) {
        redirectByRole(o.role);
        return;
      }
      localStorage.removeItem('traq_session');
    }
  } catch(e) {}

  loadUsers();
})();

async function loadUsers() {
  try {
    const rows = await sbFetch('traq_users?select=id,name,role,is_active&is_active=eq.true&order=name');
    ALL_USERS = (rows || []).sort((a, b) => {
      const ro = { admin:0, leader:0, sl:1, worker:2, op:2 };
      const rd = (ro[a.role]||2) - (ro[b.role]||2);
      return rd !== 0 ? rd : a.name.localeCompare(b.name, 'ja');
    });
  } catch(e) {
    console.warn('ユーザー取得エラー:', e.message);
    ALL_USERS = [];
  }
}

/* ===== Theme ===== */
function toggleTheme() {
  const h = document.documentElement;
  const isDark = h.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  h.setAttribute('data-theme', next);
  localStorage.setItem('traq_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

/* ===== Step nav ===== */
function goStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('step'+i);
    if (el) el.style.display = i === n ? 'block' : 'none';
  });
  updateProgressBar(n);
}

function updateProgressBar(n) {
  for (let i = 1; i <= 3; i++) {
    const seg = document.getElementById('pbSeg' + i);
    if (!seg) continue;
    if (i < n) seg.className = 'pb-done';
    else if (i === n) seg.className = 'pb-active';
    else seg.className = 'pb-pending';
  }
}

/* ===== Step 1: Shift ===== */
async function selectShift(s) {
  state.selectedShift = s;
  [1,2,3].forEach(i => {
    document.getElementById('shift'+i)?.classList.toggle('active', i===s);
  });
  const sb = document.getElementById('shiftBadge');
  if (sb) sb.textContent = t('shift_badge', s);

  if (ALL_USERS.length === 0) {
    const grid = document.getElementById('userGrid');
    if (grid) grid.innerHTML = '<div class="loading">読み込み中...</div>';
    await loadUsers();
  }

  renderUsers('');
  document.getElementById('userSearch').value = '';
  goStep(2);
}

/* ===== Step 2: Users ===== */
function renderUsers(filter) {
  const filtered = ALL_USERS.filter(u =>
    !filter || u.name.toLowerCase().includes(filter.toLowerCase())
  );
  const grid = document.getElementById('userGrid');
  if (!grid) return;
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="loading">該当なし</div>';
    return;
  }
  grid.innerHTML = '';
  filtered.forEach(u => {
    const btn = document.createElement('button');
    const role = u.role;
    const isSL = role === 'leader' || role === 'sl';
    const isAdmin = role === 'admin';
    btn.className = 'user-btn';
    btn.onclick = () => selectUser(u);
    const roleLabel = isAdmin ? t('role_adm') : isSL ? t('role_sl') : t('role_op');
    const avatarClass = isAdmin ? 'adm' : isSL ? 'sl' : '';
    const roleClass = isAdmin ? 'adm' : isSL ? 'sl' : '';
    btn.innerHTML =
      `<div class="user-avatar ${avatarClass}">${u.name.charAt(0)}</div>` +
      `<div><div class="user-name">${u.name}</div>` +
      `<div class="user-role ${roleClass}">${roleLabel}</div></div>`;
    grid.appendChild(btn);
  });
}
function filterUsers() {
  renderUsers(document.getElementById('userSearch').value);
}

/* ===== Step 3: PIN ===== */
function selectUser(u) {
  state.selectedUser = u;
  state.pinInput = '';
  updatePinDots();
  const role = u.role;
  const isSL = role === 'leader' || role === 'sl';
  const isAdmin = role === 'admin';
  const avatarEl = document.getElementById('pinAvatar');
  avatarEl.textContent = u.name.charAt(0);
  avatarEl.className = 'pin-avatar' + (isAdmin ? ' adm' : isSL ? ' sl' : '');
  document.getElementById('pinName').textContent = u.name;
  const roleEl = document.getElementById('pinRole');
  roleEl.textContent = isAdmin ? t('role_adm') : isSL ? t('role_sl') : t('role_op');
  roleEl.className = 'pin-user-role' + (isAdmin ? ' adm' : isSL ? ' sl' : '');
  clearError();
  document.getElementById('loginBtn').disabled = true;
  goStep(3);
}

function pinKey(k) {
  if (state.pinInput.length >= 4) return;
  state.pinInput += k;
  updatePinDots();
  if (state.pinInput.length === 4) {
    document.getElementById('loginBtn').disabled = false;
  }
}
function pinDel() {
  state.pinInput = state.pinInput.slice(0,-1);
  updatePinDots();
  document.getElementById('loginBtn').disabled = true;
}
function pinClear() {
  state.pinInput = '';
  updatePinDots();
  document.getElementById('loginBtn').disabled = true;
}
function updatePinDots(dotState) {
  for (let i=0; i<4; i++) {
    const d = document.getElementById('pd'+i);
    if (!d) continue;
    if (dotState === 'error') { d.className = 'pin-dot error'; continue; }
    if (dotState === 'success') { d.className = 'pin-dot success'; continue; }
    d.className = 'pin-dot' + (i < state.pinInput.length ? ' filled' : '');
  }
}
function clearError() {
  document.getElementById('pinErrorEl').textContent = '';
}

/* ===== Login ===== */
async function doLogin() {
  const u = state.selectedUser;
  if (!u) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  clearError();
  try {
    const rows = await sbFetch('traq_users?id=eq.' + u.id + '&select=id,name,role,shift,pin');
    if (!rows || rows.length === 0) throw new Error('user not found');
    const dbUser = rows[0];

    if (state.pinInput !== dbUser.pin) {
      updatePinDots('error');
      document.getElementById('pinErrorEl').textContent = t('pin_error');
      setTimeout(() => {
        state.pinInput = '';
        updatePinDots();
        clearError();
        btn.disabled = false;
      }, 700);
      return;
    }

    updatePinDots('success');

    const role = dbUser.role;
    localStorage.setItem('traq_session', JSON.stringify({
      userId: dbUser.id,
      name: dbUser.name,
      role: role,
      shift: state.selectedShift,
      expiresAt: Date.now() + 8 * 60 * 60 * 1000
    }));

    showToast(t('login_ok', dbUser.name), 'success');
    setTimeout(() => { redirectByRole(role); }, 800);

  } catch(e) {
    showToast('エラー: ' + e.message, 'error');
    btn.disabled = false;
  }
}

function redirectByRole(role) {
  if (role === 'admin' || role === 'leader' || role === 'sl') { location.href = 'home_sl.html'; }
  else { location.href = 'home.html'; }
}

/* ===== Toast ===== */
let toastTimer = null;
function showToast(msg, type='info') {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast ' + type;
  requestAnimationFrame(() => { el.classList.add('show'); });
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); }, 2500);
}
</script>
