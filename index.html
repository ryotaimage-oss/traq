<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – TroubleTrack System</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080d18;
    --surface: #111827;
    --border:  #1e293b;
    --orange:  #EF9F27;
    --text:    #f1f5f9;
    --muted:   #64748b;
    --error:   #ef4444;
    --radius:  8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #080d18;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo-icon { width: 36px; height: 36px; flex-shrink: 0; }
  .logo-text { font-size: 20px; font-weight: 700; color: var(--orange); letter-spacing: .04em; }
  .logo-sub  { font-size: 10px; color: var(--muted); letter-spacing: .08em; }
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    padding: 28px 24px;
  }
  .steps { display: flex; align-items: center; margin-bottom: 24px; }
  .step-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--muted); background: var(--bg);
  }
  .step-dot.active { border-color: var(--orange); color: var(--orange); }
  .step-dot.done   { border-color: var(--orange); background: var(--orange); color: #000; }
  .step-label { font-size: 10px; color: var(--muted); }
  .step-label.active { color: var(--orange); }
  .step-line { flex: 1; height: 2px; background: var(--border); margin-bottom: 16px; }
  .step-line.done { background: var(--orange); }
  .section-title { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .shift-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .shift-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 8px; cursor: pointer; text-align: center; color: var(--text); font-family: inherit;
  }
  .shift-btn:hover { border-color: var(--orange); }
  .shift-no   { font-size: 22px; font-weight: 700; color: var(--orange); }
  .shift-time { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: nowrap; }
  .user-list { display: flex; flex-direction: column; gap: 6px; }
  .user-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
    color: var(--text); text-align: left; width: 100%; font-family: inherit;
  }
  .user-btn:hover { border-color: var(--orange); }
  .user-btn:disabled { opacity: .5; cursor: not-allowed; }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0; color: var(--orange);
  }
  .user-name { font-size: 14px; font-weight: 500; }
  .user-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .role-badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700; flex-shrink: 0; }
  .badge-admin  { background: #1e3a5f; color: #60a5fa; }
  .badge-leader { background: #1a3a1a; color: #4ade80; }
  .badge-worker { background: #2a1a00; color: var(--orange); }
  .pin-user {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding: 12px 16px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border);
  }
  .pin-user-avatar {
    width: 40px; height: 40px; border-radius: 50%; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--orange); flex-shrink: 0;
  }
  .pin-user-name { font-size: 15px; font-weight: 600; }
  .pin-user-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: transparent; }
  .pin-dot.filled { background: var(--orange); border-color: var(--orange); }
  .pin-dot.error  { background: var(--error);  border-color: var(--error); }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .pin-key {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; font-size: 20px; font-weight: 700; color: var(--text);
    cursor: pointer; text-align: center; user-select: none; font-family: inherit;
  }
  .pin-key:active { background: var(--border); }
  .pin-key.cancel { font-size: 13px; font-weight: 500; color: var(--muted); }
  .pin-error { text-align: center; font-size: 12px; color: var(--error); margin-bottom: 12px; min-height: 18px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px; background: none; border: none;
    color: var(--muted); font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 16px; font-family: inherit;
  }
  .back-btn:hover { color: var(--text); }
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: var(--muted); font-size: 14px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="11" cy="4" r="1.5" fill="#EF9F27" opacity=".5"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="21" cy="2" r="1.5" fill="#EF9F27" opacity=".5"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub">TROUBLETRACK SYSTEM</div>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="steps">
      <div class="step-item">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-label active" id="lbl1">シフト</div>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step-item">
        <div class="step-dot" id="dot2">2</div>
        <div class="step-label" id="lbl2">ユーザー</div>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step-item">
        <div class="step-dot" id="dot3">3</div>
        <div class="step-label" id="lbl3">PIN</div>
      </div>
    </div>

    <div id="step1">
      <div class="section-title">シフトを選択</div>
      <div class="shift-grid">
        <button class="shift-btn" onclick="selectShift(1)">
          <div class="shift-no">1直</div>
          <div class="shift-time">08:00–16:00</div>
        </button>
        <button class="shift-btn" onclick="selectShift(2)">
          <div class="shift-no">2直</div>
          <div class="shift-time">16:00–00:00</div>
        </button>
        <button class="shift-btn" onclick="selectShift(3)">
          <div class="shift-no">3直</div>
          <div class="shift-time">00:00–08:00</div>
        </button>
      </div>
    </div>

    <div id="step2" class="hidden">
      <button class="back-btn" onclick="goStep(1)">← 戻る</button>
      <div class="section-title" id="step2-title">ユーザーを選択</div>
      <div id="user-list-wrap">
        <div class="loading"><div class="spinner"></div>読込中...</div>
      </div>
    </div>

    <div id="step3" class="hidden">
      <button class="back-btn" onclick="goStep(2)">← 戻る</button>
      <div class="pin-user">
        <div class="pin-user-avatar" id="pin-avatar"></div>
        <div>
          <div class="pin-user-name" id="pin-name"></div>
          <div class="pin-user-role" id="pin-role"></div>
        </div>
      </div>
      <div class="pin-dots">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinKey('1')">1</button>
        <button class="pin-key" onclick="pinKey('2')">2</button>
        <button class="pin-key" onclick="pinKey('3')">3</button>
        <button class="pin-key" onclick="pinKey('4')">4</button>
        <button class="pin-key" onclick="pinKey('5')">5</button>
        <button class="pin-key" onclick="pinKey('6')">6</button>
        <button class="pin-key" onclick="pinKey('7')">7</button>
        <button class="pin-key" onclick="pinKey('8')">8</button>
        <button class="pin-key" onclick="pinKey('9')">9</button>
        <button class="pin-key cancel" onclick="pinCancel()">取消</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key" onclick="pinDel()">⌫</button>
      </div>
    </div>
  </div>
</main>

<script>
const SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

var allUsers = [], selectedShift = null, selectedUser = null, pinInput = '';
var lockState = {};
var ROLE_LABELS = { worker: 'OP', leader: 'SL', admin: 'Admin' };
var ROLE_DEST   = { worker: 'home.html', leader: 'home_sl.html', admin: 'home.html' };

sbFetch('traq_users?is_active=eq.true&select=id,name,role,shift,pin&order=role.asc,name.asc')
  .then(function(data) { allUsers = data; })
  .catch(function(e) { console.error('ユーザー取得失敗:', e); });

function goStep(n) {
  document.getElementById('step1').className = n === 1 ? '' : 'hidden';
  document.getElementById('step2').className = n === 2 ? '' : 'hidden';
  document.getElementById('step3').className = n === 3 ? '' : 'hidden';
  for (var i = 1; i <= 3; i++) {
    document.getElementById('dot' + i).className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
    document.getElementById('lbl' + i).className = 'step-label' + (i === n ? ' active' : '');
    if (i < 3) document.getElementById('line' + i).className = 'step-line' + (i < n ? ' done' : '');
  }
}

function selectShift(shift) {
  selectedShift = shift;
  renderUserList();
  goStep(2);
}

function renderUserList() {
  var wrap = document.getElementById('user-list-wrap');
  document.getElementById('step2-title').textContent = selectedShift + '直 — ユーザーを選択';
  if (!allUsers.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:32px;color:#ef4444;font-size:13px;">ユーザーを取得できませんでした<br><button onclick="retryLoad()" style="margin-top:12px;background:none;border:1px solid #ef4444;color:#ef4444;border-radius:8px;padding:8px 20px;cursor:pointer;font-family:inherit;font-size:13px;">再読込</button></div>';
    return;
  }
  var roleOrder = { admin: 0, leader: 1, worker: 2 };
  var sorted = allUsers.slice().sort(function(a, b) {
    var sa = a.shift === selectedShift ? 0 : 1;
    var sb = b.shift === selectedShift ? 0 : 1;
    if (sa !== sb) return sa - sb;
    return (roleOrder[a.role] || 9) - (roleOrder[b.role] || 9);
  });
  var badgeClass = { admin: 'badge-admin', leader: 'badge-leader', worker: 'badge-worker' };
  var html = '<div class="user-list">';
  for (var i = 0; i < sorted.length; i++) {
    var u = sorted[i];
    var locked = isLocked(u.id);
    html += '<button class="user-btn" onclick="selectUser(' + u.id + ')"' + (locked ? ' disabled' : '') + '>';
    html += '<div class="user-avatar">' + u.name.charAt(0) + '</div>';
    html += '<div><div class="user-name">' + u.name + '</div>';
    html += '<div class="user-sub">' + u.shift + '直' + (locked ? ' — ロック中' : '') + '</div></div>';
    html += '<span class="role-badge ' + (badgeClass[u.role] || 'badge-worker') + '">' + (ROLE_LABELS[u.role] || u.role) + '</span>';
    html += '</button>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function retryLoad() {
  document.getElementById('user-list-wrap').innerHTML = '<div class="loading"><div class="spinner"></div>読込中...</div>';
  sbFetch('traq_users?is_active=eq.true&select=id,name,role,shift,pin&order=role.asc,name.asc')
    .then(function(data) { allUsers = data; renderUserList(); })
    .catch(function() {
      document.getElementById('user-list-wrap').innerHTML = '<div style="text-align:center;padding:32px;color:#ef4444;font-size:13px;">取得失敗<br><button onclick="retryLoad()" style="margin-top:12px;background:none;border:1px solid #ef4444;color:#ef4444;border-radius:8px;padding:8px 20px;cursor:pointer;font-family:inherit;font-size:13px;">再読込</button></div>';
    });
}

function selectUser(userId) {
  for (var i = 0; i < allUsers.length; i++) {
    if (allUsers[i].id === userId) { selectedUser = allUsers[i]; break; }
  }
  if (!selectedUser) return;
  pinInput = '';
  document.getElementById('pin-avatar').textContent = selectedUser.name.charAt(0);
  document.getElementById('pin-name').textContent   = selectedUser.name;
  document.getElementById('pin-role').textContent   = ROLE_LABELS[selectedUser.role] || selectedUser.role;
  document.getElementById('pin-error').textContent  = '';
  renderPinDots(false);
  goStep(3);
}

function renderPinDots(shake) {
  for (var i = 0; i < 4; i++) {
    document.getElementById('pd' + i).className = 'pin-dot' + (i < pinInput.length ? (shake ? ' error' : ' filled') : '');
  }
}

function pinKey(k) {
  if (pinInput.length >= 4) return;
  pinInput += k;
  renderPinDots(false);
  document.getElementById('pin-error').textContent = '';
  if (pinInput.length === 4) setTimeout(verifyPin, 80);
}

function pinDel() {
  pinInput = pinInput.slice(0, -1);
  renderPinDots(false);
  document.getElementById('pin-error').textContent = '';
}

function pinCancel() {
  pinInput = '';
  renderPinDots(false);
  document.getElementById('pin-error').textContent = '';
  goStep(2);
}

function isLocked(userId) {
  var s = lockState[userId];
  if (!s || !s.lockedUntil) return false;
  return new Date() < new Date(s.lockedUntil);
}

function recordFail(userId) {
  if (!lockState[userId]) lockState[userId] = { failCount: 0, lockedUntil: null };
  lockState[userId].failCount++;
  if (lockState[userId].failCount >= 3) {
    lockState[userId].lockedUntil = new Date(Date.now() + 5 * 60 * 1000).toISOString();
    lockState[userId].failCount = 0;
    return true;
  }
  return false;
}

function clearFail(userId) { delete lockState[userId]; }

function verifyPin() {
  if (isLocked(selectedUser.id)) {
    document.getElementById('pin-error').textContent = 'アカウントがロックされています';
    pinInput = '';
    renderPinDots(false);
    return;
  }
  var ok = (pinInput === selectedUser.pin);
  if (ok) {
    clearFail(selectedUser.id);
    var roleMap = { worker: 'op', leader: 'sl', admin: 'admin' };
    var role = roleMap[selectedUser.role] || 'op';
    localStorage.setItem('traq_session', JSON.stringify({
      userId: selectedUser.id, name: selectedUser.name,
      role: role, shift: selectedShift,
      expiresAt: Date.now() + 8 * 60 * 60 * 1000
    }));
    location.href = ROLE_DEST[selectedUser.role] || 'home.html';
  } else {
    var locked = recordFail(selectedUser.id);
    pinInput = '';
    renderPinDots(true);
    if (locked) {
      document.getElementById('pin-error').textContent = '3回失敗しました。5分間ロックします';
      renderUserList();
    } else {
      document.getElementById('pin-error').textContent = 'PINが違います（' + lockState[selectedUser.id].failCount + '/3回）';
    }
  }
}
</script>
</body>
</html>
