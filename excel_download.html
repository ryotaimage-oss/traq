<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – Excel出力</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --orange: #EF9F27;
  --error:  #ef4444;
  --success:#22c55e;
  --radius: 12px;
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --text:    #f1f5f9;
  --muted:   #64748b;
}
[data-theme="light"] {
  --bg:      #e8e6e2;
  --surface: #ffffff;
  --surface2:#f0ede8;
  --border:  rgba(0,0,0,0.18);
  --text:    #1a1f2e;
  --muted:   #666666;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

/* ヘッダー */
.header { background: #080d18; padding: 14px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1e293b; flex-shrink: 0; }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: #64748b; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: #94a3b8; }
.back-btn { background: none; border: 1px solid #1e293b; color: #94a3b8; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: inherit; font-size: 13px; }

/* メイン */
.main { flex: 1; padding: 24px 16px; max-width: 560px; margin: 0 auto; width: 100%; }

/* セクション */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; letter-spacing: .04em; }

/* フォーム */
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.form-input, .form-select {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 13px 16px; color: var(--text);
  font-family: inherit; font-size: 16px;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--orange); }
.form-select option { background: var(--surface); }

/* 期間プリセット */
.preset-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
.preset-btn {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 9px 4px; text-align: center;
  cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
  color: var(--muted); transition: all .15s;
}
.preset-btn:hover, .preset-btn.active { border-color: var(--orange); color: var(--orange); background: rgba(239,159,39,.08); }

/* 日付レンジ */
.date-range { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ダウンロードボタン */
.dl-btn {
  width: 100%; padding: 18px; background: var(--orange); color: #000;
  border: none; border-radius: var(--radius); font-family: inherit;
  font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: .04em;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity .15s;
}
.dl-btn:active { opacity: .85; }
.dl-btn:disabled { opacity: .5; cursor: not-allowed; }

/* プレビューカード */
.preview-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.preview-label { font-size: 13px; font-weight: 600; color: var(--text); }
.preview-count { font-size: 22px; font-weight: 700; color: var(--orange); }
.preview-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* トースト */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 24px; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.15); white-space: nowrap; font-weight: 500; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--error);   color: var(--error); }
.hidden { display: none !important; }

/* ローディング overlay */
.overlay { position: fixed; inset: 0; background: rgba(8,13,24,.8); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 14px; color: #94a3b8; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub">Excel出力</div>
  </div>
  <div class="header-right">
    <span class="user-info" id="header-user"></span>
    <button class="back-btn" onclick="goBack()">← 戻る</button>
  </div>
</header>

<main class="main">

  <!-- 期間指定 -->
  <div class="section">
    <div class="section-title">📅 出力期間</div>

    <div class="preset-group">
      <button class="preset-btn" id="preset-week"  onclick="setPreset('week')">今週</button>
      <button class="preset-btn" id="preset-month" onclick="setPreset('month')">今月</button>
      <button class="preset-btn" id="preset-prev"  onclick="setPreset('prev')">先月</button>
      <button class="preset-btn" id="preset-all"   onclick="setPreset('all')">全期間</button>
    </div>

    <div class="date-range">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">開始日</label>
        <input class="form-input" type="date" id="date-from" onchange="onDateChange()">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">終了日</label>
        <input class="form-input" type="date" id="date-to" onchange="onDateChange()">
      </div>
    </div>
  </div>

  <!-- プレビュー -->
  <div class="section" id="preview-section">
    <div class="section-title">📊 件数プレビュー</div>
    <div class="preview-card">
      <div>
        <div class="preview-label">⚙️ 設備トラブル</div>
        <div class="preview-sub">設備シートに出力</div>
      </div>
      <div style="text-align:right">
        <div class="preview-count" id="count-equipment">–</div>
        <div class="preview-sub">件</div>
      </div>
    </div>
    <div class="preview-card">
      <div>
        <div class="preview-label">🔩 金型トラブル</div>
        <div class="preview-sub">金型シートに出力</div>
      </div>
      <div style="text-align:right">
        <div class="preview-count" id="count-mold">–</div>
        <div class="preview-sub">件</div>
      </div>
    </div>
  </div>

  <!-- ダウンロード -->
  <div style="padding-bottom: 24px;">
    <button class="dl-btn" id="dl-btn" onclick="doDownload()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Excelダウンロード
    </button>
  </div>

</main>

<!-- ローディング -->
<div class="overlay hidden" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlay-text">データ取得中...</div>
</div>

<!-- トースト -->
<div class="toast hidden" id="toast"></div>

<script>
(function(){
  var saved = localStorage.getItem('traq_theme');
  var pref  = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', saved || pref);
})();

var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path) {
  var res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ── セッション確認 ────────────────────────────────────────
var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  try {
    session = JSON.parse(s);
  } catch(e) { location.href = 'index.html'; return; }
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  // adminとSL/leaderのみアクセス可
  if (session.role === 'worker' || session.role === 'op') {
    location.href = 'home.html'; return;
  }
  document.getElementById('header-user').textContent = session.name + ' (' + session.shift + '直)';
  // デフォルトは今月
  setPreset('month');
})();

function goBack() { history.back(); }

// ── プリセット ────────────────────────────────────────────
var activePreset = null;

function setPreset(type) {
  activePreset = type;
  ['week','month','prev','all'].forEach(function(k) {
    document.getElementById('preset-' + k).classList.toggle('active', k === type);
  });

  var now   = new Date();
  var y     = now.getFullYear();
  var m     = now.getMonth();
  var from, to;

  if (type === 'week') {
    var day = now.getDay(); // 0=日
    var diff = (day === 0) ? -6 : 1 - day; // 月曜始まり
    var mon  = new Date(now); mon.setDate(now.getDate() + diff);
    var sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
    from = toDateStr(mon);
    to   = toDateStr(sun);
  } else if (type === 'month') {
    from = toDateStr(new Date(y, m, 1));
    to   = toDateStr(new Date(y, m + 1, 0));
  } else if (type === 'prev') {
    from = toDateStr(new Date(y, m - 1, 1));
    to   = toDateStr(new Date(y, m, 0));
  } else if (type === 'all') {
    from = '2020-01-01';
    to   = toDateStr(now);
  }

  document.getElementById('date-from').value = from;
  document.getElementById('date-to').value   = to;
  fetchPreview();
}

function onDateChange() {
  // 手動変更時はプリセット解除
  activePreset = null;
  ['week','month','prev','all'].forEach(function(k) {
    document.getElementById('preset-' + k).classList.remove('active');
  });
  fetchPreview();
}

function toDateStr(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

// ── プレビュー件数取得 ─────────────────────────────────────
var previewTimer = null;
function fetchPreview() {
  if (previewTimer) clearTimeout(previewTimer);
  previewTimer = setTimeout(_fetchPreview, 400);
}

async function _fetchPreview() {
  var from = document.getElementById('date-from').value;
  var to   = document.getElementById('date-to').value;
  if (!from || !to) return;

  document.getElementById('count-equipment').textContent = '…';
  document.getElementById('count-mold').textContent = '…';
  document.getElementById('dl-btn').disabled = true;

  try {
    var query = buildQuery(from, to, null, true);
    var rows = await sbFetch(query);

    var eqCount   = rows.filter(function(r) { return r.trouble_type === 'equipment'; }).length;
    var moldCount = rows.filter(function(r) { return r.trouble_type === 'mold'; }).length;

    document.getElementById('count-equipment').textContent = eqCount;
    document.getElementById('count-mold').textContent      = moldCount;
    document.getElementById('dl-btn').disabled = (eqCount + moldCount === 0);
  } catch(e) {
    document.getElementById('count-equipment').textContent = '–';
    document.getElementById('count-mold').textContent      = '–';
    showToast('件数取得失敗: ' + e.message, 'error');
  }
}

// ── クエリ構築 ────────────────────────────────────────────
function buildQuery(from, to, type, countOnly) {
  // JOIN: lines, machines, products, categories, reporter(traq_users), approver(traq_users)
  var select = countOnly
    ? 'trouble_type'
    : 'id,trouble_type,status,occurred_date,shift,occurrence,stop_start,stop_end,stop_minutes,detail,approved_at,reject_reason,' +
      'lines(name),' +
      'machines(machine_no),' +
      'products(product_code,product_name),' +
      'categories(name),' +
      'reporter:reporter_id(name),' +
      'approver:approver_id(name)';

  var q = 'troubles?select=' + select +
    '&occurred_date=gte.' + from +
    '&occurred_date=lte.' + to +
    '&order=occurred_date.asc,id.asc';

  if (type) q += '&trouble_type=eq.' + type;
  return q;
}

// ── ダウンロード ──────────────────────────────────────────
async function doDownload() {
  var from = document.getElementById('date-from').value;
  var to   = document.getElementById('date-to').value;
  if (!from || !to) { showToast('期間を指定してください', 'error'); return; }

  document.getElementById('dl-btn').disabled = true;
  showOverlay('データ取得中...');

  try {
    var rows = await sbFetch(buildQuery(from, to, null, false));

    var eqRows   = rows.filter(function(r) { return r.trouble_type === 'equipment'; });
    var moldRows = rows.filter(function(r) { return r.trouble_type === 'mold'; });

    showOverlay('Excel生成中...');

    var wb = XLSX.utils.book_new();

    // 設備シート
    var eqSheet = buildSheet(eqRows);
    XLSX.utils.book_append_sheet(wb, eqSheet, '設備トラブル');

    // 金型シート
    var moldSheet = buildSheet(moldRows);
    XLSX.utils.book_append_sheet(wb, moldSheet, '金型トラブル');

    // ファイル名: Traq_YYYYMMDD-YYYYMMDD.xlsx
    var fileName = 'Traq_' + from.replace(/-/g,'') + '-' + to.replace(/-/g,'') + '.xlsx';
    XLSX.writeFile(wb, fileName);

    hideOverlay();
    showToast('ダウンロード完了', 'success');
    document.getElementById('dl-btn').disabled = false;

  } catch(e) {
    hideOverlay();
    document.getElementById('dl-btn').disabled = false;
    showToast('ダウンロード失敗: ' + e.message, 'error');
  }
}

// ── シート生成 ────────────────────────────────────────────
function buildSheet(rows) {
  var HEADERS = [
    'No', '発生日', 'シフト', 'ライン', '機番', '品番コード', '品番名',
    '分類', '初発/再発', '停止開始', '停止終了', '停止分数',
    '詳細内容', 'ステータス', '承認者', '承認日時', '差戻しコメント'
  ];

  var statusLabel = {
    'draft':    '下書き',
    'pending':  '承認待ち',
    'approved': '承認済',
    'rejected': '差戻し'
  };
  var occLabel = {
    'first':      '初発',
    'recurrence': '再発'
  };

  var data = [HEADERS];

  rows.forEach(function(r, i) {
    var lineName    = (r.lines    && r.lines.name)                  ? r.lines.name    : '';
    var machineNo   = (r.machines && r.machines.machine_no)         ? r.machines.machine_no : '';
    var productCode = (r.products && r.products.product_code)       ? r.products.product_code : '';
    var productName = (r.products && r.products.product_name)       ? r.products.product_name : '';
    var catName     = (r.categories && r.categories.name)           ? r.categories.name : '';
    var reporterN   = (r.reporter  && r.reporter.name)              ? r.reporter.name  : '';
    var approverN   = (r.approver  && r.approver.name)              ? r.approver.name  : '';

    var approvedAt = '';
    if (r.approved_at) {
      var d = new Date(r.approved_at);
      approvedAt = d.getFullYear() + '/' +
        String(d.getMonth()+1).padStart(2,'0') + '/' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0');
    }

    data.push([
      i + 1,
      r.occurred_date || '',
      r.shift ? r.shift + '直' : '',
      lineName,
      machineNo,
      productCode,
      productName,
      catName,
      occLabel[r.occurrence] || r.occurrence || '',
      r.stop_start ? r.stop_start.slice(0,5) : '',
      r.stop_end   ? r.stop_end.slice(0,5)   : '',
      r.stop_minutes != null ? r.stop_minutes : '',
      r.detail || '',
      statusLabel[r.status] || r.status || '',
      approverN,
      approvedAt,
      r.reject_reason || ''
    ]);
  });

  var ws = XLSX.utils.aoa_to_sheet(data);

  // 列幅設定
  ws['!cols'] = [
    {wch:5},  // No
    {wch:12}, // 発生日
    {wch:8},  // シフト
    {wch:12}, // ライン
    {wch:8},  // 機番
    {wch:12}, // 品番コード
    {wch:16}, // 品番名
    {wch:14}, // 分類
    {wch:10}, // 初発/再発
    {wch:10}, // 停止開始
    {wch:10}, // 停止終了
    {wch:8},  // 停止分数
    {wch:40}, // 詳細内容
    {wch:10}, // ステータス
    {wch:12}, // 承認者
    {wch:18}, // 承認日時
    {wch:30}  // 差戻しコメント
  ];

  return ws;
}

// ── UI共通 ────────────────────────────────────────────────
function showOverlay(text) {
  document.getElementById('overlay-text').textContent = text;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.classList.remove('hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(e) { console.warn('SW登録失敗:', e); });
  });
}
</script>
</body>
</html>
