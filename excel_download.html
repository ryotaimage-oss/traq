<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – Excelダウンロード</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.back-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.back-btn:hover { border-color: var(--orange); color: var(--text); }

.main { flex: 1; padding: 24px 16px; max-width: 560px; margin: 0 auto; width: 100%; }

.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--orange); }
.form-select option { background: var(--surface); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.dl-btn { width: 100%; padding: 14px; background: var(--orange); color: #000; border: none; border-radius: var(--radius); font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.dl-btn:hover { opacity: .85; }
.dl-btn:disabled { opacity: .5; cursor: not-allowed; }

.count-info { font-size: 13px; color: var(--muted); text-align: center; margin-top: 10px; min-height: 20px; }

.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap; }
.toast.success { border-color: var(--success); }
.toast.error   { border-color: var(--error); }
.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub">Excelダウンロード</div>
  </div>
  <div class="header-right">
    <span class="user-info" id="header-user"></span>
    <button class="back-btn" onclick="goBack()">← 戻る</button>
  </div>
</header>

<main class="main">

  <!-- 設備トラブル -->
  <div class="section">
    <div class="section-title">⚙️ 設備トラブル</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開始日</label>
        <input class="form-input" type="date" id="eq-from">
      </div>
      <div class="form-group">
        <label class="form-label">終了日</label>
        <input class="form-input" type="date" id="eq-to">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ライン</label>
      <select class="form-select" id="eq-line">
        <option value="">全ライン</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ステータス</label>
      <select class="form-select" id="eq-status">
        <option value="">全て</option>
        <option value="approved">承認済みのみ</option>
        <option value="pending">承認待ちのみ</option>
      </select>
    </div>
    <button class="dl-btn" id="eq-btn" onclick="download('equipment')">📥 設備トラブルをダウンロード</button>
    <div class="count-info" id="eq-count"></div>
  </div>

  <!-- 金型トラブル -->
  <div class="section">
    <div class="section-title">🔧 金型トラブル</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">開始日</label>
        <input class="form-input" type="date" id="mold-from">
      </div>
      <div class="form-group">
        <label class="form-label">終了日</label>
        <input class="form-input" type="date" id="mold-to">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ライン</label>
      <select class="form-select" id="mold-line">
        <option value="">全ライン</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ステータス</label>
      <select class="form-select" id="mold-status">
        <option value="">全て</option>
        <option value="approved">承認済みのみ</option>
        <option value="pending">承認待ちのみ</option>
      </select>
    </div>
    <button class="dl-btn" id="mold-btn" onclick="download('mold')">📥 金型トラブルをダウンロード</button>
    <div class="count-info" id="mold-count"></div>
  </div>

</main>

<div class="toast hidden" id="toast"></div>

<script>
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path) {
  var res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  document.getElementById('header-user').textContent = session.name;

  // デフォルト期間: 今月
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var lastDay = new Date(y, now.getMonth() + 1, 0).getDate();
  var from = y + '-' + m + '-01';
  var to   = y + '-' + m + '-' + String(lastDay).padStart(2, '0');
  ['eq','mold'].forEach(function(p) {
    document.getElementById(p + '-from').value = from;
    document.getElementById(p + '-to').value   = to;
  });
})();

function goBack() {
  location.href = session.role === 'sl' ? 'home_sl.html' : 'home.html';
}

var allLines = [], allMachines = [], allProducts = [], allCategories = [], allUsers = [];

async function loadMasters() {
  var results = await Promise.all([
    sbFetch('lines?select=id,name&order=name.asc'),
    sbFetch('machines?select=id,machine_no'),
    sbFetch('products?select=id,product_code,product_name'),
    sbFetch('categories?select=id,name,type'),
    sbFetch('traq_users?select=id,name')
  ]);
  allLines      = results[0] || [];
  allMachines   = results[1] || [];
  allProducts   = results[2] || [];
  allCategories = results[3] || [];
  allUsers      = results[4] || [];

  ['eq','mold'].forEach(function(p) {
    var sel = document.getElementById(p + '-line');
    sel.innerHTML = '<option value="">全ライン</option>' +
      allLines.map(function(l) { return '<option value="' + l.id + '">' + l.name + '</option>'; }).join('');
  });
}

function getName(arr, id, field) {
  var item = arr.find(function(x) { return x.id === id; });
  return item ? (item[field] || '') : '';
}

async function download(type) {
  var prefix = type === 'equipment' ? 'eq' : 'mold';
  var from   = document.getElementById(prefix + '-from').value;
  var to     = document.getElementById(prefix + '-to').value;
  var lineId = document.getElementById(prefix + '-line').value;
  var status = document.getElementById(prefix + '-status').value;
  var btn    = document.getElementById(prefix + '-btn');
  var countEl = document.getElementById(prefix + '-count');

  btn.disabled = true;
  btn.textContent = '読込中...';
  countEl.textContent = '';

  try {
    var query = 'troubles?trouble_type=eq.' + type + '&order=occurred_date.asc,created_at.asc';
    if (from)   query += '&occurred_date=gte.' + from;
    if (to)     query += '&occurred_date=lte.' + to;
    if (lineId) query += '&line_id=eq.' + lineId;
    if (status) query += '&status=eq.' + status;

    var rows = await sbFetch(query) || [];
    countEl.textContent = rows.length + '件';

    if (!rows.length) {
      showToast('該当データがありません', '');
      btn.disabled = false;
      btn.textContent = '📥 ' + (type === 'equipment' ? '設備' : '金型') + 'トラブルをダウンロード';
      return;
    }

    var STATUS_LABEL = { pending: '承認待ち', approved: '承認済み', rejected: '差戻し', draft: '下書き' };
    var OCC_LABEL    = { first: '初発', repeat: '再発' };

    var headers = ['発生日','シフト','ライン','機番','品番コード','品番名','分類','初発/再発','停止時間(分)','詳細','報告者','承認者','ステータス','差戻し理由'];
    var data = [headers].concat(rows.map(function(r) {
      var line    = getName(allLines, r.line_id, 'name');
      var machine = getName(allMachines, r.machine_id, 'machine_no');
      var pCode   = getName(allProducts, r.product_id, 'product_code');
      var pName   = getName(allProducts, r.product_id, 'product_name');
      var cat     = getName(allCategories, r.category_id, 'name');
      var reporter = getName(allUsers, r.reporter_id, 'name');
      var approver = getName(allUsers, r.approver_id, 'name');
      return [
        r.occurred_date || '',
        r.shift + '直',
        line, machine, pCode, pName, cat,
        OCC_LABEL[r.occurrence] || r.occurrence || '',
        r.stop_minutes != null ? r.stop_minutes : '',
        r.detail || '',
        reporter, approver,
        STATUS_LABEL[r.status] || r.status || '',
        r.reject_reason || ''
      ];
    }));

    var ws = XLSX.utils.aoa_to_sheet(data);
    // 列幅設定
    ws['!cols'] = [12,8,10,10,12,16,12,10,12,30,10,10,10,20].map(function(w) { return {wch:w}; });
    var wb = XLSX.utils.book_new();
    var sheetName = type === 'equipment' ? '設備トラブル' : '金型トラブル';
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    var fname = 'traq_' + type + '_' + (from || 'all') + '_' + (to || 'all') + '.xlsx';
    XLSX.writeFile(wb, fname);
    showToast(rows.length + '件をダウンロードしました', 'success');

  } catch(e) {
    showToast('失敗: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '📥 ' + (type === 'equipment' ? '設備' : '金型') + 'トラブルをダウンロード';
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}

if (session) loadMasters();
</script>
</body>
</html>
