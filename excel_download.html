<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – Excel出力</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --orange: #EF9F27;
  --error:  #ef4444;
  --success:#22c55e;
  --radius: 12px;
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --nav-h:56px;
  --factory:#2e3a52; --roof:#3d4e6e;

  --bg2:#111827;--bg3:#1e2d45;--text1:#e8eaf0;--text2:#8b90a0;--danger:#ef4444;--warning:#f59e0b;--navy:#080d18;}
[data-theme="light"] {
  --bg:      #e8e6e2;
  --surface: #ffffff;
  --surface2:#f0ede8;
  --border:  rgba(0,0,0,0.18);
  --text:    #1a1f2e;
  --muted:   #666666;

  --bg2:#ffffff;--bg3:#f0ede8;--text1:#1a1f2e;--text2:#666666;}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; }
.app { height: 100%; display: flex; flex-direction: column; }
.main-column { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ===== Sidebar (PC/Tablet) ===== */
.sidebar { display: none; }
@media (min-width: 768px) {
  .app { flex-direction: row; }
  .sidebar {
    display: flex; width: 220px; flex-shrink: 0;
    background: var(--bg2); border-right: 1px solid var(--border);
    flex-direction: column; overflow-y: auto;
  }
  .sidebar-logo { padding: 18px 20px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-user { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sidebar-name { font-size: 13px; font-weight: 700; }
  .sidebar-role { font-size: 11px; color: var(--text2); }
  .sidebar-nav { flex: 1; padding: 12px 8px; }
  .lang-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
  .lang-btn.active,.lang-btn:hover{border-color:var(--orange);color:var(--orange)}
  .snav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all .15s; font-size: 13px; font-weight: 500; color: var(--text2); border: none; background: none; font-family: inherit; width: 100%; text-align: left; }
  .snav-item:hover { background: var(--bg3); color: var(--text1); }
  .snav-item.active { background: rgba(239,159,39,.12); color: var(--orange); font-weight: 700; }
  .snav-icon { font-size: 18px; width: 24px; text-align: center; }
  .snav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700}
  .snav-disabled{opacity:.3;pointer-events:none;cursor:not-allowed}
  .snav-lock{margin-left:auto;font-size:10px;opacity:.6}
  .sidebar-bottom { padding: 12px 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .topbar { display: none; }
  .role-admin .sidebar-avatar { background: rgba(239,68,68,0.25); color: #f87171; }
  .role-sl .sidebar-avatar { background: rgba(239,159,39,0.25); color: #e8a520; }
  .role-op .sidebar-avatar { background: rgba(30,58,110,0.35); color: #6b8ec5; }
  [data-theme="light"] .role-admin .sidebar-avatar { background: rgba(239,68,68,0.15); color: #c53030; }
  [data-theme="light"] .role-sl .sidebar-avatar { background: rgba(200,130,20,0.18); color: #b07a10; }
  [data-theme="light"] .role-op .sidebar-avatar { background: rgba(30,58,110,0.15); color: #2c4a80; }
}
@media (min-width: 1025px) { .sidebar { width: 240px; } }

/* ===== Common Header (F-style) ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--muted);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}
.page-title-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.page-back-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; color: var(--muted); transition: all .15s;
}
.page-back-btn:hover { border-color: var(--orange); color: var(--orange); }
.page-title-text { font-size: 15px; font-weight: 700; }
/* ===== Bottom Nav (2-tab) ===== */
.bottom-nav{display:flex;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:10px;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.nav-item.active{color:var(--orange)}
.nav-item:hover:not(.active){color:var(--text1)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-weight:500}
@media(min-width:768px){.bottom-nav{display:none}}

/* メイン */
.main { flex: 1; overflow-y: auto; padding: 24px 16px; }
.main-inner { max-width: 560px; margin: 0 auto; width: 100%; }

/* セクション */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; letter-spacing: .04em; }

/* フォーム */
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.form-input, .form-select {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 13px 16px; color: var(--text);
  font-family: inherit; font-size: 16px;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--orange); }
.form-select option { background: var(--surface); }

/* 期間プリセット */
.preset-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
.preset-btn {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 9px 4px; text-align: center;
  cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
  color: var(--muted); transition: all .15s;
}
.preset-btn:hover, .preset-btn.active { border-color: var(--orange); color: var(--orange); background: rgba(239,159,39,.08); }

/* 日付レンジ */
.date-range { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ダウンロードボタン */
.dl-btn {
  width: 100%; padding: 18px; background: var(--orange); color: #000;
  border: none; border-radius: var(--radius); font-family: inherit;
  font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: .04em;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity .15s;
}
.dl-btn:active { opacity: .85; }
.dl-btn:disabled { opacity: .5; cursor: not-allowed; }

/* プレビューカード */
.preview-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.preview-label { font-size: 13px; font-weight: 600; color: var(--text); }
.preview-count { font-size: 22px; font-weight: 700; color: var(--orange); }
.preview-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* トースト */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 24px; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.15); white-space: nowrap; font-weight: 500; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--error);   color: var(--error); }
.hidden { display: none !important; }

/* ローディング overlay */
.overlay { position: fixed; inset: 0; background: rgba(8,13,24,.8); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 14px; color: #94a3b8; }
</style>
</head>
<body>
<div class="app">

  <!-- ===== PC/Tablet Sidebar ===== -->
    <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="100" height="32" viewBox="0 0 200 56" fill="none">
        <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
        <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
        <rect x="9" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
        <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="42" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".4"/>
        <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
        <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>

        <circle cx="26" cy="14" r="3" fill="var(--orange)" opacity=".8"/>
        <circle cx="28" cy="9" r="2" fill="var(--orange)" opacity=".5"/>
        <circle cx="40" cy="17" r="2.5" fill="var(--orange)" opacity=".7"/>
        <circle cx="42" cy="13" r="1.8" fill="var(--orange)" opacity=".45"/>
        <text x="60" y="42" font-family="'Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="var(--orange)">Traq</text>
      </svg>
    </div>
    <div class="sidebar-user" id="sb-user-wrap">
      <div class="sidebar-avatar" id="sb-avatar"></div>
      <div>
        <div class="sidebar-name" id="sb-name"></div>
        <div class="sidebar-role" id="sb-role"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="snav-item" onclick="goHome()">
        <span class="snav-icon">📋</span>
        <span data-i18n="nav_list">一覧</span>
      </button>
      <button class="snav-item" onclick="location.href='dashboard.html'">
        <span class="snav-icon">📊</span>
        <span data-i18n="nav_dashboard">ダッシュボード</span>
      </button>
      <button class="snav-item active" onclick="void(0)">
        <span class="snav-icon">📥</span>
        <span data-i18n="nav_excel">Excelダウンロード</span>
      </button>
      <button class="snav-item" onclick="location.href='admin.html'">
        <span class="snav-icon">🔧</span>
        <span data-i18n="nav_master">マスタ</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <button class="snav-item" onclick="toggleTheme()">
        <span class="snav-icon" id="sb-theme-icon">🌙</span>
        <span data-i18n="nav_theme">テーマ切替</span>
      </button>
      <button class="snav-item" style="gap:6px">
        <span class="snav-icon">🌐</span>
        <button class="lang-btn active" onclick="setLang('ja')" id="sb-lang-ja">JP</button>
        <button class="lang-btn" onclick="setLang('vi')" id="sb-lang-vi">VN</button>
        <button class="lang-btn" onclick="setLang('en')" id="sb-lang-en">EN</button>
      </button>
      <button class="snav-item" onclick="location.href='settings.html'">
        <span class="snav-icon">⚙️</span>
        <span data-i18n="nav_settings">設定</span>
      </button>
      <button class="snav-item" onclick="doLogout()" style="color:var(--danger)">
        <span class="snav-icon">🚪</span>
        <span data-i18n="nav_logout">ログアウト</span>
      </button>
    </div>
  </aside>

  <!-- ===== Main Column ===== -->
  <div class="main-column">

  <header class="topbar">
    <div class="topbar-left">
      <svg class="mini-logo" width="26" height="26" viewBox="0 0 56 56" fill="none">
        <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
        <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
        <rect x="9" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
        <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
        <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
        <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>
        <rect x="6" y="16" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="20" y="20" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="34" y="23" width="12" height="4" rx="1" fill="var(--roof)"/>
        <circle cx="12" cy="10" r="3.5" fill="var(--orange)" opacity=".9"/>
        <circle cx="26" cy="14" r="3" fill="var(--orange)" opacity=".8"/>
        <circle cx="40" cy="17" r="2.5" fill="var(--orange)" opacity=".7"/>
      </svg>
      <span class="topbar-logo-text">Traq</span>
      <span class="topbar-sep"></span>
      <span class="topbar-sub">Trouble Tracking System</span>
    </div>
    <div class="topbar-right">
      <button class="hdr-icon-btn" onclick="forceReload()" data-i18n-title="hdr_reload" title="リロード">🔄</button>
      <button class="hdr-icon-btn" onclick="toggleTheme()" id="themeBtn" data-i18n-title="hdr_theme" title="テーマ切替">🌙</button>
      <button class="hdr-icon-btn" onclick="location.href='settings.html'" data-i18n-title="hdr_settings" title="設定">⚙️</button>
      <div class="hdr-avatar" id="mob-avatar"></div>
    </div>
  </header>
<div class="page-title-bar">
  <button class="page-back-btn" onclick="goBack()">←</button>
  <span class="page-title-text" data-i18n="page_title">📥 Excel出力</span>
</div>

<main class="main">
<div class="main-inner">

  <!-- 期間指定 -->
  <div class="section">
    <div class="section-title" data-i18n="sec_period">📅 出力期間</div>

    <div class="preset-group">
      <button class="preset-btn" id="preset-week"  onclick="setPreset('week')"data-i18n="preset_week">今週</button>
      <button class="preset-btn" id="preset-month" onclick="setPreset('month')"data-i18n="preset_month">今月</button>
      <button class="preset-btn" id="preset-prev"  onclick="setPreset('prev')"data-i18n="preset_prev">先月</button>
      <button class="preset-btn" id="preset-all"   onclick="setPreset('all')"data-i18n="preset_all">全期間</button>
    </div>

    <div class="date-range">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" data-i18n="lbl_from">開始日</label>
        <input class="form-input" type="date" id="date-from" onchange="onDateChange()">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" data-i18n="lbl_to">終了日</label>
        <input class="form-input" type="date" id="date-to" onchange="onDateChange()">
      </div>
    </div>
  </div>

  <!-- プレビュー -->
  <div class="section" id="preview-section">
    <div class="section-title" data-i18n="sec_preview">📊 件数プレビュー</div>
    <div class="preview-card">
      <div>
        <div class="preview-label" data-i18n="preview_eq">⚙️ 設備トラブル</div>
        <div class="preview-sub" data-i18n="preview_eq_file">設備トラブル_期間.xlsx</div>
      </div>
      <div style="text-align:right">
        <div class="preview-count" id="count-equipment">–</div>
        <div class="preview-sub">件</div>
      </div>
    </div>
    <div class="preview-card">
      <div>
        <div class="preview-label" data-i18n="preview_md">🔩 金型トラブル</div>
        <div class="preview-sub" data-i18n="preview_md_file">金型トラブル_期間.xlsx</div>
      </div>
      <div style="text-align:right">
        <div class="preview-count" id="count-mold">–</div>
        <div class="preview-sub">件</div>
      </div>
    </div>
  </div>

  <!-- 出力オプション -->
  <div class="section">
    <div class="section-title" data-i18n="sec_image">📎 画像出力</div>
    <div class="form-group" style="margin-bottom:0">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;padding:6px 0">
        <input type="checkbox" id="include-images" style="width:18px;height:18px;accent-color:var(--orange);cursor:pointer">
        <span data-i18n="img_check">画像をZIPでまとめてダウンロード</span>
      </label>
      <div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6">
        <span data-i18n="img_desc">対象期間のトラブルに添付された画像をZIPファイルとしてダウンロードします。</span><br>
        <span data-i18n="img_desc2">容量削減前のバックアップに利用できます。</span>
      </div>
    </div>
  </div>

  <!-- ダウンロード -->
  <div style="padding-bottom: 24px;">
    <button class="dl-btn" id="dl-btn" onclick="doDownload()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span data-i18n="btn_excel">Excelダウンロード</span>

}

// ── プリセット ────────────────────────────────────────────
var activePreset = null;

function setPreset(type) {
  activePreset = type;
  ['week','month','prev','all'].forEach(function(k) {
    document.getElementById('preset-' + k).classList.toggle('active', k === type);
  });

  var now   = new Date();
  var y     = now.getFullYear();
  var m     = now.getMonth();
  var from, to;

  if (type === 'week') {
    var day = now.getDay(); // 0=日
    var diff = (day === 0) ? -6 : 1 - day; // 月曜始まり
    var mon  = new Date(now); mon.setDate(now.getDate() + diff);
    var sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
    from = toDateStr(mon);
    to   = toDateStr(sun);
  } else if (type === 'month') {
    from = toDateStr(new Date(y, m, 1));
    to   = toDateStr(new Date(y, m + 1, 0));
  } else if (type === 'prev') {
    from = toDateStr(new Date(y, m - 1, 1));
    to   = toDateStr(new Date(y, m, 0));
  } else if (type === 'all') {
    from = '2020-01-01';
    to   = toDateStr(now);
  }

  document.getElementById('date-from').value = from;
  document.getElementById('date-to').value   = to;
  fetchPreview();
}

function onDateChange() {
  // 手動変更時はプリセット解除
  activePreset = null;
  ['week','month','prev','all'].forEach(function(k) {
    document.getElementById('preset-' + k).classList.remove('active');
  });
  fetchPreview();
}

function toDateStr(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

async function _fetchPreview() {
  var from = document.getElementById('date-from').value;
  var to   = document.getElementById('date-to').value;
  if (!from || !to) return;

  document.getElementById('count-equipment').textContent = '…';
  document.getElementById('count-mold').textContent = '…';
  document.getElementById('dl-btn').disabled = true;

  try {
    var query = buildQuery(from, to, null, true);
    var rows = await sbFetch(query);

    var eqCount   = rows.filter(function(r) { return r.trouble_type === 'equipment'; }).length;
    var moldCount = rows.filter(function(r) { return r.trouble_type === 'mold'; }).length;

    document.getElementById('count-equipment').textContent = eqCount;
    document.getElementById('count-mold').textContent      = moldCount;
    document.getElementById('dl-btn').disabled = (eqCount + moldCount === 0);
    // 画像ZIPボタンも連動
    var imgBtn = document.getElementById('dl-img-btn');
    if (imgBtn && imgBtn.style.display !== 'none') {
      imgBtn.disabled = (eqCount + moldCount === 0);
    }
  } catch(e) {
    document.getElementById('count-equipment').textContent = '–';
    document.getElementById('count-mold').textContent      = '–';
    showToast(t('msg_count_fail')(e.message), 'error');
  }
}

// ── クエリ構築 ────────────────────────────────────────────
function buildQuery(from, to, type, countOnly) {
  // JOIN: lines, machines, products, categories, reporter(traq_users), approver(traq_users)
  var select = countOnly
    ? 'trouble_type'
    : 'id,trouble_type,status,occurred_date,shift,occurrence,stop_start,stop_end,stop_minutes,detail,approved_at,reject_reason,' +
      'lines(name),' +
      'machines(machine_no),' +
      'products(product_code,product_name),' +
      'categories(name),' +
      'reporter:reporter_id(name),' +
      'approver:approver_id(name)';

  var q = 'troubles?select=' + select +
    '&occurred_date=gte.' + from +
    '&occurred_date=lte.' + to +
    '&order=occurred_date.asc,id.asc';

  if (type) q += '&trouble_type=eq.' + type;
  return q;
}

// ── ダウンロード ──────────────────────────────────────────
async function doDownload() {
  var from = document.getElementById('date-from').value;
  var to   = document.getElementById('date-to').value;
  if (!from || !to) { showToast(t('msg_no_period'), 'error'); return; }

  document.getElementById('dl-btn').disabled = true;
  showOverlay(t('overlay_fetching'));

  try {
    var rows = await sbFetch(buildQuery(from, to, null, false));

    var eqRows   = rows.filter(function(r) { return r.trouble_type === 'equipment'; });
    var moldRows = rows.filter(function(r) { return r.trouble_type === 'mold'; });

    if (eqRows.length === 0 && moldRows.length === 0) {
      hideOverlay();
      document.getElementById('dl-btn').disabled = false;
      showToast(t('msg_no_data'), 'error');
      return;
    }

    var fromStr = from.replace(/-/g, '');
    var toStr   = to.replace(/-/g, '');

    // 設備ファイル
    if (eqRows.length > 0) {
      showOverlay(t('overlay_eq_gen'));
      var wbEq = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wbEq, buildSheet(eqRows), t('xl_eq_sheet'));
      XLSX.writeFile(wbEq, t('xl_eq_file')(fromStr, toStr));
    }

    // 金型ファイル
    if (moldRows.length > 0) {
      showOverlay(t('overlay_md_gen'));
      var wbMd = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wbMd, buildSheet(moldRows), t('xl_md_sheet'));
      XLSX.writeFile(wbMd, t('xl_md_file')(fromStr, toStr));
    }

    hideOverlay();
    showToast(t('msg_dl_done')(eqRows.length, moldRows.length), 'success');
    document.getElementById('dl-btn').disabled = false;

  } catch(e) {
    hideOverlay();
    document.getElementById('dl-btn').disabled = false;
    showToast(t('msg_dl_fail')(e.message), 'error');
  }
}

// ── シート生成 ────────────────────────────────────────────
function buildSheet(rows) {
  var HEADERS = [
    t('xl_no'), t('xl_date'), t('xl_shift'), t('xl_line'), t('xl_machine'), t('xl_pcode'), t('xl_pname'),
    t('xl_category'), t('xl_occurrence'), t('xl_stop_start'), t('xl_stop_end'), t('xl_stop_min'),
    t('xl_detail'), t('xl_reporter'), t('xl_status'), t('xl_approver'), t('xl_approved_at'), t('xl_reject')
  ];

  var statusLabel = {
    'draft':    t('st_draft'),
    'pending':  t('st_pending'),
    'approved': t('st_approved'),
    'rejected': t('st_rejected')
  };
  var occLabel = {
    'first':      t('occ_first'),
    'recurrence': t('occ_rec')
  };

  var data = [HEADERS];

  rows.forEach(function(r, i) {
    var lineName    = (r.lines    && r.lines.name)                  ? r.lines.name    : '';
    var machineNo   = (r.machines && r.machines.machine_no)         ? r.machines.machine_no : '';
    var productCode = (r.products && r.products.product_code)       ? r.products.product_code : '';
    var productName = (r.products && r.products.product_name)       ? r.products.product_name : '';
    var catName     = (r.categories && r.categories.name)           ? r.categories.name : '';
    var reporterN   = (r.reporter  && r.reporter.name)              ? r.reporter.name  : '';
    var approverN   = (r.approver  && r.approver.name)              ? r.approver.name  : '';

    var approvedAt = '';
    if (r.approved_at) {
      var d = new Date(r.approved_at);
      approvedAt = d.getFullYear() + '/' +
        String(d.getMonth()+1).padStart(2,'0') + '/' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0');
    }

    data.push([
      i + 1,
      r.occurred_date || '',
      r.shift ? r.shift + 'S' : '',
      lineName,
      machineNo,
      productCode,
      productName,
      catName,
      occLabel[r.occurrence] || r.occurrence || '',
      r.stop_start ? r.stop_start.slice(0,5) : '',
      r.stop_end   ? r.stop_end.slice(0,5)   : '',
      r.stop_minutes != null ? r.stop_minutes : '',
      r.detail || '',
      reporterN,
      statusLabel[r.status] || r.status || '',
      approverN,
      approvedAt,
      r.reject_reason || ''
    ]);
  });

  var ws = XLSX.utils.aoa_to_sheet(data);

  // 列幅設定
  ws['!cols'] = [
    {wch:5},  // No
    {wch:12}, // 発生日
    {wch:6},  // シフト
    {wch:12}, // ライン
    {wch:8},  // 機番
    {wch:12}, // 品番コード
    {wch:16}, // 品番名
    {wch:14}, // 分類
    {wch:10}, // 初発/再発
    {wch:10}, // 停止開始
    {wch:10}, // 停止終了
    {wch:8},  // 停止分数
    {wch:40}, // 詳細内容
    {wch:12}, // 報告者
    {wch:10}, // ステータス
    {wch:12}, // 承認者
    {wch:18}, // 承認日時
    {wch:30}  // 差戻しコメント
  ];

  return ws;
}

// ── UI共通 ────────────────────────────────────────────────
function showOverlay(text) {
  document.getElementById('overlay-text').textContent = text;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.classList.remove('hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}

// ── 画像チェックボックス連動 ──
document.getElementById('include-images').addEventListener('change', function() {
  var imgBtn = document.getElementById('dl-img-btn');
  imgBtn.style.display = this.checked ? 'flex' : 'none';
  // dlボタンが有効な場合のみ画像ボタンも有効に
  imgBtn.disabled = document.getElementById('dl-btn').disabled;
});

// ── 画像ZIPダウンロード ──
async function doImageDownload() {
  var from = document.getElementById('date-from').value;
  var to   = document.getElementById('date-to').value;
  if (!from || !to) { showToast(t('msg_no_period'), 'error'); return; }

  document.getElementById('dl-img-btn').disabled = true;
  showOverlay(t('overlay_img_info'));

  try {
    // 対象期間のトラブルIDを取得
    var troubles = await sbFetch(
      'troubles?select=id,occurred_date,shift,machines(machine_no),products(product_code)' +
      '&occurred_date=gte.' + from + '&occurred_date=lte.' + to +
      '&order=occurred_date.asc,id.asc'
    );
    if (!troubles || troubles.length === 0) {
      hideOverlay();
      document.getElementById('dl-img-btn').disabled = false;
      showToast(t('msg_no_trouble'), 'error');
      return;
    }

    // trouble_imagesから対象のstorage_pathを取得
    var troubleIds = troubles.map(function(t) { return t.id; });
    var images = await sbFetch(
      'trouble_images?select=id,trouble_id,storage_path' +
      '&trouble_id=in.(' + troubleIds.join(',') + ')' +
      '&order=trouble_id,id'
    );

    if (!images || images.length === 0) {
      hideOverlay();
      document.getElementById('dl-img-btn').disabled = false;
      showToast(t('msg_no_images'), 'error');
      return;
    }

    showOverlay(t('overlay_img_dl')(0, images.length));

    var zip = new JSZip();
    var downloaded = 0;
    var failed = 0;

    // 直列で画像を取得（レート制限対策）
    for (var i = 0; i < images.length; i++) {
      var img = images[i];
      var path = img.storage_path;
      if (!path) { failed++; continue; }

      // ファイル名を取得（パスの最後の部分）
      var parts = path.split('/');
      var filename = parts[parts.length - 1] || ('image_' + img.id + '.jpg');

      // フォルダ構造: トラブルID/ファイル名
      var folder = 'trouble_' + img.trouble_id;

      try {
        var url = SB_URL + '/storage/v1/object/public/trouble-images/' + path;
        var res = await fetch(url);
        if (!res.ok) { failed++; continue; }
        var blob = await res.blob();
        zip.file(folder + '/' + filename, blob);
        downloaded++;
      } catch(e) {
        failed++;
      }

      showOverlay(t('overlay_img_dl')(i + 1, images.length));
    }

    if (downloaded === 0) {
      hideOverlay();
      document.getElementById('dl-img-btn').disabled = false;
      showToast(t('msg_img_fail'), 'error');
      return;
    }

    showOverlay(t('overlay_zip'));
    var zipBlob = await zip.generateAsync({ type: 'blob' }, function(meta) {
      showOverlay(t('overlay_zip_pct')(Math.round(meta.percent)));
    });

    // ダウンロード
    var fromStr = from.replace(/-/g, '');
    var toStr   = to.replace(/-/g, '');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = t('xl_img_file')(fromStr, toStr);
    a.click();
    URL.revokeObjectURL(a.href);

    hideOverlay();
    document.getElementById('dl-img-btn').disabled = false;

    var msg = t('msg_img_done')(downloaded, failed);
    showToast(msg, failed > 0 ? 'error' : 'success');

  } catch(e) {
    hideOverlay();
    document.getElementById('dl-img-btn').disabled = false;
    showToast(t('msg_img_dl_fail')(e.message), 'error');
  }
}
