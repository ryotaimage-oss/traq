<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – 管理者画面</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

/* ヘッダー */
.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.logout-btn:hover { border-color: var(--orange); color: var(--text); }

/* レイアウト */
.layout { display: flex; flex: 1; overflow: hidden; }

/* サイドバー */
.sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 14px 20px; cursor: pointer; font-size: 13px; color: var(--muted); border-left: 3px solid transparent; transition: all .15s; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--surface2); color: var(--orange); border-left-color: var(--orange); }
.nav-icon { font-size: 16px; flex-shrink: 0; }

/* メインコンテンツ */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* パネルヘッダー */
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.panel-title { font-size: 18px; font-weight: 700; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ボタン */
.btn { padding: 8px 16px; border-radius: var(--radius); font-family: inherit; font-size: 13px; cursor: pointer; border: none; font-weight: 500; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary  { background: var(--orange); color: #000; }
.btn-outline  { background: none; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--orange); }
.btn-danger   { background: none; border: 1px solid var(--error); color: var(--error); }
.btn-danger:hover { background: var(--error); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* テーブル */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .04em; white-space: nowrap; }
td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--surface2); }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.badge-admin  { background: #1e3a5f; color: #60a5fa; }
.badge-leader { background: #1a3a1a; color: #4ade80; }
.badge-worker { background: #2a1a00; color: var(--orange); }
.badge-active   { background: #1a3a1a; color: #4ade80; }
.badge-inactive { background: #2a1a1a; color: #f87171; }
.badge-equipment { background: #1e2a4a; color: #93c5fd; }
.badge-mold      { background: #2a1a3a; color: #c4b5fd; }

/* モーダル */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* フォーム */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--orange); }
.form-select option { background: var(--surface); }

/* トースト */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.4); transition: opacity .3s; white-space: nowrap; }
.toast.success { border-color: var(--success); }
.toast.error   { border-color: var(--error); }

/* 空状態 */
.empty { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }

/* ローディング */
.loading-row td { text-align: center; padding: 32px; color: var(--muted); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }
</style>
</head>

    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>

        </table>

    </div>

    <!-- 機番タブ -->
    <div class="tab-panel" id="tab-machines">
      <div class="panel-header">
        <div class="panel-title">機番管理</div>
        <div class="btn-group">
          <button class="btn btn-outline" onclick="exportMachines()">Excelエクスポート</button>

<script>
// ── Supabase設定 ──────────────────────────────────────────
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── セッション確認 ────────────────────────────────────────
var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  if (session.role !== 'admin') { location.href = 'home.html'; return; }
  document.getElementById('header-user').textContent = session.name + ' (Admin)';
})();

function logout() {
  localStorage.removeItem('traq_session');
  location.href = 'index.html';
}

// ── データキャッシュ ──────────────────────────────────────
var users = [], lines = [], machines = [], products = [], categories = [];

// ── 初期ロード ────────────────────────────────────────────
async function loadAll() {
  try {
    var results = await Promise.all([
      sbFetch('traq_users?order=role.asc,name.asc&select=*'),
      sbFetch('lines?order=name.asc&select=*'),
      sbFetch('machines?order=machine_no.asc&select=*'),
      sbFetch('products?order=product_code.asc&select=*'),
      sbFetch('categories?order=type.asc,sort_order.asc&select=*')
    ]);
    users      = results[0] || [];
    lines      = results[1] || [];
    machines   = results[2] || [];
    products   = results[3] || [];
    categories = results[4] || [];
    renderAll();
  } catch(e) {
    showToast('データの読込に失敗しました: ' + e.message, 'error');
  }
}

function renderAll() {
  renderUsers();
  renderLines();
  renderMachines();
  renderProducts();
  renderCategories();
}

// ── タブ切り替え ──────────────────────────────────────────
function switchTab(tab) {
  var tabs = ['users','lines','machines','products','categories'];
  tabs.forEach(function(t) {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
  });
}

// ── ユーザー ──────────────────────────────────────────────
function renderUsers() {
  var tbody = document.getElementById('users-tbody');
  if (!users.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">ユーザーがいません</td></tr>'; return; }
  var roleLabel = { worker: 'OP', leader: 'SL', admin: 'Admin' };
  var badgeClass = { worker: 'badge-worker', leader: 'badge-leader', admin: 'badge-admin' };
  tbody.innerHTML = users.map(function(u) {
    return '<tr>' +
      '<td>' + u.name + '</td>' +
      '<td><span class="badge ' + (badgeClass[u.role]||'') + '">' + (roleLabel[u.role]||u.role) + '</span></td>' +
      '<td>' + u.shift + '直</td>' +

async function saveMachine() {
  var id     = document.getElementById('machine-id').value;

  var memo   = document.getElementById('machine-memo').value.trim();

  if (!lineId) { showToast('ラインを選択してください', 'error'); return; }
  var data = { machine_no: no, line_id: lineId, memo: memo || null };
  try {
    if (id) {
      await sbFetch('machines?id=eq.' + id, 'PATCH', data);
    } else {
      await sbFetch('machines', 'POST', data);
    }
    closeModal('machine-modal');
    await sbFetch('machines?order=machine_no.asc&select=*').then(function(d) { machines = d || []; renderMachines(); });
    showToast('保存しました', 'success');

async function toggleMachine(id, isActive) {

    showToast('失敗: ' + e.message, 'error');
  }

function exportMachines() {
  var rows = [['機番','ライン','メモ','状態']];
  machines.forEach(function(m) {
    var line = lines.find(function(l) { return l.id === m.line_id; });
    rows.push([m.machine_no, line ? line.name : '', m.memo || '', m.is_active ? '有効' : '無効']);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '機番');
  XLSX.writeFile(wb, 'traq_machines.xlsx');
}

async function importMachines(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = async function(e) {
    try {
      var wb = XLSX.read(e.target.result, { type: 'binary' });
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      var count = 0;
      for (var i = 1; i < rows.length; i++) {
        var row = rows[i];
        if (!row[0]) continue;
        var no   = String(row[0]).trim();
        var lineName = String(row[1] || '').trim();
        var memo = row[2] ? String(row[2]).trim() : null;
        var line = lines.find(function(l) { return l.name === lineName; });
        if (!line) continue;
        var existing = machines.find(function(m) { return m.machine_no === no; });
        if (existing) {
          await sbFetch('machines?id=eq.' + existing.id, 'PATCH', { machine_no: no, line_id: line.id, memo: memo });
        } else {
          await sbFetch('machines', 'POST', { machine_no: no, line_id: line.id, memo: memo });
        }
        count++;
      }
      machines = await sbFetch('machines?order=machine_no.asc&select=*') || [];
      renderMachines();
      showToast(count + '件インポートしました', 'success');
    } catch(e) {
      showToast('インポート失敗: ' + e.message, 'error');
    }
    event.target.value = '';
  };
  reader.readAsBinaryString(file);
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}
