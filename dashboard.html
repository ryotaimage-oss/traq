<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --orange:#EF9F27;--orange-dark:#c97d10;--navy:#080d18;
  --bg1:#080d18;--bg2:#111827;--bg3:#1e2d45;
  --text1:#e8eaf0;--text2:#8b90a0;
  --border:rgba(255,255,255,0.08);
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;
  --eq:#3b82f6;--md:#a855f7;
  --radius:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --nav-h:56px;
  --factory:#2e3a52; --roof:#3d4e6e;
}
[data-theme="light"]{
  --bg1:#e8e6e2;--bg2:#ffffff;--bg3:#f0ede8;
  --text1:#1a1f2e;--text2:#666666;
  --border:rgba(0,0,0,0.18);--shadow:0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}

/* ===== Topbar (F-style) ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}

/* ===== Bottom Nav (2-tab) ===== */
.bottom-nav{display:flex;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:10px;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.nav-item.active{color:var(--orange)}
.nav-item:hover:not(.active){color:var(--text1)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-weight:500}
@media(min-width:768px){.bottom-nav{display:none}}


/* Scroll */
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 32px}
.inner{max-width:900px;margin:0 auto}

/* Filters */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.period-tabs{display:flex;gap:4px}
.ptab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.ptab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}
.ptab:hover:not(.active){border-color:var(--orange);color:var(--orange)}
.type-tabs{display:flex;gap:4px}
.ttab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.ttab.active.eq{background:rgba(59,130,246,.15);border-color:var(--eq);color:var(--eq)}
.ttab.active.md{background:rgba(168,85,247,.15);border-color:var(--md);color:var(--md)}
.ttab.active.all{background:var(--orange);border-color:var(--orange);color:var(--navy)}
.ttab:hover:not(.active){border-color:var(--orange);color:var(--orange)}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;line-height:1}
.kpi-value.eq{color:var(--eq)}
.kpi-value.md{color:var(--md)}
.kpi-value.stop{color:var(--warning)}

/* Chart grid */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;animation:fadeUp .3s ease both}
.chart-card.wide{grid-column:span 2}
@media(max-width:600px){.chart-card.wide{grid-column:span 1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.chart-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;margin-bottom:12px}
.chart-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-wrap{position:relative;height:200px}
.chart-wrap.tall{height:240px}
.chart-wrap.short{height:180px}

/* Ranking list */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-item{display:flex;align-items:center;gap:8px}
.rank-num{font-size:11px;font-weight:700;color:var(--text2);width:20px;text-align:right;flex-shrink:0}
.rank-num.top{color:var(--orange)}
.rank-bar-wrap{flex:1;background:var(--bg3);border-radius:4px;height:22px;overflow:hidden;position:relative}
.rank-bar{height:100%;border-radius:4px;min-width:4px;transition:width .4s ease}
.rank-label{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 40px)}
.rank-count{font-size:11px;font-weight:700;flex-shrink:0;width:28px;text-align:right;color:var(--text2)}

/* Pie legend */
.pie-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px}
.pie-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pie-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Loading / empty */
.loading-overlay{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.empty-state{text-align:center;padding:30px;color:var(--text2);font-size:13px}

/* Toast */
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);border-radius:20px;padding:8px 20px;font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:400;white-space:nowrap;animation:fadeUp .2s ease}
.toast.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.toast.info{background:var(--bg3);border:1px solid var(--border);color:var(--text1)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:767px){.topbar-right .lang-btn{display:none}}
</style>
</head>

<script>
(function(){
  var saved=localStorage.getItem('traq_theme');
  var pref=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',saved||pref);
  var btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=(saved||pref)==='dark'?'🌙':'☀️';
})();

/* ===== Supabase ===== */
const SB_URL='https://svnqlwfcnoqwdwfbbaqb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';
async function sbFetch(path){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!res.ok) throw new Error(await res.text());

  return text?JSON.parse(text):[];
}

/* ===== i18n ===== */
let currentLang=localStorage.getItem('traq_lang')||'ja';
const I18N={
  ja:{page_title:'ダッシュボード',nav_list:'一覧',nav_dashboard:'ダッシュボード',nav_master:'マスタ',master_denied:'マスタはSL・管理者のみ利用できます',nav_settings:'設定',p7:'直近7日',p30:'直近30日',p90:'直近90日',p_all:'全期間',t_all:'すべて',t_eq:'設備',t_md:'金型',kpi_total:'総件数',kpi_eq:'設備',kpi_md:'金型',kpi_stop:'停止時間(分)',chart1_title:'日別件数推移',chart2_title:'停止時間合計推移（分）',chart3_title:'初発・再発比率',chart4_title:'設備 分類別件数',chart5_title:'金型 異常内容別件数',chart6_title:'再発率（設備 / 金型）',chart7_title:'機番別件数ランキング（上位10）',chart8_title:'品番別件数ランキング（上位10）',first:'初発',rec:'再発',no_data:'データなし'},
  vi:{page_title:'Thống kê',nav_list:'Danh sách',nav_dashboard:'Dashboard',nav_master:'Master',master_denied:'Chỉ SL và Admin mới dùng được Master',nav_settings:'Cài đặt',p7:'7 ngày',p30:'30 ngày',p90:'90 ngày',p_all:'Tất cả',t_all:'Tất cả',t_eq:'Thiết bị',t_md:'Khuôn',kpi_total:'Tổng',kpi_eq:'Thiết bị',kpi_md:'Khuôn',kpi_stop:'Tổng dừng(p)',chart1_title:'Số sự cố theo ngày',chart2_title:'Thời gian dừng (phút)',chart3_title:'Lần đầu / Tái phát',chart4_title:'Thiết bị theo loại',chart5_title:'Khuôn theo loại',chart6_title:'Tỷ lệ tái phát',chart7_title:'Top 10 máy',chart8_title:'Top 10 sản phẩm',first:'Lần đầu',rec:'Tái phát',no_data:'Không có dữ liệu'},
  en:{page_title:'Dashboard',nav_list:'List',nav_dashboard:'Dashboard',nav_master:'Master',master_denied:'Master is for SL and Admin only',nav_settings:'Settings',p7:'Last 7d',p30:'Last 30d',p90:'Last 90d',p_all:'All',t_all:'All',t_eq:'Equipment',t_md:'Mold',kpi_total:'Total',kpi_eq:'Equipment',kpi_md:'Mold',kpi_stop:'Downtime(min)',chart1_title:'Daily Count',chart2_title:'Daily Downtime (min)',chart3_title:'First / Recurrence',chart4_title:'Equipment by Category',chart5_title:'Mold by Category',chart6_title:'Recurrence Rate',chart7_title:'Top 10 Machines',chart8_title:'Top 10 Products',first:'First',rec:'Recurrence',no_data:'No data'}
};
function t(k){return(I18N[currentLang]||I18N.ja)[k]||(I18N.ja[k]||k)}
function setLang(l){
  currentLang=l;localStorage.setItem('traq_lang',l);
  ['ja','vi','en'].forEach(x=>{var el=document.getElementById('sb-lang-'+x);if(el)el.classList.toggle('active',x===l);});
  applyI18n();
}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n);});
}

/* ===== State ===== */
let currentPeriod=7, currentType='all';
let RAW=[];
const chartInstances={};

/* ===== Colors ===== */
const PIE_COLORS=['#EF9F27','#3b82f6','#10b981','#a855f7','#ef4444','#f59e0b','#06b6d4','#84cc16','#f97316','#ec4899'];

/* ===== CSS var helper ===== */
function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}

/* ===== Init ===== */
(async function init(){
  initChip();
  applyI18n();
  const sl=localStorage.getItem('traq_lang')||'ja';
  currentLang=sl;
  ['ja','vi','en'].forEach(l=>{var el=document.getElementById('sb-lang-'+l);if(el)el.classList.toggle('active',l===sl);});

  // テーマ・ランゲージ反映
  const th=localStorage.getItem('traq_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',th);
  const btn=document.getElementById('themeBtn');
  if(btn) btn.textContent=th==='dark'?'🌙':'☀️';

  await loadData();
})();

/* ===== Load ===== */
async function loadData(){
  try{
    const rows=await sbFetch(
      'troubles?select=id,trouble_type,status,occurred_date,stop_minutes,occurrence,categories(name),machines(machine_no),products(product_code,product_name)'+
      '&status=neq.draft&order=occurred_date.desc&limit=2000'
    );
    RAW=(rows||[]).filter(r=>r.status!=='draft');
    render();
  }catch(e){
    showToast('データ読込エラー: '+e.message,'error');
    RAW=[];
    render();
  }
}

/* ===== Filter ===== */
function getFiltered(){
  const now=new Date();
  return RAW.filter(r=>{
    // 期間フィルター
    if(currentPeriod>0){
      const d=new Date(r.occurred_date||r.created_at||'');
      const diff=(now-d)/(1000*60*60*24);
      if(diff>currentPeriod) return false;
    }
    // 種別フィルター
    if(currentType==='eq'&&r.trouble_type!=='equipment') return false;
    if(currentType==='md'&&r.trouble_type!=='mold') return false;
    return true;
  });
}

/* ===== Controls ===== */
function setPeriod(p){
  currentPeriod=p;
  document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',+b.dataset.p===p));
  render();
}
function setType(tp){
  currentType=tp;
  document.querySelectorAll('.ttab').forEach(b=>{
    b.classList.remove('active','all','eq','md');
    if(b.dataset.t===tp){b.classList.add('active',tp);}
  });
  render();
}

/* ===== Render ===== */
function render(){
  const data=getFiltered();
  renderKPI(data);
  renderChart1(data);
  renderChart2(data);
  renderChart3(data);
  renderChart4(data);
  renderChart5(data);
  renderChart6(data);
  renderRank('rankMachine', data, r=>r.machines?r.machines.machine_no+'号機':'不明');
  renderRank('rankProduct', data, r=>r.products?(r.products.product_code+' '+r.products.product_name).trim():'不明');
}

/* ===== KPI ===== */
function renderKPI(data){
  const total=data.length;
  const eq=data.filter(r=>r.trouble_type==='equipment').length;
  const md=data.filter(r=>r.trouble_type==='mold').length;
  const stop=data.reduce((s,r)=>s+(r.stop_minutes||0),0);
  document.getElementById('kpiTotal').textContent=total;
  document.getElementById('kpiEq').textContent=eq;
  document.getElementById('kpiMd').textContent=md;
  document.getElementById('kpiStop').textContent=stop;
}

/* ===== Chart helpers ===== */
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function gridColor(){return isDark()?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';}
function tickColor(){return isDark()?'#8b90a0':'#666666';}

/* last N days array */
function lastNDays(n){
  const days=[];const now=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}
function getDateKey(r){return(r.occurred_date||'').slice(0,10)||null;}

/* ===== Chart 1: 日別件数 ===== */
function renderChart1(data){
  destroyChart('c1');
  const days=currentPeriod>0?lastNDays(currentPeriod):getDayRange(data);
  const labels=days.map(d=>d.slice(5));
  let datasets=[];
  if(currentType==='all'||currentType==='eq'){
    const eqMap={};days.forEach(d=>{eqMap[d]=0;});
    data.filter(r=>r.trouble_type==='equipment').forEach(r=>{const d=getDateKey(r);if(d&&eqMap[d]!==undefined)eqMap[d]++;});
    datasets.push({label:t('t_eq'),data:days.map(d=>eqMap[d]),backgroundColor:'rgba(59,130,246,.7)',borderRadius:3});
  }
  if(currentType==='all'||currentType==='md'){
    const mdMap={};days.forEach(d=>{mdMap[d]=0;});
    data.filter(r=>r.trouble_type==='mold').forEach(r=>{const d=getDateKey(r);if(d&&mdMap[d]!==undefined)mdMap[d]++;});
    datasets.push({label:t('t_md'),data:days.map(d=>mdMap[d]),backgroundColor:'rgba(168,85,247,.7)',borderRadius:3});
  }
  const ctx=document.getElementById('chart1').getContext('2d');
  chartInstances['c1']=new Chart(ctx,{type:'bar',data:{labels,datasets},options:barOpts()});
}

/* ===== Chart 2: 停止時間推移 ===== */
function renderChart2(data){
  destroyChart('c2');
  const days=currentPeriod>0?lastNDays(currentPeriod):getDayRange(data);
  const stopMap={};days.forEach(d=>{stopMap[d]=0;});
  data.forEach(r=>{
    const d=getDateKey(r);
    if(d&&stopMap[d]!==undefined) stopMap[d]+=(r.stop_minutes||0);
  });
  const labels=days.map(d=>d.slice(5));
  const ctx=document.getElementById('chart2').getContext('2d');
  chartInstances['c2']=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      label:t('kpi_stop'),data:days.map(d=>stopMap[d]),
      borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.1)',
      tension:.35,fill:true,pointRadius:3,pointBackgroundColor:'#f59e0b'
    }]},
    options:lineOpts()
  });
}

/* ===== Chart 3: 初発・再発 ===== */
function renderChart3(data){
  destroyChart('c3');
  const first=data.filter(r=>r.occurrence==='first').length;
  const rec=data.filter(r=>r.occurrence==='recurrence'||r.occurrence==='repeat').length;
  const ctx=document.getElementById('chart3').getContext('2d');
  chartInstances['c3']=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:[t('first'),t('rec')],
      datasets:[{data:[first,rec],backgroundColor:['#10b981','#ef4444'],borderWidth:0}]
    },
    options:pieOpts()
  });
  renderPieLegend('legend3',[t('first'),t('rec')],[first,rec],['#10b981','#ef4444']);
}

/* ===== Chart 4: 設備分類別 ===== */
function renderChart4(data){
  destroyChart('c4');
  const el=document.getElementById('chart4').closest('.chart-card');
  if(currentType==='md'){if(el)el.style.display='none';return;}
  if(el)el.style.display='';
  const eq=data.filter(r=>r.trouble_type==='equipment');
  const map={};
  eq.forEach(r=>{const k=r.categories?r.categories.name:'その他';map[k]=(map[k]||0)+1;});
  renderPieChart('chart4','legend4',map);
}

/* ===== Chart 5: 金型分類別 ===== */
function renderChart5(data){
  destroyChart('c5');
  const el=document.getElementById('chart5').closest('.chart-card');
  if(currentType==='eq'){if(el)el.style.display='none';return;}
  if(el)el.style.display='';
  const md=data.filter(r=>r.trouble_type==='mold');
  const map={};
  md.forEach(r=>{const k=r.categories?r.categories.name:'その他';map[k]=(map[k]||0)+1;});
  renderPieChart('chart5','legend5',map);
}

function renderPieChart(canvasId,legendId,map){
  const keys=Object.keys(map);const vals=keys.map(k=>map[k]);
  const colors=keys.map((_,i)=>PIE_COLORS[i%PIE_COLORS.length]);
  destroyChart(canvasId);
  const ctx=document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId]=new Chart(ctx,{
    type:'doughnut',
    data:{labels:keys,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},
    options:pieOpts()
  });
  renderPieLegend(legendId,keys,vals,colors);
}

function renderPieLegend(id,keys,vals,colors){
  const el=document.getElementById(id);if(!el)return;
  const total=vals.reduce((s,v)=>s+v,0)||1;
  el.innerHTML=keys.map((k,i)=>
    `<div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${colors[i]}"></div>
      <span>${k} ${Math.round(vals[i]/total*100)}%</span>
    </div>`
  ).join('');
}

/* ===== Chart 6: 再発率 ===== */
function renderChart6(data){
  destroyChart('c6');
  const types=currentType==='all'?['equipment','mold']:currentType==='eq'?['equipment']:['mold'];
  const labels=types.map(tp=>tp==='equipment'?t('t_eq'):t('t_md'));
  const colors=types.map(tp=>tp==='equipment'?'rgba(59,130,246,.7)':'rgba(168,85,247,.7)');
  const rates=types.map(tp=>{
    const sub=data.filter(r=>r.trouble_type===tp);
    if(!sub.length) return 0;
    const rec=sub.filter(r=>r.occurrence==='recurrence'||r.occurrence==='repeat').length;
    return Math.round(rec/sub.length*100);
  });
  const ctx=document.getElementById('chart6').getContext('2d');
  chartInstances['c6']=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'再発率(%)',data:rates,backgroundColor:colors,borderRadius:4}]},
    options:{
      ...barOpts(),
      scales:{y:{...barOpts().scales.y,max:100,ticks:{...barOpts().scales.y.ticks,callback:v=>v+'%'}}}
    }
  });
}

/* ===== Ranking ===== */
function renderRank(containerId,data,keyFn){
  const el=document.getElementById(containerId);if(!el)return;
  const map={};
  data.forEach(r=>{const k=keyFn(r);map[k]=(map[k]||0)+1;});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!sorted.length){el.innerHTML=`<div class="empty-state">${t('no_data')}</div>`;return;}
  const max=sorted[0][1]||1;
  el.innerHTML=sorted.map(([name,cnt],i)=>`
    <div class="rank-item">
      <span class="rank-num ${i<3?'top':''}">${i+1}</span>
      <div class="rank-bar-wrap">
        <div class="rank-bar" style="width:${Math.round(cnt/max*100)}%;background:${i===0?'#EF9F27':i===1?'#8b90a0':i===2?'#c97d10':'var(--bg3)'}"></div>
        <span class="rank-label" style="color:${isDark()?'#e8eaf0':'#1a1f2e'}">${name}</span>
      </div>
      <span class="rank-count">${cnt}</span>
    </div>`).join('');
}

/* ===== Chart option presets ===== */
function barOpts(){
  return{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:true,labels:{color:tickColor(),font:{size:11,family:'Noto Sans JP'}}},tooltip:{mode:'index',intersect:false}},
    scales:{
      x:{grid:{color:gridColor()},ticks:{color:tickColor(),font:{size:10,family:'Noto Sans JP'},maxRotation:0}},
      y:{grid:{color:gridColor()},ticks:{color:tickColor(),font:{size:10,family:'Noto Sans JP'}},beginAtZero:true}
    }
  };
}
function lineOpts(){
  return{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
    scales:{
      x:{grid:{color:gridColor()},ticks:{color:tickColor(),font:{size:10,family:'Noto Sans JP'},maxRotation:0}},
      y:{grid:{color:gridColor()},ticks:{color:tickColor(),font:{size:10,family:'Noto Sans JP'}},beginAtZero:true}
    }
  };
}
function pieOpts(){
  return{
    responsive:true,maintainAspectRatio:false,
    cutout:'60%',
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw}件`}}}
  };
}

/* ===== Utils ===== */
function getDayRange(data){
  if(!data.length) return lastNDays(30);
  const dates=data.map(r=>(r.occurred_date||'').slice(0,10)).filter(Boolean).sort();
  const start=new Date(dates[0]);const end=new Date(dates[dates.length-1]);
  const days=[];const cur=new Date(start);
  while(cur<=end){days.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  return days;
}

/* ===== Theme ===== */
function toggleTheme(){
  const h=document.documentElement;const isDk=h.getAttribute('data-theme')==='dark';
  const next=isDk?'light':'dark';h.setAttribute('data-theme',next);
  localStorage.setItem('traq_theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'🌙':'☀️';
  // チャート再描画
  if(RAW.length) render();
}

/* ===== Session & User Chip ===== */
const SESSION = (function(){
  try { return JSON.parse(localStorage.getItem('traq_session')||'{}'); }
  catch(e){ return {}; }
})();
function initChip(){
  var s;
  try{s=JSON.parse(localStorage.getItem('traq_session')||'{}');}catch(e){s={};}
  var name=s.name||'';
  var role=s.role||'worker';
  var initial=name?name.charAt(0):'?';
  var classMap={worker:'role-op',leader:'role-sl',admin:'role-admin'};
  var topbar=document.querySelector('.topbar');
  if(topbar){topbar.classList.remove('role-op','role-sl','role-admin');topbar.classList.add(classMap[role]||'role-op');}
  var av=document.getElementById('mob-avatar');
  if(av) av.textContent=initial;
}
function goHome(){
  try{
    const r = SESSION.role || '';
    if(r==='leader'||r==='admin') location.href='home_sl.html';
    else location.href='home.html';
  }catch(e){location.href='home.html';}
}
function goMaster(){
  var r=SESSION&&SESSION.role;
  if(r==='worker'||r==='op'||!r){showToast(t('master_denied'),'error');return;}
  location.href='admin.html';
}

/* ===== Force Reload ===== */
function forceReload(){
  if('caches' in window){
    caches.keys().then(function(keys){
      return Promise.all(keys.map(function(k){return caches.delete(k);}));
    }).then(function(){location.reload(true);});
  } else { location.reload(true); }
}

/* ===== Toast ===== */
let toastTimer=null;
function showToast(msg,type='info'){
  const el=document.getElementById('toastEl');
  el.innerHTML=`<div class="toast ${type}">${msg}</div>`;
  el.style.display='block';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display='none';},2500);
}
