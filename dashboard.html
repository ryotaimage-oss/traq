<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – ダッシュボード</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.back-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.back-btn:hover { border-color: var(--orange); color: var(--text); }

.main { flex: 1; padding: 24px 16px; max-width: 1000px; margin: 0 auto; width: 100%; }

/* フィルター */
.filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.filter-label { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }
.filter-select, .filter-input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-family: inherit; font-size: 13px; }
.filter-select:focus, .filter-input:focus { outline: none; border-color: var(--orange); }
.filter-select option { background: var(--surface); }
.filter-btn { background: var(--orange); color: #000; border: none; border-radius: var(--radius); padding: 8px 16px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
.filter-btn:hover { opacity: .85; }

/* KPIカード */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 640px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 700; color: var(--text); }
.kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
.kpi-value.orange { color: var(--orange); }
.kpi-value.green  { color: var(--success); }
.kpi-value.red    { color: var(--error); }

/* グラフグリッド */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 640px) { .chart-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.chart-card.full { grid-column: 1 / -1; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
.chart-wrap { position: relative; height: 220px; }

/* テーブル */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.table-title { font-size: 13px; font-weight: 700; color: var(--muted); padding: 14px 16px; border-bottom: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; color: var(--muted); font-weight: 600; }
td { padding: 10px 14px; border-top: 1px solid var(--border); }
tr:hover td { background: var(--surface2); }

.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.badge-equipment { background: #1e2a4a; color: #93c5fd; }
.badge-mold      { background: #2a1a3a; color: #c4b5fd; }
.badge-approved  { background: #1a3a1a; color: #4ade80; }
.badge-rejected  { background: #2a1a1a; color: #f87171; }
.badge-pending   { background: #2a2000; color: #fbbf24; }

.loading { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub">ダッシュボード</div>
  </div>
  <div class="header-right">
    <span class="user-info" id="header-user"></span>
    <button class="back-btn" onclick="goBack()">← 戻る</button>
  </div>
</header>

<main class="main">

  <!-- フィルター -->
  <div class="filter-bar">
    <span class="filter-label">期間</span>
    <input class="filter-input" type="date" id="filter-from">
    <span class="filter-label">〜</span>
    <input class="filter-input" type="date" id="filter-to">
    <select class="filter-select" id="filter-type">
      <option value="">全種別</option>
      <option value="equipment">設備</option>
      <option value="mold">金型</option>
    </select>
    <select class="filter-select" id="filter-line">
      <option value="">全ライン</option>
    </select>
    <button class="filter-btn" onclick="loadData()">表示</button>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">総件数</div>
      <div class="kpi-value orange" id="kpi-total">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">承認済み</div>
      <div class="kpi-value green" id="kpi-approved">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">承認待ち</div>
      <div class="kpi-value" id="kpi-pending">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">平均停止時間</div>
      <div class="kpi-value" id="kpi-avg-stop">-</div>
      <div class="kpi-sub">分</div>
    </div>
  </div>

  <!-- グラフ -->
  <div class="chart-grid">
    <div class="chart-card">
      <div class="chart-title">📅 日別件数</div>
      <div class="chart-wrap"><canvas id="chart-daily"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🏷️ 分類別件数</div>
      <div class="chart-wrap"><canvas id="chart-category"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">🏭 ライン別件数</div>
      <div class="chart-wrap"><canvas id="chart-line"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">⚙️ 設備 vs 🔧 金型</div>
      <div class="chart-wrap"><canvas id="chart-type"></canvas></div>
    </div>
  </div>

  <!-- 直近トラブル一覧 -->
  <div class="table-wrap">
    <div class="table-title">直近トラブル一覧</div>
    <div id="trouble-table-wrap">
      <div class="loading"><span class="spinner"></span>読込中...</div>
    </div>
  </div>

</main>

<script>
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path) {
  var res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  document.getElementById('header-user').textContent = session.name;

  // デフォルト期間: 過去30日
  var to   = new Date();
  var from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('filter-from').value = fmt(from);
  document.getElementById('filter-to').value   = fmt(to);
})();

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function goBack() {
  var dest = session.role === 'sl' ? 'home_sl.html' : 'home.html';
  location.href = dest;
}

var allLines = [], allCategories = [], allUsers = [];
var chartInstances = {};

async function loadMasters() {
  var results = await Promise.all([
    sbFetch('lines?select=id,name&order=name.asc'),
    sbFetch('categories?select=id,name,type&order=type.asc,sort_order.asc'),
    sbFetch('traq_users?select=id,name')
  ]);
  allLines      = results[0] || [];
  allCategories = results[1] || [];
  allUsers      = results[2] || [];

  var lineFilter = document.getElementById('filter-line');
  lineFilter.innerHTML = '<option value="">全ライン</option>' +
    allLines.map(function(l) { return '<option value="' + l.id + '">' + l.name + '</option>'; }).join('');
}

async function loadData() {
  var from   = document.getElementById('filter-from').value;
  var to     = document.getElementById('filter-to').value;
  var type   = document.getElementById('filter-type').value;
  var lineId = document.getElementById('filter-line').value;

  var query = 'troubles?select=*&order=occurred_date.desc';
  if (from) query += '&occurred_date=gte.' + from;
  if (to)   query += '&occurred_date=lte.' + to;
  if (type) query += '&trouble_type=eq.' + type;
  if (lineId) query += '&line_id=eq.' + lineId;

  document.getElementById('trouble-table-wrap').innerHTML =
    '<div class="loading"><span class="spinner"></span>読込中...</div>';

  try {
    var rows = await sbFetch(query) || [];
    updateKPI(rows);
    updateCharts(rows);
    updateTable(rows);
  } catch(e) {
    document.getElementById('trouble-table-wrap').innerHTML =
      '<div class="loading" style="color:var(--error);">読込失敗: ' + e.message + '</div>';
  }
}

function updateKPI(rows) {
  var total    = rows.length;
  var approved = rows.filter(function(r) { return r.status === 'approved'; }).length;
  var pending  = rows.filter(function(r) { return r.status === 'pending'; }).length;
  var stops    = rows.filter(function(r) { return r.stop_minutes != null; });
  var avgStop  = stops.length ? Math.round(stops.reduce(function(s,r) { return s + r.stop_minutes; }, 0) / stops.length) : 0;

  document.getElementById('kpi-total').textContent    = total;
  document.getElementById('kpi-approved').textContent = approved;
  document.getElementById('kpi-pending').textContent  = pending;
  document.getElementById('kpi-avg-stop').textContent = avgStop;
}

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

var CHART_COLORS = ['#EF9F27','#60a5fa','#4ade80','#f87171','#c4b5fd','#fbbf24','#34d399','#fb923c'];

function updateCharts(rows) {
  // 日別
  destroyChart('daily');
  var byDate = {};
  rows.forEach(function(r) { byDate[r.occurred_date] = (byDate[r.occurred_date] || 0) + 1; });
  var dates = Object.keys(byDate).sort();
  chartInstances['daily'] = new Chart(document.getElementById('chart-daily'), {
    type: 'bar',
    data: {
      labels: dates,
      datasets: [{ label: '件数', data: dates.map(function(d) { return byDate[d]; }), backgroundColor: '#EF9F27', borderRadius: 4 }]
    },
    options: chartOpts()
  });

  // 分類別
  destroyChart('category');
  var byCat = {};
  rows.forEach(function(r) {
    var cat = allCategories.find(function(c) { return c.id === r.category_id; });
    var name = cat ? cat.name : '未分類';
    byCat[name] = (byCat[name] || 0) + 1;
  });
  var catKeys = Object.keys(byCat);
  chartInstances['category'] = new Chart(document.getElementById('chart-category'), {
    type: 'doughnut',
    data: {
      labels: catKeys,
      datasets: [{ data: catKeys.map(function(k) { return byCat[k]; }), backgroundColor: CHART_COLORS, borderWidth: 0 }]
    },
    options: doughnutOpts()
  });

  // ライン別
  destroyChart('line');
  var byLine = {};
  rows.forEach(function(r) {
    var line = allLines.find(function(l) { return l.id === r.line_id; });
    var name = line ? line.name : '不明';
    byLine[name] = (byLine[name] || 0) + 1;
  });
  var lineKeys = Object.keys(byLine);
  chartInstances['line'] = new Chart(document.getElementById('chart-line'), {
    type: 'bar',
    data: {
      labels: lineKeys,
      datasets: [{ label: '件数', data: lineKeys.map(function(k) { return byLine[k]; }), backgroundColor: '#60a5fa', borderRadius: 4 }]
    },
    options: chartOpts()
  });

  // 種別
  destroyChart('type');
  var eqCount   = rows.filter(function(r) { return r.trouble_type === 'equipment'; }).length;
  var moldCount = rows.filter(function(r) { return r.trouble_type === 'mold'; }).length;
  chartInstances['type'] = new Chart(document.getElementById('chart-type'), {
    type: 'doughnut',
    data: {
      labels: ['設備', '金型'],
      datasets: [{ data: [eqCount, moldCount], backgroundColor: ['#93c5fd','#c4b5fd'], borderWidth: 0 }]
    },
    options: doughnutOpts()
  });
}

function chartOpts() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' } },
      y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e293b' }, beginAtZero: true }
    }
  };
}

function doughnutOpts() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } }
    }
  };
}

function updateTable(rows) {
  var wrap = document.getElementById('trouble-table-wrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="loading" style="color:var(--muted);">データがありません</div>';
    return;
  }
  var STATUS_BADGE = { pending: 'badge-pending', approved: 'badge-approved', rejected: 'badge-rejected' };
  var STATUS_LABEL = { pending: '承認待ち', approved: '承認済み', rejected: '差戻し' };
  wrap.innerHTML = '<table><thead><tr>' +
    '<th>日付</th><th>直</th><th>種別</th><th>ライン</th><th>機番</th><th>報告者</th><th>停止(分)</th><th>状態</th>' +
    '</tr></thead><tbody>' +
    rows.slice(0, 50).map(function(r) {
      var line    = allLines.find(function(l) { return l.id === r.line_id; });
      var user    = allUsers.find(function(u) { return u.id === r.reporter_id; });
      var typeBadge = r.trouble_type === 'equipment'
        ? '<span class="badge badge-equipment">設備</span>'
        : '<span class="badge badge-mold">金型</span>';
      var statusBadge = '<span class="badge ' + (STATUS_BADGE[r.status]||'') + '">' + (STATUS_LABEL[r.status]||r.status) + '</span>';
      return '<tr>' +
        '<td>' + (r.occurred_date||'-') + '</td>' +
        '<td>' + r.shift + '直</td>' +
        '<td>' + typeBadge + '</td>' +
        '<td>' + (line ? line.name : '-') + '</td>' +
        '<td>' + (r.machine_id || '-') + '</td>' +
        '<td>' + (user ? user.name : '-') + '</td>' +
        '<td>' + (r.stop_minutes != null ? r.stop_minutes : '-') + '</td>' +
        '<td>' + statusBadge + '</td>' +
        '</tr>';
    }).join('') +
    '</tbody></table>';
}

// 初期化
loadMasters().then(function() { loadData(); });
</script>
</body>
</html>
