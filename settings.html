<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – 設定</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.back-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.back-btn:hover { border-color: var(--orange); color: var(--text); }

.main { flex: 1; padding: 24px 16px; max-width: 480px; margin: 0 auto; width: 100%; }

.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* PIN変更 */
.pin-step { display: none; }
.pin-step.active { display: block; }
.pin-label { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); background: transparent; }
.pin-dot.filled { background: var(--orange); border-color: var(--orange); }
.pin-dot.error  { background: var(--error); border-color: var(--error); }
.pin-dot.success { background: var(--success); border-color: var(--success); }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pin-key { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; font-size: 18px; font-weight: 700; color: var(--text); cursor: pointer; text-align: center; user-select: none; font-family: inherit; }
.pin-key:active { background: var(--border); }
.pin-key.cancel { font-size: 12px; font-weight: 500; color: var(--muted); }
.pin-error { text-align: center; font-size: 12px; color: var(--error); margin-bottom: 8px; min-height: 18px; }
.pin-success { text-align: center; font-size: 13px; color: var(--success); padding: 16px; }

/* 情報行 */
.info-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); }
.info-value { font-weight: 500; }

.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap; }
.toast.success { border-color: var(--success); }
.toast.error   { border-color: var(--error); }
.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub">設定</div>
  </div>
  <div class="header-right">
    <span class="user-info" id="header-user"></span>
    <button class="back-btn" onclick="goBack()">← 戻る</button>
  </div>
</header>

<main class="main">

  <!-- アカウント情報 -->
  <div class="section">
    <div class="section-title">👤 アカウント情報</div>
    <div class="info-row"><span class="info-label">名前</span><span class="info-value" id="info-name">-</span></div>
    <div class="info-row"><span class="info-label">ロール</span><span class="info-value" id="info-role">-</span></div>
    <div class="info-row"><span class="info-label">シフト</span><span class="info-value" id="info-shift">-</span></div>
  </div>

  <!-- PIN変更 -->
  <div class="section">
    <div class="section-title">🔑 PIN変更</div>

    <!-- Step1: 現在のPIN -->
    <div class="pin-step active" id="pin-step1">
      <div class="pin-label">現在のPINを入力してください</div>
      <div class="pin-dots">
        <div class="pin-dot" id="c0"></div>
        <div class="pin-dot" id="c1"></div>
        <div class="pin-dot" id="c2"></div>
        <div class="pin-dot" id="c3"></div>
      </div>
      <div class="pin-error" id="current-error"></div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinKey('current','1')">1</button>
        <button class="pin-key" onclick="pinKey('current','2')">2</button>
        <button class="pin-key" onclick="pinKey('current','3')">3</button>
        <button class="pin-key" onclick="pinKey('current','4')">4</button>
        <button class="pin-key" onclick="pinKey('current','5')">5</button>
        <button class="pin-key" onclick="pinKey('current','6')">6</button>
        <button class="pin-key" onclick="pinKey('current','7')">7</button>
        <button class="pin-key" onclick="pinKey('current','8')">8</button>
        <button class="pin-key" onclick="pinKey('current','9')">9</button>
        <button class="pin-key cancel" onclick="pinDel('current')">⌫</button>
        <button class="pin-key" onclick="pinKey('current','0')">0</button>
        <button class="pin-key cancel" onclick="resetPinFlow()">取消</button>
      </div>
    </div>

    <!-- Step2: 新しいPIN -->
    <div class="pin-step" id="pin-step2">
      <div class="pin-label">新しいPINを入力してください</div>
      <div class="pin-dots">
        <div class="pin-dot" id="n0"></div>
        <div class="pin-dot" id="n1"></div>
        <div class="pin-dot" id="n2"></div>
        <div class="pin-dot" id="n3"></div>
      </div>
      <div class="pin-error" id="new-error"></div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinKey('new','1')">1</button>
        <button class="pin-key" onclick="pinKey('new','2')">2</button>
        <button class="pin-key" onclick="pinKey('new','3')">3</button>
        <button class="pin-key" onclick="pinKey('new','4')">4</button>
        <button class="pin-key" onclick="pinKey('new','5')">5</button>
        <button class="pin-key" onclick="pinKey('new','6')">6</button>
        <button class="pin-key" onclick="pinKey('new','7')">7</button>
        <button class="pin-key" onclick="pinKey('new','8')">8</button>
        <button class="pin-key" onclick="pinKey('new','9')">9</button>
        <button class="pin-key cancel" onclick="pinDel('new')">⌫</button>
        <button class="pin-key" onclick="pinKey('new','0')">0</button>
        <button class="pin-key cancel" onclick="resetPinFlow()">取消</button>
      </div>
    </div>

    <!-- Step3: 確認入力 -->
    <div class="pin-step" id="pin-step3">
      <div class="pin-label">新しいPINをもう一度入力してください</div>
      <div class="pin-dots">
        <div class="pin-dot" id="r0"></div>
        <div class="pin-dot" id="r1"></div>
        <div class="pin-dot" id="r2"></div>
        <div class="pin-dot" id="r3"></div>
      </div>
      <div class="pin-error" id="repeat-error"></div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinKey('repeat','1')">1</button>
        <button class="pin-key" onclick="pinKey('repeat','2')">2</button>
        <button class="pin-key" onclick="pinKey('repeat','3')">3</button>
        <button class="pin-key" onclick="pinKey('repeat','4')">4</button>
        <button class="pin-key" onclick="pinKey('repeat','5')">5</button>
        <button class="pin-key" onclick="pinKey('repeat','6')">6</button>
        <button class="pin-key" onclick="pinKey('repeat','7')">7</button>
        <button class="pin-key" onclick="pinKey('repeat','8')">8</button>
        <button class="pin-key" onclick="pinKey('repeat','9')">9</button>
        <button class="pin-key cancel" onclick="pinDel('repeat')">⌫</button>
        <button class="pin-key" onclick="pinKey('repeat','0')">0</button>
        <button class="pin-key cancel" onclick="resetPinFlow()">取消</button>
      </div>
    </div>

    <!-- 完了 -->
    <div class="pin-step" id="pin-step4">
      <div class="pin-success">✅ PINを変更しました</div>
      <div style="text-align:center;margin-top:8px;">
        <button onclick="resetPinFlow()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 20px;cursor:pointer;font-family:inherit;font-size:13px;">もう一度変更する</button>
      </div>
    </div>
  </div>

</main>

<div class="toast hidden" id="toast"></div>

<script>
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path, method, body) {
  var opts = { method: method || 'GET', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

var session = null;
var currentUserPin = '';

(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  document.getElementById('header-user').textContent = session.name;

  var roleLabel = { op: 'OP（作業者）', sl: 'SL（シフトリーダー）', admin: 'Admin（管理者）' };
  document.getElementById('info-name').textContent  = session.name;
  document.getElementById('info-role').textContent  = roleLabel[session.role] || session.role;
  document.getElementById('info-shift').textContent = session.shift + '直';

  // 現在のPINをDBから取得
  sbFetch('traq_users?id=eq.' + session.userId + '&select=pin')
    .then(function(rows) { if (rows && rows[0]) currentUserPin = rows[0].pin; })
    .catch(function() {});
})();

function goBack() {
  var dest = session.role === 'sl' ? 'home_sl.html' : 'home.html';
  location.href = dest;
}

// PIN入力状態
var pinState = { current: '', new: '', repeat: '' };
var prefixMap = { current: 'c', new: 'n', repeat: 'r' };
var errorMap  = { current: 'current-error', new: 'new-error', repeat: 'repeat-error' };

function pinKey(type, k) {
  if (pinState[type].length >= 4) return;
  pinState[type] += k;
  renderDots(type);
  document.getElementById(errorMap[type]).textContent = '';
  if (pinState[type].length === 4) setTimeout(function() { onPinComplete(type); }, 80);
}

function pinDel(type) {
  pinState[type] = pinState[type].slice(0, -1);
  renderDots(type);
  document.getElementById(errorMap[type]).textContent = '';
}

function renderDots(type, mode) {
  var prefix = prefixMap[type];
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById(prefix + i);
    dot.className = 'pin-dot' + (i < pinState[type].length ? (mode === 'error' ? ' error' : ' filled') : '');
  }
}

function onPinComplete(type) {
  if (type === 'current') {
    if (pinState.current === currentUserPin) {
      showStep(2);
    } else {
      renderDots('current', 'error');
      document.getElementById('current-error').textContent = 'PINが違います';
      setTimeout(function() { pinState.current = ''; renderDots('current'); }, 800);
    }
  } else if (type === 'new') {
    showStep(3);
  } else if (type === 'repeat') {
    if (pinState.new === pinState.repeat) {
      saveNewPin();
    } else {
      renderDots('repeat', 'error');
      document.getElementById('repeat-error').textContent = 'PINが一致しません';
      setTimeout(function() { pinState.repeat = ''; renderDots('repeat'); }, 800);
    }
  }
}

function showStep(n) {
  [1,2,3,4].forEach(function(i) {
    document.getElementById('pin-step' + i).classList.toggle('active', i === n);
  });
}

function resetPinFlow() {
  pinState = { current: '', new: '', repeat: '' };
  ['current','new','repeat'].forEach(function(t) { renderDots(t); document.getElementById(errorMap[t]).textContent = ''; });
  showStep(1);
}

async function saveNewPin() {
  try {
    await sbFetch('traq_users?id=eq.' + session.userId, 'PATCH', { pin: pinState.new });
    currentUserPin = pinState.new;
    showStep(4);
    showToast('PINを変更しました', 'success');
  } catch(e) {
    document.getElementById('repeat-error').textContent = '保存失敗: ' + e.message;
    pinState.repeat = '';
    renderDots('repeat');
  }
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}
</script>
</body>
</html>
