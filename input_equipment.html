<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
  --orange:  #EF9F27;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  12px;
}

/* ライト/ダーク自動切替 */
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --nav-h:56px;
  --factory:#1e293b; --roof:#334155;
}
[data-theme="light"] {
  --bg:      #e8e6e2;
  --factory:#c8c4bc; --roof:#b0aca4;
  --surface: #ffffff;
  --surface2:#f0ede8;
  --border:  rgba(0,0,0,0.18);
  --text:    #1a1f2e;
  --muted:   #666666;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }


.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 52px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 8px; }
.topbar-right { display: flex; align-items: center; gap: 6px; }
.chip-role-op   .chip-role-op   .chip-role-sl   .chip-role-sl   .chip-role-admin .chip-role-admin [data-theme="light"] .chip-role-op   [data-theme="light"] .chip-role-op   [data-theme="light"] .chip-role-sl   [data-theme="light"] .chip-role-sl   [data-theme="light"] .chip-role-admin [data-theme="light"] .chip-role-admin .icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: var(--muted); transition: all .15s; }
.icon-btn:hover { border-color: var(--orange); color: var(--orange); }

/* ===== Page Title Bar ===== */
.page-title-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.page-back-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; color: var(--muted); transition: all .15s;
}
.page-back-btn:hover { border-color: var(--orange); color: var(--orange); }
.page-title-text { font-size: 15px; font-weight: 700; }

/* ===== Bottom Nav ===== */
.bottom-nav {
  display: flex; height: var(--nav-h); background: var(--surface);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; background: none; border: none; color: var(--muted);
  font-family: inherit; font-size: 10px; cursor: pointer; transition: color .15s;
  -webkit-tap-highlight-color: transparent;
}
.bnav-item:hover { color: var(--text); }
.bnav-icon { font-size: 18px; line-height: 1; }
.bnav-label { font-weight: 500; }
@media(min-width:768px){ .bottom-nav { display: none; } }

/* メイン */
.main { flex: 1; padding: 20px 16px; max-width: 600px; margin: 0 auto; width: 100%; }

/* セクション */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.section-title { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; letter-spacing: .04em; }

/* フォーム */
.form-group { margin-bottom: 18px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.form-label .required { color: var(--error); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 16px; color: var(--text);
  font-family: inherit; font-size: 16px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--orange); background: var(--surface); }
.form-select option { background: var(--surface); }
.form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
.form-input:disabled, .form-select:disabled { opacity: .4; cursor: not-allowed; }

/* 2カラム */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* 初発/再発ボタン */
.occurrence-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.occurrence-btn {
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 16px; text-align: center; cursor: pointer; font-family: inherit;
  font-size: 16px; font-weight: 600; color: var(--muted); transition: all .15s;
}
.occurrence-btn.selected { border-color: var(--orange); color: var(--orange); background: rgba(239,159,39,.1); }

/* 画像アップロード */
.image-area {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 28px; text-align: center; cursor: pointer; transition: border-color .15s;
  background: var(--surface2);
}
.image-area:hover { border-color: var(--orange); }
.image-area-text { font-size: 15px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.image-area-sub  { font-size: 12px; color: var(--muted); opacity: .7; }
.image-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.image-preview { position: relative; width: 88px; height: 88px; }
.image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1.5px solid var(--border); }
.image-preview .del-btn {
  position: absolute; top: -6px; right: -6px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--error); color: #fff; border: none;
  font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* 送信ボタン */
.submit-area { padding: 16px 0; }
.submit-btn {
  width: 100%; padding: 18px; background: var(--orange); color: #000;
  border: none; border-radius: var(--radius); font-family: inherit;
  font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: .04em;
}
.submit-btn:active { opacity: .85; transform: scale(.99); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }

/* 下書きバー */
.draft-bar {
  position: relative;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--muted); z-index: 10;
}
.draft-status { display: flex; align-items: center; gap: 6px; }
.draft-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.draft-dot.saved { background: var(--success); }

/* トースト */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 24px; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.15); white-space: nowrap; font-weight: 500; }
.toast.success { border-color: var(--success); }
.toast.error   { border-color: var(--error); }
.hidden { display: none !important; }

/* ローディング overlay */
.overlay { position: fixed; inset: 0; background: rgba(8,13,24,.8); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 14px; color: #94a3b8; }

  /* ドラムロール */
  .drum-wrap { position:relative; overflow:hidden; height:180px; border-radius:var(--radius); background:var(--bg); }
  .drum-selector { position:absolute; top:50%; left:0; right:0; height:40px; margin-top:-20px; border-top:2px solid var(--orange); border-bottom:2px solid var(--orange); pointer-events:none; z-index:2; }
  .drum-fade-top { position:absolute; top:0; left:0; right:0; height:70px; background:linear-gradient(to bottom,var(--bg),transparent); z-index:1; pointer-events:none; }
  .drum-fade-bot { position:absolute; bottom:0; left:0; right:0; height:70px; background:linear-gradient(to top,var(--bg),transparent); z-index:1; pointer-events:none; }
  .drum-list { position:absolute; left:0; right:0; top:70px; cursor:grab; user-select:none; }
  .drum-item { height:40px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:var(--text); }
  .drum-label { font-size:11px; color:var(--muted); text-align:center; margin-top:4px; }
  .stop-result { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:10px 16px; text-align:center; margin-top:8px; font-size:15px; font-weight:500; min-height:42px; }

/* ===== Topbar (new F-style) ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mini-logo svg{display:block}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}

</style>
</head>
<body>

<header class="topbar">
      <div class="topbar-left">
        <svg class="mini-logo" width="26" height="26" viewBox="0 0 56 56" fill="none">
          <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>

          <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
          <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
          <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
          <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
          <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>

<div class="page-title-bar">

</div>

<main class="main">

  <!-- 基本情報 -->
  <div class="section">
    <div class="section-title">⚙️ 基本情報</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">発生日<span class="required">*</span></label>

      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ライン<span class="required">*</span></label>

        <option value="">選択してください</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">機番<span class="required">*</span></label>
      <select class="form-select" id="machine-select" onchange="onMachineChange()" disabled>

      </select>
    </div>
    <div class="form-group">
      <label class="form-label">品番<span class="required">*</span></label>
      <select class="form-select" id="product-select" disabled>
        <option value="">機番を先に選択</option>
      </select>
    </div>
  </div>

  <!-- トラブル詳細 -->
  <div class="section">
    <div class="section-title">📋 トラブル詳細</div>
    <div class="form-group">
      <label class="form-label">分類<span class="required">*</span></label>
      <select class="form-select" id="category-select">
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">初発 / 再発<span class="required">*</span></label>
      <div class="occurrence-group">
        <button class="occurrence-btn" id="btn-first" onclick="selectOccurrence('first')">初発</button>
        <button class="occurrence-btn" id="btn-repeat" onclick="selectOccurrence('recurrence')">再発</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">停止時間<span class="required">*</span>（開始）/ 終了は不明な場合は空白でOK</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <div class="drum-label" style="margin-bottom:6px;">開始時刻（必須）</div>

            <div class="drum-wrap"><div class="drum-selector"></div><div class="drum-fade-top"></div><div class="drum-fade-bot"></div><div class="drum-list" id="dSH"></div></div>
            <div class="drum-wrap"><div class="drum-selector"></div><div class="drum-fade-top"></div><div class="drum-fade-bot"></div><div class="drum-list" id="dSM"></div></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><div class="drum-label">時</div><div class="drum-label">分</div></div>
        </div>
        <div>
          <div class="drum-label" style="margin-bottom:6px;">終了時刻（任意）</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
            <div class="drum-wrap"><div class="drum-selector"></div><div class="drum-fade-top"></div><div class="drum-fade-bot"></div><div class="drum-list" id="dEH"></div></div>
            <div class="drum-wrap"><div class="drum-selector"></div><div class="drum-fade-top"></div><div class="drum-fade-bot"></div><div class="drum-list" id="dEM"></div></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><div class="drum-label">時</div><div class="drum-label">分</div></div>

      <div class="stop-result" id="stop-result">開始時刻を設定してください</div>

    <div class="form-group">
      <label class="form-label">詳細内容<span class="required">*</span></label>
      <textarea class="form-textarea" id="detail" placeholder="トラブルの内容を入力してください"></textarea>
    </div>
  </div>

  <!-- 画像 -->
  <div class="section">
    <div class="section-title">📷 写真</div>
    <div class="image-area" onclick="document.getElementById('image-input').click()">

    </div>
    <div class="image-previews" id="image-previews"></div>
  </div>

  <!-- 送信 -->
  <div class="submit-area">
    <button class="submit-btn" id="submit-btn" onclick="doSubmit()">送信する</button>
  </div>


</main>

(function(){

  var pref=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',saved||pref);
})();
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── セッション確認 ────────────────────────────────────────
var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  document.getElementById('shift-display').value = session.shift + '直';
  setDefaultDate();
  initChip();
})();

function goBack() { history.back(); }
// ── ヘッダーチップ初期化 ──
function initChip(){
  var s;
  try{s=JSON.parse(localStorage.getItem('traq_session')||'{}');}catch(e){s={};}
  var name=s.name||'';
  var role=s.role||'worker';
  var initial=name?name.charAt(0):'?';
  var classMap={worker:'role-op',leader:'role-sl',admin:'role-admin'};
  var topbar=document.querySelector('.topbar');

var machineProducts = []; // machine_productsテーブル

    var results = await Promise.all([

// ── ライン変更→機番絞り込み ───────────────────────────────
function onLineChange() {
  var lineId = parseInt(document.getElementById('line-select').value);
  var machSel = document.getElementById('machine-select');
  var prodSel = document.getElementById('product-select');

  machSel.innerHTML = '<option value="">選択してください</option>';
  prodSel.innerHTML = '<option value="">機番を先に選択</option>';
  prodSel.disabled = true;

  if (!lineId) { machSel.disabled = true; return; }

  var filtered = allMachines.filter(function(m) { return m.line_id === lineId; });
  filtered.sort(function(a, b) {
    var na = parseInt(a.machine_no); var nb = parseInt(b.machine_no);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.machine_no.localeCompare(b.machine_no);
  });
  machSel.innerHTML = '<option value="">選択してください</option>' +
    filtered.map(function(m) { return '<option value="' + m.id + '">' + m.machine_no + '</option>'; }).join('');
  machSel.disabled = false;
  saveDraft();
}

// ── 機番変更→品番絞り込み ────────────────────────────────
function onMachineChange() {
  var machineId = parseInt(document.getElementById('machine-select').value);
  var prodSel = document.getElementById('product-select');

  prodSel.innerHTML = '<option value="">選択してください</option>';

  if (!machineId) { prodSel.disabled = true; return; }

  // machine_productsから紐づく品番を取得
  var linkedProductIds = machineProducts
    .filter(function(mp) { return mp.machine_id === machineId; })
    .map(function(mp) { return mp.product_id; });

  var filtered = linkedProductIds.length > 0
    ? allProducts.filter(function(p) { return linkedProductIds.includes(p.id); })
    : allProducts; // 紐づけなしの場合は全品番

  prodSel.innerHTML = '<option value="">選択してください</option>' +
    filtered.map(function(p) { return '<option value="' + p.id + '">' + p.product_code + '(' + p.product_name + ')</option>'; }).join('');
  prodSel.disabled = false;
  saveDraft();
}

// ── ドラムロール ─────────────────────────────────────────
var ITEM_H = 40;
var drumState = { sh:0, sm:0, eh:-1, em:-1 }; // -1 = 未設定
var endTimeSet = false;

var drumDefs = [
  { id:'dSH', items:Array.from({length:24},function(_,i){return String(i).padStart(2,'0');}), key:'sh' },
  { id:'dSM', items:Array.from({length:12},function(_,i){return String(i*5).padStart(2,'0');}), key:'sm' },
  { id:'dEH', items:Array.from({length:24},function(_,i){return String(i).padStart(2,'0');}), key:'eh' },
  { id:'dEM', items:Array.from({length:12},function(_,i){return String(i*5).padStart(2,'0');}), key:'em' }
];

function initDrums() {
  var now = new Date();
  var sh = now.getHours();
  var sm = Math.floor(now.getMinutes() / 5);
  drumState.sh = sh;
  drumState.sm = sm;

  drumDefs.forEach(function(d) {
    var el = document.getElementById(d.id);
    el.innerHTML = '';
    d.items.forEach(function(label) {
      var div = document.createElement('div');
      div.className = 'drum-item';
      div.textContent = label;
      el.appendChild(div);
    });
    var idx = (d.key === 'sh') ? sh : (d.key === 'sm') ? sm : 0;
    setDrumPos(d.id, idx, false);
    initDrumDrag(d);
  });
  updateStopResult();
}

function setDrumPos(id, idx, animate) {
  var el = document.getElementById(id);
  var top = 70 - idx * ITEM_H;
  el.style.transition = animate ? 'top 0.2s ease' : 'none';
  el.style.top = top + 'px';
}

function snapDrum(d) {
  var el = document.getElementById(d.id);
  var top = parseInt(el.style.top) || 70;
  var maxIdx = d.items.length - 1;
  var idx = Math.round((70 - top) / ITEM_H);
  idx = Math.max(0, Math.min(maxIdx, idx));
  if (d.key === 'eh' || d.key === 'em') endTimeSet = true;
  drumState[d.key] = idx;
  setDrumPos(d.id, idx, true);
  updateStopResult();
  saveDraft();
}

function clearEndTime() {
  endTimeSet = false;
  drumState.eh = -1;
  drumState.em = -1;
  setDrumPos('dEH', 0, true);
  setDrumPos('dEM', 0, true);
  updateStopResult();
}

function updateStopResult() {
  var sh = drumState.sh, sm = drumState.sm * 5;
  var startStr = String(sh).padStart(2,'0') + ':' + String(sm).padStart(2,'0');
  var result = document.getElementById('stop-result');

  if (!endTimeSet || drumState.eh < 0) {
    result.textContent = '開始: ' + startStr + ' ／ 終了: 未定（承認者が入力）';
    document.getElementById('stop-minutes').value = '';
  } else {
    var eh = drumState.eh, em = drumState.em * 5;
    var endStr = String(eh).padStart(2,'0') + ':' + String(em).padStart(2,'0');
    var startMins = sh * 60 + sm;
    var endMins   = eh * 60 + em;
    if (endMins < startMins) endMins += 1440;
    var diff = endMins - startMins;
    result.textContent = startStr + ' → ' + endStr + '　' + diff + '分';
    document.getElementById('stop-minutes').value = diff;
  }
}

function initDrumDrag(d) {
  var el = document.getElementById(d.id);
  var startY = 0, startTop = 0, dragging = false;
  function onStart(e) {
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startTop = parseInt(el.style.top) || 70;
    el.style.transition = 'none';
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    var y = e.touches ? e.touches[0].clientY : e.clientY;
    var newTop = startTop + (y - startY);
    var minTop = 70 - (d.items.length - 1) * ITEM_H;
    newTop = Math.max(minTop - 20, Math.min(90, newTop));
    el.style.top = newTop + 'px';
    e.preventDefault();
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    snapDrum(d);
  }
  el.addEventListener('mousedown', onStart);
  el.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

// ── 画像 ──────────────────────────────────────────────────
var selectedImages = []; // { file, dataUrl }

function onImageSelect(event) {
  var files = Array.from(event.target.files);
  files.forEach(function(file) {
    if (file.size > 200 * 1024) {
      // 200KB超は圧縮
      compressImage(file, function(compressed) {
        addImage(compressed);
      });
    } else {
      addImage(file);
    }
  });
  event.target.value = '';
}

function compressImage(file, callback) {
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var scale = Math.min(1, Math.sqrt((200 * 1024) / file.size));
    canvas.width  = img.width  * scale;
    canvas.height = img.height * scale;
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(function(blob) {
      URL.revokeObjectURL(url);
      callback(new File([blob], file.name, { type: 'image/jpeg' }));
    }, 'image/jpeg', 0.8);
  };
  img.src = url;
}

function addImage(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    selectedImages.push({ file: file, dataUrl: e.target.result });
    renderPreviews();
  };
  reader.readAsDataURL(file);
}

function renderPreviews() {
  var wrap = document.getElementById('image-previews');
  wrap.innerHTML = selectedImages.map(function(img, i) {
    return '<div class="image-preview">' +
      '<img src="' + img.dataUrl + '">' +
      '<button class="del-btn" onclick="removeImage(' + i + ')">×</button>' +
      '</div>';
  }).join('');
}

function removeImage(i) {
  selectedImages.splice(i, 1);
  renderPreviews();
}

// ── 下書き保存（30秒ごと + 変更時）─────────────────────────
var draftTimer = null;
function saveDraft() {
  if (draftTimer) clearTimeout(draftTimer);
  draftTimer = setTimeout(function() { _saveDraft(); }, 1000);
}

async function _saveDraft() {
  if (!session) return;
  var data = getDraftData();
  try {
    await sbFetch('drafts?user_id=eq.' + session.userId + '&trouble_type=eq.equipment', 'DELETE');
    await sbFetch('drafts', 'POST', {
      user_id: session.userId, trouble_type: 'equipment', data: data
    });
    document.getElementById('draft-dot').className = 'draft-dot saved';
    document.getElementById('draft-status-text').textContent = '下書き保存済み（' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) + '）';
  } catch(e) {
    console.warn('下書き保存失敗:', e);
  }
}

function getDraftData() {
  return {
    occurred_date:  document.getElementById('occurred-date').value,
    line_id:        document.getElementById('line-select').value,
    machine_id:     document.getElementById('machine-select').value,
    product_id:     document.getElementById('product-select').value,
    category_id:    document.getElementById('category-select').value,
    occurrence:     selectedOccurrence,
    stop_start_h:   drumState ? drumState.sh : 0,
    stop_start_m:   drumState ? drumState.sm : 0,
    stop_minutes:   document.getElementById('stop-minutes').value,
    detail:         document.getElementById('detail').value
  };
}

async function loadDraft() {
  try {
    var rows = await sbFetch('drafts?user_id=eq.' + session.userId + '&trouble_type=eq.equipment&select=data');
    if (!rows || !rows.length) { showToast('下書きがありません', ''); return; }
    var d = rows[0].data;
    if (d.occurred_date) document.getElementById('occurred-date').value = d.occurred_date;
    if (d.line_id) {
      document.getElementById('line-select').value = d.line_id;
      onLineChange();
    }
    if (d.machine_id) {
      document.getElementById('machine-select').value = d.machine_id;
      onMachineChange();
    }
    if (d.product_id)  document.getElementById('product-select').value  = d.product_id;
    if (d.category_id) document.getElementById('category-select').value = d.category_id;
    if (d.occurrence)  selectOccurrence(d.occurrence);
    if (d.stop_minutes) document.getElementById('stop-minutes').value = d.stop_minutes;
    if (d.detail)      document.getElementById('detail').value = d.detail;
    showToast('下書きを読み込みました', 'success');
  } catch(e) {
    showToast('下書き読込失敗: ' + e.message, 'error');
  }
}

// 30秒ごとに自動保存
setInterval(function() { _saveDraft(); }, 30000);

// フォーム変更時に保存
['occurred-date','line-select','machine-select','product-select','category-select','stop-minutes','detail'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('change', saveDraft);
});

// ── バリデーション ────────────────────────────────────────
function validate() {
  if (!document.getElementById('occurred-date').value) { showToast('発生日を入力してください', 'error'); return false; }
  if (!document.getElementById('line-select').value)    { showToast('ラインを選択してください', 'error'); return false; }
  if (!document.getElementById('machine-select').value) { showToast('機番を選択してください', 'error'); return false; }
  if (!document.getElementById('product-select').value) { showToast('品番を選択してください', 'error'); return false; }
  if (!document.getElementById('category-select').value){ showToast('分類を選択してください', 'error'); return false; }
  if (!selectedOccurrence)                              { showToast('初発/再発を選択してください', 'error'); return false; }
  if (!document.getElementById('detail').value.trim())  { showToast('詳細内容を入力してください', 'error'); return false; }
  return true;
}

// ── 送信 ──────────────────────────────────────────────────
async function doSubmit() {
  if (!validate()) return;

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showOverlay('送信中...');

  try {
    // 1. troublesテーブルにINSERT
    var troubleData = {
      trouble_type:  'equipment',
      status:        'pending',
      occurred_date: document.getElementById('occurred-date').value,
      shift:         session.shift,
      line_id:       parseInt(document.getElementById('line-select').value) || null,
      machine_id:    parseInt(document.getElementById('machine-select').value) || null,
      product_id:    parseInt(document.getElementById('product-select').value) || null,
      category_id:   parseInt(document.getElementById('category-select').value) || null,
      occurrence:    selectedOccurrence,
      stop_start:    (function(){ var sh=drumState.sh,sm=drumState.sm*5; return String(sh).padStart(2,'0')+':'+String(sm).padStart(2,'0')+':00'; })(),
      stop_end:      endTimeSet && drumState.eh >= 0 ? (function(){ var eh=drumState.eh,em=drumState.em*5; return String(eh).padStart(2,'0')+':'+String(em).padStart(2,'0')+':00'; })() : null,
      stop_minutes:  (function(){ var v=document.getElementById('stop-minutes').value; return v ? parseInt(v) : null; })(),
      detail:        document.getElementById('detail').value.trim() || null,
      reporter_id:   session.userId
    };

    var result = await sbFetch('troubles', 'POST', troubleData);
    var troubleId = result[0].id;

    // 2. 画像アップロード
    if (selectedImages.length > 0) {
      showOverlay('画像をアップロード中...');
      for (var i = 0; i < selectedImages.length; i++) {
        var img = selectedImages[i];
        var dateStr = troubleData.occurred_date.replace(/-/g, '');
        // 機番テキストを取得
        var machSel = document.getElementById('machine-select');
        var machText = machSel.options[machSel.selectedIndex] ? machSel.options[machSel.selectedIndex].text : 'XX';
        // 品番テキストを取得
        var prodSel = document.getElementById('product-select');
        var prodText = prodSel.options[prodSel.selectedIndex] ? prodSel.options[prodSel.selectedIndex].text.split('(')[0].trim() : 'unknown';
        var fileName = dateStr + '_' + session.shift + '直_機番' + machText + '_' + prodText + '_' + (i + 1) + '.jpg';
        var storagePath = 'troubles/' + troubleId + '/' + fileName;

        // Supabase StorageへアップロードTroubles バケット必要
        var uploadRes = await fetch(SB_URL + '/storage/v1/object/trouble-images/' + storagePath, {
          method: 'POST',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': img.file.type },
          body: img.file
        });
        if (uploadRes.ok) {
          await sbFetch('trouble_images', 'POST', { trouble_id: troubleId, storage_path: storagePath });
        }
      }
    }

    // 3. 下書き削除
    await sbFetch('drafts?user_id=eq.' + session.userId + '&trouble_type=eq.equipment', 'DELETE');

    hideOverlay();
    showToast('送信しました', 'success');
    setTimeout(function() { location.href = 'home.html'; }, 1200);

  } catch(e) {
    hideOverlay();
    btn.disabled = false;
    showToast('送信失敗: ' + e.message, 'error');
  }
}

// ── UI共通 ────────────────────────────────────────────────
function showOverlay(text) {
  document.getElementById('overlay-text').textContent = text;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}

// ── 初期化 ────────────────────────────────────────────────
loadMasters();
initDrums();

function toggleTheme() {
  var h = document.documentElement;
  var isDark = h.getAttribute('data-theme') === 'dark';
  var next = isDark ? 'light' : 'dark';
  h.setAttribute('data-theme', next);
  localStorage.setItem('traq_theme', next);
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = next === 'dark' ? '🌙' : '☀️';
}
