<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

/* ヘッダー */
.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.back-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.back-btn:hover { border-color: var(--orange); color: var(--text); }

/* メイン */
.main { flex: 1; padding: 24px 16px; max-width: 640px; margin: 0 auto; width: 100%; }

/* セクション */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

/* フォーム */
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
.form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.form-label .required { color: var(--error); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px; color: var(--text);
  font-family: inherit; font-size: 14px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--orange); }
.form-select option { background: var(--surface); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-input:disabled, .form-select:disabled { opacity: .5; cursor: not-allowed; }

/* 2カラム */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* 初発/再発ボタン */
.occurrence-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.occurrence-btn {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; text-align: center; cursor: pointer; font-family: inherit;
  font-size: 14px; font-weight: 500; color: var(--muted); transition: all .15s;
}
.occurrence-btn.selected { border-color: var(--orange); color: var(--orange); background: rgba(239,159,39,.08); }

/* 画像アップロード */
.image-area {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 20px; text-align: center; cursor: pointer; transition: border-color .15s;
}
.image-area:hover { border-color: var(--orange); }
.image-area-text { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.image-area-sub  { font-size: 11px; color: var(--muted); }
.image-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.image-preview { position: relative; width: 80px; height: 80px; }
.image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
.image-preview .del-btn {
  position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--error); color: #fff; border: none;
  font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}

/* 送信ボタン */
.submit-area { padding: 16px 0; }
.submit-btn {
  width: 100%; padding: 16px; background: var(--orange); color: #000;
  border: none; border-radius: var(--radius); font-family: inherit;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .15s;
}
.submit-btn:hover { opacity: .85; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }

/* 下書きバー */
.draft-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--muted); z-index: 10;
}
.draft-status { display: flex; align-items: center; gap: 6px; }
.draft-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.draft-dot.saved { background: var(--success); }

/* トースト */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,.4); white-space: nowrap; }
.toast.success { border-color: var(--success); }
.toast.error   { border-color: var(--error); }
.hidden { display: none !important; }

/* ローディング overlay */
.overlay { position: fixed; inset: 0; background: rgba(8,13,24,.8); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay-text { font-size: 14px; color: var(--muted); }
</style>
</head>

<!-- 下書きバー -->

<script>
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── セッション確認 ────────────────────────────────────────
var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  document.getElementById('header-user').textContent = session.name + ' (' + session.shift + '直)';
  document.getElementById('shift-display').value = session.shift + '直';
  setDefaultDate();
})();

function goBack() { history.back(); }

// ── 発生日のデフォルト設定（3直は前日）────────────────────
function setDefaultDate() {
  var now = new Date();
  if (session.shift === 3) {
    now.setDate(now.getDate() - 1);
  }
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var d = String(now.getDate()).padStart(2, '0');
  document.getElementById('occurred-date').value = y + '-' + m + '-' + d;
}

// ── マスタデータ ──────────────────────────────────────────
var allLines = [], allMachines = [], allProducts = [], allCategories = [];
var machineProducts = []; // machine_productsテーブル

async function loadMasters() {
  try {
    var results = await Promise.all([
      sbFetch('lines?is_active=eq.true&order=name.asc&select=*'),
      sbFetch('machines?is_active=eq.true&order=machine_no.asc&select=*'),
      sbFetch('products?is_active=eq.true&order=product_code.asc&select=*'),
      sbFetch('categories?is_active=eq.true&type=eq.equipment&order=sort_order.asc&select=*'),
      sbFetch('machine_products?select=*')
    ]);
    allLines      = results[0] || [];
    allMachines   = results[1] || [];
    allProducts   = results[2] || [];
    allCategories = results[3] || [];
    machineProducts = results[4] || [];

    // ライン選択肢
    var lineSelect = document.getElementById('line-select');
    lineSelect.innerHTML = '<option value="">選択してください</option>' +
      allLines.map(function(l) { return '<option value="' + l.id + '">' + l.name + '</option>'; }).join('');

    // 分類選択肢
    var catSelect = document.getElementById('category-select');
    catSelect.innerHTML = '<option value="">選択してください</option>' +
      allCategories.map(function(c) { return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('');

  } catch(e) {
    showToast('マスタ読込失敗: ' + e.message, 'error');
  }
}

// ── ライン変更→機番絞り込み ───────────────────────────────
function onLineChange() {
  var lineId = parseInt(document.getElementById('line-select').value);
  var machSel = document.getElementById('machine-select');
  var prodSel = document.getElementById('product-select');

  machSel.innerHTML = '<option value="">選択してください</option>';
  prodSel.innerHTML = '<option value="">機番を先に選択</option>';
  prodSel.disabled = true;

  if (!lineId) { machSel.disabled = true; return; }

  var filtered = allMachines.filter(function(m) { return m.line_id === lineId; });
  filtered.sort(function(a, b) {
    var na = parseInt(a.machine_no); var nb = parseInt(b.machine_no);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return a.machine_no.localeCompare(b.machine_no);
  });
  machSel.innerHTML = '<option value="">選択してください</option>' +
    filtered.map(function(m) { return '<option value="' + m.id + '">' + m.machine_no + '</option>'; }).join('');
  machSel.disabled = false;
  saveDraft();
}

// ── 機番変更→品番絞り込み ────────────────────────────────
function onMachineChange() {
  var machineId = parseInt(document.getElementById('machine-select').value);
  var prodSel = document.getElementById('product-select');

  prodSel.innerHTML = '<option value="">選択してください</option>';

  if (!machineId) { prodSel.disabled = true; return; }

  // machine_productsから紐づく品番を取得
  var linkedProductIds = machineProducts
    .filter(function(mp) { return mp.machine_id === machineId; })
    .map(function(mp) { return mp.product_id; });

  var filtered = linkedProductIds.length > 0
    ? allProducts.filter(function(p) { return linkedProductIds.includes(p.id); })
    : allProducts; // 紐づけなしの場合は全品番

  prodSel.innerHTML = '<option value="">選択してください</option>' +
    filtered.map(function(p) { return '<option value="' + p.id + '">' + p.product_code + '(' + p.product_name + ')</option>'; }).join('');
  prodSel.disabled = false;
  saveDraft();
}

// ── 初発/再発 ─────────────────────────────────────────────
var selectedOccurrence = null;
function selectOccurrence(val) {
  selectedOccurrence = val;
  document.getElementById('btn-first').classList.toggle('selected', val === 'first');
  document.getElementById('btn-repeat').classList.toggle('selected', val === 'repeat');
  saveDraft();
}

// ── 画像 ──────────────────────────────────────────────────
var selectedImages = []; // { file, dataUrl }

function onImageSelect(event) {
  var files = Array.from(event.target.files);
  files.forEach(function(file) {
    if (file.size > 200 * 1024) {
      // 200KB超は圧縮
      compressImage(file, function(compressed) {
        addImage(compressed);
      });
    } else {
      addImage(file);
    }
  });
  event.target.value = '';
}

function compressImage(file, callback) {
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var scale = Math.min(1, Math.sqrt((200 * 1024) / file.size));
    canvas.width  = img.width  * scale;
    canvas.height = img.height * scale;
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(function(blob) {
      URL.revokeObjectURL(url);
      callback(new File([blob], file.name, { type: 'image/jpeg' }));
    }, 'image/jpeg', 0.8);
  };
  img.src = url;
}

function addImage(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    selectedImages.push({ file: file, dataUrl: e.target.result });
    renderPreviews();
  };
  reader.readAsDataURL(file);
}

function renderPreviews() {
  var wrap = document.getElementById('image-previews');
  wrap.innerHTML = selectedImages.map(function(img, i) {
    return '<div class="image-preview">' +
      '<img src="' + img.dataUrl + '">' +
      '<button class="del-btn" onclick="removeImage(' + i + ')">×</button>' +
      '</div>';
  }).join('');
}

function removeImage(i) {
  selectedImages.splice(i, 1);
  renderPreviews();
}

// ── 下書き保存（30秒ごと + 変更時）─────────────────────────
var draftTimer = null;
function saveDraft() {
  if (draftTimer) clearTimeout(draftTimer);
  draftTimer = setTimeout(function() { _saveDraft(); }, 1000);
}

async function _saveDraft() {
  if (!session) return;
  var data = getDraftData();
  try {
    await sbFetch('drafts?user_id=eq.' + session.userId + '&trouble_type=eq.equipment', 'DELETE');
    await sbFetch('drafts', 'POST', {
      user_id: session.userId, trouble_type: 'equipment', data: data
    });
    document.getElementById('draft-dot').className = 'draft-dot saved';
    document.getElementById('draft-status-text').textContent = '下書き保存済み（' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) + '）';
  } catch(e) {
    console.warn('下書き保存失敗:', e);
  }
}

function getDraftData() {
  return {
    occurred_date:  document.getElementById('occurred-date').value,
    line_id:        document.getElementById('line-select').value,
    machine_id:     document.getElementById('machine-select').value,
    product_id:     document.getElementById('product-select').value,
    category_id:    document.getElementById('category-select').value,
    occurrence:     selectedOccurrence,
    stop_minutes:   document.getElementById('stop-minutes').value,
    detail:         document.getElementById('detail').value
  };
}

async function loadDraft() {
  try {
    var rows = await sbFetch('drafts?user_id=eq.' + session.userId + '&trouble_type=eq.equipment&select=data');
    if (!rows || !rows.length) { showToast('下書きがありません', ''); return; }
    var d = rows[0].data;
    if (d.occurred_date) document.getElementById('occurred-date').value = d.occurred_date;
    if (d.line_id) {
      document.getElementById('line-select').value = d.line_id;
      onLineChange();
    }
    if (d.machine_id) {
      document.getElementById('machine-select').value = d.machine_id;
      onMachineChange();
    }
    if (d.product_id)  document.getElementById('product-select').value  = d.product_id;
    if (d.category_id) document.getElementById('category-select').value = d.category_id;
    if (d.occurrence)  selectOccurrence(d.occurrence);
    if (d.stop_minutes) document.getElementById('stop-minutes').value = d.stop_minutes;
    if (d.detail)      document.getElementById('detail').value = d.detail;
    showToast('下書きを読み込みました', 'success');
  } catch(e) {
    showToast('下書き読込失敗: ' + e.message, 'error');
  }
}

// 30秒ごとに自動保存
setInterval(function() { _saveDraft(); }, 30000);

// フォーム変更時に保存
['occurred-date','line-select','machine-select','product-select','category-select','stop-minutes','detail'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('change', saveDraft);
});

// ── バリデーション ────────────────────────────────────────
function validate() {
  if (!document.getElementById('occurred-date').value) { showToast('発生日を入力してください', 'error'); return false; }
  if (!document.getElementById('line-select').value)    { showToast('ラインを選択してください', 'error'); return false; }
  if (!document.getElementById('machine-select').value) { showToast('機番を選択してください', 'error'); return false; }
  if (!document.getElementById('category-select').value){ showToast('分類を選択してください', 'error'); return false; }
  if (!selectedOccurrence)                              { showToast('初発/再発を選択してください', 'error'); return false; }
  return true;
}

// ── 送信 ──────────────────────────────────────────────────
async function doSubmit() {
  if (!validate()) return;

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showOverlay('送信中...');

  try {
    // 1. troublesテーブルにINSERT
    var troubleData = {
      trouble_type:  'equipment',
      status:        'pending',
      occurred_date: document.getElementById('occurred-date').value,
      shift:         session.shift,
      line_id:       parseInt(document.getElementById('line-select').value) || null,
      machine_id:    parseInt(document.getElementById('machine-select').value) || null,
      product_id:    parseInt(document.getElementById('product-select').value) || null,
      category_id:   parseInt(document.getElementById('category-select').value) || null,
      occurrence:    selectedOccurrence,
      stop_minutes:  parseInt(document.getElementById('stop-minutes').value) || null,
      detail:        document.getElementById('detail').value.trim() || null,
      reporter_id:   session.userId
    };

    var result = await sbFetch('troubles', 'POST', troubleData);
    var troubleId = result[0].id;

    // 2. 画像アップロード
    if (selectedImages.length > 0) {
      showOverlay('画像をアップロード中...');
      for (var i = 0; i < selectedImages.length; i++) {
        var img = selectedImages[i];
        var dateStr = troubleData.occurred_date.replace(/-/g, '');
        var fileName = dateStr + '_' + session.shift + 'shift_' + troubleId + '_' + (i + 1) + '.jpg';
        var storagePath = 'troubles/' + troubleId + '/' + fileName;

        // Supabase StorageへアップロードTroubles バケット必要
        var uploadRes = await fetch(SB_URL + '/storage/v1/object/trouble-images/' + storagePath, {
          method: 'POST',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': img.file.type },
          body: img.file
        });
        if (uploadRes.ok) {
          await sbFetch('trouble_images', 'POST', { trouble_id: troubleId, storage_path: storagePath });
        }
      }
    }

    // 3. 下書き削除
    await sbFetch('drafts?user_id=eq.' + session.userId + '&trouble_type=eq.equipment', 'DELETE');

    hideOverlay();
    showToast('送信しました', 'success');
    setTimeout(function() { location.href = 'home.html'; }, 1200);

  } catch(e) {
    hideOverlay();
    btn.disabled = false;
    showToast('送信失敗: ' + e.message, 'error');
  }
}

// ── UI共通 ────────────────────────────────────────────────
function showOverlay(text) {
  document.getElementById('overlay-text').textContent = text;
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hidden'); }, 3000);
}

// ── 初期化 ────────────────────────────────────────────────
loadMasters();
</script>
