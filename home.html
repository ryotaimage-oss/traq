<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Traq">
<title>Traq – ホーム</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080d18;
  --surface: #111827;
  --surface2:#16213a;
  --border:  #1e293b;
  --orange:  #EF9F27;
  --text:    #f1f5f9;
  --muted:   #64748b;
  --error:   #ef4444;
  --success: #22c55e;
  --radius:  8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

.header { background: #080d18; padding: 12px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: var(--orange); }
.logo-sub  { font-size: 10px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-info { font-size: 12px; color: var(--muted); }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 12px; }
.logout-btn:hover { border-color: var(--orange); color: var(--text); }

.main { flex: 1; padding: 24px 16px; max-width: 800px; margin: 0 auto; width: 100%; }

/* 入力ボタン */
.input-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.input-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 16px; cursor: pointer; text-align: center; transition: border-color .15s;
  font-family: inherit; color: var(--text);
}
.input-btn:hover { border-color: var(--orange); }
.input-btn-icon { font-size: 28px; margin-bottom: 8px; }
.input-btn-label { font-size: 14px; font-weight: 700; }
.input-btn-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* 管理者リンク */
.admin-link { margin-bottom: 24px; }
.admin-btn {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; cursor: pointer; text-align: left; font-family: inherit; color: var(--text);
  display: flex; align-items: center; gap: 10px; font-size: 13px;
}
.admin-btn:hover { border-color: var(--orange); }

/* セクションタイトル */
.section-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

/* トラブルカード */
.trouble-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.trouble-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; transition: border-color .15s;
}
.trouble-card:hover { border-color: var(--orange); }
.trouble-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.trouble-card-body { font-size: 12px; color: var(--muted); }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.badge-equipment { background: #1e2a4a; color: #93c5fd; }
.badge-mold      { background: #2a1a3a; color: #c4b5fd; }
.badge-pending   { background: #2a2000; color: #fbbf24; }
.badge-approved  { background: #1a3a1a; color: #4ade80; }
.badge-rejected  { background: #2a1a1a; color: #f87171; }
.badge-draft     { background: #1e293b; color: #94a3b8; }
.trouble-date { font-size: 12px; color: var(--muted); margin-left: auto; }

.empty { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
    <rect width="36" height="36" rx="6" fill="#080d18"/>
    <rect x="4" y="20" width="28" height="12" rx="1" fill="#2e3a52"/>
    <rect x="6" y="14" width="6" height="8" fill="#2e3a52"/>
    <rect x="16" y="12" width="6" height="10" fill="#2e3a52"/>
    <rect x="26" y="16" width="4" height="6" fill="#2e3a52"/>
    <rect x="8" y="8" width="2" height="8" rx="1" fill="#2e3a52"/>
    <rect x="18" y="6" width="2" height="8" rx="1" fill="#2e3a52"/>
    <circle cx="9" cy="6" r="2" fill="#EF9F27" opacity=".8"/>
    <circle cx="19" cy="4" r="2" fill="#EF9F27" opacity=".8"/>
  </svg>
  <div>
    <div class="logo-text">Traq</div>
    <div class="logo-sub" id="header-sub">ホーム</div>
  </div>
  <div class="header-right">
    <span class="user-info" id="header-user"></span>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</header>

<main class="main">

  <!-- 入力ボタン -->
  <div class="input-btns">
    <button class="input-btn" onclick="location.href='input_equipment.html'">
      <div class="input-btn-icon">⚙️</div>
      <div class="input-btn-label">設備トラブル</div>
      <div class="input-btn-sub">入力する</div>
    </button>
    <button class="input-btn" onclick="location.href='input_mold.html'">
      <div class="input-btn-icon">🔧</div>
      <div class="input-btn-label">金型トラブル</div>
      <div class="input-btn-sub">入力する</div>
    </button>
  </div>

  <!-- サブメニュー -->
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
    <button class="admin-btn" onclick="location.href='dashboard.html'" style="flex:1;"><span>📊</span> ダッシュボード</button>
    <button class="admin-btn" onclick="location.href='excel_download.html'" style="flex:1;"><span>📥</span> Excelダウンロード</button>
  </div>

  <!-- 管理者メニュー（adminのみ表示） -->
  <div class="admin-link hidden" id="admin-link">
    <button class="admin-btn" onclick="location.href='admin.html'">
      <span>⚙</span> 管理者画面
    </button>
  </div>

  <!-- 自分の投稿一覧 -->
  <div class="section-title">
    <span>📋 自分のトラブル報告</span>
  </div>
  <div id="my-troubles">
    <div class="loading"><span class="spinner"></span>読込中...</div>
  </div>

</main>

<script>
var SB_URL = 'https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';

async function sbFetch(path) {
  var res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

var session = null;
(function() {
  var s = localStorage.getItem('traq_session');
  if (!s) { location.href = 'index.html'; return; }
  session = JSON.parse(s);
  if (Date.now() > session.expiresAt) { location.href = 'index.html'; return; }
  document.getElementById('header-user').textContent = session.name + ' (' + session.shift + '直)';
  document.getElementById('header-sub').textContent  = session.shift + '直 ホーム';
  if (session.role === 'admin') {
    document.getElementById('admin-link').classList.remove('hidden');
  }
})();

function logout() {
  localStorage.removeItem('traq_session');
  location.href = 'index.html';
}

var STATUS_LABEL = { pending: '承認待ち', approved: '承認済み', rejected: '差戻し', draft: '下書き' };
var STATUS_BADGE = { pending: 'badge-pending', approved: 'badge-approved', rejected: 'badge-rejected', draft: 'badge-draft' };

async function loadMyTroubles() {
  var wrap = document.getElementById('my-troubles');
  try {
    var rows = await sbFetch(
      'troubles?reporter_id=eq.' + session.userId +
      '&order=created_at.desc&limit=20' +
      '&select=id,trouble_type,status,occurred_date,shift,detail,created_at'
    );
    if (!rows || !rows.length) {
      wrap.innerHTML = '<div class="empty">トラブル報告はありません</div>';
      return;
    }
    wrap.innerHTML = '<div class="trouble-list">' +
      rows.map(function(t) {
        var typeBadge = t.trouble_type === 'equipment' ? '<span class="badge badge-equipment">設備</span>' : '<span class="badge badge-mold">金型</span>';
        var statusBadge = '<span class="badge ' + (STATUS_BADGE[t.status] || '') + '">' + (STATUS_LABEL[t.status] || t.status) + '</span>';
        var date = t.occurred_date || t.created_at.slice(0,10);
        var detail = t.detail ? (t.detail.length > 30 ? t.detail.slice(0,30) + '…' : t.detail) : '詳細なし';
        return '<div class="trouble-card">' +
          '<div class="trouble-card-header">' + typeBadge + statusBadge +
          '<span class="trouble-date">' + date + ' ' + t.shift + '直</span></div>' +
          '<div class="trouble-card-body">' + detail + '</div>' +
          '</div>';
      }).join('') +
    '</div>';
  } catch(e) {
    wrap.innerHTML = '<div class="empty" style="color:var(--error);">読込失敗: ' + e.message + '</div>';
  }
}

if (session) loadMyTroubles();
</script>
</body>
</html>
