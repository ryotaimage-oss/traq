<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --factory:     #2e3a52;
  --roof:        #3d4e6e;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       56px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg1);
  color: var(--text1);
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}
.app { height: 100%; display: flex; flex-direction: column; }
.main-column { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.sidebar { display: none; }
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}
.lang-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 6px;
  font-family: inherit; font-size: 11px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all .15s;
}
.lang-btn.active, .lang-btn:hover { border-color: var(--orange); color: var(--orange); }
.scroll-area { flex: 1; overflow-y: auto; padding: 16px 16px 16px; }
.date-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; animation: fadeIn .3s ease both; }
.date-text { font-size: 13px; color: var(--text2); }
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; animation: slideUp .3s .05s ease both; }
.action-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer; display: flex; flex-direction: row; align-items: center; gap: 10px; transition: all .15s; position: relative; overflow: hidden; }
.action-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; background: var(--orange); transform: scaleX(0); transition: transform .2s ease; transform-origin: left; }
.action-card:hover, .action-card:active { border-color: var(--orange); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(239,159,39,.15); }
.action-card:hover::before, .action-card:active::before { transform: scaleX(1); }
.action-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(239,159,39,.12); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.action-label { font-size: 13px; font-weight: 700; color: var(--text1); line-height: 1.3; white-space: nowrap; }
.action-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--orange); opacity: .6; }
.draft-banner { background: rgba(239,159,39,.08); border: 1px solid rgba(239,159,39,.25); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; cursor: pointer; transition: all .15s; animation: slideUp .3s .1s ease both; }
.draft-banner:hover { background: rgba(239,159,39,.13); }
.draft-banner-left { display: flex; align-items: center; gap: 8px; }
.draft-count { background: var(--orange); color: var(--navy); border-radius: 10px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
.draft-label { font-size: 13px; font-weight: 500; }
.draft-banner-right { font-size: 12px; color: var(--orange); }
.tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:0;padding:11px 4px;text-align:center;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.tab-item.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle}
.tl-filter-area{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.tl-filter-row{display:flex;gap:7px;align-items:center}
.tl-flabel{font-size:11px;color:var(--text2);white-space:nowrap;min-width:30px}
.tl-datebox{flex:1;padding:5px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text1);font-family:inherit}
.tl-datesep{font-size:11px;color:var(--text2)}
.tl-linesel{flex:1;padding:5px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text1);font-family:inherit;-webkit-appearance:none}
.tl-cnt{text-align:right;font-size:11px;color:var(--text2);padding:5px 14px 2px;flex-shrink:0}
.tl-list{display:flex;flex-direction:column;padding:10px 14px}
.tl-sep{display:flex;align-items:center;gap:8px;margin:8px 0 7px}
.tl-sep-line{flex:1;height:1px;background:var(--border)}
.tl-sep-label{font-size:11px;color:var(--text2);white-space:nowrap;font-weight:500}
.tl-item{display:flex;gap:9px;margin-bottom:10px}
.tl-col{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.tl-dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-dot.pending{background:var(--warning)}
.tl-dot.approved{background:var(--success)}
.tl-dot.rejected{background:var(--danger)}
.tl-dot.draft{background:#4b5563}
.tl-vl{width:1px;flex:1;background:var(--border);margin-top:3px}
.tl-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
.tl-card:hover{border-color:rgba(239,159,39,.3)}
.tl-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tl-machine{font-size:14px;font-weight:700;color:var(--text1)}
.tl-time{font-size:11px;color:var(--text2)}
.tl-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tl-pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.tl-pill.eq{background:rgba(59,130,246,.15);color:#60a5fa}
.tl-pill.md{background:rgba(168,85,247,.15);color:#c084fc}
.tl-pill.pending{background:rgba(245,158,11,.15);color:var(--warning)}
.tl-pill.approved{background:rgba(16,185,129,.12);color:var(--success)}
.tl-pill.rejected{background:rgba(239,68,68,.12);color:var(--danger)}
.tl-pill.draft{background:rgba(139,144,160,.12);color:var(--text2)}
.tl-product{font-size:11px;color:var(--text2);margin-bottom:4px}
.tl-detail{font-size:12px;color:var(--text1);line-height:1.4;margin-bottom:5px}
.tl-footer{display:flex;justify-content:space-between;align-items:center;padding-top:5px;border-top:1px solid var(--border)}
.tl-who{font-size:11px;color:var(--text2)}
.filter-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.ftab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ftab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}
.trouble-list { display: flex; flex-direction: column; gap: 8px; }
.tcard { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all .15s; animation: slideUp .25s ease both; }
.tcard:hover { border-color: rgba(239,159,39,.3); }
.tcard-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.tcard-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tcard-type { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.tcard-type.eq { background: rgba(59,130,246,.15); color: #60a5fa; }
.tcard-type.md { background: rgba(168,85,247,.15); color: #c084fc; }
.status-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.status-draft    { background: rgba(139,144,160,.12); color: var(--text2); }
.status-pending  { background: rgba(245,158,11,.15);  color: var(--warning); }
.status-approved { background: rgba(16,185,129,.12);  color: var(--success); }
.status-rejected { background: rgba(239,68,68,.12);   color: var(--danger); }
.tcard-date { font-size: 11px; color: var(--text2); }
.tcard-body { margin-bottom: 8px; }
.tcard-machine { font-size: 15px; font-weight: 700; color: var(--text1); margin-bottom: 2px; }
.tcard-product { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.tcard-category { display: inline-block; font-size: 11px; font-weight: 500; background: var(--bg3); border-radius: 4px; padding: 2px 7px; color: var(--text2); margin-bottom: 4px; }
.tcard-detail { font-size: 13px; color: var(--text1); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tcard-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); }
.tcard-submitter { font-size: 11px; color: var(--text2); }
.tcard-stop { font-size: 11px; color: var(--text2); }
.draft-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.da-btn { flex: 1; height: 36px; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .12s; border: none; display: flex; align-items: center; justify-content: center; gap: 4px; }
.da-edit  { background: var(--bg3); color: var(--text1); border: 1px solid var(--border); }
.da-del   { background: rgba(239,68,68,.1); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
.da-send  { background: var(--orange); color: var(--navy); }
.da-resubmit { background: var(--orange); color: var(--navy); flex: 1; }
.da-btn:hover { opacity: .85; transform: scale(.98); }
.reject-reason { margin-top: 8px; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: var(--danger); }
.reject-reason strong { display: block; margin-bottom: 2px; font-size: 11px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }
.bottom-nav{display:flex;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text2);font-family:inherit;font-size:10px;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;padding:0}
.nav-item.active{color:var(--orange)}
.nav-item:hover:not(.active){color:var(--text1)}
.nav-icon{font-size:18px;line-height:1}
.nav-label{font-weight:500}
@media (min-width: 768px) {
  .bottom-nav { display: none; }
  .app { flex-direction: row; }
  .sidebar { display: flex; width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); flex-direction: column; padding: 0; overflow-y: auto; }
  .sidebar-logo { padding: 18px 20px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-user { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sidebar-name { font-size: 13px; font-weight: 700; }
  .sidebar-role { font-size: 11px; color: var(--text2); }
  .sidebar-nav { flex: 1; padding: 12px 8px; }
  .snav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all .15s; font-size: 13px; font-weight: 500; color: var(--text2); border: none; background: none; font-family: inherit; width: 100%; text-align: left; }
  .snav-item:hover { background: var(--bg3); color: var(--text1); }
  .snav-item.active { background: rgba(239,159,39,.12); color: var(--orange); font-weight: 700; }
  .snav-icon { font-size: 18px; width: 24px; text-align: center; }
  .snav-disabled{opacity:.3;pointer-events:none;cursor:not-allowed}
  .snav-lock{margin-left:auto;font-size:10px;opacity:.6}
  .sidebar-bottom { padding: 12px 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
  .role-admin .sidebar-avatar{background:rgba(239,68,68,0.25);color:#f87171}
  .role-sl .sidebar-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
  .role-op .sidebar-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
  [data-theme="light"] .role-admin .sidebar-avatar{background:rgba(239,68,68,0.15);color:#c53030}
  [data-theme="light"] .role-sl .sidebar-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
  [data-theme="light"] .role-op .sidebar-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
  .topbar { display: none; }
  .main-column { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .scroll-area { padding-bottom: 24px; }
}
@media (min-width: 1025px) {
  .sidebar { width: 240px; }
  .action-grid { grid-template-columns: repeat(2, 1fr); }
}
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: flex-end; justify-content: center; z-index: 200; animation: fadeIn .15s ease; }
.modal-overlay.center { align-items: center; }
.modal-sheet { background: var(--bg2); border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; animation: slideUp .2s ease; }
.modal-overlay.center .modal-sheet { border-radius: 12px; margin: 20px; max-height: 80vh; }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.modal-close-btn { width: 100%; height: 48px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; margin-top: 12px; transition: all .15s; }
.modal-close-btn:hover { color: var(--text1); }
.detail-row { display: flex; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.detail-row:last-child { border-bottom: none; margin-bottom: 0; }
.detail-key { font-size: 11px; font-weight: 500; color: var(--text2); width: 80px; flex-shrink: 0; padding-top: 2px; }
.detail-val { font-size: 13px; color: var(--text1); flex: 1; word-break: break-all; }
.detail-images{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.detail-images-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.detail-img-grid{display:flex;flex-wrap:wrap;gap:8px}
.detail-img-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.detail-img-thumb:hover{opacity:.8}
.detail-img-loading{font-size:12px;color:var(--text2)}
.img-fullscreen{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-fullscreen img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:4px}
.confirm-msg { font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
.confirm-btns { display: flex; gap: 8px; }
.btn-danger { flex: 1; height: 48px; background: var(--danger); border: none; border-radius: 8px; color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
.btn-cancel { flex: 1; height: 48px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text1); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; }
.toast { position: fixed; top: 64px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow); z-index: 300; animation: fadeIn .2s ease; white-space: nowrap; }
.toast.success { background: rgba(16,185,129,.15); border-color: rgba(16,185,129,.3); color: var(--success); }
.toast.error   { background: rgba(239,68,68,.12);  border-color: rgba(239,68,68,.3);  color: var(--danger); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="100" height="32" viewBox="0 0 200 56" fill="none">
        <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
        <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
        <rect x="9" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
        <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="42" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".4"/>
        <rect x="8" y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
        <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
        <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>

async function sbFetch(path, method='GET', body=null) {
  const opts = { method, headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const SESSION = (() => {
  try {
    const s = localStorage.getItem('traq_session');
    if (!s) return null;
    const o = JSON.parse(s);

    return o;
  } catch(e) { return null; }
})();

function getRoleClass(role) {
  if (role === 'admin') return 'role-admin';
  if (role === 'leader' || role === 'sl') return 'role-sl';
  return 'role-op';
}
function getRoleLabel(role) {
  if (role === 'admin') return t('role_adm');
  if (role === 'leader' || role === 'sl') return t('role_sl');
  return t('role_op');
}

function renderUserInfo() {
  const u = SESSION;
  if (!u) return;
  const initial = (u.name || '?')[0];
  const roleLabel = getRoleLabel(u.role);
  const roleClass = getRoleClass(u.role);
  var topbar = document.querySelector('.topbar');
  if(topbar){topbar.classList.remove('role-op','role-sl','role-admin');topbar.classList.add(roleClass);}
  var mobAv = document.getElementById('mob-avatar');
  if(mobAv) mobAv.textContent = initial;
  const sbWrap = document.getElementById('sb-user-wrap');
  if (sbWrap) sbWrap.className = 'sidebar-user ' + roleClass;
  document.getElementById('sb-avatar').textContent = initial;
  document.getElementById('sb-name').textContent = u.name;
  document.getElementById('sb-role').textContent = roleLabel + ' / ' + t('shift_label', u.shift);
  const now = new Date();
  const displayDate = (u.shift === 3 && now.getHours() < 8) ? new Date(now.getTime() - 86400000) : now;
  const ymd = `${displayDate.getFullYear()}/${String(displayDate.getMonth()+1).padStart(2,'0')}/${String(displayDate.getDate()).padStart(2,'0')}`;
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateText').textContent = `${ymd}（${days[displayDate.getDay()]}）`;
}

  if (list.length === 0) {

    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>${emptyMsg}</div></div>`;
    return;
  }
  container.innerHTML = '';
  list.forEach((tr, idx) => { container.appendChild(buildCard(tr, idx)); });
}

function getFilteredList() {
  return TROUBLES.filter(tr => {
    const statusOk = mainTab==='draft'    ? tr.status==='draft' :
                     mainTab==='pending'  ? tr.status==='pending' :
                     mainTab==='approved' ? tr.status==='approved' :
                     mainTab==='rejected' ? tr.status==='rejected' :
                     tr.status !== 'draft';
    const typeOk = typeFilter==='all' ? true : typeFilter==='eq' ? tr.type==='equipment' : tr.type==='mold';
    return statusOk && typeOk;
  });
}

function buildCard(tr, idx) {
  const div = document.createElement('div');
  div.className = 'tcard';
  div.style.animationDelay = `${idx * 0.04}s`;
  const typeLabel   = tr.type === 'equipment' ? t('type_eq') : t('type_md');
  const typeClass   = tr.type === 'equipment' ? 'eq' : 'md';
  const statusLabel = t('status_'+tr.status);
  const occLabel    = tr.occurrence === 'first' ? t('occurrence_first') : t('occurrence_rec');
  const stopLabel   = tr.stop_minutes ? t('stop_min', tr.stop_minutes) : t('stop_none');
  const dateDisp    = (tr.date || '').replace(/-/g,'/') + ' ' + t('shift_label', tr.shift);
  let draftActionsHTML = '';
  if (tr.status === 'draft') {
    draftActionsHTML = `<div class="draft-actions">
      <button class="da-btn da-edit"  onclick="event.stopPropagation();editDraft('${tr.id}')">${t('da_edit')}</button>
      <button class="da-btn da-del"   onclick="event.stopPropagation();confirmDelete('${tr.id}')">${t('da_del')}</button>
      <button class="da-btn da-send"  onclick="event.stopPropagation();sendDraft('${tr.id}')">${t('da_send')}</button>
    </div>`;
  } else if (tr.status === 'rejected') {
    draftActionsHTML = `<div class="draft-actions">
      <button class="da-btn da-resubmit" onclick="event.stopPropagation();editRejected('${tr.id}')">${t('da_resubmit')}</button>
    </div>`;
  }
  let rejectHTML = '';
  if (tr.status === 'rejected' && tr.reject_reason) {
    rejectHTML = `<div class="reject-reason"><strong>${t('reject_label')}</strong>${tr.reject_reason}</div>`;
  }
  div.innerHTML = `
    <div class="tcard-header"><div class="tcard-meta">
      <span class="tcard-type ${typeClass}">${typeLabel}</span>
      <span class="status-badge status-${tr.status}">${statusLabel}</span>
      <span class="tcard-date">${dateDisp}</span>
    </div></div>
    <div class="tcard-body">
      <div class="tcard-machine">${tr.line} – ${tr.machine}号機</div>
      <div class="tcard-product">${tr.product_code} / ${tr.product_name}</div>
      <span class="tcard-category">${tr.category}</span>
      <div class="tcard-detail">${tr.detail}</div>
      ${rejectHTML}
    </div>
    <div class="tcard-footer">
      <span class="tcard-submitter">👤 ${tr.submitted_by}</span>
      <span class="tcard-stop">⏱ ${stopLabel} &nbsp; ${occLabel}</span>
    </div>
    ${draftActionsHTML}`;
  div.addEventListener('click', () => openDetail(tr));
  return div;
}

async function loadTimeline() {
  document.getElementById('timelineList').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>読み込み中...</div></div>';
  try {
    const rows = await sbFetch('troubles?select=*,lines(name),machines(machine_no),products(product_code,product_name),categories(name),traq_users!reporter_id(name)&order=created_at.desc&limit=100');
    TL_DATA = (rows || []).map(r => ({
      id: r.id, type: r.trouble_type, status: r.status,
      date: (r.occurred_date || '').slice(0,10),
      shift: r.shift ? String(r.shift) : '',
      line: r.lines ? r.lines.name : '',
      machine: r.machines ? r.machines.machine_no : '',

function buildLineOptions() {
  const sel = document.getElementById('tlLineSelect');
  const current = sel.value;
  const lines = [...new Set(TL_DATA.filter(r=>r.line).map(r=>r.line))].sort();
  sel.innerHTML = `<option value="">すべてのライン</option>`;
  lines.forEach(ln => {
    const opt = document.createElement('option');
    opt.value = ln; opt.textContent = ln;
    if(ln === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setDefaultDates() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const fmt = d => d.toISOString().slice(0,10);
  const fromEl = document.getElementById('tlDateFrom');
  const toEl = document.getElementById('tlDateTo');
  if(!fromEl.value) fromEl.value = fmt(monday);
  if(!toEl.value) toEl.value = fmt(now);
  fromEl.onchange = renderTimeline;
  toEl.onchange = renderTimeline;
}

function renderTimeline() {
  const from = document.getElementById('tlDateFrom').value;
  const to   = document.getElementById('tlDateTo').value;
  const line = document.getElementById('tlLineSelect').value;
  const filtered = TL_DATA.filter(r => {
    if(r.status === 'draft') return false;
    if(from && r.date < from) return false;
    if(to   && r.date > to)   return false;
    if(line && r.line !== line) return false;
    if(tlTypeFilter === 'eq' && r.type !== 'equipment') return false;
    if(tlTypeFilter === 'md' && r.type !== 'mold') return false;
    return true;
  });
  document.getElementById('tlCnt').textContent = TL_DATA.filter(r=>r.status!=='draft').length + '件中 ' + filtered.length + '件表示';
  if(filtered.length === 0) {
    document.getElementById('timelineList').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>該当する投稿はありません</div></div>';
    return;
  }
  const groups = {};
  filtered.forEach(r => { if(!groups[r.date]) groups[r.date]=[]; groups[r.date].push(r); });
  const container = document.getElementById('timelineList');
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'tl-list';
  const days = ['日','月','火','水','木','金','土'];
  Object.keys(groups).sort().reverse().forEach(date => {
    const sep = document.createElement('div');
    sep.className = 'tl-sep';
    const d = new Date(date + 'T00:00:00');
    sep.innerHTML = '<div class="tl-sep-line"></div><span class="tl-sep-label">' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + days[d.getDay()] + '）</span><div class="tl-sep-line"></div>';
    wrap.appendChild(sep);
    groups[date].forEach(r => {
      const typeLabel = r.type === 'equipment' ? t('type_eq') : t('type_md');
      const typeClass = r.type === 'equipment' ? 'eq' : 'md';
      const timeStr = r.submitted_at ? r.submitted_at.slice(11,16) : '';
      const item = document.createElement('div');
      item.className = 'tl-item';
      item.innerHTML =
        '<div class="tl-col"><div class="tl-dot ' + r.status + '"></div><div class="tl-vl"></div></div>' +
        '<div class="tl-card">' +
          '<div class="tl-card-head"><span class="tl-machine">' + r.line + ' — ' + r.machine + '号機</span><span class="tl-time">' + timeStr + '</span></div>' +
          '<div class="tl-pills"><span class="tl-pill ' + typeClass + '">' + typeLabel + '</span><span class="tl-pill ' + r.status + '">' + t('status_'+r.status) + '</span></div>' +
          (r.product_code ? '<div class="tl-product">' + r.product_code + (r.product_name ? ' / ' + r.product_name : '') + '</div>' : '') +
          '<div class="tl-detail">' + r.detail + '</div>' +
          '<div class="tl-footer"><span class="tl-who">👤 ' + r.submitted_by + '</span></div>' +
        '</div>';
      item.querySelector('.tl-card').addEventListener('click', () => openDetail(r));
      wrap.appendChild(item);
    });
  });
  container.appendChild(wrap);
}

  const tr = TROUBLES.find(x => String(x.id) === String(id));
  if (!tr || !tr._draftId) { showToast('送信できません', 'error'); return; }
  try {
    await sbFetch('troubles', 'POST', {
      trouble_type: tr.type, status: 'pending',
      occurred_date: tr.date || null, shift: tr.shift,
      detail: tr.detail, occurrence: tr.occurrence || 'first',
      stop_minutes: tr.stop_minutes || null, reporter_id: SESSION.userId

    await sbFetch('drafts?id=eq.' + tr._draftId, 'DELETE');
    TROUBLES = TROUBLES.filter(x => String(x.id) !== String(id));
    renderList();
    showToast(t('send_done'), 'success');
  } catch(e) { showToast('エラー: ' + e.message, 'error'); }
}

function utcToJST(isoStr){
  if(!isoStr) return '';
  var s=isoStr.replace('+00:00','Z').replace('+00','Z');
  if(!/Z$/i.test(s)&&!/[+-]\d{2}/.test(s)) s+='Z';
  var d=new Date(s);
  if(isNaN(d.getTime())) return isoStr.slice(0,16).replace('T',' ');
  var jst=new Date(d.getTime()+9*60*60*1000);
  var y=jst.getUTCFullYear(),mo=String(jst.getUTCMonth()+1).padStart(2,'0'),dy=String(jst.getUTCDate()).padStart(2,'0'),h=String(jst.getUTCHours()).padStart(2,'0'),mi=String(jst.getUTCMinutes()).padStart(2,'0');
  return y+'-'+mo+'-'+dy+' '+h+':'+mi;
}

    (drows || []).forEach(dr => {
      const d = dr.data || {};
      TROUBLES.push({
        id: 'draft_' + dr.id, _draftId: dr.id,
        type: dr.trouble_type || 'equipment', status: 'draft',
        date: d.occurred_date || '', shift: d.shift ? String(d.shift) : String(SESSION.shift || ''),
        line: d.line_name || '', machine: d.machine_no || '',
        product_code: d.product_code || '', product_name: d.product_name || '',
        category: d.category_name || '', occurrence: d.occurrence || 'first',
        stop_minutes: d.stop_minutes || null, detail: d.detail || '',
        submitted_by: SESSION.name, submitted_at: utcToJST(dr.updated_at),
        approved_by: null, approved_at: null, reject_reason: null,
      });
    });
  } catch(e) {}
  updateBadges();
  renderList();
}

/* ===== Init ===== */
(async function init() {
  if (!SESSION) { location.href = 'index.html'; return; }
  if (SESSION.role === 'leader' || SESSION.role === 'sl') { location.href = 'home_sl.html'; return; }
  if (SESSION.role === 'admin') { location.href = 'home_sl.html'; return; }
  initTheme();
  const savedLang = localStorage.getItem('traq_lang') || 'ja';
  currentLang = savedLang;
  ['ja','vi','en'].forEach(l => { const b2 = document.getElementById('sb-lang-'+l); if(b2) b2.classList.toggle('active', l===savedLang); });
  applyI18n();
  renderUserInfo();
  await loadTroubles();  // ← 修正: TROUBLESを先に読み込み、バッジ・各タブを初期化
  await loadTimeline();
})();

window.addEventListener('pageshow', function(e) {
  if (e.persisted) { if (mainTab === 'all') { loadTimeline(); } else { loadTroubles(); } }
});
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    if (mainTab === 'all') { loadTimeline(); } else { loadTroubles(); }
  }
});
</script>
<script src="./update_banner.js"></script>
</body>
