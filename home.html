<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Traq – ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --factory:     #2e3a52;
  --roof:        #3d4e6e;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       64px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:6px}
.mini-logo{display:flex;align-items:center;gap:6px}
.mini-logo-emoji{font-size:18px;line-height:1}
.mini-logo-text{font-size:15px;font-weight:700;color:var(--orange)}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 5px}
.user-chip-avatar{width:26px;height:26px;border-radius:50%;background:var(--orange);color:var(--navy);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.user-chip-name{font-size:12px;font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-chip-role{font-size:10px;color:var(--orange)}
.lang-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.lang-btn.active,.lang-btn:hover{border-color:var(--orange);color:var(--orange)}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.icon-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Layout */
.main-wrap{flex:1;overflow:hidden;display:flex}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-user{padding:16px;border-bottom:1px solid var(--border)}
.sb-avatar{width:40px;height:40px;border-radius:50%;background:var(--orange);color:var(--navy);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.sb-name{font-size:14px;font-weight:700}
.sb-role{font-size:11px;color:var(--orange);margin-top:2px}
.sb-nav{flex:1;padding:8px}
.sb-nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;text-decoration:none;width:100%;background:none;border:none;font-family:inherit;text-align:left}
.sb-nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text1)}
.sb-nav-item.active{background:rgba(239,159,39,0.12);color:var(--orange);font-weight:700}
.sb-nav-item.danger{color:var(--danger)}
.sb-nav-item.danger:hover{background:rgba(239,68,68,0.08)}
.sb-nav-icon{font-size:15px;width:18px;text-align:center}
.sb-bottom{padding:8px;border-top:1px solid var(--border);margin-top:auto}
.sb-theme-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;background:none;border:none;font-family:inherit;width:100%;text-align:left;transition:all .15s}
.sb-theme-btn:hover{color:var(--text1)}
.sb-lang{display:flex;gap:4px;padding:4px;margin-bottom:4px}
.sb-lang-btn{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:6px;background:none;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.sb-lang-btn.active,.sb-lang-btn:hover{border-color:var(--orange);color:var(--orange)}

/* Scroll */
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px calc(var(--nav-h) + 12px)}
@media(min-width:768px){.scroll-area{padding-bottom:12px}}

/* Date bar */
.date-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.date-text{font-size:14px;font-weight:500;color:var(--text2)}
.shift-tag{background:var(--orange);color:var(--navy);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}

/* Input buttons */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.input-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all .18s;text-align:left;display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:var(--text1)}
.input-btn:hover{border-color:var(--orange);background:rgba(239,159,39,0.06);transform:translateY(-1px);box-shadow:var(--shadow)}
.input-btn-left{display:flex;align-items:center;gap:10px}
.input-btn-icon{width:34px;height:34px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:17px}
.input-btn-label{font-size:13px;font-weight:600}
.input-btn-arrow{color:var(--text2);font-size:14px}

/* Draft banner */
.draft-banner{display:flex;align-items:center;justify-content:space-between;background:rgba(239,159,39,0.1);border:1px solid rgba(239,159,39,0.3);border-radius:var(--radius);padding:11px 14px;margin-bottom:14px;cursor:pointer;transition:background .15s}
.draft-banner:hover{background:rgba(239,159,39,0.15)}
.draft-banner-left{display:flex;align-items:center;gap:10px}
.draft-badge{background:var(--orange);color:var(--navy);font-size:12px;font-weight:700;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.draft-banner-text{font-size:13px;font-weight:600;color:var(--orange)}
.draft-banner-link{font-size:12px;font-weight:600;color:var(--orange);white-space:nowrap}

/* List header */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.list-title{font-size:13px;font-weight:600;color:var(--text2)}
.list-all-btn{font-size:12px;color:var(--text2);cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.list-all-btn:hover{color:var(--orange)}

/* Filter tabs */
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.ftab{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ftab.active{background:var(--orange);border-color:var(--orange);color:var(--navy);font-weight:700}
.ftab:hover:not(.active){border-color:var(--orange);color:var(--orange)}

/* Cards */
.trouble-list{display:flex;flex-direction:column;gap:10px}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;animation:slideUp .25s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tcard:hover{border-color:rgba(239,159,39,.3)}
.tcard-top{padding:14px 14px 10px;cursor:pointer}
.tcard-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.tcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tcard-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.tcard-type.eq{background:rgba(59,130,246,.15);color:#60a5fa}
.tcard-type.md{background:rgba(168,85,247,.15);color:#c084fc}
.status-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.status-badge.draft{background:rgba(100,116,139,.15);color:#94a3b8}
.status-badge.pending{background:rgba(245,158,11,.15);color:#fbbf24}
.status-badge.approved{background:rgba(16,185,129,.15);color:#34d399}
.status-badge.rejected{background:rgba(239,68,68,.15);color:#f87171}
.shift-badge{font-size:11px;color:var(--text2)}
.tcard-title{font-size:15px;font-weight:700;margin-bottom:3px}
.tcard-product{font-size:12px;color:var(--text2);margin-bottom:8px}
.tcard-cat{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);margin-bottom:8px}
.tcard-detail{font-size:13px;line-height:1.6;color:var(--text1);margin-bottom:10px}
.tcard-footer{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.tcard-reporter::before{content:'👤';font-size:11px;margin-right:4px}
.tcard-stop::before{content:'⏱';font-size:11px;margin-right:4px}
.reject-box{margin-top:8px;padding:8px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px}
.reject-label{font-size:10px;font-weight:700;color:var(--danger);margin-bottom:2px}
.reject-text{font-size:12px;color:var(--danger)}

/* Draft actions */
.card-actions{display:flex;gap:6px;padding:10px 14px;background:var(--bg3);border-top:1px solid var(--border)}
.ca-btn{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.ca-edit{background:rgba(255,255,255,0.06);color:var(--text2)}
.ca-edit:hover{background:rgba(255,255,255,0.1);color:var(--text1)}
.ca-send{background:var(--orange);color:var(--navy)}
.ca-send:hover{background:var(--orange-dark)}
.ca-delete{background:rgba(239,68,68,0.1);color:var(--danger)}
.ca-delete:hover{background:rgba(239,68,68,0.2)}

/* Empty */
.empty-state{text-align:center;padding:48px 16px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* Bottom nav */
.bottom-nav{height:var(--nav-h);flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-size:10px;color:var(--text2);border:none;background:none;font-family:inherit;transition:color .15s}
.bn-item.active,.bn-item:hover{color:var(--orange)}
.bn-icon{font-size:20px;line-height:1}

/* Modal */
.modal-wrap{position:fixed;inset:0;z-index:100;display:none}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end}
.modal-overlay.center{align-items:center;justify-content:center}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 20px 40px}
.modal-overlay.center .modal-sheet{border-radius:12px;max-width:340px;width:calc(100% - 32px);padding:24px}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px}
.modal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.modal-label{color:var(--text2);flex-shrink:0}
.modal-value{font-weight:500;text-align:right}
.modal-close-btn{width:100%;margin-top:14px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text1);cursor:pointer;font-family:inherit}
.confirm-msg{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.confirm-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text1);cursor:pointer;font-family:inherit}
.btn-danger{flex:1;padding:12px;background:var(--danger);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}

/* Toast */
.toast-wrap{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:#1e293b;color:#fff;border:1px solid rgba(255,255,255,.12);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;white-space:nowrap;animation:toastIn .2s ease}
.toast.success{background:#065f46;border-color:#10b981}
.toast.error{background:#7f1d1d;border-color:#ef4444}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(min-width:768px){
  .sidebar{display:flex!important}
  .bottom-nav{display:none}
  .toast-wrap{bottom:16px}
}
@media(max-width:767px){.sidebar{display:none}}
</style>
</head>

<script>
var SB_URL='https://svnqlwfcnoqwdwfbbaqb.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bnFsd2Zjbm9xd2R3ZmJiYXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NzIzNDAsImV4cCI6MjA5MDI0ODM0MH0.wu2BqVk6FemFO-d_UDgNW5XXl6uVqQAKEMmGy7mQFmw';
async function sbFetch(path,method,body){
  var opts={method:method||'GET',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  var res=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(!res.ok)throw new Error(await res.text());
  var text=await res.text();return text?JSON.parse(text):null;
}

var currentLang='ja';
var I18N={
  ja:{shift:'直',eq:'設備',md:'金型',draft:'下書き',pending:'承認待ち',approved:'承認済み',rejected:'差し戻し',first:'初発',repeat:'再発',min:function(m){return m+'分'},unknown:'不明',empty:'投稿はありません',edit:'編集',send:'承認依頼',del:'削除',del_title:'削除の確認',del_msg:'この下書きを削除しますか？\nこの操作は元に戻せません。',del_cancel:'キャンセル',del_ok:'削除する',del_done:'削除しました',send_done:'承認依頼を送信しました',logout_msg:'ログアウトしました'},
  vi:{shift:'ca',eq:'Thiết bị',md:'Khuôn',draft:'Nháp',pending:'Chờ duyệt',approved:'Đã duyệt',rejected:'Trả lại',first:'Lần đầu',repeat:'Tái phát',min:function(m){return m+' phút'},unknown:'Không rõ',empty:'Không có báo cáo',edit:'Sửa',send:'Gửi duyệt',del:'Xóa',del_title:'Xác nhận xóa',del_msg:'Xóa bản nháp?\nKhông thể hoàn tác.',del_cancel:'Hủy',del_ok:'Xóa',del_done:'Đã xóa',send_done:'Đã gửi duyệt',logout_msg:'Đã đăng xuất'},
  en:{shift:'shift',eq:'Equipment',md:'Mold',draft:'Draft',pending:'Pending',approved:'Approved',rejected:'Rejected',first:'First',repeat:'Repeat',min:function(m){return m+'min'},unknown:'Unknown',empty:'No posts',edit:'Edit',send:'Submit',del:'Delete',del_title:'Confirm Delete',del_msg:'Delete this draft?\nThis cannot be undone.',del_cancel:'Cancel',del_ok:'Delete',del_done:'Deleted',send_done:'Submitted',logout_msg:'Logged out'}
};
function t(k,arg){var d=I18N[currentLang]||I18N.ja;var v=d[k]||I18N.ja[k]||k;return typeof v==='function'?v(arg):v;}
function setLang(l){
  currentLang=l;localStorage.setItem('traq_lang',l);
  ['ja','vi','en'].forEach(function(x){
    ['lang-','sb-lang-'].forEach(function(p){var b=document.getElementById(p+x);if(b)b.classList.toggle('active',x===l);});
  });
  renderList();
}

var SESSION=null,TROUBLES=[],currentFilter='all';
function getSession(){try{var s=localStorage.getItem('traq_session');if(!s)return null;var o=JSON.parse(s);if(o.expiresAt&&Date.now()>o.expiresAt){localStorage.removeItem('traq_session');return null;}return o;}catch(e){return null;}}

(async function init(){
  SESSION=getSession();
  if(!SESSION){location.href='index.html';return;}
  if(SESSION.role==='leader'||SESSION.role==='sl'){location.href='home_sl.html';return;}
  if(SESSION.role==='admin'){location.href='admin.html';return;}

  var th=localStorage.getItem('traq_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',th);
  var icon=th==='dark'?'🌙':'☀️';
  document.getElementById('themeBtn').textContent=icon;
  var sti=document.getElementById('sbThemeIcon');if(sti)sti.textContent=icon;

  var l=localStorage.getItem('traq_lang')||'ja';currentLang=l;
  ['ja','vi','en'].forEach(function(x){
    ['lang-','sb-lang-'].forEach(function(p){var b=document.getElementById(p+x);if(b)b.classList.toggle('active',x===l);});
  });

  var name=SESSION.name||'';var ini=name.charAt(0)||'?';
  var shStr=(SESSION.shift||'')+t('shift');
  document.getElementById('chipAvatar').textContent=ini;
  document.getElementById('chipName').textContent=name;
  document.getElementById('chipRole').textContent='OP / '+shStr;
  document.getElementById('sbAvatar').textContent=ini;
  document.getElementById('sbName').textContent=name;
  document.getElementById('sbRole').textContent='OP / '+shStr;

  var now=new Date();
  var ymd=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0');
  var days=['日','月','火','水','木','金','土'];
  document.getElementById('dateText').textContent=ymd+'（'+days[now.getDay()]+'）';
  var st=(SESSION.shift||'')+t('shift');
  document.getElementById('shiftTag').textContent=st;

  var sb=document.getElementById('sidebarEl');
  function checkSb(){if(sb)sb.style.display=window.innerWidth>=768?'flex':'none';}
  checkSb();window.addEventListener('resize',checkSb);

  await loadTroubles();
})();

async function loadTroubles(){
  TROUBLES=[];
  try{
    var rows=await sbFetch('troubles?select=*,lines(name),machines(machine_no),products(product_code,product_name),categories(name),traq_users!reporter_id(name)&reporter_id=eq.'+SESSION.userId+'&order=created_at.desc&limit=50','GET');
    if(!rows)rows=[];
    TROUBLES=rows.map(function(r){return{id:r.id,type:r.trouble_type,status:r.status,date:r.occurred_date||'',shift:r.shift,line:r.lines?r.lines.name:'',machine:r.machines?r.machines.machine_no:'',product_code:r.products?r.products.product_code:'',product_name:r.products?r.products.product_name:'',category:r.categories?r.categories.name:'',occurrence:r.occurrence,stop_minutes:r.stop_minutes,detail:r.detail||'',reporter:r.traq_users?r.traq_users.name:SESSION.name,reject_reason:r.reject_reason||'',created_at:r.created_at};});
  }catch(e){showToast('データ読込エラー','error');}
  try{
    var drows=await sbFetch('drafts?user_id=eq.'+SESSION.userId+'&order=updated_at.desc','GET');
    if(drows&&drows.length){drows.forEach(function(dr){var d=dr.data||{};TROUBLES.push({id:'draft_'+dr.id,_draftId:dr.id,type:dr.trouble_type||'equipment',status:'draft',date:d.occurred_date||'',shift:d.shift||SESSION.shift,line:d.line_name||'',machine:d.machine_no||'',product_code:d.product_code||'',product_name:d.product_name||'',category:d.category_name||'',occurrence:d.occurrence||'first',stop_minutes:d.stop_minutes||null,detail:d.detail||'',reporter:SESSION.name,reject_reason:'',created_at:dr.updated_at,_isDraft:true});});}
  }catch(e){}
  renderList();
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(function(b){b.classList.toggle('active',b.dataset.f===f);});
  renderList();
}
function getFiltered(){
  return TROUBLES.filter(function(tr){
    if(currentFilter==='all')return true;
    if(currentFilter==='draft')return tr.status==='draft';
    if(currentFilter==='pending')return tr.status==='pending';
    if(currentFilter==='approved')return tr.status==='approved';
    if(currentFilter==='eq')return tr.type==='equipment';
    if(currentFilter==='md')return tr.type==='mold';
    return true;
  });
}

function renderList(){
  var drafts=TROUBLES.filter(function(tr){return tr.status==='draft';});
  var banner=document.getElementById('draftBanner');
  if(drafts.length>0){banner.style.display='flex';document.getElementById('draftCount').textContent=drafts.length;}
  else banner.style.display='none';

  var list=getFiltered();var container=document.getElementById('troubleList');
  if(list.length===0){container.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">'+t('empty')+'</div></div>';return;}
  container.innerHTML='';
  list.forEach(function(tr,i){container.appendChild(buildCard(tr,i));});
}

function buildCard(tr,idx){
  var div=document.createElement('div');div.className='tcard';div.id='card-'+tr.id;div.style.animationDelay=(idx*0.04)+'s';
  var tc=tr.type==='equipment'?'eq':'md';
  var stop=tr.stop_minutes?t('min',tr.stop_minutes):t('unknown');
  var occ=tr.occurrence==='first'?t('first'):t('repeat');
  var machine=tr.line?tr.line+' – '+tr.machine+'号機':(tr.machine?tr.machine+'号機':'');
  var product=tr.product_code&&tr.product_name?tr.product_code+' / '+tr.product_name:(tr.product_code||tr.product_name||'');
  var dateStr=tr.date?tr.date.replace(/-/g,'/').slice(0,10):(tr.created_at?tr.created_at.slice(0,10).replace(/-/g,'/'):'');
  var shiftStr=tr.shift?tr.shift+t('shift'):'';
  var rejHTML=tr.status==='rejected'&&tr.reject_reason?'<div class="reject-box"><div class="reject-label">差し戻し理由：</div><div class="reject-text">'+esc(tr.reject_reason)+'</div></div>':'';
  var actHTML='';
  if(tr.status==='draft'){
    var sid=String(tr.id);
    actHTML='<div class="card-actions"><button class="ca-btn ca-edit" onclick="event.stopPropagation();editDraft(\''+sid+'\')">✏️ '+t('edit')+'</button><button class="ca-btn ca-send" onclick="event.stopPropagation();sendDraft(\''+sid+'\')">📤 '+t('send')+'</button><button class="ca-btn ca-delete" onclick="event.stopPropagation();confirmDelete(\''+sid+'\')">🗑 '+t('del')+'</button></div>';
  }
  div.innerHTML=
    '<div class="tcard-top" onclick="openDetail(\''+tr.id+'\')">' +
    '<div class="tcard-header"><div class="tcard-meta"><span class="tcard-type '+tc+'">'+t(tc)+'</span><span class="status-badge '+tr.status+'">'+t(tr.status)+'</span><span class="shift-badge">'+dateStr+' '+shiftStr+'</span></div></div>'+
    '<div class="tcard-title">'+esc(machine)+'</div>'+
    (product?'<div class="tcard-product">'+esc(product)+'</div>':'')+
    (tr.category?'<span class="tcard-cat">'+esc(tr.category)+'</span>':'')+
    '<div class="tcard-detail">'+esc(tr.detail).substring(0,100)+(tr.detail.length>100?'…':'')+'</div>'+
    '<div class="tcard-footer"><span class="tcard-reporter">'+esc(tr.reporter)+'</span><div style="display:flex;gap:8px"><span class="tcard-stop">'+stop+'</span><span style="font-size:11px;color:var(--text2)">'+occ+'</span></div></div>'+
    rejHTML+'</div>'+actHTML;
  return div;
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openDetail(id){
  var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});if(!tr)return;
  var tc=tr.type==='equipment'?'eq':'md';
  var machine=tr.line?tr.line+' – '+tr.machine+'号機':(tr.machine||'');
  var product=tr.product_code&&tr.product_name?tr.product_code+' / '+tr.product_name:'';
  var rBox=tr.status==='rejected'&&tr.reject_reason?'<div class="reject-box" style="margin-bottom:12px"><div class="reject-label">差し戻し理由：</div><div class="reject-text">'+esc(tr.reject_reason)+'</div></div>':'';
  showModal('<div class="modal-handle"></div><div class="modal-title">'+esc(machine)+'</div>'+rBox+mrow('種別','<span class="tcard-type '+tc+'">'+t(tc)+'</span>')+mrow('ステータス','<span class="status-badge '+tr.status+'">'+t(tr.status)+'</span>')+mrow('発生日',tr.date||'')+mrow('直',tr.shift?tr.shift+t('shift'):'')+mrow('品番',product)+mrow('分類',tr.category||'')+mrow('初発/再発',tr.occurrence==='first'?t('first'):t('repeat'))+mrow('停止時間',tr.stop_minutes?t('min',tr.stop_minutes):t('unknown'))+mrow('詳細',esc(tr.detail))+mrow('報告者',tr.reporter)+'<button class="modal-close-btn" onclick="closeModal()">閉じる</button>');
}
function mrow(l,v){return'<div class="modal-row"><span class="modal-label">'+l+'</span><span class="modal-value">'+v+'</span></div>';}

function editDraft(id){var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});if(!tr)return;location.href=(tr.type==='equipment'?'input_equipment':'input_mold')+'.html'+(tr._draftId?'?draft='+tr._draftId:'');}

async function sendDraft(id){
  var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});if(!tr||!tr._draftId){showToast('送信できません','error');return;}
  try{
    await sbFetch('troubles','POST',{trouble_type:tr.type,status:'pending',occurred_date:tr.date||null,shift:tr.shift,detail:tr.detail,occurrence:tr.occurrence||'first',stop_minutes:tr.stop_minutes||null,reporter_id:SESSION.userId});
    await sbFetch('drafts?id=eq.'+tr._draftId,'DELETE');
    TROUBLES=TROUBLES.filter(function(x){return String(x.id)!==String(id);});
    renderList();showToast(t('send_done'),'success');
  }catch(e){showToast('エラー: '+e.message,'error');}
}

function confirmDelete(id){
  showModal('<div class="modal-handle"></div><div class="modal-title">'+t('del_title')+'</div><p class="confirm-msg">'+t('del_msg').replace(/\n/g,'<br>')+'</p><div class="confirm-btns"><button class="btn-cancel" onclick="closeModal()">'+t('del_cancel')+'</button><button class="btn-danger" onclick="deleteDraft(\''+id+'\')">'+t('del_ok')+'</button></div>',true);
}
async function deleteDraft(id){
  var tr=TROUBLES.find(function(x){return String(x.id)===String(id);});
  if(tr&&tr._draftId){try{await sbFetch('drafts?id=eq.'+tr._draftId,'DELETE');}catch(e){}}
  TROUBLES=TROUBLES.filter(function(x){return String(x.id)!==String(id);});
  closeModal();renderList();showToast(t('del_done'),'success');
}

function showModal(html,center){var el=document.getElementById('modalEl');el.innerHTML='<div class="modal-overlay'+(center?' center':'')+'" onclick="handleOverlay(event)"><div class="modal-sheet">'+html+'</div></div>';el.style.display='block';}
function closeModal(){document.getElementById('modalEl').style.display='none';}
function handleOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

var _tt=null;
function showToast(msg,type){var el=document.getElementById('toastWrap');el.innerHTML='<div class="toast'+(type?' '+type:'')+'">'+msg+'</div>';el.style.display='block';if(_tt)clearTimeout(_tt);_tt=setTimeout(function(){el.style.display='none';},2500);}

function toggleTheme(){
  var h=document.documentElement;var isDark=h.getAttribute('data-theme')==='dark';var next=isDark?'light':'dark';
  h.setAttribute('data-theme',next);localStorage.setItem('traq_theme',next);
  var icon=next==='dark'?'🌙':'☀️';
  document.getElementById('themeBtn').textContent=icon;
  var sti=document.getElementById('sbThemeIcon');if(sti)sti.textContent=icon;
}

function doLogout(){localStorage.removeItem('traq_session');showToast(t('logout_msg'));setTimeout(function(){location.href='index.html';},800);}
</script>
</body>
</html>
