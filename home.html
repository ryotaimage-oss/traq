<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Traq – ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables ===== */
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       64px;
  --sb-w:        220px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg1);color:var(--text1);-webkit-tap-highlight-color:transparent;overflow:hidden}
.app{height:100%;display:flex;flex-direction:column}

/* ===== Topbar ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;
  background:#080d18;
  border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;z-index:20;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:8px}
.logo-mark{display:flex;align-items:center;gap:7px}
.logo-emoji{font-size:20px;line-height:1}
.logo-text{font-size:15px;font-weight:700;color:#fff}

/* ===== Main Layout ===== */
.main-wrap{
  flex:1;overflow:hidden;display:flex;
}

/* ===== Sidebar (PC) ===== */
.sidebar{
  width:var(--sb-w);flex-shrink:0;
  background:#080d18;
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;
  padding:20px 0 16px;
  overflow-y:auto;
}
.sb-user{padding:0 16px 20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:8px}
.sb-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--orange);color:#080d18;
  font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;
}
.sb-name{font-size:15px;font-weight:700;color:#fff}
.sb-role{font-size:12px;color:var(--text2);margin-top:2px}
.sb-nav{flex:1;padding:0 8px}
.sb-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius);
  font-size:14px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all .15s;
  text-decoration:none;
}
.sb-nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text1)}
.sb-nav-item.active{background:rgba(239,159,39,0.12);color:var(--orange)}
.sb-nav-icon{font-size:16px;width:20px;text-align:center}
.sb-bottom{padding:8px;border-top:1px solid rgba(255,255,255,0.08);margin-top:8px}
.sb-lang{display:flex;gap:4px;padding:0 4px;margin-bottom:8px}
.sb-lang-btn{
  flex:1;padding:5px 4px;border:1px solid rgba(255,255,255,0.12);
  border-radius:6px;background:none;font-family:inherit;
  font-size:11px;font-weight:500;color:var(--text2);
  cursor:pointer;transition:all .15s;text-align:center;
}
.sb-lang-btn.active,.sb-lang-btn:hover{border-color:var(--orange);color:var(--orange)}
.sb-globe{font-size:16px;padding:8px 16px;display:block;color:var(--text2)}
.sb-theme-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-radius:var(--radius);
  font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;background:none;border:none;
  font-family:inherit;width:100%;text-align:left;
  transition:all .15s;
}
.sb-theme-btn:hover{color:var(--text1)}
.sb-logout{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius);
  font-size:14px;font-weight:600;color:var(--danger);
  cursor:pointer;transition:all .15s;
  width:100%;background:none;border:none;
  font-family:inherit;text-align:left;
}
.sb-logout:hover{background:rgba(239,68,68,0.08)}

/* ===== Scroll Area ===== */
.scroll-area{
  flex:1;overflow-y:auto;
  padding:16px;
  padding-bottom:calc(var(--nav-h) + 16px);
}
@media(min-width:768px){
  .scroll-area{padding-bottom:16px}
}

/* ===== Date Bar ===== */
.date-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.date-text{font-size:14px;font-weight:500;color:var(--text2)}
.shift-tag{
  background:var(--orange);color:#080d18;
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;
}

/* ===== Input Buttons ===== */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.input-btn{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 16px;
  cursor:pointer;
  transition:all .18s;
  text-align:left;
  display:flex;align-items:center;justify-content:space-between;
  text-decoration:none;
  color:var(--text1);
}
.input-btn:hover{border-color:var(--orange);background:rgba(239,159,39,0.06);transform:translateY(-1px);box-shadow:var(--shadow)}
.input-btn-left{display:flex;align-items:center;gap:12px}
.input-btn-icon{
  width:36px;height:36px;border-radius:8px;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.input-btn-label{font-size:13px;font-weight:600}
.input-btn-arrow{color:var(--text2);font-size:12px}

/* ===== Draft Banner ===== */
.draft-banner{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(239,159,39,0.1);
  border:1px solid rgba(239,159,39,0.3);
  border-radius:var(--radius);
  padding:12px 16px;
  margin-bottom:16px;
  cursor:pointer;
  transition:background .15s;
}
.draft-banner:hover{background:rgba(239,159,39,0.15)}
.draft-banner-left{display:flex;align-items:center;gap:10px}
.draft-badge{
  background:var(--orange);color:#080d18;
  font-size:13px;font-weight:700;
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.draft-banner-text{font-size:13px;font-weight:600;color:var(--orange)}
.draft-banner-link{font-size:12px;font-weight:600;color:var(--orange);white-space:nowrap}

/* ===== Post List ===== */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-size:14px;font-weight:600;color:var(--text2)}
.list-all-btn{font-size:12px;color:var(--text2);cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.list-all-btn:hover{color:var(--orange)}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ftab{
  padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:500;
  border:1px solid var(--border);
  background:none;color:var(--text2);
  cursor:pointer;font-family:inherit;
  transition:all .15s;white-space:nowrap;
}
.ftab.active{background:var(--orange);color:#080d18;border-color:var(--orange);font-weight:700}
.ftab:hover:not(.active){border-color:var(--orange);color:var(--orange)}

/* ===== Trouble Card ===== */
.tcard{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
  transition:box-shadow .15s;
  animation:fadeUp .25s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tcard:hover{box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.tcard-body{padding:14px;cursor:pointer}
.tcard-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tcard-type{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
}
.tcard-type.eq{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
.tcard-type.md{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.tcard-status{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
}
.tcard-status.draft{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.3)}
.tcard-status.pending{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.tcard-status.approved{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3)}
.tcard-status.rejected{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.tcard-date{font-size:11px;color:var(--text2)}
.tcard-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--text1)}
.tcard-product{font-size:12px;color:var(--text2);margin-bottom:8px}
.tcard-cat{
  display:inline-block;font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:4px;
  background:var(--bg3);color:var(--text2);
  border:1px solid var(--border);
  margin-bottom:8px;
}
.tcard-detail{font-size:13px;color:var(--text1);line-height:1.6;margin-bottom:10px}
.tcard-footer{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text2);
}
.tcard-reporter{display:flex;align-items:center;gap:4px}
.tcard-reporter::before{content:'👤';font-size:11px}
.tcard-stopinfo{display:flex;align-items:center;gap:4px}
.tcard-stopinfo::before{content:'⏱';font-size:11px}
.tcard-occ{font-size:11px;color:var(--text2)}
.reject-box{
  margin-top:8px;padding:8px 10px;
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2);
  border-radius:6px;
}
.reject-label{font-size:10px;font-weight:700;color:var(--danger);margin-bottom:2px}
.reject-text{font-size:12px;color:var(--danger)}

/* Draft card actions */
.tcard-actions{
  display:flex;gap:8px;padding:10px 14px;
  background:var(--bg3);border-top:1px solid var(--border);
}
.ca-btn{
  flex:1;padding:8px;border-radius:6px;
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
  border:none;transition:all .15s;
}
.ca-edit{background:rgba(255,255,255,0.06);color:var(--text2)}
.ca-edit:hover{background:rgba(255,255,255,0.1);color:var(--text1)}
.ca-send{background:var(--orange);color:#080d18}
.ca-send:hover{background:var(--orange-dark)}
.ca-delete{background:rgba(239,68,68,0.1);color:var(--danger)}
.ca-delete:hover{background:rgba(239,68,68,0.2)}

/* ===== Empty State ===== */
.empty-state{
  text-align:center;padding:48px 16px;
  color:var(--text2);
}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* ===== Bottom Nav (Mobile) ===== */
.bottom-nav{
  height:var(--nav-h);flex-shrink:0;
  background:#080d18;
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;cursor:pointer;
  font-size:10px;color:var(--text2);
  border:none;background:none;font-family:inherit;
  transition:color .15s;
}
.bn-item.active{color:var(--orange)}
.bn-item:hover{color:var(--text1)}
.bn-icon{font-size:20px;line-height:1}
.bn-badge{
  position:relative;
}
.bn-badge::after{
  content:attr(data-count);
  position:absolute;top:-2px;right:-8px;
  background:var(--danger);color:#fff;
  font-size:9px;font-weight:700;
  min-width:16px;height:16px;
  border-radius:8px;padding:0 4px;
  display:flex;align-items:center;justify-content:center;
}

/* ===== Modal ===== */
.modal-wrap{
  position:fixed;inset:0;z-index:100;display:none;
}
.modal-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;align-items:flex-end;
}
.modal-overlay.center{align-items:center;justify-content:center}
.modal-sheet{
  background:var(--bg2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:85vh;
  overflow-y:auto;
  padding:20px 20px 40px;
}
.modal-overlay.center .modal-sheet{
  border-radius:var(--radius);
  max-width:340px;width:calc(100% - 32px);
  padding:24px;
}
.modal-handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--border);margin:0 auto 16px;
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px}
.modal-close-btn{
  width:100%;margin-top:16px;padding:12px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);
  font-size:14px;font-weight:600;color:var(--text1);
  cursor:pointer;font-family:inherit;
}
.modal-detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.modal-detail-label{color:var(--text2)}
.modal-detail-value{font-weight:500;text-align:right;max-width:60%}
.confirm-msg{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.btn-cancel{flex:1;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text1);cursor:pointer;font-family:inherit}
.btn-danger{flex:1;padding:12px;background:var(--danger);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}

/* ===== Toast ===== */
.toast-wrap{
  position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);
  z-index:200;pointer-events:none;
}
.toast{
  background:#1e293b;color:#fff;border:1px solid rgba(255,255,255,0.1);
  padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;
  white-space:nowrap;
  animation:toastIn .2s ease;
}
.toast.success{background:#065f46;border-color:#10b981}
.toast.error{background:#7f1d1d;border-color:#ef4444}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== PC Layout ===== */
@media(min-width:768px){
  .sidebar{display:flex}
  .bottom-nav{display:none}
  .toast-wrap{bottom:16px}
  .scroll-area{padding-bottom:16px}
}
@media(max-width:767px){
  .sidebar{display:none}
}
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <span class="logo-emoji">🏭</span>
        <span class="logo-text">Traq</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="shiftTagTop" class="shift-tag">1直</span>
    </div>
  </header>

  <div class="main-wrap">

    <!-- Sidebar (PC) -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">高</div>
        <div class="sb-name" id="sbName">高橋 A</div>
        <div class="sb-role" id="sbRole">OP / 1直</div>
      </div>
      <nav class="sb-nav">
        <a class="sb-nav-item active" onclick="return false;">
          <span class="sb-nav-icon">🏠</span>ホーム
        </a>
        <a class="sb-nav-item" href="#" onclick="setFilter('all');document.querySelector('.scroll-area').scrollTo(0,300);return false;">
          <span class="sb-nav-icon">📋</span>投稿一覧
        </a>
        <a class="sb-nav-item" href="dashboard.html">
          <span class="sb-nav-icon">📊</span>ダッシュボード
        </a>
      </nav>
      <div class="sb-bottom">
        <button class="sb-theme-btn" onclick="toggleTheme()">
          <span id="sbThemeIcon">🌙</span>
          <span id="sbThemeLabel">テーマ切替</span>
        </button>
        <span class="sb-globe">🌐</span>
        <div class="sb-lang">
          <button class="sb-lang-btn active" id="sb-lang-ja" onclick="setLang('ja')">JP</button>
          <button class="sb-lang-btn" id="sb-lang-vi" onclick="setLang('vi')">VN</button>
          <button class="sb-lang-btn" id="sb-lang-en" onclick="setLang('en')">EN</button>
        </div>
        <a class="sb-nav-item" href="settings.html">
          <span class="sb-nav-icon">⚙️</span>設定
        </a>
        <button class="sb-logout" onclick="doLogout()">
          <span>🚪</span>ログアウト
        </button>
      </div>
    </aside>

    <!-- Main Scroll -->
    <div class="scroll-area" id="scrollArea">

      <!-- Date Bar -->
      <div class="date-bar">
        <span class="date-text" id="dateText">2026/03/28（土）</span>
        <span class="shift-tag" id="shiftTag">1直</span>
      </div>

      <!-- Input Buttons -->
      <div class="input-grid">
        <a class="input-btn" href="input_equipment.html">
          <div class="input-btn-left">
            <div class="input-btn-icon">⚙️</div>
            <span class="input-btn-label">設備トラブル を入力</span>
          </div>
          <span class="input-btn-arrow">›</span>
        </a>
        <a class="input-btn" href="input_mold.html">
          <div class="input-btn-left">
            <div class="input-btn-icon">🔧</div>
            <span class="input-btn-label">金型トラブル を入力</span>
          </div>
          <span class="input-btn-arrow">›</span>
        </a>
      </div>

      <!-- Draft Banner -->
      <div class="draft-banner" id="draftBanner" style="display:none" onclick="setFilter('draft')">
        <div class="draft-banner-left">
          <div class="draft-badge" id="draftCount">0</div>
          <span class="draft-banner-text">件の下書きがあります</span>
        </div>
        <span class="draft-banner-link">確認する →</span>
      </div>

      <!-- Post List -->
      <div class="list-header">
        <span class="list-title">投稿一覧</span>
        <button class="list-all-btn" onclick="setFilter('all')">すべて表示</button>
      </div>
      <div class="filter-tabs">
        <button class="ftab active" data-f="all" onclick="setFilter('all')">すべて</button>
        <button class="ftab" data-f="draft" onclick="setFilter('draft')">下書き</button>
        <button class="ftab" data-f="pending" onclick="setFilter('pending')">承認待ち</button>
        <button class="ftab" data-f="approved" onclick="setFilter('approved')">承認済み</button>
        <button class="ftab" data-f="eq" onclick="setFilter('eq')">設備</button>
        <button class="ftab" data-f="md" onclick="setFilter('md')">金型</button>
      </div>
      <div id="troubleList">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div class="empty-text">読み込み中...</div>
        </div>
      </div>

    </div><!-- /scroll-area -->
  </div><!-- /main-wrap -->

  <!-- Bottom Nav (Mobile) -->
  <nav class="bottom-nav">
    <button class="bn-item active" onclick="">
      <span class="bn-icon">🏠</span>ホーム
    </button>
    <button class="bn-item" onclick="setFilter('all');document.querySelector('.scroll-area').scrollTo(0,300)">
      <span class="bn-icon">📋</span>投稿一覧
    </button>
    <button class="bn-item" onclick="location.href='dashboard.html'">
      <span class="bn-icon">📊</span>ダッシュボード
    </button>
    <button class="bn-item" onclick="doLogout()">
      <span class="bn-icon" style="color:var(--danger)">🚪</span>
      <span style="color:var(--danger)">ログアウト</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- Modal -->
<div class="modal-wrap" id="modalEl"></div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap" style="display:none"></div>

<script>
/* =============================================
   Supabase

async function sbFetch(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  var text = await res.text();
  return text ? JSON.parse(text) : null;
}

/* =============================================
   Session
============================================= */
var SESSION = null;
var TROUBLES = [];
var currentFilter = 'all';

function getSession() {
  try {
    var s = localStorage.getItem('traq_session');
    if (!s) return null;
    var obj = JSON.parse(s);
    if (obj.expiresAt && Date.now() > obj.expiresAt) {
      localStorage.removeItem('traq_session');
      return null;
    }
    return obj;
  } catch(e) { return null; }
}

/* =============================================
   Init
============================================= */
(async function init() {
  // Session check
  SESSION = getSession();
  if (!SESSION) {
    location.href = 'index.html';
    return;
  }
  // Redirect admin/SL
  if (SESSION.role === 'admin') { location.href = 'admin.html'; return; }
  if (SESSION.role === 'leader' || SESSION.role === 'sl') { location.href = 'home_sl.html'; return; }

  // Theme
  var savedTheme = localStorage.getItem('traq_theme');
  var prefTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  var theme = savedTheme || prefTheme;
  document.documentElement.setAttribute('data-theme', theme);
  var themeIcon = theme === 'dark' ? '🌙' : '☀️';
  var sbTI = document.getElementById('sbThemeIcon');
  if(sbTI) sbTI.textContent = themeIcon;

  // Lang
  var savedLang = localStorage.getItem('traq_lang') || 'ja';
  currentLang = savedLang;
  ['ja','vi','en'].forEach(function(l){
    var b = document.getElementById('sb-lang-'+l);
    if(b) b.classList.toggle('active', l===savedLang);
  });

  // User info
  renderUserInfo();

  // Load data
  await loadTroubles();
})();

function renderUserInfo() {
  var name = SESSION.name || '';
  var initial = name.charAt(0) || '?';
  var role = SESSION.role;
  var roleLabel = role === 'worker' ? 'OP' : role === 'leader' ? 'SL' : role;
  var shift = SESSION.shift;

  document.getElementById('sbAvatar').textContent = initial;
  document.getElementById('sbName').textContent = name;
  document.getElementById('sbRole').textContent = roleLabel + ' / ' + shift + t('shift');

  // Date
  var now = new Date();
  var d = now;
  var ymd = d.getFullYear() + '/' +
    String(d.getMonth()+1).padStart(2,'0') + '/' +
    String(d.getDate()).padStart(2,'0');
  var days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateText').textContent = ymd + '（' + days[d.getDay()] + '）';

  var stTag = shift + t('shift');
  document.getElementById('shiftTag').textContent = stTag;
  document.getElementById('shiftTagTop').textContent = stTag;
}

/* =============================================
   Load from Supabase
============================================= */
async function loadTroubles() {
  try {
    // troublesテーブルからreporter_id=自分のもの
    // JOINでline/machine/productの名前も取得
    var rows = await sbFetch(
      'troubles?select=*,lines(name),machines(machine_no),products(product_code,product_name),categories(name),traq_users!reporter_id(name)' +
      '&reporter_id=eq.' + SESSION.userId +
      '&order=created_at.desc&limit=50',
      'GET'
    );
    if (!rows) rows = [];
    TROUBLES = rows.map(function(r) {
      return {
        id: r.id,
        type: r.trouble_type,
        status: r.status,
        date: r.occurred_date || '',
        shift: r.shift,
        line: r.lines ? r.lines.name : '',
        machine: r.machines ? r.machines.machine_no : '',
        product_code: r.products ? r.products.product_code : '',
        product_name: r.products ? r.products.product_name : '',
        category: r.categories ? r.categories.name : '',
        occurrence: r.occurrence,
        stop_minutes: r.stop_minutes,
        detail: r.detail || '',
        reporter: r.traq_users ? r.traq_users.name : SESSION.name,
        reject_reason: r.reject_reason || '',
        created_at: r.created_at,
        _raw: r
      };
    });
  } catch(e) {
    console.error('loadTroubles error:', e);
    TROUBLES = [];
    showToast('データ読込エラー', 'error');
  }

  // Also load drafts
  try {
    var draftRows = await sbFetch(
      'drafts?user_id=eq.' + SESSION.userId + '&order=updated_at.desc',
      'GET'
    );
    if (draftRows && draftRows.length > 0) {
      draftRows.forEach(function(dr) {
        var d = dr.data || {};
        TROUBLES.push({
          id: 'draft_' + dr.id,
          _draftId: dr.id,
          type: dr.trouble_type || d.trouble_type || 'equipment',
          status: 'draft',
          date: d.occurred_date || '',
          shift: d.shift || SESSION.shift,
          line: d.line_name || '',
          machine: d.machine_no || '',
          product_code: d.product_code || '',
          product_name: d.product_name || '',
          category: d.category_name || '',
          occurrence: d.occurrence || 'first',
          stop_minutes: d.stop_minutes || null,
          detail: d.detail || '',
          reporter: SESSION.name,
          reject_reason: '',
          created_at: dr.updated_at,
          _isDraft: true
        });
      });
    }
  } catch(e) {
    console.warn('drafts load error:', e);
  }

  renderList();
}

/* =============================================
   Filter & Render
============================================= */
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.f === f);
  });
  renderList();
}

function getFiltered() {
  return TROUBLES.filter(function(tr) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'draft') return tr.status === 'draft';
    if (currentFilter === 'pending') return tr.status === 'pending';
    if (currentFilter === 'approved') return tr.status === 'approved';
    if (currentFilter === 'eq') return tr.type === 'equipment';
    if (currentFilter === 'md') return tr.type === 'mold';
    return true;
  });
}

function renderList() {
  // Draft banner
  var drafts = TROUBLES.filter(function(tr){ return tr.status === 'draft'; });
  var banner = document.getElementById('draftBanner');
  if (drafts.length > 0) {
    banner.style.display = 'flex';
    document.getElementById('draftCount').textContent = drafts.length;
  } else {
    banner.style.display = 'none';
  }

  var list = getFiltered();
  var container = document.getElementById('troubleList');

  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">' + t('empty_all') + '</div></div>';
    return;
  }

  container.innerHTML = '';
  list.forEach(function(tr, idx) {
    var card = buildCard(tr, idx);
    container.appendChild(card);
  });
}

function buildCard(tr, idx) {
  var div = document.createElement('div');
  div.className = 'tcard';
  div.style.animationDelay = (idx * 0.04) + 's';

  var typeClass = tr.type === 'equipment' ? 'eq' : 'md';
  var typeLabel = t('type_' + typeClass);
  var statusLabel = t('status_' + tr.status);
  var statusClass = tr.status;
  var occLabel = tr.occurrence === 'first' ? t('occ_first') : t('occ_rec');
  var stopLabel = tr.stop_minutes ? t('stop_min', tr.stop_minutes) : t('stop_none');

  // Date format
  var dateStr = tr.date ? tr.date.replace(/-/g, '/').slice(0,10) : (tr.created_at ? tr.created_at.slice(0,10).replace(/-/g,'/') : '');
  var shiftStr = tr.shift ? tr.shift + t('shift') : '';

  // Machine/Product display
  var machineLabel = tr.line ? tr.line + ' – ' + tr.machine + '号機' : (tr.machine ? tr.machine + '号機' : '');
  var productLabel = tr.product_code && tr.product_name
    ? tr.product_code + ' / ' + tr.product_name
    : (tr.product_code || tr.product_name || '');

  // Reject box
  var rejectHTML = '';
  if (tr.status === 'rejected' && tr.reject_reason) {
    rejectHTML = '<div class="reject-box"><div class="reject-label">差し戻し理由：</div><div class="reject-text">' + esc(tr.reject_reason) + '</div></div>';
  }

  // Actions for draft
  var actionsHTML = '';
  var idStr = typeof tr.id === 'string' ? '"' + tr.id + '"' : tr.id;
  if (tr.status === 'draft') {
    actionsHTML = '<div class="tcard-actions">' +
      '<button class="ca-btn ca-edit" onclick="editDraft(' + idStr + ')">✏️ ' + t('edit') + '</button>' +
      '<button class="ca-btn ca-send" onclick="sendDraft(' + idStr + ')">📤 ' + t('send') + '</button>' +
      '<button class="ca-btn ca-delete" onclick="confirmDelete(' + idStr + ')">🗑 ' + t('del') + '</button>' +
      '</div>';
  }

  div.innerHTML =
    '<div class="tcard-body" onclick="openDetail(\'' + tr.id + '\')">' +
      '<div class="tcard-meta">' +
        '<span class="tcard-type ' + typeClass + '">' + typeLabel + '</span>' +
        '<span class="tcard-status ' + statusClass + '">' + statusLabel + '</span>' +
        '<span class="tcard-date">' + dateStr + ' ' + shiftStr + '</span>' +
      '</div>' +
      '<div class="tcard-title">' + esc(machineLabel) + '</div>' +
      (productLabel ? '<div class="tcard-product">' + esc(productLabel) + '</div>' : '') +
      (tr.category ? '<span class="tcard-cat">' + esc(tr.category) + '</span>' : '') +
      '<div class="tcard-detail">' + esc(tr.detail).substring(0, 80) + (tr.detail && tr.detail.length > 80 ? '…' : '') + '</div>' +
      '<div class="tcard-footer">' +
        '<span class="tcard-reporter">' + esc(tr.reporter) + '</span>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="tcard-stopinfo">' + stopLabel + '</span>' +
          '<span class="tcard-occ">' + occLabel + '</span>' +
        '</div>' +
      '</div>' +
      rejectHTML +
    '</div>' +
    actionsHTML;

  return div;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* =============================================
   Detail Modal
============================================= */
function openDetail(id) {
  var tr = TROUBLES.find(function(x){ return String(x.id) === String(id); });
  if (!tr) return;

  var typeClass = tr.type === 'equipment' ? 'eq' : 'md';
  var typeLabel = t('type_' + typeClass);
  var statusLabel = t('status_' + tr.status);
  var machineLabel = tr.line ? tr.line + ' – ' + tr.machine + '号機' : (tr.machine || '');
  var productLabel = tr.product_code && tr.product_name
    ? tr.product_code + ' / ' + tr.product_name : '';

  var rejectHTML = '';
  if (tr.status === 'rejected' && tr.reject_reason) {
    rejectHTML = '<div class="reject-box" style="margin-bottom:12px"><div class="reject-label">差し戻し理由：</div><div class="reject-text">' + esc(tr.reject_reason) + '</div></div>';
  }

  showModal(
    '<div class="modal-handle"></div>' +
    '<div class="modal-title">' + esc(machineLabel) + '</div>' +
    rejectHTML +
    row('種別', '<span class="tcard-type ' + typeClass + '">' + typeLabel + '</span>') +
    row('ステータス', '<span class="tcard-status ' + tr.status + '">' + statusLabel + '</span>') +
    row('発生日', tr.date || '') +
    row('直', tr.shift ? tr.shift + t('shift') : '') +
    row('品番', productLabel) +
    row('分類', tr.category || '') +
    row('初発/再発', tr.occurrence === 'first' ? t('occ_first') : t('occ_rec')) +
    row('停止時間', tr.stop_minutes ? t('stop_min', tr.stop_minutes) : t('stop_none')) +
    row('詳細', esc(tr.detail)) +
    row('報告者', tr.reporter) +
    '<button class="modal-close-btn" onclick="closeModal()">閉じる</button>'
  );
}

function row(label, value) {
  return '<div class="modal-detail-row"><span class="modal-detail-label">' + label + '</span><span class="modal-detail-value">' + value + '</span></div>';
}

/* =============================================
   Draft Actions
============================================= */
function editDraft(id) {
  // Find draft and navigate to input form with draft data
  var tr = TROUBLES.find(function(x){ return String(x.id) === String(id); });
  if (!tr) return;
  var page = tr.type === 'equipment' ? 'input_equipment.html' : 'input_mold.html';
  if (tr._draftId) {
    location.href = page + '?draft=' + tr._draftId;
  } else {
    showToast('編集機能は入力フォームから行ってください');
  }
}

async function sendDraft(id) {
  var tr = TROUBLES.find(function(x){ return String(x.id) === String(id); });
  if (!tr || !tr._draftId) {
    showToast('この下書きは送信できません', 'error');
    return;
  }
  try {
    var draftData = tr._raw ? tr._raw.data : tr;
    // Insert into troubles
    await sbFetch('troubles', 'POST', {
      trouble_type: tr.type,
      status: 'pending',
      occurred_date: tr.date || null,
      shift: tr.shift,
      detail: tr.detail,
      occurrence: tr.occurrence || 'first',
      stop_minutes: tr.stop_minutes || null,
      reporter_id: SESSION.userId
    });
    // Delete draft
    await sbFetch('drafts?id=eq.' + tr._draftId, 'DELETE');
    TROUBLES = TROUBLES.filter(function(x){ return String(x.id) !== String(id); });
    renderList();
    showToast(t('send_done'), 'success');
  } catch(e) {
    showToast('送信エラー: ' + e.message, 'error');
  }
}

function confirmDelete(id) {
  showModal(
    '<div class="modal-handle"></div>' +
    '<div class="modal-title">' + t('del_title') + '</div>' +
    '<p class="confirm-msg">' + t('del_msg').replace(/\n/g,'<br>') + '</p>' +
    '<div class="confirm-btns">' +
    '<button class="btn-cancel" onclick="closeModal()">' + t('del_cancel') + '</button>' +
    '<button class="btn-danger" onclick="deleteDraft(\'' + id + '\')">' + t('del_confirm') + '</button>' +
    '</div>',
    true
  );
}

async function deleteDraft(id) {
  var tr = TROUBLES.find(function(x){ return String(x.id) === String(id); });
  if (tr && tr._draftId) {
    try {
      await sbFetch('drafts?id=eq.' + tr._draftId, 'DELETE');
    } catch(e) { console.warn(e); }
  }
  TROUBLES = TROUBLES.filter(function(x){ return String(x.id) !== String(id); });
  closeModal();
  renderList();
  showToast(t('del_done'), 'success');
}

/* =============================================
   Modal
============================================= */
function showModal(html, center) {
  var el = document.getElementById('modalEl');
  el.innerHTML =
    '<div class="modal-overlay' + (center ? ' center' : '') + '" onclick="handleOverlayClick(event)">' +
    '<div class="modal-sheet">' + html + '</div>' +
    '</div>';
  el.style.display = 'block';
}
function closeModal() {
  document.getElementById('modalEl').style.display = 'none';
}
function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

/* =============================================
   Toast
============================================= */
var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById('toastWrap');
  el.innerHTML = '<div class="toast' + (type ? ' ' + type : '') + '">' + msg + '</div>';
  el.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display = 'none'; }, 2500);
}

/* =============================================
   Theme
============================================= */
function toggleTheme() {
  var html = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  var next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('traq_theme', next);
  var icon = next === 'dark' ? '🌙' : '☀️';
  var sbTI = document.getElementById('sbThemeIcon');
  if(sbTI) sbTI.textContent = icon;
}

/* =============================================
   Logout
============================================= */
function doLogout() {
  localStorage.removeItem('traq_session');
  showToast(t('logout_msg'));
  setTimeout(function(){ location.href = 'index.html'; }, 800);
}
