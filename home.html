<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Traq">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>Traq – ホーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables ===== */
:root {
  --orange:      #EF9F27;
  --orange-dark: #c97d10;
  --navy:        #080d18;
  --bg1:         #080d18;
  --bg2:         #111827;
  --bg3:         #1e2d45;
  --factory:     #2e3a52;
  --roof:        #3d4e6e;
  --text1:       #e8eaf0;
  --text2:       #8b90a0;
  --border:      rgba(255,255,255,0.08);
  --success:     #10b981;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --radius:      8px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --nav-h:       56px;
}
[data-theme="light"] {
  --bg1:    #e8e6e2;
  --bg2:    #ffffff;
  --bg3:    #f0ede8;
  --text1:  #1a1f2e;
  --text2:  #666666;
  --border: rgba(0,0,0,0.18);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg1);
  color: var(--text1);
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ===== Layout ===== */
.app { height: 100%; display: flex; flex-direction: column; }
.sidebar { display: none; }


.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px;
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 8px; }
.topbar-right { display: flex; align-items: center; gap: 6px; }

/* Mini logo */

/* User chip */
/* Role badge colors: OP=紺 SL=オレンジ admin=赤 */
.role-op   .role-op   .role-sl   .role-sl   .role-admin .role-admin /* Light mode overrides */
[data-theme="light"] .role-op   [data-theme="light"] .role-op   [data-theme="light"] .role-sl   [data-theme="light"] .role-sl   [data-theme="light"] .role-admin [data-theme="light"] .role-admin 
/* Icon buttons */
.icon-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 6px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; color: var(--text2);
  transition: all .15s;
}
.icon-btn:hover { border-color: var(--orange); color: var(--orange); }

/* Lang btns */
.lang-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 6px;
  font-family: inherit; font-size: 11px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all .15s;
}
.lang-btn.active, .lang-btn:hover { border-color: var(--orange); color: var(--orange); }

/* ===== Scroll area ===== */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px calc(var(--nav-h) + 16px);
}

/* ===== Date/shift bar ===== */
.date-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  animation: fadeIn .3s ease both;
}
.date-text { font-size: 13px; color: var(--text2); }
.shift-tag {
  background: rgba(239,159,39,.15);
  border: 1px solid rgba(239,159,39,.3);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px; font-weight: 700;
  color: var(--orange);
}

/* ===== Action cards ===== */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
  animation: slideUp .3s .05s ease both;
}
.action-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 18px 14px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.action-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: 12px 12px 0 0;
  background: var(--orange);
  transform: scaleX(0);
  transition: transform .2s ease;
  transform-origin: left;
}
.action-card:hover, .action-card:active {
  border-color: var(--orange);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(239,159,39,.15);
}
.action-card:hover::before, .action-card:active::before { transform: scaleX(1); }
.action-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(239,159,39,.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.action-label {
  font-size: 13px; font-weight: 700; color: var(--text1); line-height: 1.3;
}
.action-sub { font-size: 11px; color: var(--text2); }
.action-arrow {
  position: absolute; right: 12px; bottom: 14px;
  font-size: 16px; color: var(--orange); opacity: .6;
}

/* ===== Draft banner ===== */
.draft-banner {
  background: rgba(239,159,39,.08);
  border: 1px solid rgba(239,159,39,.25);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all .15s;
  animation: slideUp .3s .1s ease both;
}
.draft-banner:hover { background: rgba(239,159,39,.13); }
.draft-banner-left { display: flex; align-items: center; gap: 8px; }
.draft-count {
  background: var(--orange); color: var(--navy);
  border-radius: 10px; padding: 2px 8px;
  font-size: 12px; font-weight: 700;
}
.draft-label { font-size: 13px; font-weight: 500; }
.draft-banner-right { font-size: 12px; color: var(--orange); }

/* ===== Section header ===== */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
  animation: fadeIn .3s .15s ease both;
}
.section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
.section-link { font-size: 12px; color: var(--orange); cursor: pointer; }

/* ===== Filter tabs ===== */
.filter-tabs {
  display: flex; gap: 6px;
  margin-bottom: 12px;
  overflow-x: auto; padding-bottom: 2px;
  animation: fadeIn .3s .18s ease both;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.ftab {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-family: inherit; font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer; white-space: nowrap;
  transition: all .15s; flex-shrink: 0;
}
.ftab.active {
  background: var(--orange); border-color: var(--orange);
  color: var(--navy); font-weight: 700;
}

/* ===== Trouble cards ===== */
.trouble-list { display: flex; flex-direction: column; gap: 8px; }

.tcard {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all .15s;
  animation: slideUp .25s ease both;
}
.tcard:hover { border-color: rgba(239,159,39,.3); }

.tcard-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 8px;
}
.tcard-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tcard-type {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
}
.tcard-type.eq { background: rgba(59,130,246,.15); color: #60a5fa; }
.tcard-type.md { background: rgba(168,85,247,.15); color: #c084fc; }

.status-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
}
.status-draft    { background: rgba(139,144,160,.12); color: var(--text2); }
.status-pending  { background: rgba(245,158,11,.15);  color: var(--warning); }
.status-approved { background: rgba(16,185,129,.12);  color: var(--success); }
.status-rejected { background: rgba(239,68,68,.12);   color: var(--danger); }

.tcard-date { font-size: 11px; color: var(--text2); }

.tcard-body { margin-bottom: 8px; }
.tcard-machine {
  font-size: 15px; font-weight: 700; color: var(--text1);
  margin-bottom: 2px;
}
.tcard-product { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.tcard-category {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  background: var(--bg3);
  border-radius: 4px; padding: 2px 7px;
  color: var(--text2); margin-bottom: 4px;
}
.tcard-detail {
  font-size: 13px; color: var(--text1);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.tcard-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 1px solid var(--border);
}
.tcard-submitter { font-size: 11px; color: var(--text2); }
.tcard-stop { font-size: 11px; color: var(--text2); }

/* Draft action buttons (inline) */
.draft-actions {
  display: flex; gap: 6px; margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.da-btn {
  flex: 1; height: 36px;
  border-radius: var(--radius);
  font-family: inherit; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .12s; border: none;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.da-edit  { background: var(--bg3); color: var(--text1); border: 1px solid var(--border); }
.da-del   { background: rgba(239,68,68,.1); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
.da-send  { background: var(--orange); color: var(--navy); }
.da-btn:hover { opacity: .85; transform: scale(.98); }

/* Reject reason */
.reject-reason {
  margin-top: 8px;
  background: rgba(239,68,68,.08);
  border: 1px solid rgba(239,68,68,.2);
  border-radius: 6px; padding: 8px 10px;
  font-size: 12px; color: var(--danger);
}
.reject-reason strong { display: block; margin-bottom: 2px; font-size: 11px; }

/* ===== Empty state ===== */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text2); font-size: 13px;
}
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* ===== Common Bottom Nav ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 4px;
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 6px 4px;
  cursor: pointer; position: relative;
  transition: all .15s;
  border: none; background: none; font-family: inherit;
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--text2); }
.nav-item.active .nav-label { color: var(--orange); }
.nav-item.active .nav-icon { filter: drop-shadow(0 0 4px rgba(239,159,39,.5)); }
/* ===== PC sidebar layout ===== */
@media (min-width: 768px) {
  .bottom-nav { display: none; }
  .app { flex-direction: row; }
  .sidebar {
    display: flex;
    width: 220px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    flex-direction: column;
    padding: 0;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-user {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sidebar-name { font-size: 13px; font-weight: 700; }
  .sidebar-role { font-size: 11px; }
  .sidebar-nav { flex: 1; padding: 12px 8px; }
  .snav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius);
    cursor: pointer; transition: all .15s;
    font-size: 13px; font-weight: 500; color: var(--text2);
    border: none; background: none; font-family: inherit;
    width: 100%; text-align: left; position: relative;
  }
  .snav-item:hover { background: var(--bg3); color: var(--text1); }
  .snav-item.active { background: rgba(239,159,39,.12); color: var(--orange); font-weight: 700; }
  .snav-icon { font-size: 18px; width: 24px; text-align: center; }
  .snav-badge {
    margin-left: auto;
    background: var(--danger); color: #fff;
    border-radius: 10px; padding: 1px 6px;
    font-size: 9px; font-weight: 700;
  }
  .sidebar-bottom {
    padding: 12px 8px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .topbar { display: none; }
  .main-column {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .scroll-area { padding-bottom: 24px; }
}

@media (min-width: 1025px) {
  .sidebar { width: 240px; }
  .action-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ===== Animations ===== */
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 200;
  animation: fadeIn .15s ease;
}
.modal-overlay.center { align-items: center; }
.modal-sheet {
  background: var(--bg2);
  border-radius: 16px 16px 0 0;
  padding: 20px;
  width: 100%; max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp .2s ease;
}
.modal-overlay.center .modal-sheet {
  border-radius: 12px;
  margin: 20px;
  max-height: 80vh;
}
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 0 auto 16px;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.modal-close-btn {
  width: 100%; height: 48px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); font-family: inherit;
  font-size: 14px; font-weight: 500; color: var(--text2);
  cursor: pointer; margin-top: 12px; transition: all .15s;
}
.modal-close-btn:hover { color: var(--text1); }

/* Detail modal fields */
.detail-row {
  display: flex; gap: 8px; margin-bottom: 10px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.detail-row:last-child { border-bottom: none; margin-bottom: 0; }
.detail-key { font-size: 11px; font-weight: 500; color: var(--text2); width: 80px; flex-shrink: 0; padding-top: 2px; }
.detail-val { font-size: 13px; color: var(--text1); flex: 1; word-break: break-all; }

/* Confirm delete */
.confirm-msg { font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
.confirm-btns { display: flex; gap: 8px; }
.btn-danger {
  flex: 1; height: 48px;
  background: var(--danger); border: none;
  border-radius: var(--radius); color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.btn-cancel {
  flex: 1; height: 48px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text1);
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}

/* Toast */
.toast {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 18px;
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow); z-index: 300;
  animation: fadeIn .2s ease;
  white-space: nowrap;
}
.toast.success { background: rgba(16,185,129,.15); border-color: rgba(16,185,129,.3); color: var(--success); }
.toast.error   { background: rgba(239,68,68,.12);  border-color: rgba(239,68,68,.3);  color: var(--danger); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


/* ===== Topbar (new F-style) ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0}
.topbar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mini-logo svg{display:block}
.topbar-logo-text{font-size:16px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;flex-shrink:0}
.topbar-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-sub{font-size:9px;font-weight:500;color:var(--text2);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-icon-btn{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:0}
.hdr-icon-btn:hover{border-color:var(--orange);color:var(--orange)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-left:2px}
.role-op .hdr-avatar{background:rgba(30,58,110,0.35);color:#6b8ec5}
.role-sl .hdr-avatar{background:rgba(239,159,39,0.25);color:#e8a520}
.role-admin .hdr-avatar{background:rgba(239,68,68,0.25);color:#f87171}
[data-theme="light"] .role-op .hdr-avatar{background:rgba(30,58,110,0.15);color:#2c4a80}
[data-theme="light"] .role-sl .hdr-avatar{background:rgba(200,130,20,0.18);color:#b07a10}
[data-theme="light"] .role-admin .hdr-avatar{background:rgba(239,68,68,0.15);color:#c53030}

</style>
</head>
<body>

<div class="app" id="app">

  <!-- ===== Sidebar (PC) ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="100" height="32" viewBox="0 0 200 56" fill="none">
        <rect x="4" y="34" width="48" height="18" rx="2" fill="var(--factory)"/>
        <rect x="4" y="33" width="48" height="3" rx="1" fill="var(--roof)"/>
        <rect x="9"  y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="20" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".5"/>
        <rect x="31" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".7"/>
        <rect x="42" y="39" width="6" height="7" rx="1" fill="var(--orange)" opacity=".4"/>
        <rect x="8"  y="18" width="8" height="18" rx="1" fill="var(--factory)"/>
        <rect x="22" y="22" width="8" height="14" rx="1" fill="var(--factory)"/>
        <rect x="36" y="25" width="8" height="11" rx="1" fill="var(--factory)"/>
        <rect x="6"  y="16" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="20" y="20" width="12" height="4" rx="1" fill="var(--roof)"/>
        <rect x="34" y="23" width="12" height="4" rx="1" fill="var(--roof)"/>
        <circle cx="12" cy="10" r="3.5" fill="var(--orange)" opacity=".9"/>
        <circle cx="14" cy="5"  r="2.5" fill="var(--orange)" opacity=".6"/>
        <circle cx="26" cy="14" r="3"   fill="var(--orange)" opacity=".8"/>
        <circle cx="28" cy="9"  r="2"   fill="var(--orange)" opacity=".5"/>
        <circle cx="40" cy="17" r="2.5" fill="var(--orange)" opacity=".7"/>
        <circle cx="42" cy="13" r="1.8" fill="var(--orange)" opacity=".45"/>
        <text x="60" y="42" font-family="'Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="var(--orange)">Traq</text>
      </svg>
    </div>
    <div class="sidebar-user" id="sb-user-wrap">
      <div class="sidebar-avatar" id="sb-avatar"></div>
      <div>
        <div class="sidebar-name" id="sb-name"></div>
        <div class="sidebar-role" id="sb-role"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="snav-item active" onclick="setTab('home')">
        <span class="snav-icon">📋</span>
        <span data-i18n="nav_list">一覧</span>

async function sbFetch(path, method='GET', body=null) {
  const opts = { method, headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const SESSION = (() => {
  try {
    const s = localStorage.getItem('traq_session');
    if (!s) return null;

/* ===== Role helper ===== */
function getRoleClass(role) {
  if (role === 'admin') return 'role-admin';
  if (role === 'leader' || role === 'sl') return 'role-sl';
  return 'role-op';
}
function getRoleLabel(role) {
  if (role === 'admin') return t('role_adm');
  if (role === 'leader' || role === 'sl') return t('role_sl');
  return t('role_op');
}

/* ===== renderUserInfo ===== */
function renderUserInfo() {
  const u = SESSION;
  if (!u) return;
  const initial = (u.name || '?')[0];
  const roleLabel = getRoleLabel(u.role);
  const roleClass = getRoleClass(u.role);

  // Mobile header
  var topbar = document.querySelector('.topbar');
  if(topbar){topbar.classList.remove('role-op','role-sl','role-admin');topbar.classList.add(roleClass);}
  document.getElementById('mob-avatar').textContent = initial;

  // PC sidebar
  const sbWrap = document.getElementById('sb-user-wrap');
  if (sbWrap) sbWrap.className = 'sidebar-user ' + roleClass;
  document.getElementById('sb-avatar').textContent = initial;
  document.getElementById('sb-name').textContent = u.name;
  document.getElementById('sb-role').textContent = roleLabel + ' / ' + t('shift_label', u.shift);

  // Date bar
  const now = new Date();
  const displayDate = (u.shift === 3 && now.getHours() < 8) ? new Date(now.getTime() - 86400000) : now;
  const ymd = `${displayDate.getFullYear()}/${String(displayDate.getMonth()+1).padStart(2,'0')}/${String(displayDate.getDate()).padStart(2,'0')}`;
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('dateText').textContent = `${ymd}（${days[displayDate.getDay()]}）`;
  document.getElementById('shiftTag').textContent = t('shift_label', u.shift || SESSION.shift);
}

/* ===== renderList ===== */
function renderList() {
  const list = getFilteredList();
  const container = document.getElementById('troubleList');
  const drafts = TROUBLES.filter(tr => tr.status === 'draft');
  const draftBanner = document.getElementById('draftBanner');
  if (drafts.length > 0) {
    draftBanner.style.display = 'flex';
    document.getElementById('draftCount').textContent = drafts.length;
    const dl = document.querySelector('[data-i18n="draft_label"]');
    const dc = document.querySelector('[data-i18n="draft_confirm"]');
    if (dl) dl.textContent = t('draft_label');
    if (dc) dc.textContent = t('draft_confirm');
  } else {
    draftBanner.style.display = 'none';
  }
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>${t('filter_'+currentFilter) || ''} の投稿はありません</div></div>`;
    return;
  }
  container.innerHTML = '';
  list.forEach((tr, idx) => { container.appendChild(buildCard(tr, idx)); });
}

function getFilteredList() {
  return TROUBLES.filter(tr => {
    if (currentFilter === 'all')      return true;
    if (currentFilter === 'draft')    return tr.status === 'draft';
    if (currentFilter === 'pending')  return tr.status === 'pending';
    if (currentFilter === 'approved') return tr.status === 'approved';
    if (currentFilter === 'eq')       return tr.type === 'equipment';
    if (currentFilter === 'md')       return tr.type === 'mold';
    return true;
  });
}

function buildCard(tr, idx) {
  const div = document.createElement('div');
  div.className = 'tcard';
  div.style.animationDelay = `${idx * 0.04}s`;
  const typeLabel   = tr.type === 'equipment' ? t('type_eq') : t('type_md');
  const typeClass   = tr.type === 'equipment' ? 'eq' : 'md';
  const statusLabel = t('status_'+tr.status);
  const occLabel    = tr.occurrence === 'first' ? t('occurrence_first') : t('occurrence_rec');
  const stopLabel   = tr.stop_minutes ? t('stop_min', tr.stop_minutes) : t('stop_none');
  const dateDisp    = (tr.date || '').replace(/-/g,'/') + ' ' + t('shift_label', tr.shift);
  let draftActionsHTML = '';
  if (tr.status === 'draft') {
    draftActionsHTML = `
      <div class="draft-actions">
        <button class="da-btn da-edit"  onclick="event.stopPropagation();editDraft('${tr.id}')">${t('da_edit')}</button>
        <button class="da-btn da-del"   onclick="event.stopPropagation();confirmDelete('${tr.id}')">${t('da_del')}</button>
        <button class="da-btn da-send"  onclick="event.stopPropagation();sendDraft('${tr.id}')">${t('da_send')}</button>
      </div>`;
  }
  let rejectHTML = '';
  if (tr.status === 'rejected' && tr.reject_reason) {
    rejectHTML = `<div class="reject-reason"><strong>${t('reject_label')}</strong>${tr.reject_reason}</div>`;
  }
  div.innerHTML = `
    <div class="tcard-header">
      <div class="tcard-meta">
        <span class="tcard-type ${typeClass}">${typeLabel}</span>
        <span class="status-badge status-${tr.status}">${statusLabel}</span>
        <span class="tcard-date">${dateDisp}</span>
      </div>
    </div>
    <div class="tcard-body">
      <div class="tcard-machine">${tr.line} – ${tr.machine}号機</div>
      <div class="tcard-product">${tr.product_code} / ${tr.product_name}</div>
      <span class="tcard-category">${tr.category}</span>
      <div class="tcard-detail">${tr.detail}</div>
      ${rejectHTML}
    </div>
    <div class="tcard-footer">
      <span class="tcard-submitter">👤 ${tr.submitted_by}</span>
      <span class="tcard-stop">⏱ ${stopLabel} &nbsp; ${occLabel}</span>
    </div>
    ${draftActionsHTML}`;
  div.addEventListener('click', () => openDetail(tr));
  return div;
}

}

/* ===== Draft actions ===== */
async function sendDraft(id) {
  const tr = TROUBLES.find(x => String(x.id) === String(id));
  if (!tr || !tr._draftId) { showToast('送信できません', 'error'); return; }
  try {
    await sbFetch('troubles', 'POST', {
      trouble_type: tr.type, status: 'pending',
      occurred_date: tr.date || null, shift: tr.shift,
      detail: tr.detail, occurrence: tr.occurrence || 'first',
      stop_minutes: tr.stop_minutes || null, reporter_id: SESSION.userId
    });
    await sbFetch('drafts?id=eq.' + tr._draftId, 'DELETE');
    TROUBLES = TROUBLES.filter(x => String(x.id) !== String(id));
    renderList();
    showToast(t('send_done'), 'success');
  } catch(e) { showToast('エラー: ' + e.message, 'error'); }
}

function editDraft(id) {
  const tr = TROUBLES.find(x => String(x.id) === String(id));
  if (!tr) return;
  location.href = (tr.type === 'equipment' ? 'input_equipment' : 'input_mold') + '.html' + (tr._draftId ? '?draft=' + tr._draftId : '');
}

function confirmDelete(id) {
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${t('del_title')}</div>
    <p class="confirm-msg">${t('del_msg').replace(/\n/g,'<br>')}</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeModal()">${t('del_cancel')}</button>
      <button class="btn-danger" onclick="deleteDraft('${id}')">${t('del_confirm')}</button>
    </div>
  `, true);
}

async function deleteDraft(id) {
  const tr = TROUBLES.find(x => String(x.id) === String(id));
  if (tr && tr._draftId) {
    try { await sbFetch('drafts?id=eq.' + tr._draftId, 'DELETE'); } catch(e) {}
  }
  TROUBLES = TROUBLES.filter(x => String(x.id) !== String(id));
  closeModal();
  renderList();
  showToast(t('del_done'), 'success');
}

/* ===== Nav ===== */
function goInput(type) {
  location.href = type === 'equipment' ? 'input_equipment.html' : 'input_mold.html';
}

function setTab(tab) {
  if (tab === 'dashboard') { location.href = 'dashboard.html'; return; }
  document.getElementById('scrollArea').scrollTo(0, 0);
}

function doLogout() {
  localStorage.removeItem('traq_session');
  showToast(t('logout_msg'));
  setTimeout(() => { location.href = 'index.html'; }, 1000);
}

/* ===== Theme ===== */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  const icon = isDark ? '☀️' : '🌙';
  document.getElementById('themeBtn').textContent = icon;
  const sbIcon = document.getElementById('sb-theme-icon');
  if (sbIcon) sbIcon.textContent = icon;
  localStorage.setItem('traq_theme', isDark ? 'light' : 'dark');
}
function initTheme() {
  const saved = localStorage.getItem('traq_theme');
  const pref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const theme = saved || pref;
  document.documentElement.setAttribute('data-theme', theme);
  const icon = theme === 'dark' ? '🌙' : '☀️';
  document.getElementById('themeBtn').textContent = icon;
  const sbIcon = document.getElementById('sb-theme-icon');
  if (sbIcon) sbIcon.textContent = icon;
}

/* ===== Modal ===== */
function showModal(html, center=false) {
  const el = document.getElementById('modalEl');
  el.innerHTML = `<div class="modal-overlay ${center?'center':''}" onclick="handleOverlayClick(event)"><div class="modal-sheet">${html}</div></div>`;
  el.style.display = 'block';
}
function closeModal() { document.getElementById('modalEl').style.display = 'none'; }
function handleOverlayClick(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); }

/* ===== Toast ===== */
let toastTimer = null;
function showToast(msg, type='') {
  const el = document.getElementById('toastEl');
  el.innerHTML = `<div class="toast ${type}">${msg}</div>`;
  el.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

/* ===== Load from Supabase ===== */
async function loadTroubles() {
  TROUBLES = [];
  try {
    const rows = await sbFetch(
      'troubles?select=*,lines(name),machines(machine_no),products(product_code,product_name),categories(name),traq_users!reporter_id(name)' +
      '&reporter_id=eq.' + SESSION.userId + '&order=created_at.desc&limit=50'
    );
    TROUBLES = (rows || []).map(r => ({
      id: r.id, type: r.trouble_type, status: r.status,
      date: (r.occurred_date || '').slice(0,10),
      shift: r.shift ? String(r.shift) : '',
      line: r.lines ? r.lines.name : '',
      machine: r.machines ? r.machines.machine_no : '',
      product_code: r.products ? r.products.product_code : '',
      product_name: r.products ? r.products.product_name : '',
      category: r.categories ? r.categories.name : '',
      occurrence: r.occurrence || 'first',
      stop_minutes: r.stop_minutes,
      detail: r.detail || '',
      submitted_by: r.traq_users ? r.traq_users.name : SESSION.name,
      submitted_at: r.created_at ? r.created_at.slice(0,16).replace('T',' ') : '',
      approved_by: r.approver_id ? '承認済み' : null,
      approved_at: r.approved_at ? r.approved_at.slice(0,16).replace('T',' ') : null,
      reject_reason: r.reject_reason || null,
    }));
  } catch(e) { showToast('データ読込エラー', 'error'); }
  try {
    const drows = await sbFetch('drafts?user_id=eq.' + SESSION.userId + '&order=updated_at.desc');
    (drows || []).forEach(dr => {
      const d = dr.data || {};
      TROUBLES.push({
        id: 'draft_' + dr.id, _draftId: dr.id,
        type: dr.trouble_type || 'equipment', status: 'draft',
        date: d.occurred_date || '', shift: d.shift ? String(d.shift) : String(SESSION.shift || ''),
        line: d.line_name || '', machine: d.machine_no || '',
        product_code: d.product_code || '', product_name: d.product_name || '',
        category: d.category_name || '', occurrence: d.occurrence || 'first',
        stop_minutes: d.stop_minutes || null, detail: d.detail || '',
        submitted_by: SESSION.name, submitted_at: dr.updated_at ? dr.updated_at.slice(0,16).replace('T',' ') : '',
        approved_by: null, approved_at: null, reject_reason: null,
      });
    });
  } catch(e) {}
  renderList();
}

/* ===== Init ===== */
(async function init() {
  if (!SESSION) { location.href = 'index.html'; return; }
  if (SESSION.role === 'leader' || SESSION.role === 'sl') { location.href = 'home_sl.html'; return; }
  if (SESSION.role === 'admin') { location.href = 'home_sl.html'; return; }
  initTheme();
  const savedLang = localStorage.getItem('traq_lang') || 'ja';
  currentLang = savedLang;
  ['ja','vi','en'].forEach(l => {
    const b2 = document.getElementById('sb-lang-'+l);
    if(b2) b2.classList.toggle('active', l===savedLang);
  });
  applyI18n();
  renderUserInfo();
  await loadTroubles();
})();
